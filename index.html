 biojätteelle ja kartongille.\n– Kuulostaa järkevältä. Miten saisimme kaikki mukaan?\n– Voisimme pitää lyhyen tiedotustilaisuuden ja kertoa, miksi tämä on tärkeää. Pienikin muutos auttaa, jos kaikki osallistuvat.", "malli_de": "– Meiner Meinung nach könnten wir damit beginnen, dass wir Einwegbecher abschaffen und eigene Kaffeetassen einführen. Das würde den Müll sofort verringern.\n– Gute Idee! Und was ist mit dem Papierverbrauch?\n– Ja, wir könnten weniger drucken und auf elektronische Dokumente umsteigen. Außerdem könnten wir im Pausenraum klare Trennbehälter für Bioabfall und Karton aufstellen.\n– Klingt sinnvoll. Wie bekämen wir alle dazu mitzumachen?\n– Wir könnten eine kurze Informationsveranstaltung abhalten und erklären, warum das wichtig ist. Schon eine kleine Veränderung hilft, wenn alle mitmachen."}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet matkatoimistossa ja haluat varata kestävän luontomatkan kotimaassa. Roolisi: kerro toiveistasi ja kysy matkan ympäristövaikutuksista. Keskustele haastattelijan kanssa.", "ohje_de": "Situation: Sie sind im Reisebüro und möchten eine nachhaltige Naturreise im Inland buchen. Ihre Rolle: Schildern Sie Ihre Wünsche und fragen Sie nach den Umweltauswirkungen der Reise. Führen Sie das Gespräch mit der Prüferin/dem Prüfer.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Hei! Haluaisin varata luontomatkan, joka olisi mahdollisimman ympäristöystävällinen. Voisitteko suositella jotain kotimaan kohdetta?\n– Tietysti. Millainen matka teitä kiinnostaisi?\n– Pidän vaeltamisesta ja haluaisin yöpyä luonnon lähellä, mieluiten junalla pääsee perille. Pääseekö kohteeseen ilman lentoa?\n– Kyllä, voimme järjestää junamatkan kansallispuiston lähelle.\n– Hienoa. Kuinka paljon matka kuormittaa ympäristöä, ja onko majoitus kestävää? Haluaisin tehdä vastuullisen valinnan.", "malli_de": "– Hallo! Ich würde gerne eine Naturreise buchen, die möglichst umweltfreundlich ist. Könnten Sie ein Inlandsziel empfehlen?\n– Selbstverständlich. Welche Art von Reise würde Sie interessieren?\n– Ich wandere gerne und würde gerne in Naturnähe übernachten, am liebsten erreicht man das Ziel mit dem Zug. Kommt man ohne Flug ans Ziel?\n– Ja, wir können eine Zugfahrt in die Nähe eines Nationalparks organisieren.\n– Toll. Wie stark belastet die Reise die Umwelt, und ist die Unterkunft nachhaltig? Ich würde gerne eine verantwortungsvolle Wahl treffen."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse yksi aihe ja kerro mielipiteesi. Perustele kantasi ja anna esimerkkejä. Sinulla on aikaa valmistautua. Aihe 1: Pitäisikö lyhyet automatkat korvata pyöräilyllä tai julkisilla? Aihe 2: Onko jokaisella vastuu ilmastonmuutoksen torjumisesta, vai onko se lähinnä valtioiden tehtävä?", "ohje_de": "Wählen Sie ein Thema und äußern Sie Ihre Meinung. Begründen Sie Ihren Standpunkt und geben Sie Beispiele. Sie haben Zeit zur Vorbereitung. Thema 1: Sollten kurze Autofahrten durch Fahrrad oder öffentliche Verkehrsmittel ersetzt werden? Thema 2: Trägt jeder Einzelne Verantwortung für den Klimaschutz, oder ist das vor allem Aufgabe der Staaten?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen aiheen kaksi: onko jokaisella vastuu ilmastonmuutoksen torjumisesta. Mielestäni vastuu kuuluu sekä yksilöille että valtioille, mutta molempia tarvitaan. Toki suuret päätökset, kuten energiantuotanto ja liikenteen säännöt, ovat valtioiden käsissä, ja niillä on suurin valta. Siksi on tärkeää, että poliitikot tekevät rohkeita ratkaisuja. Toisaalta uskon, että myös jokaisella meistä on oma roolinsa. Pienet teot, kuten kierrättäminen, ruokahävikin vähentäminen ja julkisen liikenteen käyttäminen, vaikuttavat yhdessä paljon. Esimerkiksi omassa arjessani olen alkanut käyttää pyörää lyhyillä matkoilla ja ostaa vähemmän tavaraa. Kun moni ihminen muuttaa tapojaan, myös yritykset ja päättäjät huomaavat sen. Lisäksi yksilöiden valinnat näyttävät esimerkkiä muille. En siis usko, että voimme jättää koko vastuun valtioille. Mielestäni paras tulos syntyy, kun me kaikki teemme yhteistyötä ja kannamme oman osamme. Ilmastonmuutos on yhteinen ongelma, joten myös ratkaisun on oltava yhteinen.", "malli_de": "Ich wähle das zweite Thema: ob jeder Einzelne Verantwortung für die Bekämpfung des Klimawandels trägt. Meiner Meinung nach liegt die Verantwortung sowohl bei den Einzelnen als auch bei den Staaten, aber beide werden gebraucht. Sicherlich liegen die großen Entscheidungen, wie die Energieerzeugung und die Verkehrsregeln, in den Händen der Staaten, und sie haben die größte Macht. Deshalb ist es wichtig, dass die Politiker mutige Lösungen treffen. Andererseits glaube ich, dass auch jeder von uns seine eigene Rolle hat. Kleine Taten wie Recyceln, die Verringerung von Lebensmittelverschwendung und die Nutzung öffentlicher Verkehrsmittel wirken zusammen viel. Zum Beispiel habe ich in meinem eigenen Alltag begonnen, auf kurzen Strecken das Fahrrad zu benutzen und weniger Dinge zu kaufen. Wenn viele Menschen ihre Gewohnheiten ändern, bemerken das auch die Unternehmen und Entscheidungsträger. Außerdem geben die Entscheidungen der Einzelnen anderen ein Beispiel. Ich glaube also nicht, dass wir die ganze Verantwortung den Staaten überlassen können. Meiner Meinung nach entsteht das beste Ergebnis, wenn wir alle zusammenarbeiten und unseren eigenen Teil tragen. Der Klimawandel ist ein gemeinsames Problem, also muss auch die Lösung gemeinsam sein."}]}, {"id": 10, "teema": "Yhteiskunta, media ja teknologia", "teema_de": "Gesellschaft, Medien und Technik", "reading": [{"otsikko": "Kaupungin tiedote: uusi sähköinen asiointipalvelu", "tyyppi": "tiedote", "teksti": "Hyvä kuntalainen,\n\nTampereen kaupunki avaa kesäkuussa uuden sähköisen asiointipalvelun nimeltä OmaTampere. Palvelussa voit hoitaa monia asioita kotoa käsin: voit hakea päivähoitopaikkaa, varata ajan terveysasemalle ja katsoa omia laskujasi. Voit myös lähettää viestin viranomaiselle ja seurata, miten asiasi etenee. Aiemmin näitä asioita piti hoitaa puhelimitse tai käymällä paikan päällä, mikä vei usein paljon aikaa.\n\nPalveluun kirjaudutaan pankkitunnuksilla tai mobiilivarmenteella. Jos sinulla ei ole verkkopankkitunnuksia, saat apua kirjautumiseen pääkirjaston neuvontapisteestä arkisin kello 10–16. Henkilökunta auttaa myös niitä, jotka käyttävät digipalveluja ensimmäistä kertaa. Mukaan kannattaa ottaa oma puhelin ja henkilöllisyystodistus.\n\nVanha puhelinpalvelu jatkaa toimintaansa vielä vuoden loppuun asti, joten kenenkään ei tarvitse jäädä ilman apua. Toivomme kuitenkin, että mahdollisimman moni kokeilee uutta palvelua, koska se on auki vuorokauden ympäri eikä siellä tarvitse jonottaa. Uskomme, että sähköinen asiointi helpottaa monen arkea ja säästää aikaa. Kysymyksiin vastaa asiakaspalvelumme osoitteessa neuvonta@tampere.fi.\n\nYstävällisin terveisin,\nTampereen kaupungin asiakaspalvelu", "teksti_de": "Sehr geehrte Gemeindebürgerin, sehr geehrter Gemeindebürger,\n\ndie Stadt Tampere eröffnet im Juni einen neuen elektronischen Behördendienst namens OmaTampere. Mit diesem Dienst können Sie viele Angelegenheiten von zu Hause aus erledigen: Sie können einen Betreuungsplatz für die Tagespflege beantragen, einen Termin im Gesundheitszentrum reservieren und Ihre eigenen Rechnungen einsehen. Sie können außerdem einer Behörde eine Nachricht senden und verfolgen, wie Ihre Angelegenheit voranschreitet. Früher mussten diese Dinge telefonisch oder durch einen Besuch vor Ort erledigt werden, was oft viel Zeit kostete.\n\nMan meldet sich im Dienst mit Bankkennungen oder mit einem mobilen Zertifikat an. Wenn Sie keine Online-Banking-Kennungen haben, erhalten Sie Hilfe bei der Anmeldung am Infopunkt der Hauptbibliothek, werktags von 10 bis 16 Uhr. Das Personal hilft auch denjenigen, die digitale Dienste zum ersten Mal nutzen. Es lohnt sich, das eigene Telefon und einen Ausweis mitzubringen.\n\nDer alte Telefondienst bleibt noch bis zum Jahresende in Betrieb, sodass niemand ohne Hilfe bleiben muss. Wir hoffen jedoch, dass möglichst viele den neuen Dienst ausprobieren, da er rund um die Uhr geöffnet ist und man dort nicht anstehen muss. Wir glauben, dass die elektronische Behördennutzung den Alltag vieler erleichtert und Zeit spart. Fragen beantwortet unser Kundenservice unter der Adresse neuvonta@tampere.fi.\n\nMit freundlichen Grüßen,\nKundenservice der Stadt Tampere", "hl": ["Tampereen kaupunki avaa kesäkuussa uuden sähköisen asiointipalvelun nimeltä OmaTampere.", "Palveluun kirjaudutaan pankkitunnuksilla tai mobiilivarmenteella.", "Jos sinulla ei ole verkkopankkitunnuksia, saat apua kirjautumiseen pääkirjaston neuvontapisteestä arkisin kello 10–16.", "Vanha puhelinpalvelu jatkaa toimintaansa vielä vuoden loppuun asti, joten kenenkään ei tarvitse jäädä ilman apua."], "image": "Simulaatio_10_yhteiskunta/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Mikä on tiedotteen tarkoitus?", "vaihtoehdot": ["Kertoa uudesta sähköisestä asiointipalvelusta.", "Ilmoittaa terveysaseman sulkemisesta.", "Pyytää asukkaita maksamaan laskunsa nopeammin."], "oikea": "a", "selitys_fi": "Tiedote esittelee uuden OmaTampere-palvelun ja sen käytön.", "vihje_de": "Es geht um einen neuen Online-Dienst der Stadt.", "kysymys_de": "Was ist der Zweck der Mitteilung?"}, {"id": "L2", "tyyppi": "monivalinta", "kysymys": "Miten palveluun kirjaudutaan?", "vaihtoehdot": ["Sähköpostiosoitteella ja salasanalla.", "Pankkitunnuksilla tai mobiilivarmenteella.", "Pelkällä puhelinnumerolla."], "oikea": "b", "selitys_fi": "Tekstissä sanotaan, että kirjautuminen tapahtuu pankkitunnuksilla tai mobiilivarmenteella.", "vihje_de": "Login mit Bankkennung oder mobiler Zertifizierung.", "kysymys_de": "Wie meldet man sich im Dienst an?"}, {"id": "L3", "tyyppi": "oikein-väärin", "kysymys": "Vanha puhelinpalvelu lopetetaan heti, kun uusi palvelu avataan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Puhelinpalvelu jatkuu vielä vuoden loppuun asti.", "vihje_de": "Der alte Telefondienst läuft bis Jahresende weiter.", "kysymys_de": "Der alte Telefondienst wird sofort eingestellt, sobald der neue Dienst eröffnet wird."}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Mistä saa apua kirjautumiseen, jos verkkopankkitunnuksia ei ole?", "vaihtoehdot": [], "oikea": "Pääkirjaston neuvontapisteestä.", "selitys_fi": "Tekstin mukaan apua saa pääkirjaston neuvontapisteestä arkisin.", "vihje_de": "Hilfe gibt es am Infopunkt der Hauptbibliothek.", "kysymys_de": "Wo bekommt man Hilfe bei der Anmeldung, wenn man keine Online-Banking-Kennungen hat?"}]}, {"otsikko": "Uutinen: Yhä useampi suomalainen seuraa uutisia puhelimella", "tyyppi": "uutinen", "teksti": "Tuoreen tutkimuksen mukaan suomalaiset lukevat uutisia entistä useammin älypuhelimella. Erityisesti nuoret aikuiset käyttävät puhelinta tärkeimpänä uutislähteenään, ja moni lukee uutiset matkalla töihin tai bussissa. Painettujen sanomalehtien lukeminen on sen sijaan vähentynyt selvästi viimeisten kymmenen vuoden aikana, ja yhä useampi lehti ilmestyy nykyään vain verkossa.\n\nTutkijat huomauttavat, että muutoksella on myös varjopuolensa. Sosiaalisessa mediassa leviää helposti virheellistä tietoa, ja moni jakaa uutisia lukematta niitä kunnolla. Siksi on tärkeää tarkistaa, mistä lähteestä tieto on peräisin. Luotettavan median uutisissa kerrotaan yleensä selkeästi, kuka jutun on kirjoittanut ja mihin tiedot perustuvat. Asiantuntijat suosittelevatkin, että saman uutisen lukisi useammasta lähteestä ennen kuin sen jakaa eteenpäin.\n\nTutkimukseen osallistui yli kaksituhatta ihmistä eri puolilta Suomea. Vastaajista noin 70 prosenttia sanoi seuraavansa uutisia päivittäin. Vaikka kanavat muuttuvat, kiinnostus ajankohtaisiin asioihin ei ole vähentynyt. Tutkijoiden mukaan tärkeintä on opettaa kaikenikäisille, miten tietoa arvioidaan kriittisesti ja miten erottaa luotettava uutinen huijauksesta.", "teksti_de": "Einer aktuellen Studie zufolge lesen die Finnen Nachrichten immer häufiger auf dem Smartphone. Besonders junge Erwachsene nutzen das Telefon als ihre wichtigste Nachrichtenquelle, und viele lesen die Nachrichten auf dem Weg zur Arbeit oder im Bus. Das Lesen gedruckter Zeitungen hat dagegen in den letzten zehn Jahren deutlich abgenommen, und immer mehr Zeitungen erscheinen heutzutage nur noch online.\n\nDie Forscher weisen darauf hin, dass die Veränderung auch ihre Schattenseiten hat. In den sozialen Medien verbreiten sich leicht falsche Informationen, und viele teilen Nachrichten, ohne sie richtig gelesen zu haben. Deshalb ist es wichtig zu überprüfen, aus welcher Quelle eine Information stammt. In den Nachrichten zuverlässiger Medien wird in der Regel klar angegeben, wer den Beitrag geschrieben hat und worauf die Informationen beruhen. Experten empfehlen daher, dieselbe Nachricht aus mehreren Quellen zu lesen, bevor man sie weiterverbreitet.\n\nAn der Studie nahmen über zweitausend Menschen aus allen Teilen Finnlands teil. Etwa 70 Prozent der Befragten gaben an, täglich Nachrichten zu verfolgen. Obwohl sich die Kanäle ändern, hat das Interesse an aktuellen Themen nicht abgenommen. Den Forschern zufolge ist es am wichtigsten, Menschen jeden Alters beizubringen, wie man Informationen kritisch bewertet und wie man eine zuverlässige Nachricht von einem Betrug unterscheidet.", "hl": ["Tuoreen tutkimuksen mukaan suomalaiset lukevat uutisia entistä useammin älypuhelimella.", "Painettujen sanomalehtien lukeminen on sen sijaan vähentynyt selvästi viimeisten kymmenen vuoden aikana, ja yhä useampi lehti ilmestyy nykyään vain verkossa.", "Sosiaalisessa mediassa leviää helposti virheellistä tietoa, ja moni jakaa uutisia lukematta niitä kunnolla.", "Vastaajista noin 70 prosenttia sanoi seuraavansa uutisia päivittäin."], "image": null, "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Millä laitteella suomalaiset lukevat uutisia yhä useammin?", "vaihtoehdot": ["Tietokoneella.", "Älypuhelimella.", "Tabletilla."], "oikea": "b", "selitys_fi": "Uutisen mukaan uutisia luetaan entistä useammin älypuhelimella.", "vihje_de": "Immer mehr lesen Nachrichten auf dem Smartphone.", "kysymys_de": "Mit welchem Gerät lesen die Finnen immer häufiger Nachrichten?"}, {"id": "L6", "tyyppi": "oikein-väärin", "kysymys": "Painettujen sanomalehtien lukeminen on lisääntynyt viime vuosina.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan painettujen lehtien lukeminen on päinvastoin vähentynyt.", "vihje_de": "Das Lesen gedruckter Zeitungen hat abgenommen, nicht zugenommen.", "kysymys_de": "Das Lesen gedruckter Zeitungen hat in den letzten Jahren zugenommen."}, {"id": "L7", "tyyppi": "monivalinta", "kysymys": "Mitä varjopuolia tutkijat mainitsevat?", "vaihtoehdot": ["Uutiset ovat liian pitkiä.", "Sosiaalisessa mediassa leviää virheellistä tietoa.", "Puhelimet ovat liian kalliita."], "oikea": "b", "selitys_fi": "Tutkijat varoittavat, että somessa leviää helposti virheellistä tietoa.", "vihje_de": "In sozialen Medien verbreiten sich Falschinformationen.", "kysymys_de": "Welche Schattenseiten erwähnen die Forscher?"}, {"id": "L8", "tyyppi": "lyhyt", "kysymys": "Kuinka suuri osa vastaajista seuraa uutisia päivittäin?", "vaihtoehdot": [], "oikea": "Noin 70 prosenttia.", "selitys_fi": "Tekstissä kerrotaan, että noin 70 prosenttia vastaajista seuraa uutisia päivittäin.", "vihje_de": "Etwa 70 Prozent verfolgen täglich Nachrichten.", "kysymys_de": "Wie groß ist der Anteil der Befragten, die täglich Nachrichten verfolgen?"}]}, {"otsikko": "Ohje: Näin tunnistaudut digipalvelussa turvallisesti", "tyyppi": "ohje", "teksti": "Monet viranomaispalvelut vaativat vahvaa tunnistautumista. Se tarkoittaa, että palvelu varmistaa henkilöllisyytesi luotettavasti. Näin asioit verkossa turvallisesti:\n\n1. Avaa palvelun verkkosivu ja valitse \"Kirjaudu sisään\". Tarkista aina, että osoite alkaa kirjaimilla https ja että selaimessa näkyy lukon kuva.\n\n2. Valitse tunnistustapa: verkkopankkitunnukset, mobiilivarmenne tai varmennekortti. Älä koskaan anna tunnuksiasi kenellekään toiselle.\n\n3. Syötä tunnistustiedot huolellisesti. Pankki tai viranomainen ei koskaan kysy salasanaasi sähköpostitse tai puhelimitse. Jos saat tällaisen viestin, kyseessä on todennäköisesti huijaus, vaikka viesti näyttäisi virallisesti tehdyltä.\n\n4. Kun olet hoitanut asiasi, muista kirjautua ulos ja sulkea selain. Tämä on erityisen tärkeää, jos käytät yhteistä tietokonetta esimerkiksi kirjastossa. Älä myöskään tallenna salasanaa selaimeen, jos kone on muidenkin käytössä.\n\nKannattaa myös pitää oma puhelin ja sovellukset ajan tasalla, koska päivitykset korjaavat tietoturva-aukkoja. Jos epäilet, että tunnuksesi ovat joutuneet vääriin käsiin, ota heti yhteyttä pankkiisi. Mitä nopeammin toimit, sitä paremmin vältät vahingot.", "teksti_de": "Viele Behördendienste verlangen eine starke Authentifizierung. Das bedeutet, dass der Dienst Ihre Identität zuverlässig bestätigt. So erledigen Sie Ihre Angelegenheiten online sicher:\n\n1. Öffnen Sie die Webseite des Dienstes und wählen Sie „Anmelden“. Prüfen Sie immer, dass die Adresse mit den Buchstaben https beginnt und dass im Browser ein Schloss-Symbol angezeigt wird.\n\n2. Wählen Sie die Authentifizierungsmethode: Online-Banking-Kennungen, mobiles Zertifikat oder Zertifikatskarte. Geben Sie Ihre Kennungen niemals an jemand anderen weiter.\n\n3. Geben Sie die Authentifizierungsdaten sorgfältig ein. Eine Bank oder Behörde fragt niemals per E-Mail oder Telefon nach Ihrem Passwort. Wenn Sie eine solche Nachricht erhalten, handelt es sich höchstwahrscheinlich um einen Betrug, auch wenn die Nachricht offiziell aussieht.\n\n4. Wenn Sie Ihre Angelegenheit erledigt haben, denken Sie daran, sich abzumelden und den Browser zu schließen. Das ist besonders wichtig, wenn Sie einen gemeinsam genutzten Computer verwenden, zum Beispiel in der Bibliothek. Speichern Sie das Passwort auch nicht im Browser, wenn der Computer auch von anderen genutzt wird.\n\nEs lohnt sich außerdem, das eigene Telefon und die Anwendungen auf dem aktuellen Stand zu halten, da Aktualisierungen Sicherheitslücken schließen. Wenn Sie vermuten, dass Ihre Kennungen in die falschen Hände geraten sind, wenden Sie sich sofort an Ihre Bank. Je schneller Sie handeln, desto besser vermeiden Sie Schäden.", "hl": ["Se tarkoittaa, että palvelu varmistaa henkilöllisyytesi luotettavasti.", "Tarkista aina, että osoite alkaa kirjaimilla https ja että selaimessa näkyy lukon kuva.", "Pankki tai viranomainen ei koskaan kysy salasanaasi sähköpostitse tai puhelimitse.", "Kun olet hoitanut asiasi, muista kirjautua ulos ja sulkea selain."], "image": "Simulaatio_10_yhteiskunta/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Mitä tarkoittaa vahva tunnistautuminen?", "vaihtoehdot": ["Palvelu varmistaa henkilöllisyytesi luotettavasti.", "Salasanan pitää olla erityisen pitkä.", "Tunnistautuminen maksaa enemmän kuin tavallinen."], "oikea": "a", "selitys_fi": "Tekstin mukaan vahva tunnistautuminen tarkoittaa henkilöllisyyden luotettavaa varmistamista.", "vihje_de": "Starke Authentifizierung = der Dienst prüft die Identität zuverlässig.", "kysymys_de": "Was bedeutet starke Authentifizierung?"}, {"id": "L10", "tyyppi": "oikein-väärin", "kysymys": "Pankki voi joskus kysyä salasanaasi sähköpostitse.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Ohjeessa sanotaan selvästi, ettei pankki koskaan kysy salasanaa sähköpostitse.", "vihje_de": "Eine Bank fragt das Passwort nie per E-Mail ab.", "kysymys_de": "Eine Bank kann manchmal per E-Mail nach Ihrem Passwort fragen."}, {"id": "L11", "tyyppi": "monivalinta", "kysymys": "Mitä kannattaa tarkistaa verkkosivun osoitteesta?", "vaihtoehdot": ["Että osoite on lyhyt.", "Että osoite alkaa kirjaimilla https.", "Että osoite on kirjoitettu isoilla kirjaimilla."], "oikea": "b", "selitys_fi": "Ohjeen mukaan turvallisen sivun osoite alkaa https-kirjaimilla ja selaimessa näkyy lukon kuva.", "vihje_de": "Die Adresse sollte mit https beginnen.", "kysymys_de": "Was sollte man an der Adresse der Webseite überprüfen?"}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Mitä pitää tehdä, kun asiointi on valmis?", "vaihtoehdot": [], "oikea": "Kirjautua ulos ja sulkea selain.", "selitys_fi": "Ohjeen kohta 4 neuvoo kirjautumaan ulos ja sulkemaan selaimen.", "vihje_de": "Ausloggen und den Browser schließen.", "kysymys_de": "Was muss man tun, wenn die Erledigung der Angelegenheit abgeschlossen ist?"}]}, {"otsikko": "Mielipideblogi: Kannattaako kaiken olla netissä?", "tyyppi": "blogi", "teksti": "Olen iloinen siitä, että yhä useamman asian voi hoitaa verkossa. Maksan laskut sohvalta käsin, varaan lääkäriajan minuutissa enkä joudu jonottamaan virastoon. Minulle digipalvelut ovat helpottaneet arkea valtavasti.\n\nSilti mietin usein niitä, joille muutos on vaikeampi. Isoäitini on 84-vuotias eikä ole koskaan käyttänyt tietokonetta. Kun hänen pankkinsa konttori suljettiin, hän ei enää tiennyt, miten hoitaa raha-asioitaan. Onneksi sain autettua, mutta kaikilla ei ole lähellä ketään, joka osaisi neuvoa.\n\nMielestäni yhteiskunnan pitää huolehtia siitä, että palveluja saa myös ilman älypuhelinta. Kaikki eivät halua tai osaa käyttää digilaitteita, eikä se ole kenenkään vika. Olisi reilua, että jokainen voisi valita itselleen sopivimman tavan asioida.\n\nEn siis vastusta digitalisaatiota – päinvastoin. Toivon vain, ettei ketään jätetä yksin. Hyvä yhteiskunta mittaa arvonsa sen mukaan, miten se kohtelee heikoimmassa asemassa olevia.", "teksti_de": "Ich freue mich darüber, dass man immer mehr Dinge online erledigen kann. Ich zahle die Rechnungen vom Sofa aus, reserviere in einer Minute einen Arzttermin und muss nicht im Amt anstehen. Für mich haben die digitalen Dienste den Alltag enorm erleichtert.\n\nTrotzdem denke ich oft an diejenigen, denen die Veränderung schwererfällt. Meine Großmutter ist 84 Jahre alt und hat noch nie einen Computer benutzt. Als die Filiale ihrer Bank geschlossen wurde, wusste sie nicht mehr, wie sie ihre Geldangelegenheiten erledigen sollte. Zum Glück konnte ich ihr helfen, aber nicht alle haben jemanden in der Nähe, der sie beraten könnte.\n\nMeiner Meinung nach muss die Gesellschaft dafür sorgen, dass man Dienste auch ohne Smartphone in Anspruch nehmen kann. Nicht alle wollen oder können digitale Geräte benutzen, und das ist niemandes Schuld. Es wäre fair, wenn jeder die für sich am besten geeignete Art wählen könnte, seine Angelegenheiten zu erledigen.\n\nIch bin also nicht gegen die Digitalisierung – im Gegenteil. Ich wünsche mir nur, dass niemand allein gelassen wird. Eine gute Gesellschaft misst ihren Wert daran, wie sie diejenigen behandelt, die sich in der schwächsten Position befinden.", "hl": ["Minulle digipalvelut ovat helpottaneet arkea valtavasti.", "Isoäitini on 84-vuotias eikä ole koskaan käyttänyt tietokonetta.", "Mielestäni yhteiskunnan pitää huolehtia siitä, että palveluja saa myös ilman älypuhelinta.", "Toivon vain, ettei ketään jätetä yksin."], "image": "Simulaatio_10_yhteiskunta/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Mikä on kirjoittajan oma suhtautuminen digipalveluihin?", "vaihtoehdot": ["Hän vastustaa niitä jyrkästi.", "Hän pitää niistä, mutta on huolissaan toisista ihmisistä.", "Hän ei käytä niitä lainkaan."], "oikea": "b", "selitys_fi": "Kirjoittaja kertoo hyötyvänsä digipalveluista mutta murehtii niitä, joille muutos on vaikea.", "vihje_de": "Sie schätzt sie, sorgt sich aber um andere.", "kysymys_de": "Wie ist die eigene Einstellung des Verfassers zu den digitalen Diensten?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Kirjoittajan isoäiti käyttää sujuvasti tietokonetta.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan isoäiti ei ole koskaan käyttänyt tietokonetta.", "vihje_de": "Die Großmutter hat nie einen Computer benutzt.", "kysymys_de": "Die Großmutter des Verfassers benutzt den Computer mühelos."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Mitä kirjoittaja toivoo yhteiskunnalta?", "vaihtoehdot": [], "oikea": "Että palveluja saisi myös ilman älypuhelinta eikä ketään jätettäisi yksin.", "selitys_fi": "Kirjoittaja toivoo, että palveluja voi käyttää myös ilman digilaitteita ja että jokainen voi valita sopivimman tavan.", "vihje_de": "Dienste sollen auch ohne Smartphone möglich sein.", "kysymys_de": "Was wünscht sich der Verfasser von der Gesellschaft?"}]}], "listening": [{"otsikko": "Radiouutinen: Kunta kerää asukkaiden mielipiteitä verkossa", "tyyppi": "monologi", "litteraatti": "Hyvää huomenta ja tervetuloa aamun uutisiin. Espoon kaupunki haluaa kuulla asukkaidensa mielipiteitä ensi vuoden suunnitelmista. Tällä viikolla on avattu verkkokysely, johon kuka tahansa kaupungin asukas voi vastata. Kyselyssä kysytään muun muassa, mihin palveluihin kaupungin pitäisi käyttää rahaa ja millaisia uusia liikuntapaikkoja kaupunkiin toivotaan. Kyselyyn voi vastata nimettömänä, ja siihen menee aikaa noin kymmenen minuuttia. Kaupunki muistuttaa, että vastaaminen onnistuu sekä tietokoneella että puhelimella. Niille, jotka eivät käytä internetiä, on järjestetty mahdollisuus vastata kyselyyn paperilla kirjastoissa. Kysely on auki kahden viikon ajan, ja tulokset julkaistaan kaupungin sivuilla ensi kuussa. Päättäjät lupaavat ottaa asukkaiden toiveet huomioon, kun ensi vuoden talousarviota valmistellaan. Ja sitten säähän.", "litteraatti_de": "Guten Morgen und willkommen zu den Morgennachrichten. Die Stadt Espoo möchte die Meinungen ihrer Bewohner zu den Plänen für das nächste Jahr hören. Diese Woche wurde eine Online-Umfrage freigeschaltet, an der jeder Bewohner der Stadt teilnehmen kann. In der Umfrage wird unter anderem gefragt, für welche Dienste die Stadt Geld ausgeben sollte und was für neue Sportstätten man sich für die Stadt wünscht. Man kann die Umfrage anonym beantworten, und es dauert etwa zehn Minuten. Die Stadt weist darauf hin, dass das Beantworten sowohl am Computer als auch am Telefon möglich ist. Für diejenigen, die das Internet nicht nutzen, wurde die Möglichkeit eingerichtet, die Umfrage auf Papier in den Bibliotheken zu beantworten. Die Umfrage ist zwei Wochen lang geöffnet, und die Ergebnisse werden im nächsten Monat auf den Seiten der Stadt veröffentlicht. Die Entscheidungsträger versprechen, die Wünsche der Bewohner zu berücksichtigen, wenn der Haushaltsplan für das nächste Jahr vorbereitet wird. Und nun zum Wetter.", "hl": ["Espoon kaupunki haluaa kuulla asukkaidensa mielipiteitä ensi vuoden suunnitelmista.", "Kyselyyn voi vastata nimettömänä, ja siihen menee aikaa noin kymmenen minuuttia.", "Niille, jotka eivät käytä internetiä, on järjestetty mahdollisuus vastata kyselyyn paperilla kirjastoissa.", "Kysely on auki kahden viikon ajan, ja tulokset julkaistaan kaupungin sivuilla ensi kuussa."], "audio": "Simulaatio_10_yhteiskunta/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Mitä kaupunki haluaa asukkailtaan?", "vaihtoehdot": ["Rahaa uusiin palveluihin.", "Mielipiteitä ensi vuoden suunnitelmista.", "Apua kyselyn tekemiseen."], "oikea": "b", "selitys_fi": "Uutisessa kerrotaan, että kaupunki haluaa kuulla asukkaiden mielipiteitä suunnitelmista.", "vihje_de": "Die Stadt will die Meinungen der Bewohner hören.", "kysymys_de": "Was möchte die Stadt von ihren Bewohnern?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Kuinka kauan kyselyyn vastaamiseen menee aikaa?", "vaihtoehdot": ["Noin kymmenen minuuttia.", "Noin kaksi viikkoa.", "Noin tunti."], "oikea": "a", "selitys_fi": "Uutisen mukaan vastaamiseen menee noin kymmenen minuuttia.", "vihje_de": "Das Ausfüllen dauert etwa zehn Minuten.", "kysymys_de": "Wie lange dauert das Beantworten der Umfrage?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Kyselyyn voi vastata myös paperilla kirjastossa.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Uutisessa sanotaan, että netittömät voivat vastata paperilla kirjastoissa.", "vihje_de": "Man kann auch auf Papier in der Bibliothek antworten.", "kysymys_de": "Man kann die Umfrage auch auf Papier in der Bibliothek beantworten."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Milloin kyselyn tulokset julkaistaan?", "vaihtoehdot": [], "oikea": "Ensi kuussa.", "selitys_fi": "Uutisen mukaan tulokset julkaistaan kaupungin sivuilla ensi kuussa.", "vihje_de": "Die Ergebnisse werden nächsten Monat veröffentlicht.", "kysymys_de": "Wann werden die Ergebnisse der Umfrage veröffentlicht?"}]}, {"otsikko": "Neuvontapuhelu: Apua mobiilisovelluksen kanssa", "tyyppi": "puhelu", "litteraatti": "– Neuvoja: Digineuvonta, hyvää päivää. Kuinka voin auttaa?\n– Nainen: Hei. Yritän käyttää terveyspalvelun sovellusta puhelimessani, mutta en pääse kirjautumaan sisään. Se sanoo koko ajan, että salasana on väärin.\n– Neuvoja: Selvä. Oletteko aivan varma, että käytätte oikeaa salasanaa? Iso ja pieni kirjain ovat eri asia.\n– Nainen: Voi, en tullut ajatelleeksi sitä. Mutta en muista, oliko siinä isoja kirjaimia.\n– Neuvoja: Ei hätää. Voitte tilata uuden salasanan. Valitkaa kirjautumissivulla kohta \"Unohditko salasanan\". Sen jälkeen sovellus lähettää teille tekstiviestin, jossa on ohjeet.\n– Nainen: Aivan. Pitääkö minun antaa jotain tietoja?\n– Neuvoja: Kyllä, syöttäkää puhelinnumeronne, niin saatte viestin muutamassa minuutissa. Älkää antako koodia kenellekään muulle.\n– Nainen: Selvä, kokeilen heti. Kiitos paljon avusta!\n– Neuvoja: Olkaa hyvä. Soittakaa uudelleen, jos ongelma jatkuu.", "litteraatti_de": "– Berater: Digitalberatung, guten Tag. Wie kann ich Ihnen helfen?\n– Frau: Hallo. Ich versuche, die App des Gesundheitsdienstes auf meinem Telefon zu nutzen, aber ich kann mich nicht anmelden. Es sagt die ganze Zeit, dass das Passwort falsch ist.\n– Berater: Verstehe. Sind Sie ganz sicher, dass Sie das richtige Passwort verwenden? Groß- und Kleinbuchstaben sind verschiedene Dinge.\n– Frau: Oh, daran habe ich nicht gedacht. Aber ich erinnere mich nicht, ob darin Großbuchstaben waren.\n– Berater: Kein Problem. Sie können ein neues Passwort anfordern. Wählen Sie auf der Anmeldeseite den Punkt „Passwort vergessen“. Danach sendet Ihnen die App eine SMS mit Anweisungen.\n– Frau: Aha. Muss ich irgendwelche Daten angeben?\n– Berater: Ja, geben Sie Ihre Telefonnummer ein, dann erhalten Sie die Nachricht in wenigen Minuten. Geben Sie den Code niemandem anderen.\n– Frau: Alles klar, ich probiere es sofort. Vielen Dank für die Hilfe!\n– Berater: Gern geschehen. Rufen Sie noch einmal an, wenn das Problem weiterbesteht.", "hl": ["Yritän käyttää terveyspalvelun sovellusta puhelimessani, mutta en pääse kirjautumaan sisään.", "Voitte tilata uuden salasanan. Valitkaa kirjautumissivulla kohta \"Unohditko salasanan\". Sen jälkeen sovellus lähettää teille tekstiviestin, jossa on ohjeet.", "Älkää antako koodia kenellekään muulle."], "audio": "Simulaatio_10_yhteiskunta/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Mikä on naisen ongelma?", "vaihtoehdot": ["Hän ei pääse kirjautumaan sovellukseen.", "Hänen puhelimensa on rikki.", "Hän ei löydä sovellusta."], "oikea": "a", "selitys_fi": "Nainen kertoo, ettei pääse kirjautumaan, koska salasana on hänen mukaansa väärin.", "vihje_de": "Sie kann sich nicht in die App einloggen.", "kysymys_de": "Was ist das Problem der Frau?"}, {"id": "Ku6", "tyyppi": "monivalinta", "kysymys": "Mitä neuvoja kehottaa naista tekemään?", "vaihtoehdot": ["Asentamaan sovelluksen uudelleen.", "Tilaamaan uuden salasanan.", "Ostamaan uuden puhelimen."], "oikea": "b", "selitys_fi": "Neuvoja neuvoo valitsemaan \"Unohditko salasanan\" ja tilaamaan uuden salasanan.", "vihje_de": "Sie soll ein neues Passwort anfordern.", "kysymys_de": "Was rät der Berater der Frau zu tun?"}, {"id": "Ku7", "tyyppi": "oikein-väärin", "kysymys": "Nainen saa ohjeet uudesta salasanasta sähköpostitse.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Ohjeet tulevat tekstiviestillä, ei sähköpostilla.", "vihje_de": "Die Anleitung kommt per SMS, nicht per E-Mail.", "kysymys_de": "Die Frau erhält die Anweisungen zum neuen Passwort per E-Mail."}, {"id": "Ku8", "tyyppi": "lyhyt", "kysymys": "Mitä neuvoja muistuttaa koodista?", "vaihtoehdot": [], "oikea": "Ettei koodia saa antaa kenellekään muulle.", "selitys_fi": "Neuvoja korostaa, ettei tekstiviestin koodia saa antaa kenellekään toiselle.", "vihje_de": "Den Code niemandem anderen geben.", "kysymys_de": "Woran erinnert der Berater bezüglich des Codes?"}]}, {"otsikko": "Keskustelu: Kuinka paljon aikaa puhelimen kanssa?", "tyyppi": "dialogi", "litteraatti": "– Mies: Huomasitko, että puhelimeni näyttää nyt, kuinka monta tuntia päivässä käytän sitä? Eilen se oli melkein viisi tuntia. Vähän hävettää.\n– Nainen: Viisi tuntia! Sehän on aika paljon. Mihin se kaikki aika menee?\n– Mies: Suurin osa menee sosiaaliseen mediaan ja uutisten selaamiseen. Aloitan aamulla ja huomaan yhtäkkiä, että puoli tuntia on mennyt.\n– Nainen: Tunnen tunteen. Minä yritin laittaa puhelimen pois illalla kello yhdeksän jälkeen. Nukun nyt paljon paremmin.\n– Mies: Hyvä idea. Minä voisin kokeilla samaa. Ehkä lukisin kirjaa sen sijaan, että selaan ruutua ennen nukkumaanmenoa.\n– Nainen: Juuri niin. Eräs kaverini poisti sovelluksia kokonaan ja sanoo, että hänellä on nyt enemmän aikaa harrastuksille.\n– Mies: Se kuulostaa hyvältä. En usko, että pystyn poistamaan kaikkea, mutta voisin ainakin sammuttaa turhat ilmoitukset.\n– Nainen: Hyvä alku. Pienikin muutos auttaa.", "litteraatti_de": "– Mann: Hast du bemerkt, dass mein Telefon jetzt anzeigt, wie viele Stunden am Tag ich es benutze? Gestern waren es fast fünf Stunden. Ein bisschen peinlich.\n– Frau: Fünf Stunden! Das ist ja ziemlich viel. Wo geht diese ganze Zeit hin?\n– Mann: Das meiste geht für soziale Medien und das Durchblättern von Nachrichten drauf. Ich fange am Morgen an und merke plötzlich, dass eine halbe Stunde vergangen ist.\n– Frau: Ich kenne das Gefühl. Ich habe versucht, das Telefon abends nach neun Uhr wegzulegen. Ich schlafe jetzt viel besser.\n– Mann: Gute Idee. Ich könnte dasselbe ausprobieren. Vielleicht würde ich ein Buch lesen, anstatt vor dem Schlafengehen auf den Bildschirm zu schauen.\n– Frau: Genau so. Ein Bekannter von mir hat Apps ganz gelöscht und sagt, dass er jetzt mehr Zeit für Hobbys hat.\n– Mann: Das klingt gut. Ich glaube nicht, dass ich alles löschen kann, aber ich könnte zumindest die unnötigen Benachrichtigungen ausschalten.\n– Frau: Ein guter Anfang. Auch eine kleine Veränderung hilft.", "hl": ["Eilen se oli melkein viisi tuntia.", "Suurin osa menee sosiaaliseen mediaan ja uutisten selaamiseen.", "Minä yritin laittaa puhelimen pois illalla kello yhdeksän jälkeen. Nukun nyt paljon paremmin.", "En usko, että pystyn poistamaan kaikkea, mutta voisin ainakin sammuttaa turhat ilmoitukset."], "audio": "Simulaatio_10_yhteiskunta/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Kuinka kauan mies käytti puhelinta eilen?", "vaihtoehdot": ["Noin kaksi tuntia.", "Melkein viisi tuntia.", "Puoli tuntia."], "oikea": "b", "selitys_fi": "Mies kertoo, että puhelimen käyttö oli eilen melkein viisi tuntia.", "vihje_de": "Fast fünf Stunden am Vortag.", "kysymys_de": "Wie lange hat der Mann gestern das Telefon benutzt?"}, {"id": "Ku10", "tyyppi": "monivalinta", "kysymys": "Mihin miehen aika kuluu eniten?", "vaihtoehdot": ["Pelaamiseen.", "Sosiaaliseen mediaan ja uutisiin.", "Soittamiseen."], "oikea": "b", "selitys_fi": "Mies sanoo, että suurin osa ajasta menee someen ja uutisten selaamiseen.", "vihje_de": "Soziale Medien und Nachrichten.", "kysymys_de": "Womit verbringt der Mann die meiste Zeit?"}, {"id": "Ku11", "tyyppi": "oikein-väärin", "kysymys": "Nainen nukkuu paremmin, kun hän laittaa puhelimen pois illalla.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Nainen kertoo nukkuvansa paremmin, kun hän ei käytä puhelinta yhdeksän jälkeen.", "vihje_de": "Sie schläft besser, wenn sie das Handy weglegt.", "kysymys_de": "Die Frau schläft besser, wenn sie das Telefon abends weglegt."}, {"id": "Ku12", "tyyppi": "lyhyt", "kysymys": "Mitä mies aikoo tehdä vähentääkseen puhelimen käyttöä?", "vaihtoehdot": [], "oikea": "Sammuttaa turhat ilmoitukset.", "selitys_fi": "Mies sanoo, että voisi ainakin sammuttaa turhat ilmoitukset.", "vihje_de": "Unnötige Benachrichtigungen ausschalten.", "kysymys_de": "Was hat der Mann vor, um die Telefonnutzung zu verringern?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Ystäväsi pyysi sinua auttamaan häntä uuden mobiilisovelluksen kanssa. Kirjoita hänelle lyhyt viesti, jossa: 1) ehdotat tapaamisaikaa, 2) kerrot, mitä sovelluksen käyttöön tarvitaan (esim. puhelin ja pankkitunnukset), ja 3) pyydät häntä vahvistamaan, sopiiko aika.", "ohje_de": "Ein Freund hat dich gebeten, ihm mit einer neuen App zu helfen. Schreibe eine kurze Nachricht: 1) schlage einen Termin vor, 2) sage, was man braucht (z. B. Handy und Bankkennung), 3) bitte um Bestätigung.", "sanamaara": "80–120", "mallivastaus": "Moi Antti!\n\nKiva, että haluat opetella käyttämään sitä uutta sovellusta. Autan sinua tietysti mielelläni, koska muistan itsekin, miten hankalaa alku oli. Sopisiko sinulle ensi torstai kello 17? Voisin tulla sinun luoksesi suoraan töiden jälkeen, niin katsotaan asiaa ihan rauhassa yhdessä.\n\nOta tapaamiseen mukaan oma puhelimesi ja pankkitunnukset, koska niitä tarvitaan kirjautumiseen. Lataa myös sovellus valmiiksi etukäteen, jos osaat, niin meidän ei tarvitse odottaa latausta turhaan. Jos jokin ei onnistu, ei se haittaa – katsotaan kaikki kohdat yhdessä alusta loppuun.\n\nKerro pian, sopiiko torstai sinulle. Jos ei sovi, ehdotan mielelläni jotain muuta päivää. Nähdään pian!\n\nTerveisin,\nMaria", "arviointi_fi": "Hyvässä vastauksessa on epävirallinen ja ystävällinen sävy, kaikki kolme asiaa (aikaehdotus, tarvittavat välineet, vahvistuspyyntö) on mainittu, ja viesti on noin 80–120 sanaa. Tarkista tervehdys, lopputervehdys ja selkeät lauseet.", "mallivastaus_de": "Hallo Antti!\n\nSchön, dass du lernen möchtest, diese neue App zu benutzen. Ich helfe dir natürlich gern, weil ich mich selbst noch daran erinnere, wie schwierig der Anfang war. Würde dir nächster Donnerstag um 17 Uhr passen? Ich könnte direkt nach der Arbeit zu dir kommen, dann schauen wir uns die Sache ganz in Ruhe gemeinsam an.\n\nBring zu dem Treffen dein eigenes Telefon und deine Bankkennungen mit, weil man sie zum Anmelden braucht. Lade auch die App vorher schon herunter, wenn du das hinbekommst, damit wir nicht unnötig auf das Herunterladen warten müssen. Wenn etwas nicht klappt, macht das nichts – wir schauen uns alle Punkte gemeinsam von Anfang bis Ende an.\n\nSag mir bald Bescheid, ob dir der Donnerstag passt. Wenn nicht, schlage ich gern einen anderen Tag vor. Bis bald!\n\nViele Grüße,\nMaria"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Verkkolehden keskustelupalstalla kysytään: \"Pitäisikö lapsille sallia älypuhelin kouluun?\" Kirjoita oma mielipiteesi. Perustele kantasi vähintään kahdella syyllä ja anna esimerkki. Voit myös mainita vastakkaisen näkökulman.", "ohje_de": "In einem Online-Forum wird gefragt: „Sollten Kinder Smartphones mit in die Schule nehmen dürfen?“ Schreibe deine Meinung. Begründe mit mindestens zwei Argumenten und nenne ein Beispiel. Du kannst auch die Gegenseite erwähnen.", "sanamaara": "150–200", "mallivastaus": "Älypuhelimet koulussa – hyvä vai huono asia?\n\nMinun mielestäni lapset voivat tuoda älypuhelimen kouluun, mutta sen käyttöä pitää rajoittaa selvästi oppituntien aikana. Puhelimesta on nimittäin sekä paljon hyötyä että myös selvää haittaa, ja siksi tarvitaan järkeviä sääntöjä.\n\nEnsinnäkin puhelin on tärkeä turvallisuuden vuoksi. Vanhemmat voivat tavoittaa lapsen koulun jälkeen, ja lapsi voi soittaa kotiin, jos esimerkiksi bussi myöhästyy tai sattuu jotain odottamatonta. Toiseksi puhelinta voi käyttää oppimisen apuna, esimerkiksi sanakirjan, laskimen tai karttojen katsomiseen. Omassa perheessäni lapsi on löytänyt puhelimella hyviä opetusvideoita, jotka ovat auttaneet kokeisiin valmistautumisessa.\n\nToisaalta ymmärrän hyvin myös vastakkaisen näkökulman. Puhelin häiritsee helposti keskittymistä, jos lapsi selaa sosiaalista mediaa tai pelaa kesken tunnin. Lisäksi jotkut voivat kiusata toisiaan netissä, mikä on vakava ongelma. Siksi paras ratkaisu on mielestäni se, että puhelimet pidetään laukussa oppituntien ajan ja niitä saa käyttää vain välitunnilla tai erikseen opettajan luvalla.\n\nNäin lapset oppivat käyttämään tekniikkaa järkevästi mutta saavat silti rauhan keskittyä opiskeluun. Mielestäni tasapaino on tässä kaikkein tärkeintä.", "arviointi_fi": "Hyvässä vastauksessa esitetään selkeä mielipide, vähintään kaksi perustelua ja esimerkki, ja teksti on jäsennelty kappaleisiin. Sopiva pituus on 150–200 sanaa. Arvioidaan myös sidesanojen käyttöä (ensinnäkin, toiseksi, toisaalta) ja kannan johdonmukaisuutta.", "mallivastaus_de": "Smartphones in der Schule – gut oder schlecht?\n\nMeiner Meinung nach dürfen Kinder ein Smartphone mit in die Schule bringen, aber seine Nutzung muss während des Unterrichts klar eingeschränkt werden. Das Telefon ist nämlich sowohl von großem Nutzen als auch von deutlichem Schaden, und deshalb braucht man vernünftige Regeln.\n\nErstens ist das Telefon aus Sicherheitsgründen wichtig. Die Eltern können das Kind nach der Schule erreichen, und das Kind kann nach Hause anrufen, wenn zum Beispiel der Bus Verspätung hat oder etwas Unerwartetes passiert. Zweitens kann man das Telefon als Lernhilfe nutzen, zum Beispiel um ein Wörterbuch, einen Taschenrechner oder Karten anzusehen. In meiner eigenen Familie hat das Kind mit dem Telefon gute Lernvideos gefunden, die bei der Vorbereitung auf Prüfungen geholfen haben.\n\nAndererseits verstehe ich auch die Gegenseite gut. Das Telefon stört leicht die Konzentration, wenn das Kind mitten im Unterricht durch soziale Medien blättert oder spielt. Außerdem können sich manche im Internet gegenseitig mobben, was ein ernstes Problem ist. Deshalb ist die beste Lösung meiner Meinung nach, dass die Telefone während des Unterrichts in der Tasche bleiben und man sie nur in der Pause oder mit ausdrücklicher Erlaubnis der Lehrkraft benutzen darf.\n\nSo lernen die Kinder, die Technik vernünftig zu nutzen, bekommen aber dennoch die Ruhe, sich auf das Lernen zu konzentrieren. Meiner Meinung nach ist das Gleichgewicht hier das Allerwichtigste."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen viesti", "ohje_fi": "Olet huomannut, että kotikuntasi verkkosivuilla oleva aikataulu on vanhentunut. Kirjoita puolivirallinen sähköposti kunnan asiakaspalveluun. Kuvaile, mikä tieto on virheellinen ja missä, kerro miten huomasit asian, ja pyydä korjaamaan tieto.", "ohje_de": "Du hast bemerkt, dass ein Zeitplan auf der Website deiner Gemeinde veraltet ist. Schreibe eine halbformelle E-Mail an den Kundenservice. Beschreibe, welche Information falsch ist und wo, wie du es bemerkt hast, und bitte um Korrektur.", "sanamaara": "120–160", "mallivastaus": "Aihe: Virheellinen aikataulu verkkosivuilla\n\nHyvä asiakaspalvelu,\n\nOtan yhteyttä teihin, koska huomasin kunnan verkkosivuilla virheellisen tiedon, jonka toivoisin tulevan korjatuksi. Uimahallin aukioloajat kohdassa \"Liikuntapalvelut\" näyttävät olevan vanhentuneet. Sivun mukaan halli on auki sunnuntaisin kello 10–18, mutta kun menin paikalle viime sunnuntaina, ovet olivat lukossa ja oveen kiinnitetyssä ilmoituksessa luki, että halli on kiinni sunnuntaisin.\n\nHuomasin asian, kun suunnittelin viikonlopun ohjelmaa perheeni kanssa ja tarkistin aukioloajat etukäteen netistä. Matka hallille oli siksi täysin turha, mikä oli erityisen harmillista lasten kannalta, sillä he olivat odottaneet uintireissua koko viikon.\n\nPyytäisin teitä ystävällisesti korjaamaan oikeat aukioloajat sivulle mahdollisimman pian, jotta muut asukkaat eivät joudu samaan tilanteeseen. Voitte halutessanne ilmoittaa minulle sähköpostitse, kun tieto on päivitetty.\n\nKiitos jo etukäteen avustanne ja nopeasta vastauksestanne!\n\nYstävällisin terveisin,\nLaura Mäkinen\nPuh. 040 123 4567", "arviointi_fi": "Hyvässä vastauksessa on kohtelias puolivirallinen sävy, kaikki kolme sisältöä (mikä tieto on väärin ja missä, miten huomasit, korjauspyyntö) sekä asianmukainen tervehdys ja lopputervehdys. Sopiva pituus on 120–160 sanaa. Tarkista teitittely ja selkeä rakenne.", "mallivastaus_de": "Betreff: Fehlerhafter Zeitplan auf der Website\n\nSehr geehrter Kundenservice,\n\nich wende mich an Sie, weil ich auf der Website der Gemeinde eine fehlerhafte Information bemerkt habe, von der ich mir wünsche, dass sie korrigiert wird. Die Öffnungszeiten der Schwimmhalle unter dem Punkt „Sportdienste“ scheinen veraltet zu sein. Laut der Seite ist die Halle sonntags von 10 bis 18 Uhr geöffnet, aber als ich letzten Sonntag vor Ort war, waren die Türen verschlossen, und auf einem an der Tür angebrachten Aushang stand, dass die Halle sonntags geschlossen ist.\n\nIch bemerkte die Sache, als ich mit meiner Familie das Wochenendprogramm plante und die Öffnungszeiten vorab im Internet überprüfte. Der Weg zur Halle war deshalb völlig umsonst, was besonders im Hinblick auf die Kinder ärgerlich war, da sie sich die ganze Woche auf den Schwimmausflug gefreut hatten.\n\nIch möchte Sie freundlich bitten, die richtigen Öffnungszeiten so bald wie möglich auf der Seite zu korrigieren, damit andere Bewohner nicht in dieselbe Lage geraten. Sie können mir auf Wunsch per E-Mail mitteilen, wenn die Information aktualisiert wurde.\n\nVielen Dank im Voraus für Ihre Hilfe und Ihre schnelle Antwort!\n\nMit freundlichen Grüßen,\nLaura Mäkinen\nTel. 040 123 4567"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Kaverisi pyytää sinua näyttämään, miten uutissovellus toimii. Mitä sanot? Reagoi tilanteeseen.", "ohje_de": "Dein Freund bittet dich zu zeigen, wie die Nachrichten-App funktioniert. Was sagst du? Reagiere auf die Situation.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Joo, näytän mielelläni! Avaa ensin sovellus tästä kuvakkeesta. Sitten voit lukea uusimmat uutiset etusivulta.", "malli_de": "Ja, ich zeige es dir gern! Öffne zuerst die App über dieses Symbol. Dann kannst du die neuesten Nachrichten auf der Startseite lesen."}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Olet saanut oudon sähköpostin, jossa pyydetään pankkitunnuksiasi. Ystäväsi kysyy, mitä teet. Reagoi.", "ohje_de": "Du hast eine seltsame E-Mail erhalten, die nach deiner Bankkennung fragt. Ein Freund fragt, was du tust. Reagiere.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "En vastaa siihen viestiin missään tapauksessa. Se on varmasti huijaus. Poistan sen heti enkä klikkaa mitään linkkiä.", "malli_de": "Auf diese Nachricht antworte ich auf keinen Fall. Das ist sicher ein Betrug. Ich lösche sie sofort und klicke auf keinen Link."}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Naapurisi ei osaa varata aikaa terveysasemalle netissä. Tarjoa apuasi. Reagoi tilanteeseen.", "ohje_de": "Dein Nachbar kann online keinen Arzttermin buchen. Biete deine Hilfe an. Reagiere auf die Situation.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Voin auttaa sinua mielelläni. Tehdään se yhdessä huomenna. Ota vain pankkitunnukset mukaan, niin varaamme ajan netistä helposti.", "malli_de": "Ich kann dir gern helfen. Machen wir das morgen zusammen. Bring einfach die Bankkennungen mit, dann reservieren wir den Termin leicht im Internet."}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Sinua pyydetään vastaamaan kunnan verkkokyselyyn, mutta sinulla ei ole nyt aikaa. Kerro tämä kohteliaasti. Reagoi.", "ohje_de": "Du wirst gebeten, an einer Online-Umfrage der Gemeinde teilzunehmen, hast aber gerade keine Zeit. Sage das höflich. Reagiere.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Kiitos, että kysyit. Valitettavasti minulla ei ole nyt aikaa. Voisinko vastata kyselyyn myöhemmin tällä viikolla?", "malli_de": "Danke, dass du gefragt hast. Leider habe ich gerade keine Zeit. Könnte ich die Umfrage später in dieser Woche beantworten?"}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Kollegasi kysyy, kannattaako hänen ladata uusi viestisovellus. Anna lyhyt suosituksesi. Reagoi.", "ohje_de": "Ein Kollege fragt, ob er eine neue Messenger-App herunterladen soll. Gib eine kurze Empfehlung. Reagiere.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Mielestäni kannattaa. Se on ilmainen ja helppokäyttöinen. Muista kuitenkin tarkistaa asetuksista, mitä tietoja sovellus kerää sinusta.", "malli_de": "Meiner Meinung nach lohnt es sich. Sie ist kostenlos und einfach zu bedienen. Denke aber daran, in den Einstellungen zu überprüfen, welche Daten die App über dich sammelt."}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro, miten sinä käytät puhelinta ja internetiä arjessa. Mihin käytät niitä eniten? Onko teknologiasta ollut sinulle enemmän hyötyä vai haittaa? Puhu noin puolitoista minuuttia.", "ohje_de": "Erzähle, wie du Handy und Internet im Alltag nutzt. Wofür am meisten? Hat dir Technik mehr genützt oder geschadet? Sprich etwa eineinhalb Minuten.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Käytän puhelinta ja internetiä päivittäin, oikeastaan koko ajan. Aamulla luen ensimmäiseksi uutiset puhelimesta, kun juon kahvia. Sen jälkeen tarkistan sähköpostit ja katson kalenterista, mitä päivän aikana tapahtuu. Töissä käytän tietokonetta paljon, ja kotona hoidan netissä esimerkiksi laskut ja pankkiasiat. Minusta on todella kätevää, ettei tarvitse mennä virastoon tai pankkiin jonottamaan.\n\nPidän yhteyttä perheeseeni viestisovelluksilla, koska osa sukulaisistani asuu ulkomailla. Soitamme videopuheluita joka viikko, ja se tuntuu lähes siltä kuin olisimme samassa huoneessa. Käytän myös karttoja, kun matkustan uuteen paikkaan.\n\nMielestäni teknologiasta on ollut minulle enemmän hyötyä kuin haittaa. Joskus huomaan kuitenkin käyttäväni puhelinta liikaa ja selaavani sitä turhaan. Siksi yritän pitää taukoja ja laittaa puhelimen pois illalla. Kaiken kaikkiaan en haluaisi enää elää ilman näitä laitteita, mutta haluan käyttää niitä järkevästi.", "malli_de": "Ich nutze Telefon und Internet täglich, eigentlich die ganze Zeit. Am Morgen lese ich als Erstes die Nachrichten auf dem Telefon, während ich Kaffee trinke. Danach prüfe ich die E-Mails und schaue im Kalender nach, was im Laufe des Tages passiert. Bei der Arbeit nutze ich viel den Computer, und zu Hause erledige ich im Internet zum Beispiel die Rechnungen und Bankangelegenheiten. Ich finde es wirklich praktisch, dass man nicht ins Amt oder zur Bank gehen muss, um anzustehen.\n\nIch halte über Messenger-Apps Kontakt zu meiner Familie, weil ein Teil meiner Verwandten im Ausland lebt. Wir machen jede Woche Videoanrufe, und das fühlt sich fast so an, als wären wir im selben Raum. Ich nutze auch Karten, wenn ich an einen neuen Ort reise.\n\nMeiner Meinung nach hat mir die Technik mehr genützt als geschadet. Manchmal merke ich allerdings, dass ich das Telefon zu viel benutze und unnötig darin blättere. Deshalb versuche ich, Pausen zu machen und das Telefon abends wegzulegen. Alles in allem würde ich nicht mehr ohne diese Geräte leben wollen, aber ich möchte sie vernünftig nutzen."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet kirjaston neuvontapisteessä. Asiakas (haastattelija) ei osaa kirjautua kaupungin digipalveluun. Roolisi: olet työntekijä, joka auttaa asiakasta. Selvitä ongelma, neuvo häntä vaihe vaiheelta ja varmista lopuksi, että asia onnistui.", "ohje_de": "Situation: Du bist am Infopunkt der Bibliothek. Ein Kunde (Interviewer) kann sich nicht beim Online-Dienst der Stadt einloggen. Deine Rolle: Mitarbeiter, der hilft. Kläre das Problem, leite Schritt für Schritt an und prüfe am Ende, ob es geklappt hat.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Työntekijä: Hei, kuinka voin auttaa?\n– Asiakas: En pääse kirjautumaan kaupungin sivuille.\n– Työntekijä: Selvä. Onko teillä pankkitunnukset mukana? Niitä tarvitaan kirjautumiseen.\n– Asiakas: Kyllä, ne ovat tässä.\n– Työntekijä: Hienoa. Avataan ensin sivu ja painetaan \"Kirjaudu sisään\". Valitkaa sitten oma pankkinne listasta ja seuratkaa ohjeita. Kokeillaanpa yhdessä – kävikö se nyt?", "malli_de": "– Mitarbeiter: Hallo, wie kann ich Ihnen helfen?\n– Kunde: Ich kann mich nicht auf den Seiten der Stadt anmelden.\n– Mitarbeiter: Verstehe. Haben Sie Ihre Bankkennungen dabei? Die braucht man zum Anmelden.\n– Kunde: Ja, sie sind hier.\n– Mitarbeiter: Wunderbar. Öffnen wir zuerst die Seite und drücken auf „Anmelden“. Wählen Sie dann Ihre eigene Bank aus der Liste und folgen Sie den Anweisungen. Probieren wir es gemeinsam – hat es jetzt geklappt?"}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Keskustelet ystäväsi (haastattelija) kanssa siitä, kuinka paljon aikaa vietätte sosiaalisessa mediassa. Roolisi: olet hieman huolissasi omasta ruutuajastasi. Kerro huolesi, kysy ystäväsi tottumuksia ja ehdottakaa yhdessä keinoja vähentää käyttöä.", "ohje_de": "Situation: Du sprichst mit einem Freund (Interviewer) darüber, wie viel Zeit ihr in sozialen Medien verbringt. Deine Rolle: Du bist etwas besorgt über deine Bildschirmzeit. Erzähle deine Sorge, frage nach den Gewohnheiten deines Freundes und schlagt gemeinsam Lösungen vor.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Minä: Olen huomannut käyttäväni somea aivan liikaa, melkein kolme tuntia päivässä.\n– Ystävä: Niinkö paljon? Mihin se aika menee?\n– Minä: Lähinnä videoiden selaamiseen illalla. Entä sinä, kuinka paljon sinä käytät?\n– Ystävä: Aika paljon minäkin, varsinkin ennen nukkumaanmenoa.\n– Minä: Voisimmeko sopia, että emme käytä puhelinta yhdeksän jälkeen? Voisimme vaikka muistuttaa toisiamme. Mitä mieltä olet?", "malli_de": "– Ich: Ich habe bemerkt, dass ich die sozialen Medien viel zu viel nutze, fast drei Stunden am Tag.\n– Freund: So viel? Wo geht diese Zeit hin?\n– Ich: Hauptsächlich für das Durchblättern von Videos am Abend. Und du, wie viel nutzt du sie?\n– Freund: Ziemlich viel auch ich, besonders vor dem Schlafengehen.\n– Ich: Könnten wir vereinbaren, dass wir das Telefon nach neun Uhr nicht mehr benutzen? Wir könnten uns zum Beispiel gegenseitig daran erinnern. Was meinst du dazu?"}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse toinen aihe ja kerro mielipiteesi. Perustele kantasi.\nAihe 1: Pitäisikö äänestäminen vaaleissa tehdä mahdolliseksi myös internetissä?\nAihe 2: Onko sosiaalinen media tehnyt yhteiskunnasta avoimemman vai jakautuneemman?", "ohje_de": "Wähle ein Thema und sage deine Meinung. Begründe deinen Standpunkt.\nThema 1: Sollte man bei Wahlen auch im Internet abstimmen dürfen?\nThema 2: Hat soziale Medien die Gesellschaft offener oder gespaltener gemacht?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen ensimmäisen aiheen eli äänestämisen internetissä. Minun mielestäni se olisi pääosin hyvä asia, mutta siihen liittyy myös riskejä.\n\nEnsinnäkin verkkoäänestäminen helpottaisi monen ihmisen osallistumista. Esimerkiksi ne, jotka asuvat kaukana äänestyspaikasta tai ovat liikuntarajoitteisia, voisivat äänestää kotoa käsin. Uskon, että se voisi myös nostaa äänestysprosenttia, koska se olisi nopeaa ja vaivatonta. Erityisesti nuoret, jotka ovat tottuneet hoitamaan kaiken puhelimella, saattaisivat innostua äänestämään.\n\nToisaalta ymmärrän myös huolet. Vaalien pitää olla ehdottoman luotettavia ja turvallisia. Jos järjestelmä joutuisi hyökkäyksen kohteeksi tai tiedot vuotaisivat, ihmiset menettäisivät luottamuksensa demokratiaan. Lisäksi pitää varmistaa, että jokainen äänestää itse eikä kukaan painosta toista.\n\nKaiken kaikkiaan kannatan verkkoäänestämistä, mutta vasta sitten, kun tietoturva on varmasti kunnossa. Perinteinen äänestäminen paperilla pitäisi mielestäni säilyttää rinnalla niille, jotka eivät halua tai osaa käyttää internetiä. Näin kaikki voisivat osallistua tasapuolisesti.", "malli_de": "Ich wähle das erste Thema, also das Abstimmen im Internet. Meiner Meinung nach wäre das im Großen und Ganzen eine gute Sache, aber es sind auch Risiken damit verbunden.\n\nErstens würde das Online-Abstimmen vielen Menschen die Teilnahme erleichtern. Zum Beispiel könnten diejenigen, die weit vom Wahllokal entfernt wohnen oder in ihrer Bewegung eingeschränkt sind, von zu Hause aus abstimmen. Ich glaube, dass es auch die Wahlbeteiligung erhöhen könnte, weil es schnell und mühelos wäre. Besonders junge Menschen, die es gewohnt sind, alles mit dem Telefon zu erledigen, könnten sich fürs Abstimmen begeistern.\n\nAndererseits verstehe ich auch die Sorgen. Wahlen müssen absolut zuverlässig und sicher sein. Wenn das System Ziel eines Angriffs würde oder Daten durchsickerten, würden die Menschen ihr Vertrauen in die Demokratie verlieren. Außerdem muss sichergestellt werden, dass jeder selbst abstimmt und niemand einen anderen unter Druck setzt.\n\nAlles in allem befürworte ich das Online-Abstimmen, aber erst dann, wenn die Datensicherheit ganz sicher in Ordnung ist. Das traditionelle Abstimmen auf Papier sollte meiner Meinung nach daneben für diejenigen erhalten bleiben, die das Internet nicht nutzen wollen oder können. So könnten alle gleichberechtigt teilnehmen."}]}];

 let h='<div class="qitem"><p class="q">'+esc(it.id)+'. '+esc(qt)+'</p>';
 if(it.tyyppi==='monivalinta'&&it.vaihtoehdot){h+='<ul class="opts">';it.vaihtoehdot.forEach((o,i)=>{const ok=rv&&L[i]===String(it.oikea);h+='<li class="'+(ok?'correct':'')+'">'+L[i]+') '+esc(o)+'</li>'});h+='</ul>'}
 if(rv){let ans=it.oikea;if(it.tyyppi==='monivalinta'){const i=L.indexOf(String(it.oikea));ans=it.oikea+') '+esc((it.vaihtoehdot||[])[i]||'')}else{ans=esc(ans)}h+='<div class="answer"><span class="a">'+x.answer+'</span> '+ans+(it.selitys_fi?'<br><small>'+esc(it.selitys_fi)+'</small>':'')+'</div>'}
 if(deOn){const oq=other(it.kysymys,it.kysymys_de)||(DE()?null:it.vihje_de);if(oq)h+='<div class="de">'+flagOf(DE())+esc(oq)+'</div>'}
 if(!ansOn)h+='<button class="mini" data-q="'+esc(it.id)+'">'+(reveal[it.id]?x.hideAns:x.showAns)+'</button>';
 return h+'</div>';
}
function render(){
 const x=t();
 teema.textContent=DE()?(DATA[si].teema_de||DATA[si].teema):DATA[si].teema;
 banner.innerHTML=BANNER[DATA[si].id]||'';
 clampNav(); applyToolbar();
 const c=curList()[idx];
 const ab=$('audiobar');
 if(sec==='listening'&&c&&c.audio){ab.style.display='block';audioLbl.textContent=(DE()?'🔊 Anhören — ':'🔊 Kuuntele — ')+c.otsikko;if(player.getAttribute('data-src')!==c.audio){player.src=c.audio;player.setAttribute('data-src',c.audio);}}
 else{ab.style.display='none';if(player&&!player.paused)player.pause();}
 if(!c){card.innerHTML='<p>—</p>';return}
 let h='';
 if(sec==='reading'||sec==='listening'){
  if(sec==='reading'&&c.image)h+='<img class="photo" src="'+c.image+'" alt="" loading="lazy">';
  h+='<div class="ctx">'+esc(c.otsikko)+' · '+esc(ty(c.tyyppi))+'</div>';
  const fi=sec==='reading'?c.teksti:c.litteraatti, de=sec==='reading'?c.teksti_de:c.litteraatti_de;
  const showPassage = sec==='reading' || reveal._trans;
  if(sec==='listening')h+='<button class="toggle" id="transBtn">'+(reveal._trans?'▲ '+x.hideScript:'🎧 '+x.showScript)+'</button>';
  if(showPassage){
   const usingDe=DE()&&de, prim=usingDe?de:fi;
   h+='<div class="passage">'+(usingDe?'🇩🇪 ':'')+rtext(prim,!usingDe,c.hl)+'</div>';
   const oth=other(fi,de); if(txOn&&oth)h+='<div class="trans">'+flagOf(DE())+rtext(oth,DE(),c.hl)+'</div>';
  }
  (c.items||[]).forEach(it=>h+=renderQ(it));
 } else {
  const isW=sec==='writing';
  let sub2=isW?(esc(c.sanamaara||'')+' '+x.words):(x.prep+' '+esc(c.valmistautuminen_s)+'s · '+x.speak+' '+esc(c.puheaika_s)+'s');
  h+='<div class="ctx">'+esc(c.id)+' · '+esc(ty(c.tyyppi))+' · '+sub2+'</div>';
  h+='<p class="q">'+esc(pick(c.ohje_fi,c.ohje_de))+'</p>';
  const oo=other(c.ohje_fi,c.ohje_de); if(deOn&&oo)h+='<div class="de">'+flagOf(DE())+esc(oo)+'</div>';
  const shown=ansOn||reveal._model;
  if(shown){
   const mfi=isW?c.mallivastaus:c.malli, mde=isW?c.mallivastaus_de:c.malli_de;
   const usingDe=DE()&&mde, prim=usingDe?mde:mfi;
   h+='<div class="answer"><span class="a">'+(isW?x.model:x.example)+'</span><div class="model">'+(usingDe?'🇩🇪 ':'')+esc(prim)+'</div>'+(isW&&c.arviointi_fi?'<small><br>'+x.eval+' '+esc(c.arviointi_fi)+'</small>':'')+'</div>';
   const om=other(mfi,mde); if(txOn&&om)h+='<div class="trans">'+flagOf(DE())+esc(om)+'</div>';
  }
  if(!ansOn)h+='<button class="inlinebtn" id="modelBtn">'+(reveal._model?(isW?x.hideModel:x.hideEx):(isW?x.showModel:x.showEx))+'</button>';
 }
 card.innerHTML=h;
 const g=id=>document.getElementById(id);
 if(g('transBtn'))g('transBtn').onclick=()=>{reveal._trans=!reveal._trans;render()};
 if(g('modelBtn'))g('modelBtn').onclick=()=>{reveal._model=!reveal._model;render()};
 document.querySelectorAll('button.mini[data-q]').forEach(b=>b.onclick=()=>{const id=b.getAttribute('data-q');reveal[id]=!reveal[id];render()});
}
function buildSel(){DATA.forEach((d,i)=>{const o=document.createElement('option');o.value=i;simSel.appendChild(o)})}
function simName(d){return ('0'+d.id).slice(-2)+' — '+(DE()&&d.teema_de?d.teema_de:d.teema)}
function applyChrome(){const x=t();h1.textContent=x.title;sub.textContent=x.sub;simLbl.textContent=x.sim;[...secSeg.children].forEach(b=>b.textContent=x.tab[b.dataset.s]);keys.textContent=x.keys;foot.textContent=x.foot;flagFi.classList.toggle('on',lang==='fi');flagDe.classList.toggle('on',lang==='de');[...simSel.options].forEach((o,i)=>o.textContent=simName(DATA[i]));document.documentElement.lang=lang;}
function applyToolbar(){const x=t();toolLbl.textContent=x.toolLbl;tbAns.textContent=x.tool.ans;tbTx.textContent=x.tool.tx;tbHl.textContent=x.tool.hl;tbDe.textContent=x.tool.de;
 tbAns.classList.toggle('on',ansOn);tbTx.classList.toggle('on',txOn);tbHl.classList.toggle('on',hlOn);tbHl.classList.toggle('hl',hlOn);tbDe.classList.toggle('on',deOn);}
function setLang(l){lang=l;applyChrome();render()}
flagFi.onclick=()=>setLang('fi');flagDe.onclick=()=>setLang('de');
tbAns.onclick=()=>{ansOn=!ansOn;render()};tbTx.onclick=()=>{txOn=!txOn;render()};tbHl.onclick=()=>{hlOn=!hlOn;render()};tbDe.onclick=()=>{deOn=!deOn;render()};
simSel.onchange=e=>{si=+e.target.value;idx=0;go()};
[...secSeg.children].forEach(b=>b.onclick=()=>{sec=b.dataset.s;idx=0;[...secSeg.children].forEach(z=>z.classList.toggle('on',z===b));go()});
slider.oninput=e=>{idx=+e.target.value;go()};
$('prev').onclick=()=>{idx--;go()};$('next').onclick=()=>{idx++;go()};
document.addEventListener('keydown',e=>{
 if(e.target&&/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName))return;
 const k=e.key.toLowerCase();
 if(e.key==='ArrowLeft'){idx--;go()}else if(e.key==='ArrowRight'){idx++;go()}
 else if(e.key===' '){e.preventDefault();ansOn=!ansOn;render()}
 else if(k==='d'){deOn=!deOn;render()}else if(k==='g'){txOn=!txOn;render()}
 else if(k==='h'){hlOn=!hlOn;render()}else if(k==='t'){reveal._trans=!reveal._trans;render()}
 else if(k==='p'){const a=curList()[idx];if(sec==='listening'&&a&&a.audio){player.paused?player.play().catch(()=>{}):player.pause();}}
 else if(k==='f'){setLang(lang==='fi'?'de':'fi')}
});
buildSel();applyChrome();render();
</script></body></html>
