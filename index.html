ntschuldige mich für die Situation und komme, sobald ich da bin."}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro omasta työpäivästäsi tai unelmiesi työstä. Kuvaile, millaisia tehtäviä siihen kuuluu, millaisia ihmisiä tapaat ja mikä työssä on mukavaa tai haastavaa. Sinulla on aikaa valmistautua.", "ohje_de": "Erzählen Sie von Ihrem Arbeitstag oder Ihrem Traumjob. Beschreiben Sie die Aufgaben, die Menschen, die Sie treffen, und was angenehm oder herausfordernd ist. Sie haben Zeit zur Vorbereitung.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluaisin kertoa unelmieni työpäivästä terveysasemalla. Aamulla aloittaisin työn rauhassa, keittäisin kupin kahvia ja katsoisin päivän potilaslistan. Sen jälkeen alkaisi vastaanotto. Tapaisin päivän aikana monenlaisia ihmisiä: nuoria, vanhuksia ja kokonaisia perheitä. Kuuntelisin heidän huoliaan, tutkisin heidät huolellisesti ja yrittäisin auttaa parhaani mukaan.\n\nMielestäni työssä parasta on se, että voi auttaa ihmisiä ja nähdä, kun he voivat paremmin. Pidän myös yhteistyöstä hoitajien ja muiden lääkäreiden kanssa, koska heiltä oppii koko ajan jotain uutta. Yhteiset tauot ovat mukavia hetkiä, jolloin jutellaan ja nauretaan yhdessä.\n\nTyössä on tietysti myös haasteita. Joskus on kiire ja potilaita on paljon, jolloin pitää pysyä rauhallisena ja keskittyä. Välillä suomen kieli tuottaa minulle vielä vaikeuksia, mutta opin koko ajan lisää. Kaiken kaikkiaan tällainen työpäivä olisi minulle juuri sopiva, koska saisin tehdä merkityksellistä työtä ihmisten parissa.", "malli_de": "Ich möchte von meinem Traumarbeitstag in einer Gesundheitsstation erzählen. Am Morgen würde ich die Arbeit in Ruhe beginnen, eine Tasse Kaffee kochen und mir die Patientenliste des Tages ansehen. Danach würde die Sprechstunde beginnen. Im Laufe des Tages würde ich verschiedenste Menschen treffen: junge Leute, ältere Menschen und ganze Familien. Ich würde ihren Sorgen zuhören, sie sorgfältig untersuchen und versuchen, nach bestem Vermögen zu helfen.\n\nMeiner Meinung nach ist das Beste an der Arbeit, dass man Menschen helfen und sehen kann, wenn es ihnen besser geht. Ich mag auch die Zusammenarbeit mit den Pflegekräften und anderen Ärztinnen und Ärzten, weil man von ihnen ständig etwas Neues lernt. Die gemeinsamen Pausen sind angenehme Momente, in denen man zusammen plaudert und lacht.\n\nNatürlich gibt es bei der Arbeit auch Herausforderungen. Manchmal ist es eilig und es gibt viele Patienten, dann muss man ruhig bleiben und sich konzentrieren. Zwischendurch bereitet mir die finnische Sprache noch Schwierigkeiten, aber ich lerne ständig dazu. Alles in allem wäre ein solcher Arbeitstag genau passend für mich, weil ich sinnvolle Arbeit unter Menschen leisten könnte."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet työhaastattelussa. Haastattelija kysyy sinulta kysymyksiä työkokemuksestasi ja vahvuuksistasi. Roolisi: Olet hakija. Vastaa kysymyksiin myönteisesti ja kerro itsestäsi. Käy lyhyt keskustelu.", "ohje_de": "Situation: Sie sind im Vorstellungsgespräch. Die/der Interviewer/in fragt nach Ihrer Erfahrung und Ihren Stärken. Ihre Rolle: Sie sind die/der Bewerber/in. Antworten Sie positiv und erzählen Sie von sich. Führen Sie ein kurzes Gespräch.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Haastattelija: Kertoisitko hieman itsestäsi ja työkokemuksestasi?\n– Hakija: Mielelläni. Olen koulutukseltani lääkäri, ja minulla on usean vuoden kokemus potilastyöstä sekä sairaalassa että terveysasemalla.\n– Haastattelija: Mitä pidät vahvuuksinasi?\n– Hakija: Olen rauhallinen ja huolellinen, ja tulen hyvin toimeen erilaisten ihmisten kanssa. Pidän myös tiimityöstä.\n– Haastattelija: Miksi haet juuri tätä paikkaa?\n– Hakija: Haluan tehdä merkityksellistä työtä ihmisten parissa ja kehittyä ammatissani. Tämä paikka vaikuttaa juuri sopivalta minulle.", "malli_de": "– Interviewerin: Würdest du ein wenig über dich und deine Berufserfahrung erzählen?\n– Bewerberin: Gerne. Ich bin von der Ausbildung her Ärztin, und ich habe mehrere Jahre Erfahrung in der Arbeit mit Patienten, sowohl im Krankenhaus als auch in einer Gesundheitsstation.\n– Interviewerin: Was hältst du für deine Stärken?\n– Bewerberin: Ich bin ruhig und sorgfältig, und ich komme gut mit verschiedenen Menschen aus. Ich mag auch die Teamarbeit.\n– Interviewerin: Warum bewirbst du dich gerade auf diese Stelle?\n– Bewerberin: Ich möchte sinnvolle Arbeit unter Menschen leisten und mich in meinem Beruf weiterentwickeln. Diese Stelle scheint genau passend für mich zu sein."}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Keskustelet työkaverisi kanssa taukotilan uusista käytännöistä. Roolisi: Olet työntekijä, jolla on toive taukoaikoihin liittyen. Esitä toiveesi ja perustele se. Käy lyhyt keskustelu työkaverin kanssa.", "ohje_de": "Situation: Sie sprechen mit einer Kollegin über die neuen Pausenregeln. Ihre Rolle: Sie haben einen Wunsch zu den Pausenzeiten. Äußern Sie ihn und begründen Sie ihn. Führen Sie ein kurzes Gespräch.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Työntekijä: Hei, mietin noita uusia taukoaikoja. Voisimmeko ehdottaa, että kahvitauko olisi vähän myöhemmin?\n– Työkaveri: Miksi haluaisit myöhemmäksi?\n– Työntekijä: Aamut ovat usein todella kiireisiä, ja kello kymmenen on huono hetki pysähtyä. Puoli yksitoista sopisi paremmin.\n– Työkaveri: Niin, siinä on järkeä. Minullakin aamut menevät yleensä tiukasti.\n– Työntekijä: Voisimmeko ehdottaa muutosta esihenkilölle yhdessä? Uskon, että moni muukin olisi samaa mieltä.", "malli_de": "– Mitarbeiterin: Hallo, ich habe über die neuen Pausenzeiten nachgedacht. Könnten wir vorschlagen, dass die Kaffeepause etwas später wäre?\n– Kollegin: Warum hättest du sie gerne später?\n– Mitarbeiterin: Die Vormittage sind oft wirklich hektisch, und zehn Uhr ist ein schlechter Moment, um innezuhalten. Halb elf würde besser passen.\n– Kollegin: Ja, das ist sinnvoll. Bei mir laufen die Vormittage auch meistens straff.\n– Mitarbeiterin: Könnten wir die Änderung gemeinsam der/dem Vorgesetzten vorschlagen? Ich glaube, dass viele andere auch derselben Meinung wären."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse yksi aihe ja kerro siitä mielipiteesi. Perustele näkemyksesi ja anna esimerkkejä. Sinulla on aikaa valmistautua.\nAihe 1: Onko tärkeämpää, että työ on hyvin palkattua vai että se on mukavaa ja merkityksellistä?\nAihe 2: Pitäisikö työpaikoilla olla enemmän yhteisiä taukoja ja tapahtumia työntekijöiden kesken?", "ohje_de": "Wählen Sie ein Thema und äußern Sie Ihre Meinung. Begründen Sie sie und geben Sie Beispiele. Sie haben Zeit zur Vorbereitung.\nThema 1: Ist es wichtiger, dass ein Job gut bezahlt ist, oder dass er angenehm und sinnvoll ist?\nThema 2: Sollte es am Arbeitsplatz mehr gemeinsame Pausen und Veranstaltungen geben?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen ensimmäisen aiheen. Minun mielestäni sekä palkka että työn mielekkyys ovat tärkeitä, mutta jos pitää valita, pidän työn merkityksellisyyttä vielä tärkeämpänä.\n\nTietysti palkalla on suuri merkitys. Sen avulla maksetaan lasku ja vuokra, ja hyvä palkka tuo turvaa ja vapautta. Jos palkka on liian pieni, jatkuva huoli rahasta vie voimia ja vähentää työn iloa. Tämä on tärkeää muistaa.\n\nSilti uskon, että mukava ja merkityksellinen työ on lopulta arvokkaampaa. Vietämme työssä suuren osan elämästämme. Jos työ tuntuu turhalta tai ilmapiiri on huono, raha ei pitkään riitä korvaamaan sitä. Itse olen lääkäri, ja minulle on tärkeää, että voin auttaa ihmisiä. Se antaa työlleni merkityksen ja jaksan paremmin myös kiireessä.\n\nEsimerkiksi tuttavani vaihtoi paremmin palkatusta työstä matalapalkkaisempaan, mutta selvästi mukavampaan työhön, ja hän on nyt paljon onnellisempi kuin ennen. Hän sanoo, ettei haluaisi enää koskaan palata vanhaan työhönsä. Siksi sanoisin, että paras tilanne on kohtuullinen palkka ja työ, joka tuntuu omalta ja merkitykselliseltä. Silloin ihminen voi hyvin ja jaksaa tehdä työtä pitkään ja motivoituneena.", "malli_de": "Ich wähle das erste Thema. Meiner Meinung nach sind sowohl das Gehalt als auch die Sinnhaftigkeit der Arbeit wichtig, aber wenn man wählen muss, halte ich die Sinnhaftigkeit der Arbeit für noch wichtiger.\n\nNatürlich hat das Gehalt eine große Bedeutung. Mit ihm bezahlt man die Rechnungen und die Miete, und ein gutes Gehalt bringt Sicherheit und Freiheit. Wenn das Gehalt zu niedrig ist, raubt die ständige Sorge um Geld Kräfte und mindert die Arbeitsfreude. Das ist wichtig zu bedenken.\n\nDennoch glaube ich, dass eine angenehme und sinnvolle Arbeit letztlich wertvoller ist. Wir verbringen einen großen Teil unseres Lebens bei der Arbeit. Wenn die Arbeit sich sinnlos anfühlt oder die Atmosphäre schlecht ist, kann Geld das auf Dauer nicht ausgleichen. Ich selbst bin Ärztin, und mir ist wichtig, dass ich Menschen helfen kann. Das gibt meiner Arbeit Sinn, und ich halte auch unter Zeitdruck besser durch.\n\nZum Beispiel hat eine Bekannte von mir von einer besser bezahlten Arbeit zu einer schlechter bezahlten, aber deutlich angenehmeren Arbeit gewechselt, und sie ist jetzt viel glücklicher als zuvor. Sie sagt, dass sie nie wieder zu ihrer alten Arbeit zurückkehren möchte. Deshalb würde ich sagen, dass die beste Situation ein angemessenes Gehalt und eine Arbeit ist, die sich als die eigene und als sinnvoll anfühlt. Dann geht es dem Menschen gut, und er hält durch, die Arbeit lange und motiviert zu machen."}]}, {"id": 4, "teema": "Matkailu ja liikenne", "teema_de": "Reisen und Verkehr", "reading": [{"otsikko": "Junayhteyksien aikataulumuutokset kesällä", "tyyppi": "tiedote", "teksti": "Hyvä matkustaja! Kesän 2026 ratatöiden takia junaliikenteessä on muutoksia 1.6.–31.8. välisenä aikana. Helsingin ja Tampereen välillä kulkee normaalia vähemmän junia, koska radalla tehdään korjaustöitä. Työt ovat välttämättömiä, jotta junat kulkevat tulevina vuosina turvallisemmin ja täsmällisemmin. Aamun ensimmäinen juna lähtee Helsingistä kello 6.10, ja se on noin viisitoista minuuttia myöhässä aikataulusta. Iltapäivällä osa nopeista junista korvataan tilausbusseilla välillä Riihimäki–Tampere. Bussit lähtevät aseman edestä, ja matka kestää noin tunnin kauemmin kuin junalla. Pyydämme matkustajia varaamaan riittävästi aikaa vaihtoihin, koska bussit eivät aina pääse lähtemään aivan aikataulun mukaan ruuhkan vuoksi. Suosittelemme myös, että varaat paikkasi etukäteen verkkokaupasta, sillä paikkoja on rajoitetusti ja suosituimmat vuorot täyttyvät nopeasti. Jos olet jo ostanut lipun peruuntuneeseen vuoroon, saat rahat takaisin automaattisesti tilillesi muutaman päivän kuluessa. Lisätietoja saat asemien neuvonnasta, sovelluksesta tai verkkosivuiltamme, joita päivitetään päivittäin. Pahoittelemme matkustajille koituvaa haittaa ja toivotamme kaikille hyvää ja turvallista kesää!", "teksti_de": "Guten Tag, lieber Reisender! Wegen der Gleisarbeiten im Sommer 2026 gibt es im Zugverkehr Änderungen im Zeitraum vom 1.6. bis 31.8. Zwischen Helsinki und Tampere verkehren weniger Züge als üblich, weil auf der Strecke Reparaturarbeiten durchgeführt werden. Die Arbeiten sind notwendig, damit die Züge in den kommenden Jahren sicherer und pünktlicher fahren. Der erste Zug am Morgen fährt um 6.10 Uhr von Helsinki ab und hat etwa fünfzehn Minuten Verspätung gegenüber dem Fahrplan. Am Nachmittag wird ein Teil der Schnellzüge auf der Strecke Riihimäki–Tampere durch Charterbusse ersetzt. Die Busse fahren vor dem Bahnhof ab, und die Fahrt dauert etwa eine Stunde länger als mit dem Zug. Wir bitten die Reisenden, genügend Zeit für die Umstiege einzuplanen, da die Busse wegen des Verkehrs nicht immer ganz nach Fahrplan abfahren können. Wir empfehlen außerdem, dass Sie Ihren Platz im Voraus im Online-Shop reservieren, denn die Plätze sind begrenzt und die beliebtesten Verbindungen sind schnell ausgebucht. Wenn Sie bereits ein Ticket für eine ausgefallene Verbindung gekauft haben, wird Ihnen das Geld innerhalb weniger Tage automatisch auf Ihr Konto zurückerstattet. Weitere Informationen erhalten Sie an den Informationsschaltern der Bahnhöfe, in der App oder auf unserer Website, die täglich aktualisiert wird. Wir bitten die Reisenden für die entstehenden Unannehmlichkeiten um Entschuldigung und wünschen allen einen schönen und sicheren Sommer!", "hl": ["Helsingin ja Tampereen välillä kulkee normaalia vähemmän junia, koska radalla tehdään korjaustöitä.", "Aamun ensimmäinen juna lähtee Helsingistä kello 6.10, ja se on noin viisitoista minuuttia myöhässä aikataulusta.", "Iltapäivällä osa nopeista junista korvataan tilausbusseilla välillä Riihimäki–Tampere.", "Suosittelemme myös, että varaat paikkasi etukäteen verkkokaupasta, sillä paikkoja on rajoitetusti ja suosituimmat vuorot täyttyvät nopeasti."], "image": "Simulaatio_04_matkailu/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Miksi junaliikenteessä on muutoksia kesällä?", "vaihtoehdot": ["Radalla tehdään korjaustöitä.", "Junia on liian vähän.", "Matkustajia on liian paljon."], "oikea": "a", "selitys_fi": "Tekstissä sanotaan, että muutokset johtuvat ratatöistä eli radalla tehtävistä korjauksista.", "vihje_de": "„ratatyöt“ = Gleisarbeiten; der Grund sind Reparaturen an der Strecke.", "kysymys_de": "Warum gibt es im Zugverkehr Änderungen im Sommer?"}, {"id": "L2", "tyyppi": "oikein-väärin", "kysymys": "Aamun ensimmäinen juna lähtee Helsingistä ajallaan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Teksti kertoo, että juna on noin viisitoista minuuttia myöhässä aikataulusta.", "vihje_de": "„myöhässä“ = verspätet; der Zug fährt also nicht pünktlich.", "kysymys_de": "Der erste Zug am Morgen fährt pünktlich von Helsinki ab."}, {"id": "L3", "tyyppi": "monivalinta", "kysymys": "Mitä iltapäivällä tapahtuu osalle nopeista junista?", "vaihtoehdot": ["Ne kulkevat tavallista nopeammin.", "Ne korvataan busseilla osalla matkaa.", "Ne lähtevät eri asemalta."], "oikea": "b", "selitys_fi": "Osa nopeista junista korvataan tilausbusseilla välillä Riihimäki–Tampere.", "vihje_de": "„korvata bussilla“ = durch einen Bus ersetzen, auf einem Teil der Strecke.", "kysymys_de": "Was passiert am Nachmittag mit einem Teil der Schnellzüge?"}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Mitä matkustajan kannattaa tehdä etukäteen, koska paikkoja on rajoitetusti?", "vaihtoehdot": [], "oikea": "Varata paikan etukäteen verkkokaupasta.", "selitys_fi": "Tekstissä suositellaan varaamaan paikka etukäteen verkkokaupasta, koska paikkoja on rajoitetusti.", "vihje_de": "„varata paikka etukäteen“ = den Platz im Voraus reservieren (im Online-Shop).", "kysymys_de": "Was sollte der Reisende im Voraus tun, weil die Plätze begrenzt sind?"}]}, {"otsikko": "Viikonloppu junalla Pohjois-Suomessa", "tyyppi": "blogi", "teksti": "Olen aina pitänyt junamatkustamisesta enemmän kuin lentämisestä, ja viime syksynä päätin vihdoin tehdä pitkän matkan Helsingistä Rovaniemelle. Lähdin perjantai-iltana yöjunalla, jotta säästäisin yhden hotelliyön ja heräisin suoraan perillä. Varasin makuupaikan, ja vaikka sänky oli kapea ja vaunu hieman keinui, nukuin yllättävän hyvin junan tasaisessa kohinassa. Aamulla heräsin, kun aurinko nousi lumisten metsien ylle. Maisema oli niin kaunis, etten malttanut katsoa puhelinta lainkaan, vaan jäin pitkäksi aikaa tuijottamaan ikkunasta ulos. Perillä vuokrasin polkupyörän ja kiersin kaupunkia rauhassa, pysähdellen kahviloihin aina kun jalat väsyivät. Kävin myös joulupukin pajakylässä, vaikka se oli täynnä turisteja ympäri maailmaa. Paluumatkalla istuin ravintolavaunussa ja juttelin erään saksalaisen pariskunnan kanssa, joka oli matkalla etelään tutustumaan järvialueeseen. He ihmettelivät, kuinka hiljaista junassa oli verrattuna heidän kotimaahansa. Suosittelen lämpimästi yöjunaa kaikille, jotka haluavat nähdä Suomea ilman kiirettä ja autoa. Seuraavaksi haaveilen matkasta merenrannikkoa pitkin Ouluun asti, ehkä jo ensi keväänä.", "teksti_de": "Ich habe das Zugreisen schon immer mehr gemocht als das Fliegen, und letzten Herbst beschloss ich endlich, die lange Reise von Helsinki nach Rovaniemi zu machen. Ich fuhr am Freitagabend mit dem Nachtzug los, um eine Hotelnacht zu sparen und direkt am Ziel aufzuwachen. Ich reservierte einen Schlafplatz, und obwohl das Bett schmal war und der Wagen ein wenig schaukelte, schlief ich im gleichmäßigen Rauschen des Zuges überraschend gut. Am Morgen wachte ich auf, als die Sonne über den verschneiten Wäldern aufging. Die Landschaft war so schön, dass ich gar nicht auf das Handy schauen mochte, sondern lange aus dem Fenster starrte. Am Ziel mietete ich ein Fahrrad und erkundete in Ruhe die Stadt, wobei ich immer dann in Cafés Halt machte, wenn die Beine müde wurden. Ich besuchte auch das Werkstattdorf des Weihnachtsmanns, obwohl es voller Touristen aus aller Welt war. Auf der Rückreise saß ich im Speisewagen und unterhielt mich mit einem deutschen Paar, das auf dem Weg in den Süden war, um die Seenregion kennenzulernen. Sie wunderten sich, wie ruhig es im Zug war, verglichen mit ihrem Heimatland. Ich empfehle den Nachtzug allen wärmstens, die Finnland ohne Eile und ohne Auto sehen möchten. Als Nächstes träume ich von einer Reise entlang der Meeresküste bis nach Oulu, vielleicht schon im nächsten Frühling.", "hl": ["Lähdin perjantai-iltana yöjunalla, jotta säästäisin yhden hotelliyön ja heräisin suoraan perillä.", "Varasin makuupaikan, ja vaikka sänky oli kapea ja vaunu hieman keinui, nukuin yllättävän hyvin junan tasaisessa kohinassa.", "Perillä vuokrasin polkupyörän ja kiersin kaupunkia rauhassa, pysähdellen kahviloihin aina kun jalat väsyivät.", "He ihmettelivät, kuinka hiljaista junassa oli verrattuna heidän kotimaahansa."], "image": "Simulaatio_04_matkailu/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Miksi kirjoittaja valitsi yöjunan?", "vaihtoehdot": ["Se oli halvin vaihtoehto.", "Hän halusi säästää yhden hotelliyön.", "Päivällä ei kulkenut junia."], "oikea": "b", "selitys_fi": "Kirjoittaja lähti yöjunalla säästääkseen yhden hotelliyön.", "vihje_de": "„säästää hotelliyö“ = eine Hotelnacht sparen; deshalb der Nachtzug.", "kysymys_de": "Warum wählte der Verfasser den Nachtzug?"}, {"id": "L6", "tyyppi": "oikein-väärin", "kysymys": "Kirjoittaja nukkui junassa huonosti.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Kirjoittaja nukkui yllättävän hyvin junan tasaisessa kohinassa, vaikka sänky oli kapea.", "vihje_de": "„nukuin yllättävän hyvin“ = ich schlief überraschend gut – also nicht schlecht.", "kysymys_de": "Der Verfasser schlief im Zug schlecht."}, {"id": "L7", "tyyppi": "monivalinta", "kysymys": "Mitä kirjoittaja teki Rovaniemellä perille päästyään?", "vaihtoehdot": ["Vuokrasi polkupyörän ja kiersi kaupunkia.", "Vuokrasi auton.", "Lähti heti takaisin etelään."], "oikea": "a", "selitys_fi": "Perillä kirjoittaja vuokrasi polkupyörän ja kiersi kaupunkia rauhassa.", "vihje_de": "„vuokrata polkupyörä“ = ein Fahrrad mieten.", "kysymys_de": "Was machte der Verfasser, als er in Rovaniemi am Ziel ankam?"}, {"id": "L8", "tyyppi": "lyhyt", "kysymys": "Mitä saksalainen pariskunta ihmetteli junassa?", "vaihtoehdot": [], "oikea": "Kuinka hiljaista junassa oli.", "selitys_fi": "Pariskunta ihmetteli, kuinka hiljaista junassa oli verrattuna heidän kotimaahansa.", "vihje_de": "„ihmetellä“ = sich wundern; sie wunderten sich über die Ruhe im Zug.", "kysymys_de": "Worüber wunderte sich das deutsche Paar im Zug?"}]}, {"otsikko": "Kaupungin uusi sähköbussilinja aloittaa", "tyyppi": "uutinen", "teksti": "Joukkoliikenne saa kaupungissamme syksyllä merkittävän uudistuksen, kun ensimmäinen kokonaan sähköllä kulkeva bussilinja aloittaa liikennöinnin. Linja numero 12 yhdistää keskustan ja sairaalan, ja sitä pitkin kulkee päivittäin tuhansia matkustajia, joista monet ovat työmatkalaisia ja potilaita. Kaupungin liikennejohtajan mukaan sähköbussit ovat hiljaisempia ja puhtaampia kuin vanhat dieselbussit, mikä parantaa ilmanlaatua etenkin ydinkeskustassa, jossa liikennettä on paljon. Uudet bussit latautuvat öisin varikolla, ja yksi lataus riittää koko päivän ajoihin myös pakkasella. Matkustajille muutos näkyy myös käytännössä: busseissa on enemmän tilaa lastenvaunuille ja pyörätuoleille sekä ilmaiset latauspisteet puhelimille. Liput maksavat saman verran kuin ennenkin, eikä reitti tai aikataulu muutu. Kaupunki suunnittelee, että vuoteen 2030 mennessä puolet kaikista busseista kulkee sähköllä, ja tavoitteena on pitkällä aikavälillä luopua kokonaan polttoaineesta. Hanketta on osittain rahoitettu valtion tuella, ja muutkin kaupungit ovat kiinnostuneita seuraamaan, miten kokeilu onnistuu. Asukkaita pyydetään antamaan palautetta uudesta linjasta sovelluksen kautta ensimmäisen kuukauden aikana, jotta palvelua voidaan kehittää edelleen.", "teksti_de": "Der öffentliche Nahverkehr erfährt in unserer Stadt im Herbst eine bedeutende Erneuerung, wenn die erste vollständig elektrisch betriebene Buslinie ihren Betrieb aufnimmt. Die Linie Nummer 12 verbindet das Zentrum und das Krankenhaus, und täglich fahren Tausende von Reisenden auf ihr, von denen viele Pendler und Patienten sind. Laut dem Verkehrsleiter der Stadt sind die Elektrobusse leiser und sauberer als die alten Dieselbusse, was die Luftqualität besonders im Stadtkern verbessert, wo viel Verkehr herrscht. Die neuen Busse laden nachts im Betriebshof, und eine Ladung reicht für die Fahrten des ganzen Tages, auch bei Frost. Für die Reisenden zeigt sich die Veränderung auch in der Praxis: In den Bussen gibt es mehr Platz für Kinderwagen und Rollstühle sowie kostenlose Ladestationen für Handys. Die Tickets kosten genauso viel wie bisher, und weder die Route noch der Fahrplan ändern sich. Die Stadt plant, dass bis zum Jahr 2030 die Hälfte aller Busse elektrisch fährt, und das langfristige Ziel ist, ganz auf Kraftstoff zu verzichten. Das Vorhaben wurde teilweise mit staatlicher Förderung finanziert, und auch andere Städte sind daran interessiert, zu verfolgen, wie der Versuch gelingt. Die Einwohner werden gebeten, im ersten Monat über die App Rückmeldung zur neuen Linie zu geben, damit der Service weiterentwickelt werden kann.", "hl": ["Joukkoliikenne saa kaupungissamme syksyllä merkittävän uudistuksen, kun ensimmäinen kokonaan sähköllä kulkeva bussilinja aloittaa liikennöinnin.", "Kaupungin liikennejohtajan mukaan sähköbussit ovat hiljaisempia ja puhtaampia kuin vanhat dieselbussit, mikä parantaa ilmanlaatua etenkin ydinkeskustassa, jossa liikennettä on paljon.", "Liput maksavat saman verran kuin ennenkin, eikä reitti tai aikataulu muutu.", "Kaupunki suunnittelee, että vuoteen 2030 mennessä puolet kaikista busseista kulkee sähköllä, ja tavoitteena on pitkällä aikavälillä luopua kokonaan polttoaineesta."], "image": "Simulaatio_04_matkailu/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Mikä on uutisen pääaihe?", "vaihtoehdot": ["Sairaalan muutto uuteen paikkaan.", "Uusi sähköbussilinja kaupungissa.", "Bussilippujen hinnan nousu."], "oikea": "b", "selitys_fi": "Uutinen kertoo, että kaupungissa aloittaa ensimmäinen kokonaan sähköllä kulkeva bussilinja.", "vihje_de": "Das Thema ist eine neue Elektrobuslinie („sähköbussilinja“).", "kysymys_de": "Was ist das Hauptthema der Nachricht?"}, {"id": "L10", "tyyppi": "oikein-väärin", "kysymys": "Sähköbussit ovat hiljaisempia kuin vanhat dieselbussit.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Liikennejohtajan mukaan sähköbussit ovat hiljaisempia ja puhtaampia kuin vanhat dieselbussit.", "vihje_de": "„hiljaisempi“ = leiser; die Elektrobusse sind leiser.", "kysymys_de": "Die Elektrobusse sind leiser als die alten Dieselbusse."}, {"id": "L11", "tyyppi": "oikein-väärin", "kysymys": "Bussilippujen hinta nousee uuden linjan myötä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan liput maksavat saman verran kuin ennenkin.", "vihje_de": "„saman verran kuin ennen“ = gleich viel wie früher – der Preis steigt nicht.", "kysymys_de": "Der Preis der Bustickets steigt mit der neuen Linie."}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Mihin vuoteen mennessä kaupunki haluaa puolet busseista kulkevan sähköllä?", "vaihtoehdot": [], "oikea": "Vuoteen 2030 mennessä.", "selitys_fi": "Kaupunki suunnittelee, että vuoteen 2030 mennessä puolet busseista kulkee sähköllä.", "vihje_de": "Bis zum Jahr 2030 sollen die Hälfte der Busse elektrisch fahren.", "kysymys_de": "Bis zu welchem Jahr will die Stadt, dass die Hälfte der Busse elektrisch fährt?"}]}, {"otsikko": "Ohjeet hotellin sähköiseen sisäänkirjautumiseen", "tyyppi": "ohje", "teksti": "Tervetuloa hotelliimme! Voit kirjautua sisään itse ilman jonottamista vastaanottoon, mikä on kätevää etenkin silloin, kun saavut myöhään illalla. Toimi näin. Lataa ensin hotellin sovellus puhelimeesi jo ennen saapumista, jotta kaikki on valmista perille tullessasi. Avaa sovellus ja syötä varausnumero, jonka löydät vahvistussähköpostista. Tämän jälkeen ota kuva passistasi tai henkilökortistasi; tämä on lain vaatima toimenpide kaikilta ulkomaisilta vierailta. Kun tietosi on tarkistettu, saat puhelimeesi sähköisen avaimen muutamassa minuutissa. Mene hissillä kerrokseesi ja pidä puhelinta lähellä huoneen lukkoa, niin ovi aukeaa automaattisesti. Huoneen siivous tehdään joka toinen päivä, mutta jos haluat pyyhkeet vaihdettavan useammin, jätä ne lattialle. Aamiainen tarjoillaan ravintolassa kello 7–10, ja se sisältyy huoneen hintaan. Jos sinulla on kysyttävää tai tarvitset apua, henkilökunta päivystää vastaanotossa ympäri vuorokauden ja vastaa mielellään myös puhelimitse. Muista uloskirjautua sovelluksessa viimeistään kello 12, jotta vältyt lisämaksulta. Toivotamme sinulle rentouttavaa ja mukavaa oleskelua hotellissamme!", "teksti_de": "Willkommen in unserem Hotel! Sie können selbst einchecken, ohne an der Rezeption anzustehen, was besonders dann praktisch ist, wenn Sie spät am Abend ankommen. Gehen Sie folgendermaßen vor. Laden Sie zunächst die App des Hotels schon vor der Ankunft auf Ihr Handy herunter, damit bei Ihrer Ankunft alles bereit ist. Öffnen Sie die App und geben Sie die Buchungsnummer ein, die Sie in der Bestätigungs-E-Mail finden. Machen Sie danach ein Foto von Ihrem Reisepass oder Ihrem Personalausweis; dies ist eine gesetzlich vorgeschriebene Maßnahme für alle ausländischen Gäste. Wenn Ihre Daten überprüft worden sind, erhalten Sie innerhalb weniger Minuten einen elektronischen Schlüssel auf Ihr Handy. Fahren Sie mit dem Aufzug in Ihre Etage und halten Sie das Handy nahe an das Zimmerschloss, dann öffnet sich die Tür automatisch. Die Zimmerreinigung erfolgt jeden zweiten Tag, aber wenn Sie möchten, dass die Handtücher häufiger gewechselt werden, legen Sie sie auf den Boden. Das Frühstück wird im Restaurant von 7 bis 10 Uhr serviert und ist im Zimmerpreis enthalten. Wenn Sie Fragen haben oder Hilfe benötigen, ist das Personal rund um die Uhr an der Rezeption im Dienst und antwortet gern auch telefonisch. Denken Sie daran, sich spätestens um 12 Uhr in der App auszuchecken, um einen Zusatzkosten zu vermeiden. Wir wünschen Ihnen einen erholsamen und angenehmen Aufenthalt in unserem Hotel!", "hl": ["Avaa sovellus ja syötä varausnumero, jonka löydät vahvistussähköpostista.", "Tämän jälkeen ota kuva passistasi tai henkilökortistasi; tämä on lain vaatima toimenpide kaikilta ulkomaisilta vierailta.", "Muista uloskirjautua sovelluksessa viimeistään kello 12, jotta vältyt lisämaksulta."], "image": "Simulaatio_04_matkailu/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Mistä matkustaja löytää varausnumeron?", "vaihtoehdot": ["Vahvistussähköpostista.", "Vastaanotosta.", "Huoneen ovesta."], "oikea": "a", "selitys_fi": "Ohjeen mukaan varausnumero löytyy vahvistussähköpostista.", "vihje_de": "„vahvistussähköposti“ = Bestätigungs-E-Mail; dort steht die Buchungsnummer.", "kysymys_de": "Wo findet der Reisende die Buchungsnummer?"}, {"id": "L14", "tyyppi": "monivalinta", "kysymys": "Miksi vieraan pitää ottaa kuva passistaan?", "vaihtoehdot": ["Se nopeuttaa aamiaista.", "Se on lain vaatima toimenpide ulkomaisilta vierailta.", "Se tarvitaan hissin käyttöön."], "oikea": "b", "selitys_fi": "Tekstin mukaan kuvan ottaminen passista on lain vaatima toimenpide kaikilta ulkomaisilta vierailta.", "vihje_de": "„lain vaatima“ = gesetzlich vorgeschrieben; gilt für ausländische Gäste.", "kysymys_de": "Warum muss der Gast ein Foto von seinem Reisepass machen?"}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Mihin kellonaikaan mennessä vieraan pitää uloskirjautua, jotta hän välttää lisämaksun?", "vaihtoehdot": [], "oikea": "Viimeistään kello 12.", "selitys_fi": "Ohjeessa pyydetään uloskirjautumaan sovelluksessa viimeistään kello 12, jotta välttyy lisämaksulta.", "vihje_de": "„uloskirjautua viimeistään kello 12“ = spätestens um 12 Uhr auschecken.", "kysymys_de": "Bis zu welcher Uhrzeit muss der Gast auschecken, um den Zusatzbetrag zu vermeiden?"}]}], "listening": [{"otsikko": "Kuulutus rautatieasemalla", "tyyppi": "kuulutus", "litteraatti": "Hyvät matkustajat, huomio. Junan numero 47 lähtö Helsinkiin viivästyy teknisen vian vuoksi. Uusi arvioitu lähtöaika on kello 14.35 raiteelta kuusi. Pyydämme matkustajia siirtymään raiteelle kuusi hyvissä ajoin, sillä juna pysähtyy asemalla vain lyhyen hetken eikä odota myöhästyneitä matkustajia. Junassa on tänään tavallista vähemmän vaunuja, joten suosittelemme paikkalipun varanneita tarkistamaan vaununumeronsa näytöltä ennen junaan nousua. Ravintolavaunu sijaitsee junan keskellä, ja se on auki koko matkan ajan. Muistutamme, että matkalippu on pidettävä mukana koko matkan ajan ja että se tarkastetaan junassa. Pyörätuolilla matkustavia avustetaan tarvittaessa; ottakaa yhteyttä asemahenkilökuntaan ennen junaan nousua, niin järjestämme avun. Matkatavarat kannattaa pitää lähellä, jotta käytävät pysyvät vapaina. Seuraava lähijuna Tikkurilaan lähtee aikataulun mukaisesti raiteelta kaksi kello 14.20. Pahoittelemme viivästyksestä aiheutuvaa haittaa. Kiitos kärsivällisyydestänne ja hyvää matkaa.", "litteraatti_de": "Werte Reisende, Achtung. Die Abfahrt des Zuges Nummer 47 nach Helsinki verzögert sich wegen einer technischen Störung. Die neue voraussichtliche Abfahrtszeit ist 14.35 Uhr von Gleis sechs. Wir bitten die Reisenden, sich rechtzeitig zu Gleis sechs zu begeben, da der Zug nur einen kurzen Moment am Bahnhof hält und nicht auf verspätete Reisende wartet. Der Zug hat heute weniger Wagen als üblich, deshalb empfehlen wir den Reisenden mit Platzreservierung, ihre Wagennummer vor dem Einsteigen auf der Anzeige zu überprüfen. Der Speisewagen befindet sich in der Mitte des Zuges und ist während der gesamten Fahrt geöffnet. Wir erinnern daran, dass die Fahrkarte während der gesamten Fahrt mitzuführen ist und dass sie im Zug kontrolliert wird. Reisenden im Rollstuhl wird bei Bedarf geholfen; wenden Sie sich vor dem Einsteigen an das Bahnhofspersonal, dann organisieren wir die Hilfe. Das Gepäck sollte man in der Nähe behalten, damit die Gänge frei bleiben. Der nächste Nahverkehrszug nach Tikkurila fährt fahrplanmäßig um 14.20 Uhr von Gleis zwei ab. Wir entschuldigen uns für die durch die Verzögerung entstehenden Unannehmlichkeiten. Vielen Dank für Ihre Geduld und gute Reise.", "hl": ["Junan numero 47 lähtö Helsinkiin viivästyy teknisen vian vuoksi.", "Uusi arvioitu lähtöaika on kello 14.35 raiteelta kuusi.", "Junassa on tänään tavallista vähemmän vaunuja, joten suosittelemme paikkalipun varanneita tarkistamaan vaununumeronsa näytöltä ennen junaan nousua.", "Muistutamme, että matkalippu on pidettävä mukana koko matkan ajan ja että se tarkastetaan junassa."], "audio": "Simulaatio_04_matkailu/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Miksi junan numero 47 lähtö viivästyy?", "vaihtoehdot": ["Teknisen vian vuoksi.", "Huonon sään vuoksi.", "Matkustajien suuren määrän vuoksi."], "oikea": "a", "selitys_fi": "Kuulutuksessa sanotaan, että lähtö viivästyy teknisen vian vuoksi.", "vihje_de": "„tekninen vika“ = technische Störung; deshalb die Verspätung.", "kysymys_de": "Warum verzögert sich die Abfahrt des Zuges Nummer 47?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Miltä raiteelta juna numero 47 lähtee?", "vaihtoehdot": ["Raiteelta kaksi.", "Raiteelta kuusi.", "Raiteelta neljä."], "oikea": "b", "selitys_fi": "Uusi lähtöaika on kello 14.35 raiteelta kuusi.", "vihje_de": "„raide kuusi“ = Gleis sechs.", "kysymys_de": "Von welchem Gleis fährt der Zug Nummer 47 ab?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Junassa on tänään tavallista enemmän vaunuja.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Kuulutuksen mukaan junassa on tänään tavallista vähemmän vaunuja.", "vihje_de": "„vähemmän vaunuja“ = weniger Wagen – nicht mehr.", "kysymys_de": "Der Zug hat heute mehr Wagen als üblich."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Mitä matkustajan pitää pitää mukana koko matkan ajan?", "vaihtoehdot": [], "oikea": "Matkalipun.", "selitys_fi": "Kuulutuksessa muistutetaan, että matkalippu on pidettävä mukana koko matkan ajan.", "vihje_de": "„matkalippu“ = Fahrkarte; sie muss die ganze Fahrt dabei sein.", "kysymys_de": "Was muss der Reisende während der gesamten Fahrt mitführen?"}]}, {"otsikko": "Hotellivaraus puhelimitse", "tyyppi": "puhelu", "litteraatti": "– Virkailija: Hyvää päivää, Hotelli Aallonharja, kuinka voin auttaa? – Asiakas: Päivää, haluaisin varata kahden hengen huoneen ensi viikonlopuksi, perjantaista sunnuntaihin. – Virkailija: Hetki, tarkistan saatavuuden. Kyllä, meillä on vapaa huone, jossa on parveke ja näkymä merelle. Hinta on sata kaksikymmentä euroa yöltä, ja siihen sisältyy aamiainen. – Asiakas: Kuulostaa hyvältä. Onko hotellissa pysäköintipaikkaa autolle? – Virkailija: On, mutta pysäköinti maksaa kymmenen euroa vuorokaudessa. Voitte varata paikan etukäteen. – Asiakas: Selvä, otan sen huoneen ja yhden pysäköintipaikan. Pääseekö hotelliin lemmikin kanssa? – Virkailija: Valitettavasti emme salli lemmikkejä huoneissa, mutta lähellä on koirahotelli. – Asiakas: Ei se mitään, koira jää kotiin. Vahvistan siis varauksen. – Virkailija: Hienoa, lähetän vahvistuksen sähköpostiinne. Tervetuloa!", "litteraatti_de": "– Schalterbeamte: Guten Tag, Hotel Aallonharja, wie kann ich Ihnen helfen? – Kunde: Guten Tag, ich würde gern ein Doppelzimmer für nächstes Wochenende reservieren, von Freitag bis Sonntag. – Schalterbeamte: Einen Moment, ich überprüfe die Verfügbarkeit. Ja, wir haben ein freies Zimmer mit Balkon und Meerblick. Der Preis beträgt hundertzwanzig Euro pro Nacht, und das Frühstück ist darin enthalten. – Kunde: Das klingt gut. Gibt es im Hotel einen Parkplatz für das Auto? – Schalterbeamte: Ja, aber das Parken kostet zehn Euro pro Tag. Sie können den Platz im Voraus reservieren. – Kunde: In Ordnung, ich nehme das Zimmer und einen Parkplatz. Darf man mit einem Haustier ins Hotel? – Schalterbeamte: Leider erlauben wir keine Haustiere in den Zimmern, aber in der Nähe gibt es ein Hundehotel. – Kunde: Das macht nichts, der Hund bleibt zu Hause. Ich bestätige also die Buchung. – Schalterbeamte: Wunderbar, ich sende die Bestätigung an Ihre E-Mail-Adresse. Willkommen!", "hl": ["Kyllä, meillä on vapaa huone, jossa on parveke ja näkymä merelle. Hinta on sata kaksikymmentä euroa yöltä, ja siihen sisältyy aamiainen.", "On, mutta pysäköinti maksaa kymmenen euroa vuorokaudessa.", "Valitettavasti emme salli lemmikkejä huoneissa, mutta lähellä on koirahotelli."], "audio": "Simulaatio_04_matkailu/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Millaisen huoneen asiakas haluaa varata?", "vaihtoehdot": ["Yhden hengen huoneen.", "Kahden hengen huoneen.", "Kolmen hengen huoneen."], "oikea": "b", "selitys_fi": "Asiakas haluaa varata kahden hengen huoneen viikonlopuksi.", "vihje_de": "„kahden hengen huone“ = Doppelzimmer (für zwei Personen).", "kysymys_de": "Was für ein Zimmer möchte der Kunde reservieren?"}, {"id": "Ku6", "tyyppi": "oikein-väärin", "kysymys": "Aamiainen sisältyy huoneen hintaan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Virkailija kertoo, että hintaan sisältyy aamiainen.", "vihje_de": "„sisältyy aamiainen“ = das Frühstück ist im Preis enthalten.", "kysymys_de": "Das Frühstück ist im Zimmerpreis enthalten."}, {"id": "Ku7", "tyyppi": "monivalinta", "kysymys": "Mitä virkailija kertoo pysäköinnistä?", "vaihtoehdot": ["Se on ilmaista.", "Se maksaa kymmenen euroa vuorokaudessa.", "Hotellissa ei ole pysäköintiä."], "oikea": "b", "selitys_fi": "Virkailija kertoo, että pysäköinti maksaa kymmenen euroa vuorokaudessa.", "vihje_de": "„kymmenen euroa vuorokaudessa“ = zehn Euro pro Tag fürs Parken.", "kysymys_de": "Was sagt der Schalterbeamte über das Parken?"}, {"id": "Ku8", "tyyppi": "lyhyt", "kysymys": "Miksi asiakas ei voi tuoda koiraa hotelliin?", "vaihtoehdot": [], "oikea": "Hotelli ei salli lemmikkejä huoneissa.", "selitys_fi": "Virkailija sanoo, että hotelli ei salli lemmikkejä huoneissa, joten koira jää kotiin.", "vihje_de": "„ei salli lemmikkejä“ = erlaubt keine Haustiere; der Hund bleibt zu Hause.", "kysymys_de": "Warum kann der Kunde den Hund nicht ins Hotel mitbringen?"}]}, {"otsikko": "Kaksi ystävää suunnittelee retkeä", "tyyppi": "dialogi", "litteraatti": "– Nainen: Mietin, että lähdettäisiin lauantaina retkelle kansallispuistoon. Sää näyttäisi olevan poutainen. – Mies: Hyvä idea! Mennäänkö bussilla vai omalla autolla? – Nainen: Mennään mieluummin bussilla, niin ei tarvitse miettiä pysäköintiä. Bussi lähtee torilta kello yhdeksän. – Mies: Sopii. Pitääkö meidän ottaa eväät mukaan? – Nainen: Pitää kyllä, sillä puistossa ei ole kioskia. Otan termospulloon kahvia ja teen voileipiä. – Mies: Minä tuon hedelmiä ja vähän suklaata. Kuinka pitkä se vaellusreitti on? – Nainen: Noin kymmenen kilometriä, mutta maasto on melko helppoa. Muista ottaa sadetakki varmuuden vuoksi, sää voi muuttua. – Mies: Totta, vuoristossa sää vaihtelee nopeasti. Otetaanko kuvia näköalapaikalla? – Nainen: Ehdottomasti. Siellä on kuulemma upea järvimaisema. Tämä on kyllä loistava tapa viettää lauantai.", "litteraatti_de": "– Frau: Ich habe überlegt, dass wir am Samstag einen Ausflug in den Nationalpark machen könnten. Das Wetter scheint trocken zu sein. – Mann: Gute Idee! Fahren wir mit dem Bus oder mit dem eigenen Auto? – Frau: Fahren wir lieber mit dem Bus, dann müssen wir nicht ans Parken denken. Der Bus fährt um neun Uhr vom Marktplatz ab. – Mann: Passt. Müssen wir Proviant mitnehmen? – Frau: Ja, müssen wir, denn im Park gibt es keinen Kiosk. Ich nehme Kaffee in der Thermoskanne mit und mache Butterbrote. – Mann: Ich bringe Obst und ein bisschen Schokolade mit. Wie lang ist der Wanderweg? – Frau: Etwa zehn Kilometer, aber das Gelände ist ziemlich leicht. Denk daran, sicherheitshalber eine Regenjacke mitzunehmen, das Wetter kann sich ändern. – Mann: Stimmt, im Gebirge wechselt das Wetter schnell. Machen wir Fotos am Aussichtspunkt? – Frau: Auf jeden Fall. Dort soll es eine herrliche Seenlandschaft geben. Das ist wirklich eine großartige Art, den Samstag zu verbringen.", "hl": ["Mennään mieluummin bussilla, niin ei tarvitse miettiä pysäköintiä.", "Pitää kyllä, sillä puistossa ei ole kioskia.", "Muista ottaa sadetakki varmuuden vuoksi, sää voi muuttua.", "Siellä on kuulemma upea järvimaisema."], "audio": "Simulaatio_04_matkailu/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Miten ystävät päättävät matkustaa kansallispuistoon?", "vaihtoehdot": ["Omalla autolla.", "Bussilla.", "Pyörällä."], "oikea": "b", "selitys_fi": "He päättävät mennä bussilla, jotta ei tarvitse miettiä pysäköintiä.", "vihje_de": "Sie fahren mit dem Bus, um sich nicht ums Parken kümmern zu müssen.", "kysymys_de": "Wie beschließen die Freunde, in den Nationalpark zu reisen?"}, {"id": "Ku10", "tyyppi": "oikein-väärin", "kysymys": "Puistossa on kioski, josta voi ostaa ruokaa.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Nainen sanoo, että eväät pitää ottaa mukaan, koska puistossa ei ole kioskia.", "vihje_de": "„ei ole kioskia“ = es gibt keinen Kiosk; deshalb Proviant mitnehmen.", "kysymys_de": "Im Park gibt es einen Kiosk, an dem man Essen kaufen kann."}, {"id": "Ku11", "tyyppi": "lyhyt", "kysymys": "Mitä naisen mielestä kannattaa ottaa mukaan, koska sää voi muuttua?", "vaihtoehdot": [], "oikea": "Sadetakin.", "selitys_fi": "Nainen kehottaa ottamaan sadetakin varmuuden vuoksi, koska sää voi muuttua.", "vihje_de": "„sadetakki“ = Regenjacke; weil sich das Wetter ändern kann.", "kysymys_de": "Was sollte man nach Meinung der Frau mitnehmen, weil sich das Wetter ändern kann?"}, {"id": "Ku12", "tyyppi": "monivalinta", "kysymys": "Mitä näköalapaikalla on kuulemma nähtävissä?", "vaihtoehdot": ["Upea järvimaisema.", "Vanha kirkko.", "Suuri kaupunki."], "oikea": "a", "selitys_fi": "Naisen mukaan näköalapaikalla on kuulemma upea järvimaisema.", "vihje_de": "„järvimaisema“ = Seenlandschaft; sie ist am Aussichtspunkt zu sehen.", "kysymys_de": "Was soll am Aussichtspunkt zu sehen sein?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Olet matkalla toisessa kaupungissa. Kirjoita ystävällesi tekstiviesti tai sähköposti. Kerro, missä olet, miten matkustit sinne ja mitä olet tehnyt. Ehdota, että ystäväsi tulisi käymään. Kirjoita 80–120 sanaa.", "ohje_de": "Sie sind auf Reisen in einer anderen Stadt. Schreiben Sie Ihrer Freundin/Ihrem Freund eine Nachricht oder E-Mail. Erzählen Sie, wo Sie sind, wie Sie dorthin gereist sind und was Sie gemacht haben. Schlagen Sie vor, dass die Freundin/der Freund Sie besucht. Schreiben Sie 80–120 Wörter.", "sanamaara": "80–120", "mallivastaus": "Moi Laura! Terveisiä Turusta! Tulin tänne eilen junalla, ja matka kesti vain pari tuntia. Sää on ollut tosi kaunis, joten olen kävellyt paljon joen rantaa pitkin. Eilen kävin vanhassa linnassa ja söin illallista mukavassa ravintolassa torin lähellä. Tänään aion käydä museossa ja ehkä laivaristeilyllä saaristoon. Hotellini on aivan keskustassa, ja huoneesta näkyy joki. Ajattelin, että sinäkin voisit tulla tänne ensi viikonloppuna! Täällä on niin paljon nähtävää, ja voisimme tutkia kaupunkia yhdessä. Junaliput eivät ole kalliita, jos varaat ne ajoissa. Kerro pian, sopiiko se sinulle. Ihania terveisiä, Theresia", "arviointi_fi": "Hyvässä vastauksessa on selkeä tervehdys ja lopputervehdys, kaikki ohjeessa pyydetyt asiat (paikka, kulkuväline, tekemiset ja kutsu) sekä epävirallinen, ystävällinen sävy. Lauseiden pitää olla ymmärrettäviä ja sanamäärän rajoissa.", "mallivastaus_de": "Hallo Laura! Grüße aus Turku! Ich bin gestern mit dem Zug hierhergekommen, und die Fahrt dauerte nur ein paar Stunden. Das Wetter war wirklich schön, deshalb bin ich viel am Flussufer entlanggelaufen. Gestern war ich in der alten Burg und habe in einem netten Restaurant in der Nähe des Marktplatzes zu Abend gegessen. Heute will ich ins Museum gehen und vielleicht eine Schiffsfahrt in den Schärengarten machen. Mein Hotel liegt mitten im Zentrum, und vom Zimmer aus sieht man den Fluss. Ich dachte, dass auch du nächstes Wochenende herkommen könntest! Hier gibt es so viel zu sehen, und wir könnten die Stadt zusammen erkunden. Die Zugtickets sind nicht teuer, wenn du sie rechtzeitig buchst. Sag bald Bescheid, ob es dir passt. Liebe Grüße, Theresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Matkailufoorumilla keskustellaan väitteestä: ”Junalla matkustaminen on parempi tapa matkustaa kuin lentäminen.” Kirjoita oma mielipiteesi. Perustele kantasi vähintään kahdella argumentilla ja anna esimerkkejä. Kirjoita 150–200 sanaa.", "ohje_de": "In einem Reiseforum wird über die Behauptung diskutiert: „Mit dem Zug zu reisen ist besser als zu fliegen.“ Schreiben Sie Ihre eigene Meinung. Begründen Sie Ihren Standpunkt mit mindestens zwei Argumenten und geben Sie Beispiele. Schreiben Sie 150–200 Wörter.", "sanamaara": "150–200", "mallivastaus": "Mielestäni junalla matkustaminen on monessa suhteessa parempi vaihtoehto kuin lentäminen, vaikka kumpikin tapa sopii omiin tilanteisiinsa. Ensinnäkin juna on usein paljon mukavampi. Matkustaja voi nousta penkiltä, kävellä ravintolavaunuun ja katsella maisemia ikkunasta ilman, että tarvitsee istua tiukasti turvavyö kiinni. Itse nautin myös siitä, että matka alkaa heti aseman ovelta keskeltä kaupunkia, eikä tarvitse mennä lentokentälle tunteja etukäteen tai jonottaa pitkään turvatarkastuksessa. Toiseksi junamatka on ympäristön kannalta selvästi parempi. Lentokoneet aiheuttavat paljon päästöjä, kun taas juna kuluttaa vähemmän energiaa jokaista matkustajaa kohden. Tämä on minulle tärkeä syy, koska haluan vähentää omaa hiilijalanjälkeäni. Esimerkiksi viime kesänä matkustin junalla naapurimaahan ja huomasin, että koko matka oli rennompi ja vähemmän stressaava kuin lentäen. Sain jopa tehtyä töitä matkan aikana. Toki myönnän, että hyvin pitkillä matkoilla lentäminen on nopeampaa ja joskus halvempaa. Jos pitää ehtiä toiselle puolelle maailmaa, juna ei tietenkään ole järkevä vaihtoehto. Kaiken kaikkiaan kannustan kuitenkin valitsemaan junan aina, kun se on mahdollista. Näin matkasta tulee osa lomaa eikä pelkkä välttämätön siirtyminen paikasta toiseen. Maisemat, rauha ja pienempi hiilijalanjälki tekevät junamatkasta minulle mieluisamman.", "arviointi_fi": "Hyvässä vastauksessa kirjoittaja ilmaisee selkeästi oman mielipiteensä, perustelee sen vähintään kahdella argumentilla ja antaa konkreettisia esimerkkejä. Tekstin pitää olla jäsennelty (johdanto, perustelut, lopetus), kieliopin pääosin sujuvaa ja sanamäärän rajoissa.", "mallivastaus_de": "Meiner Meinung nach ist das Reisen mit dem Zug in vielerlei Hinsicht eine bessere Option als das Fliegen, auch wenn beide Arten für ihre jeweiligen Situationen geeignet sind. Erstens ist der Zug oft viel bequemer. Der Reisende kann vom Sitz aufstehen, in den Speisewagen gehen und die Landschaft aus dem Fenster betrachten, ohne mit fest angeschnalltem Sicherheitsgurt sitzen zu müssen. Ich selbst genieße es auch, dass die Reise gleich vor der Tür des Bahnhofs mitten in der Stadt beginnt, und dass man nicht Stunden im Voraus zum Flughafen fahren oder lange in der Sicherheitskontrolle anstehen muss. Zweitens ist die Zugreise für die Umwelt deutlich besser. Flugzeuge verursachen viele Emissionen, während der Zug pro Reisenden weniger Energie verbraucht. Das ist für mich ein wichtiger Grund, weil ich meinen eigenen CO2-Fußabdruck verringern möchte. Zum Beispiel reiste ich letzten Sommer mit dem Zug ins Nachbarland und merkte, dass die ganze Reise entspannter und weniger stressig war als mit dem Flugzeug. Ich konnte sogar während der Reise arbeiten. Natürlich gebe ich zu, dass das Fliegen auf sehr langen Reisen schneller und manchmal billiger ist. Wenn man es auf die andere Seite der Welt schaffen muss, ist der Zug natürlich keine sinnvolle Option. Alles in allem ermutige ich jedoch dazu, den Zug immer dann zu wählen, wenn es möglich ist. So wird die Reise zu einem Teil des Urlaubs und nicht zu einem bloßen notwendigen Wechsel von einem Ort zum anderen. Die Landschaften, die Ruhe und der kleinere CO2-Fußabdruck machen die Zugreise für mich angenehmer."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen", "ohje_fi": "Varasit verkossa retken, mutta retki peruuntui huonon sään vuoksi. Kirjoita matkatoimistolle puolivirallinen sähköposti. Kuvaile lyhyesti, minkä retken varasit, kerro mitä tapahtui ja pyydä rahojasi takaisin tai uutta ajankohtaa. Kirjoita 120–160 sanaa.", "ohje_de": "Sie haben online einen Ausflug gebucht, aber der Ausflug wurde wegen schlechten Wetters abgesagt. Schreiben Sie dem Reisebüro eine halboffizielle E-Mail. Beschreiben Sie kurz, welchen Ausflug Sie gebucht haben, erzählen Sie, was passiert ist, und bitten Sie um eine Rückerstattung oder einen neuen Termin. Schreiben Sie 120–160 Wörter.", "sanamaara": "120–160", "mallivastaus": "Hyvä matkatoimisto,\n\nVarasin verkkosivuiltanne saaristoristeilyn lauantaille 13.6.2026. Varausnumeroni on TR-4821, ja maksoin retkestä etukäteen 65 euroa. Olin odottanut tätä retkeä jo pitkään, ja saavuin satamaan ajoissa kello yhdeksältä. Paikalla kerrottiin kuitenkin, että risteily on peruttu kovan tuulen ja sateen vuoksi. Ymmärrän hyvin, että turvallisuus on tärkeintä, enkä tietenkään halua matkustaa huonossa säässä, mutta olin silti pettynyt, koska olin varannut päivän vapaaksi juuri tätä varten.\n\nKoska retki ei toteutunut minusta riippumattomasta syystä, pyytäisin teitä joko palauttamaan maksamani summan tililleni tai tarjoamaan uuden ajankohdan saman risteilyn tekemiseen. Minulle sopisi hyvin esimerkiksi seuraava viikonloppu tai jokin arki-ilta heinäkuussa.\n\nVoitte ottaa minuun yhteyttä sähköpostitse tai puhelimitse. Liitän mukaan kopion varausvahvistuksesta, jotta asian käsittely olisi helpompaa. Kiitän jo etukäteen vaivannäöstänne ja toivon pikaista vastausta.\n\nYstävällisin terveisin,\nTheresia Virtanen", "arviointi_fi": "Hyvässä vastauksessa on puolivirallinen sävy, selkeä rakenne (tervehdys, asia, pyyntö, lopputervehdys) ja kaikki pyydetyt tiedot: varattu retki, mitä tapahtui sekä pyyntö rahojen palautuksesta tai uudesta ajankohdasta. Kielen tulee olla kohteliasta ja pääosin virheetöntä, ja sanamäärän rajoissa.", "mallivastaus_de": "Sehr geehrtes Reisebüro,\n\nich habe auf Ihrer Website eine Schärenkreuzfahrt für Samstag, den 13.6.2026, gebucht. Meine Buchungsnummer ist TR-4821, und ich habe für den Ausflug im Voraus 65 Euro bezahlt. Ich hatte mich schon lange auf diesen Ausflug gefreut und bin pünktlich um neun Uhr am Hafen angekommen. Vor Ort wurde mir jedoch mitgeteilt, dass die Kreuzfahrt wegen des starken Windes und Regens abgesagt sei. Ich verstehe gut, dass die Sicherheit am wichtigsten ist, und ich möchte natürlich nicht bei schlechtem Wetter reisen, aber ich war dennoch enttäuscht, weil ich mir gerade dafür den Tag freigenommen hatte.\n\nDa der Ausflug aus einem von mir nicht zu verantwortenden Grund nicht stattfand, möchte ich Sie bitten, mir entweder den bezahlten Betrag auf mein Konto zurückzuerstatten oder einen neuen Termin für dieselbe Kreuzfahrt anzubieten. Mir würde zum Beispiel das nächste Wochenende oder ein Werktagabend im Juli gut passen.\n\nSie können mich per E-Mail oder telefonisch kontaktieren. Ich füge eine Kopie der Buchungsbestätigung bei, damit die Bearbeitung der Angelegenheit einfacher ist. Ich danke Ihnen schon im Voraus für Ihre Mühe und hoffe auf eine baldige Antwort.\n\nMit freundlichen Grüßen,\nTheresia Virtanen"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Olet rautatieasemalla etkä löydä oikeaa laituria. Pysäytät asemavirkailijan ja kysyt, miltä laiturilta juna Tampereelle lähtee.", "ohje_de": "Sie sind am Bahnhof und finden den richtigen Bahnsteig nicht. Sie halten einen Bahnhofsangestellten an und fragen, von welchem Bahnsteig der Zug nach Tampere abfährt.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, voisitteko auttaa? Miltä laiturilta juna Tampereelle lähtee? En löydä oikeaa laituria.", "malli_de": "Entschuldigung, könnten Sie mir helfen? Von welchem Bahnsteig fährt der Zug nach Tampere ab? Ich finde den richtigen Bahnsteig nicht."}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Olet hotellin vastaanotossa. Huoneesi ilmastointi ei toimi. Kerro asiasta vastaanottovirkailijalle ja pyydä apua.", "ohje_de": "Sie sind an der Hotelrezeption. Die Klimaanlage in Ihrem Zimmer funktioniert nicht. Teilen Sie das dem Rezeptionisten mit und bitten Sie um Hilfe.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, valitettavasti huoneeni ilmastointi ei toimi, ja huoneessa on todella kuuma. Voisitteko korjata sen tai antaa minulle toisen huoneen?", "malli_de": "Hallo, leider funktioniert die Klimaanlage in meinem Zimmer nicht, und im Zimmer ist es wirklich heiß. Könnten Sie sie reparieren oder mir ein anderes Zimmer geben?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Olet lentokentällä, ja lentosi on myöhässä. Kysyt lähtöselvitystiskillä, milloin kone arviolta lähtee ja ehditkö vielä syödä jotain.", "ohje_de": "Sie sind am Flughafen und Ihr Flug hat Verspätung. Sie fragen am Check-in-Schalter, wann das Flugzeug voraussichtlich abfliegt und ob Sie noch etwas essen können.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, lentoni näyttää olevan myöhässä. Milloin kone arviolta lähtee? Ehdinkö vielä käydä syömässä jotain ennen lähtöä?", "malli_de": "Entschuldigung, mein Flug scheint Verspätung zu haben. Wann fliegt das Flugzeug voraussichtlich ab? Schaffe ich es noch, vor dem Abflug etwas essen zu gehen?"}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Bussissa et ole varma, missä sinun pitää jäädä pois päästäksesi museolle. Kysyt vieressä istuvalta matkustajalta neuvoa.", "ohje_de": "Im Bus sind Sie sich nicht sicher, wo Sie aussteigen müssen, um zum Museum zu gelangen. Sie fragen den danebensitzenden Fahrgast um Rat.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, tiedättekö, millä pysäkillä minun kannattaa jäädä pois, jos haluan museolle? En ole varma, onko se seuraava pysäkki vai vasta sitä seuraava.", "malli_de": "Entschuldigung, wissen Sie, an welcher Haltestelle ich am besten aussteige, wenn ich zum Museum will? Ich bin mir nicht sicher, ob es die nächste Haltestelle ist oder erst die danach."}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Olet varannut retken, mutta sinun täytyy perua se. Soitat matkatoimistoon ja kerrot, että haluat perua varauksesi, ja kysyt, saatko rahat takaisin.", "ohje_de": "Sie haben einen Ausflug gebucht, müssen ihn aber absagen. Sie rufen das Reisebüro an, sagen, dass Sie Ihre Buchung stornieren möchten, und fragen, ob Sie das Geld zurückbekommen.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hyvää päivää, olen varannut retken ensi lauantaiksi, mutta minun täytyy valitettavasti perua se. Voinko saada maksamani rahat takaisin, vai siirretäänkö varaus toiselle päivälle?", "malli_de": "Guten Tag, ich habe für nächsten Samstag einen Ausflug gebucht, aber ich muss ihn leider absagen. Kann ich das bezahlte Geld zurückbekommen, oder wird die Buchung auf einen anderen Tag verschoben?"}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro mieleenpainuvasta matkasta, jonka olet tehnyt. Kerro, minne matkustit, kenen kanssa, miten kuljit perille, mitä teit ja miksi matka jäi mieleesi. Sinulla on aikaa valmistautua.", "ohje_de": "Erzählen Sie von einer unvergesslichen Reise, die Sie gemacht haben. Erzählen Sie, wohin Sie gereist sind, mit wem, wie Sie dorthin gekommen sind, was Sie gemacht haben und warum die Reise Ihnen in Erinnerung geblieben ist. Sie haben Zeit zur Vorbereitung.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluaisin kertoa matkasta, jonka tein muutama vuosi sitten Lappiin yhdessä siskoni kanssa. Olimme molemmat töissä paljon, ja halusimme rauhoittua keskellä talvea. Matkustimme Helsingistä Rovaniemelle yöjunalla, mikä oli minulle aivan uusi kokemus. Nukuimme makuuvaunussa, ja aamulla heräsimme lumiseen ja valkoiseen maisemaan. Se oli kuin satukirjasta. Perillä vuokrasimme mökin järven rannalta. Päivisin kävimme hiihtämässä ja kokeilimme jopa koiravaljakkoa, mikä oli todella jännittävää. Iltaisin istuimme saunassa ja katselimme tähtiä. Eräänä yönä näimme jopa revontulet, ja se oli ehkä koko matkan kohokohta. Seisoimme ulkona pakkasessa pitkään, vaikka oli kylmä, koska emme malttaneet lähteä sisälle. Matka jäi mieleeni, koska sain viettää aikaa siskoni kanssa ilman kiirettä ja koska luonto oli niin kaunis ja hiljainen. Sen jälkeen olen halunnut palata Lappiin uudestaan. Mielestäni jokaisen kannattaisi nähdä Suomen talvi ainakin kerran elämässään.", "malli_de": "Ich möchte von einer Reise erzählen, die ich vor ein paar Jahren zusammen mit meiner Schwester nach Lappland gemacht habe. Wir waren beide viel bei der Arbeit und wollten mitten im Winter zur Ruhe kommen. Wir reisten von Helsinki nach Rovaniemi mit dem Nachtzug, was für mich eine ganz neue Erfahrung war. Wir schliefen im Schlafwagen, und am Morgen wachten wir in einer verschneiten und weißen Landschaft auf. Es war wie aus einem Märchenbuch. Am Ziel mieteten wir eine Hütte am Seeufer. Tagsüber gingen wir Ski fahren und probierten sogar ein Hundeschlittengespann aus, was wirklich aufregend war. Abends saßen wir in der Sauna und betrachteten die Sterne. In einer Nacht sahen wir sogar das Nordlicht, und das war vielleicht der Höhepunkt der ganzen Reise. Wir standen lange draußen im Frost, obwohl es kalt war, weil wir nicht hineingehen mochten. Die Reise ist mir in Erinnerung geblieben, weil ich Zeit mit meiner Schwester ohne Eile verbringen konnte und weil die Natur so schön und still war. Seitdem wollte ich wieder nach Lappland zurückkehren. Ich finde, jeder sollte den finnischen Winter mindestens einmal im Leben sehen."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet matkatoimistossa ja suunnittelet lomamatkaa virkailijan kanssa. Roolisi: Olet asiakas, joka haluaa varata viikon matkan aurinkoiseen kohteeseen. Kerro toiveistasi (kohde, ajankohta, budjetti), kysy hotellista ja kulkuyhteyksistä sekä tee lopuksi päätös. Keskustele virkailijan kanssa.", "ohje_de": "Situation: Sie sind in einem Reisebüro und planen mit dem Angestellten eine Urlaubsreise. Ihre Rolle: Sie sind ein Kunde, der eine einwöchige Reise an ein sonniges Ziel buchen möchte. Erzählen Sie von Ihren Wünschen (Ziel, Zeitpunkt, Budget), fragen Sie nach dem Hotel und den Verkehrsverbindungen und treffen Sie am Ende eine Entscheidung. Sprechen Sie mit dem Angestellten.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Asiakas: Hei, haluaisin varata noin viikon mittaisen lomamatkan johonkin lämpimään kohteeseen heinäkuussa. – Virkailija: Sopisiko teille esimerkiksi Espanja tai Kreikka? – Asiakas: Kreikka kuulostaa mukavalta. Paljonko sellainen matka suunnilleen maksaa, jos budjettini on noin tuhat euroa? – Virkailija: Tuhannella eurolla saatte lennot ja hotellin meren rannalla. – Asiakas: Hienoa. Onko hotellissa aamiainen, ja kuinka kaukana se on rannasta? – Virkailija: Aamiainen sisältyy hintaan, ja rannalle on vain viisi minuuttia kävelymatkaa. – Asiakas: Selvä. Miten lentokentältä pääsee hotelliin? – Virkailija: Kuljetus on järjestetty, bussi vie teidät suoraan hotellille. – Asiakas: Kuulostaa täydelliseltä. Otan tämän matkan, kiitos paljon!", "malli_de": "– Kunde: Hallo, ich würde gern eine etwa einwöchige Urlaubsreise an irgendein warmes Ziel im Juli buchen. – Schalterbeamte: Würde Ihnen zum Beispiel Spanien oder Griechenland passen? – Kunde: Griechenland klingt nett. Wie viel kostet so eine Reise ungefähr, wenn mein Budget etwa tausend Euro beträgt? – Schalterbeamte: Für tausend Euro bekommen Sie die Flüge und ein Hotel am Meer. – Kunde: Wunderbar. Gibt es im Hotel Frühstück, und wie weit ist es vom Strand entfernt? – Schalterbeamte: Das Frühstück ist im Preis enthalten, und bis zum Strand sind es nur fünf Minuten zu Fuß. – Kunde: In Ordnung. Wie kommt man vom Flughafen zum Hotel? – Schalterbeamte: Der Transfer ist organisiert, ein Bus bringt Sie direkt zum Hotel. – Kunde: Das klingt perfekt. Ich nehme diese Reise, vielen Dank!"}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Ystäväsi kanssa suunnittelette yhteistä viikonloppumatkaa, mutta teillä on eri toiveet. Roolisi: Sinä haluat rauhallisen luontolomamatkan mökille, mutta ystäväsi haluaisi mieluummin kaupunkilomalle. Perustele oma toiveesi, kuuntele ystävää ja yrittäkää löytää yhteinen ratkaisu. Keskustele ystäväsi kanssa.", "ohje_de": "Situation: Mit Ihrer Freundin/Ihrem Freund planen Sie eine gemeinsame Wochenendreise, aber Sie haben unterschiedliche Wünsche. Ihre Rolle: Sie möchten einen ruhigen Natururlaub in einer Hütte, aber Ihre Freundin/Ihr Freund würde lieber einen Städtetrip machen. Begründen Sie Ihren eigenen Wunsch, hören Sie der anderen Person zu und versuchen Sie, eine gemeinsame Lösung zu finden. Sprechen Sie mit Ihrer Freundin/Ihrem Freund.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Sinä: Mietin, että voisimme vuokrata mökin järven rannalta. Kaipaan kunnolla lepoa ja luontoa. – Ystävä: Kuulostaa rauhalliselta, mutta minä haluaisin nähdä museoita ja käydä ravintoloissa kaupungissa. – Sinä: Ymmärrän kyllä. Minusta on vain mukava päästä pois melusta edes pariksi päiväksi. Saunominen ja kävely metsässä rentouttavat minua paljon. – Ystävä: Totta, sekin olisi kivaa. Voisimmeko ehkä yhdistää molemmat? – Sinä: Hyvä idea! Mitä jos viettäisimme yhden yön mökillä luonnossa ja toisen yön lähikaupungissa? – Ystävä: Se sopii minulle hyvin. Näin saamme sekä rauhaa että vähän elämää. – Sinä: Sovittu. Etsin meille sopivan mökin, niin sinä voit etsiä mukavan hotellin kaupungista.", "malli_de": "– Du: Ich habe überlegt, dass wir eine Hütte am Seeufer mieten könnten. Ich sehne mich richtig nach Erholung und Natur. – Freund: Klingt erholsam, aber ich würde gern Museen sehen und in der Stadt in Restaurants gehen. – Du: Ich verstehe das schon. Ich finde es nur schön, wenigstens für ein paar Tage dem Lärm zu entkommen. Saunieren und Spazierengehen im Wald entspannen mich sehr. – Freund: Stimmt, das wäre auch schön. Könnten wir vielleicht beides verbinden? – Du: Gute Idee! Wie wäre es, wenn wir eine Nacht in der Hütte in der Natur und die andere Nacht in der nahegelegenen Stadt verbringen? – Freund: Das passt mir gut. So bekommen wir sowohl Ruhe als auch ein bisschen Leben. – Du: Abgemacht. Ich suche uns eine passende Hütte, und du kannst ein nettes Hotel in der Stadt suchen."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse yksi aihe ja kerro mielipiteesi. Perustele kantasi ja anna esimerkkejä. Sinulla on aikaa valmistautua. Aihe 1: Pitäisikö lyhyitä kotimaan lentoja vähentää ja suosia junaa ympäristön vuoksi? Aihe 2: Onko parempi matkustaa yksin vai ryhmässä?", "ohje_de": "Wählen Sie ein Thema und äußern Sie Ihre Meinung. Begründen Sie Ihren Standpunkt und geben Sie Beispiele. Sie haben Zeit zur Vorbereitung. Thema 1: Sollte man kurze Inlandsflüge reduzieren und wegen der Umwelt den Zug bevorzugen? Thema 2: Ist es besser, allein oder in der Gruppe zu reisen?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen ensimmäisen aiheen eli kysymyksen lyhyistä kotimaan lennoista. Minun mielestäni lyhyitä kotimaan lentoja pitäisi todella vähentää ja suosia sen sijaan junaa. Ensinnäkin lentäminen kuormittaa ympäristöä paljon enemmän kuin junalla matkustaminen. Lentokoneet tuottavat suuria määriä päästöjä lyhyelläkin matkalla, ja juuri lyhyet lennot ovat usein turhia, koska sama matka taittuu junalla melko nopeasti. Toiseksi junamatka on monesti käytännöllisempi. Asemat sijaitsevat keskellä kaupunkia, joten ei tarvitse matkustaa kauas lentokentälle eikä saapua paikalle tunteja etukäteen. Itse asun lähellä rautatieasemaa, ja minulle juna olisi paljon kätevämpi. Toki ymmärrän, että harvaan asutussa maassa kuten Suomessa lentäminen on joskus välttämätöntä, jos välimatkat ovat hyvin pitkiä eikä junayhteyttä ole. Sellaisissa tapauksissa lentoa ei voi korvata, ja silloin se on mielestäni täysin perusteltua. Voisimme myös tukea junayhteyksiä siten, että liput olisivat halvempia ja vuoroja olisi enemmän, jolloin yhä useampi valitsisi junan vapaaehtoisesti. Kaiken kaikkiaan olen kuitenkin sitä mieltä, että aina kun nopea junayhteys on olemassa, sitä kannattaisi käyttää lentämisen sijaan. Näin voimme vähentää päästöjä emmekä menetä juuri lainkaan aikaa, ja samalla matkasta tulee usein mukavampi.", "malli_de": "Ich wähle das erste Thema, also die Frage nach den kurzen Inlandsflügen. Meiner Meinung nach sollte man kurze Inlandsflüge wirklich reduzieren und stattdessen den Zug bevorzugen. Erstens belastet das Fliegen die Umwelt viel stärker als das Reisen mit dem Zug. Flugzeuge produzieren auch auf einer kurzen Strecke große Mengen an Emissionen, und gerade die kurzen Flüge sind oft überflüssig, weil dieselbe Strecke mit dem Zug recht schnell zurückgelegt wird. Zweitens ist die Zugreise oft praktischer. Die Bahnhöfe liegen mitten in der Stadt, sodass man nicht weit zum Flughafen fahren und nicht Stunden im Voraus dort erscheinen muss. Ich selbst wohne in der Nähe des Bahnhofs, und für mich wäre der Zug viel praktischer. Natürlich verstehe ich, dass das Fliegen in einem dünn besiedelten Land wie Finnland manchmal unvermeidlich ist, wenn die Entfernungen sehr groß sind und keine Zugverbindung besteht. In solchen Fällen kann der Flug nicht ersetzt werden, und dann ist er meiner Meinung nach völlig gerechtfertigt. Wir könnten die Zugverbindungen auch so unterstützen, dass die Tickets billiger wären und es mehr Verbindungen gäbe, sodass immer mehr Menschen freiwillig den Zug wählen würden. Alles in allem bin ich jedoch der Meinung, dass man, immer wenn eine schnelle Zugverbindung besteht, diese statt des Fliegens nutzen sollte. So können wir die Emissionen verringern und verlieren kaum Zeit, und gleichzeitig wird die Reise oft angenehmer."}]}, {"id": 5, "teema": "Kaupat, palvelut ja asiointi", "teema_de": "Einkaufen und Dienstleistungen", "reading": [{"otsikko": "Lähikaupan viikkotarjoukset", "tyyppi": "ilmoitus", "teksti": "Tervetuloa K-Market Rantatorille! Tällä viikolla meillä on jälleen paljon edullisia tarjouksia koko perheelle. Suomalaiset omenat maksavat nyt vain 1,49 euroa kilo, kun ostat vähintään kaksi kiloa. Tuore ruisleipä on kahden euron hintaan, ja kahvipaketti on tarjouksessa hintaan 3,99 euroa. Lisäksi tuoreet kotimaiset kasvikset ovat tällä viikolla erityisen edullisia, joten kannattaa täyttää ostoskori terveellisillä herkuilla. Muista, että tarjoukset ovat voimassa maanantaista lauantaihin, mutta sunnuntaina hinnat palaavat normaaleiksi.\n\nKanta-asiakkaille meillä on lisäksi erikoisetu: kun keräät vähintään kymmenen Plussa-pistettä, saat ensi viikolla ilmaisen kahvikupin kassalta. Muistathan näyttää kanta-asiakaskortin jo kassajonossa, jotta saat pisteet heti etkä joudu pyytämään niitä jälkikäteen.\n\nKauppamme on avoinna arkisin kello seitsemästä yhdeksään illalla ja viikonloppuisin kello yhdeksästä iltakuuteen. Jos haluat tilata isompia juhlatarjoiluja tai leipomotuotteita, ota yhteyttä myymäläpäällikköön viimeistään kaksi päivää ennen juhlia. Autamme mielellämme suunnittelussa. Toivotamme kaikki asiakkaat lämpimästi tervetulleiksi!", "teksti_de": "Willkommen bei K-Market Rantatori! Diese Woche haben wir wieder viele günstige Angebote für die ganze Familie. Finnische Äpfel kosten jetzt nur 1,49 Euro pro Kilo, wenn Sie mindestens zwei Kilo kaufen. Frisches Roggenbrot gibt es zum Preis von zwei Euro, und eine Packung Kaffee ist im Angebot zum Preis von 3,99 Euro. Außerdem ist frisches einheimisches Gemüse diese Woche besonders günstig, daher lohnt es sich, den Einkaufskorb mit gesunden Leckereien zu füllen. Denken Sie daran, dass die Angebote von Montag bis Samstag gültig sind, aber am Sonntag kehren die Preise wieder zum Normalpreis zurück.\n\nFür Stammkunden haben wir außerdem einen besonderen Vorteil: Wenn Sie mindestens zehn Plussa-Punkte sammeln, bekommen Sie nächste Woche eine kostenlose Tasse Kaffee an der Kasse. Denken Sie bitte daran, die Stammkundenkarte schon in der Kassenschlange vorzuzeigen, damit Sie die Punkte sofort erhalten und sie nicht nachträglich erbitten müssen.\n\nUnser Geschäft ist werktags von sieben Uhr bis neun Uhr abends und an den Wochenenden von neun Uhr bis sechs Uhr abends geöffnet. Wenn Sie größere Feier-Bewirtungen oder Backwaren bestellen möchten, wenden Sie sich spätestens zwei Tage vor der Feier an die Filialleitung. Wir helfen gerne bei der Planung. Wir heißen alle Kunden herzlich willkommen!", "hl": ["Suomalaiset omenat maksavat nyt vain 1,49 euroa kilo, kun ostat vähintään kaksi kiloa.", "Muista, että tarjoukset ovat voimassa maanantaista lauantaihin, mutta sunnuntaina hinnat palaavat normaaleiksi.", "Kanta-asiakkaille meillä on lisäksi erikoisetu: kun keräät vähintään kymmenen Plussa-pistettä, saat ensi viikolla ilmaisen kahvikupin kassalta.", "Kauppamme on avoinna arkisin kello seitsemästä yhdeksään illalla ja viikonloppuisin kello yhdeksästä iltakuuteen."], "image": "Simulaatio_05_asiointi/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Milloin omenat ovat tarjoushintaan?", "vaihtoehdot": ["kun ostaa ainakin kaksi kiloa", "vain sunnuntaina", "kun on kanta-asiakas"], "oikea": "a", "selitys_fi": "Tekstissä sanotaan, että omenat maksavat 1,49 euroa kilo, kun ostaa vähintään kaksi kiloa.", "vihje_de": "„vähintään kaksi kiloa“ = mindestens zwei Kilo.", "kysymys_de": "Wann sind die Äpfel zum Angebotspreis erhältlich?"}, {"id": "L2", "tyyppi": "oikein-väärin", "kysymys": "Tarjoukset ovat voimassa myös sunnuntaina.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Sunnuntaina hinnat palaavat normaaleiksi, joten tarjoukset eivät ole silloin voimassa.", "vihje_de": "Am Sonntag gelten die normalen Preise wieder.", "kysymys_de": "Die Angebote gelten auch am Sonntag."}, {"id": "L3", "tyyppi": "monivalinta", "kysymys": "Mitä kanta-asiakas saa, kun hän kerää vähintään kymmenen Plussa-pistettä?", "vaihtoehdot": ["ilmaisen ruisleivän", "ilmaisen kahvikupin", "alennuksen kahvipaketista"], "oikea": "b", "selitys_fi": "Kanta-asiakas saa ilmaisen kahvikupin kassalta, kun hän kerää vähintään kymmenen pistettä.", "vihje_de": "„ilmainen kahvikuppi“ = eine kostenlose Kaffeetasse.", "kysymys_de": "Was bekommt ein Stammkunde, wenn er mindestens zehn Plussa-Punkte sammelt?"}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Mihin asti kauppa on auki viikonloppuisin?", "vaihtoehdot": [], "oikea": "Iltakuuteen eli kello 18.", "selitys_fi": "Tekstin mukaan kauppa on viikonloppuisin auki kello yhdeksästä iltakuuteen.", "vihje_de": "„iltakuuteen“ = bis 18 Uhr (am Wochenende).", "kysymys_de": "Bis wann ist das Geschäft an den Wochenenden geöffnet?"}]}, {"otsikko": "Vastaus asiakkaan kysymykseen paketista", "tyyppi": "sähköposti", "teksti": "Hei Theresia,\n\nkiitos viestistäsi ja kärsivällisyydestäsi. Selvitimme tilauksesi tilanteen heti, kun saimme kysymyksesi, koska haluamme aina pitää asiakkaamme ajan tasalla. Pahoittelemme vilpittömästi, että pakettisi on ollut myöhässä jo kolme päivää.\n\nSeurantatietojen mukaan paketti on tällä hetkellä lajittelukeskuksessa Vantaalla. Valitettavasti viime viikon huono sää hidasti kuljetuksia koko maassa, ja siksi monet paketit ovat liikkeellä tavallista hitaammin. Arvioimme kuitenkin, että pakettisi saapuu lähimpään postin noutopisteeseen kahden arkipäivän kuluessa.\n\nSaat tekstiviestin matkapuhelimeesi heti, kun paketti on valmiina noudettavaksi. Ota noutoa varten mukaan henkilöllisyystodistus ja viestissä oleva noutokoodi. Paketti odottaa noutopisteessä seitsemän päivää, joten ehdit hakea sen rauhassa työpäivän jälkeenkin.\n\nKoska toimitus viivästyi, hyvitämme sinulle postikulut kokonaan. Raha näkyy tililläsi noin viikon kuluessa. Jos sinulla on vielä kysyttävää tai haluat muuttaa toimitustapaa, vastaamme mielellämme arkisin kello 8–16.\n\nYstävällisin terveisin,\nasiakaspalvelu / Verkkokauppa Aalto", "teksti_de": "Hallo Theresia,\n\ndanke für deine Nachricht und deine Geduld. Wir haben den Stand deiner Bestellung sofort geklärt, als wir deine Frage erhielten, denn wir möchten unsere Kunden immer auf dem Laufenden halten. Wir bitten aufrichtig um Entschuldigung, dass dein Paket bereits drei Tage verspätet ist.\n\nLaut den Sendungsverfolgungsdaten befindet sich das Paket derzeit im Sortierzentrum in Vantaa. Leider hat das schlechte Wetter letzte Woche die Beförderung im ganzen Land verlangsamt, und deshalb sind viele Pakete langsamer als gewöhnlich unterwegs. Wir schätzen jedoch, dass dein Paket innerhalb von zwei Werktagen an der nächstgelegenen Post-Abholstelle eintrifft.\n\nDu erhältst eine SMS auf dein Mobiltelefon, sobald das Paket abholbereit ist. Bring für die Abholung einen Ausweis und den in der Nachricht enthaltenen Abholcode mit. Das Paket wartet sieben Tage an der Abholstelle, du hast also genug Zeit, es in Ruhe auch nach dem Arbeitstag abzuholen.\n\nDa sich die Lieferung verzögert hat, erstatten wir dir die Versandkosten vollständig. Das Geld erscheint innerhalb von etwa einer Woche auf deinem Konto. Wenn du noch Fragen hast oder die Versandart ändern möchtest, antworten wir gerne werktags von 8 bis 16 Uhr.\n\nMit freundlichen Grüßen,\nKundenservice / Onlineshop Aalto", "hl": ["Valitettavasti viime viikon huono sää hidasti kuljetuksia koko maassa, ja siksi monet paketit ovat liikkeellä tavallista hitaammin.", "Ota noutoa varten mukaan henkilöllisyystodistus ja viestissä oleva noutokoodi.", "Paketti odottaa noutopisteessä seitsemän päivää, joten ehdit hakea sen rauhassa työpäivän jälkeenkin.", "Koska toimitus viivästyi, hyvitämme sinulle postikulut kokonaan."], "image": "Simulaatio_05_asiointi/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Miksi paketti on myöhässä?", "vaihtoehdot": ["Asiakas antoi väärän osoitteen.", "Huono sää hidasti kuljetuksia.", "Paketti katosi kokonaan."], "oikea": "b", "selitys_fi": "Tekstin mukaan viime viikon huono sää hidasti kuljetuksia koko maassa.", "vihje_de": "„huono sää“ = schlechtes Wetter verlangsamte die Lieferungen.", "kysymys_de": "Warum ist das Paket verspätet?"}, {"id": "L6", "tyyppi": "lyhyt", "kysymys": "Mitä asiakkaan pitää ottaa mukaan, kun hän noutaa paketin?", "vaihtoehdot": [], "oikea": "Henkilöllisyystodistus ja noutokoodi.", "selitys_fi": "Noutoa varten pitää ottaa mukaan henkilöllisyystodistus ja viestissä oleva noutokoodi.", "vihje_de": "Ausweis und Abholcode mitbringen.", "kysymys_de": "Was muss der Kunde mitbringen, wenn er das Paket abholt?"}, {"id": "L7", "tyyppi": "oikein-väärin", "kysymys": "Paketti odottaa noutopisteessä seitsemän päivää.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstissä sanotaan, että paketti odottaa noutopisteessä seitsemän päivää.", "vihje_de": "Das Paket wartet sieben Tage an der Abholstelle.", "kysymys_de": "Das Paket wartet sieben Tage an der Abholstelle."}, {"id": "L8", "tyyppi": "monivalinta", "kysymys": "Miten kauppa hyvittää myöhästymisen?", "vaihtoehdot": ["Se lähettää uuden tuotteen.", "Se antaa alennuskoodin seuraavaan tilaukseen.", "Se maksaa postikulut takaisin."], "oikea": "c", "selitys_fi": "Kauppa hyvittää postikulut kokonaan, ja raha näkyy tilillä noin viikon kuluessa.", "vihje_de": "„hyvittää postikulut“ = die Versandkosten werden erstattet.", "kysymys_de": "Wie entschädigt das Geschäft für die Verspätung?"}]}, {"otsikko": "Näin palautat verkkokaupan tuotteen", "tyyppi": "ohje", "teksti": "Haluatko palauttaa tuotteen, joka ei sopinut tai miellyttänyt? Se on helppoa, kun toimit ohjeiden mukaan.\n\nEnsimmäiseksi pakkaa tuote huolellisesti alkuperäiseen pakkaukseen. Tarkista, että kaikki osat ja käyttöohjeet ovat mukana. Tuotteen pitää olla siisti ja käyttämätön, sillä emme voi ottaa vastaan likaisia tai rikkinäisiä tuotteita.\n\nToiseksi täytä palautuslomake, jonka löydät tilauksen mukana tulleesta paketista tai verkkosivuiltamme. Kirjoita lomakkeeseen tilausnumero ja syy palautukselle. Laita täytetty lomake paketin sisään.\n\nKolmanneksi tulosta palautustarra omalta tililtäsi ja kiinnitä se paketin päälle. Vie paketti mihin tahansa postin toimipisteeseen. Palautus on sinulle maksuton, jos teet sen neljäntoista päivän kuluessa tilauksen saapumisesta.\n\nKun olemme vastaanottaneet palautuksen, tarkistamme tuotteen ja palautamme rahat samalle maksutavalle, jolla maksoit. Raha on tililläsi yleensä noin kahden viikon kuluessa. Muista säilyttää palautuskuitti siihen asti, kunnes olet saanut rahat takaisin.", "teksti_de": "Möchten Sie ein Produkt zurücksenden, das nicht gepasst oder gefallen hat? Das ist einfach, wenn Sie nach der Anleitung vorgehen.\n\nVerpacken Sie das Produkt zuerst sorgfältig in der Originalverpackung. Prüfen Sie, dass alle Teile und die Gebrauchsanweisung dabei sind. Das Produkt muss sauber und ungebraucht sein, denn wir können keine schmutzigen oder kaputten Produkte annehmen.\n\nZweitens füllen Sie das Rücksendeformular aus, das Sie in dem mit der Bestellung gelieferten Paket oder auf unserer Website finden. Schreiben Sie in das Formular die Bestellnummer und den Grund für die Rücksendung. Legen Sie das ausgefüllte Formular in das Paket.\n\nDrittens drucken Sie den Rücksendeaufkleber aus Ihrem eigenen Konto aus und befestigen ihn auf dem Paket. Bringen Sie das Paket zu einer beliebigen Postfiliale. Die Rücksendung ist für Sie kostenlos, wenn Sie sie innerhalb von vierzehn Tagen nach Eintreffen der Bestellung vornehmen.\n\nWenn wir die Rücksendung erhalten haben, prüfen wir das Produkt und erstatten das Geld auf dasselbe Zahlungsmittel, mit dem Sie bezahlt haben. Das Geld ist in der Regel innerhalb von etwa zwei Wochen auf Ihrem Konto. Denken Sie daran, den Rücksendebeleg bis dahin aufzubewahren, bis Sie das Geld zurückerhalten haben.", "hl": ["Tuotteen pitää olla siisti ja käyttämätön, sillä emme voi ottaa vastaan likaisia tai rikkinäisiä tuotteita.", "Kirjoita lomakkeeseen tilausnumero ja syy palautukselle.", "Palautus on sinulle maksuton, jos teet sen neljäntoista päivän kuluessa tilauksen saapumisesta.", "Kun olemme vastaanottaneet palautuksen, tarkistamme tuotteen ja palautamme rahat samalle maksutavalle, jolla maksoit."], "image": null, "items": [{"id": "L9", "tyyppi": "oikein-väärin", "kysymys": "Palautettavan tuotteen pitää olla siisti ja käyttämätön.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstin mukaan tuotteen pitää olla siisti ja käyttämätön, eikä likaisia tai rikkinäisiä tuotteita oteta vastaan.", "vihje_de": "Die Ware muss sauber und ungebraucht sein.", "kysymys_de": "Das zurückzusendende Produkt muss sauber und ungebraucht sein."}, {"id": "L10", "tyyppi": "monivalinta", "kysymys": "Mitä palautuslomakkeeseen pitää kirjoittaa?", "vaihtoehdot": ["tilausnumero ja palautuksen syy", "pankkitilin numero", "henkilötunnus ja osoite"], "oikea": "a", "selitys_fi": "Lomakkeeseen kirjoitetaan tilausnumero ja syy palautukselle.", "vihje_de": "„syy palautukselle“ = der Grund für die Rücksendung.", "kysymys_de": "Was muss in das Rücksendeformular geschrieben werden?"}, {"id": "L11", "tyyppi": "monivalinta", "kysymys": "Milloin palautus on asiakkaalle maksuton?", "vaihtoehdot": ["aina, ilman aikarajaa", "kun sen tekee 14 päivän kuluessa", "vain kanta-asiakkaille"], "oikea": "b", "selitys_fi": "Palautus on maksuton, jos sen tekee neljäntoista päivän kuluessa tilauksen saapumisesta.", "vihje_de": "Kostenlos innerhalb von 14 Tagen nach Erhalt.", "kysymys_de": "Wann ist die Rücksendung für den Kunden kostenlos?"}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Miten asiakas saa rahat takaisin?", "vaihtoehdot": [], "oikea": "Samalle maksutavalle, jolla hän maksoi.", "selitys_fi": "Rahat palautetaan samalle maksutavalle, jolla asiakas alun perin maksoi.", "vihje_de": "Erstattung auf dasselbe Zahlungsmittel.", "kysymys_de": "Wie bekommt der Kunde das Geld zurück?"}]}, {"otsikko": "Käteinen vähenee suomalaisissa kaupoissa", "tyyppi": "uutinen", "teksti": "Yhä useampi suomalainen maksaa ostoksensa kortilla tai puhelimella. Tuoreen tutkimuksen mukaan vain noin joka kymmenes asiakas käyttää nykyään käteistä päivittäisissä ostoksissaan. Erityisesti nuoret aikuiset suosivat mobiilimaksamista, koska se on heidän mielestään nopeaa ja kätevää.\n\nKaupan alan asiantuntija Markku Laine kertoo, että muutos on ollut nopea. ”Kymmenen vuotta sitten käteistä käytettiin paljon enemmän. Nyt monet kaupat toivovat asiakkaiden maksavan kortilla, koska kassojen käsittely on silloin sujuvampaa”, hän sanoo.\n\nKaikki eivät kuitenkaan halua luopua käteisestä. Osa iäkkäämmistä asiakkaista kokee kortin käytön hankalaksi, ja jotkut haluavat seurata rahankäyttöään konkreettisesti. Siksi asiantuntijat muistuttavat, että kauppojen kannattaa tarjota molempia maksutapoja jatkossakin.\n\nLaineen mukaan käteinen ei
