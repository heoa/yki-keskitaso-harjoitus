me vuorokautta.", "vihje_de": "Arzt/Apotheke kontaktieren, wenn Schmerz oder Fieber länger als drei Tage anhält.", "kysymys_de": "Wann muss sich der Anwender des Medikaments an einen Arzt oder eine Apotheke wenden?"}]}], "listening": [{"otsikko": "Lääkärin vastaanotolla", "tyyppi": "dialogi", "litteraatti": "– Lääkäri: Päivää, käykää istumaan. No, mikä teitä vaivaa?\n– Asiakas: Päivää. Minulla on ollut jo viikon ajan kova yskä, ja eilen alkoi myös kuumeilla. Tänä aamuna mittasin kuumetta 38,5 astetta.\n– Lääkäri: Selvä. Onko teillä kipuja rinnassa, kun hengitätte tai yskitte?\n– Asiakas: Vähän kyllä, ja olen ollut todella väsynyt. En ole jaksanut käydä töissä tällä viikolla.\n– Lääkäri: Kuunnellaanpa keuhkot. Hengittäkää syvään sisään ja ulos… Kiitos. Keuhkot kuulostavat melko puhtailta, joten kyseessä on todennäköisesti virusinfektio. Antibiootti ei siihen auttaisi.\n– Asiakas: Tarvitsenko minä siis mitään lääkettä?\n– Lääkäri: Tärkeintä on lepo ja runsas juominen. Voitte ottaa särkylääkettä kuumeeseen ja kipuun. Jos kuume jatkuu yli kolme päivää tai hengitys vaikeutuu, ottakaa heti uudelleen yhteyttä. Kirjoitan teille sairausloman loppuviikoksi.\n– Asiakas: Kiitos paljon. Se helpottaa, kun saan levätä rauhassa.", "litteraatti_de": "– Arzt: Guten Tag, nehmen Sie Platz. Nun, was fehlt Ihnen?\n– Kunde: Guten Tag. Ich habe schon seit einer Woche starken Husten, und gestern bekam ich auch Fieber. Heute Morgen habe ich 38,5 Grad Fieber gemessen.\n– Arzt: Verstehe. Haben Sie Schmerzen in der Brust, wenn Sie atmen oder husten?\n– Kunde: Ein bisschen schon, und ich bin wirklich müde gewesen. Ich habe diese Woche nicht zur Arbeit gehen können.\n– Arzt: Hören wir uns die Lunge an. Atmen Sie tief ein und aus … Danke. Die Lunge klingt ziemlich frei, es handelt sich also wahrscheinlich um eine Virusinfektion. Ein Antibiotikum würde dagegen nicht helfen.\n– Kunde: Brauche ich also kein Medikament?\n– Arzt: Das Wichtigste sind Ruhe und reichlich Flüssigkeit. Sie können ein Schmerzmittel gegen Fieber und Schmerzen nehmen. Wenn das Fieber länger als drei Tage anhält oder die Atmung schwerer wird, melden Sie sich sofort wieder. Ich schreibe Ihnen für den Rest der Woche eine Krankschreibung.\n– Kunde: Vielen Dank. Das erleichtert mich, wenn ich in Ruhe ausruhen kann.", "hl": ["Minulla on ollut jo viikon ajan kova yskä, ja eilen alkoi myös kuumeilla.", "Keuhkot kuulostavat melko puhtailta, joten kyseessä on todennäköisesti virusinfektio.", "Kirjoitan teille sairausloman loppuviikoksi."], "audio": "Simulaatio_02_terveys/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Kuinka kauan asiakkaalla on ollut yskää?", "vaihtoehdot": ["Yhden päivän.", "Noin viikon.", "Yli kuukauden."], "oikea": "b", "selitys_fi": "Asiakas kertoo, että yskää on ollut jo viikon ajan.", "vihje_de": "Husten seit etwa einer Woche.", "kysymys_de": "Wie lange hat der Kunde schon Husten?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Mitä lääkäri arvelee asiakkaan sairaudeksi?", "vaihtoehdot": ["Virusinfektiota.", "Murtumaa.", "Allergiaa."], "oikea": "a", "selitys_fi": "Lääkäri sanoo, että kyseessä on todennäköisesti virusinfektio, eikä antibiootti auttaisi.", "vihje_de": "Wahrscheinlich eine Virusinfektion – Antibiotika helfen nicht.", "kysymys_de": "Was vermutet der Arzt als Krankheit des Kunden?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Lääkäri määrää asiakkaalle antibiootin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Lääkäri sanoo, ettei antibiootti auttaisi, ja suosittelee lepoa, juomista ja särkylääkettä.", "vihje_de": "Kein Antibiotikum – nur Ruhe, Flüssigkeit und Schmerzmittel.", "kysymys_de": "Der Arzt verschreibt dem Kunden ein Antibiotikum."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Mitä lääkäri kirjoittaa asiakkaalle loppuviikoksi?", "vaihtoehdot": [], "oikea": "Sairausloman.", "selitys_fi": "Lääkäri sanoo kirjoittavansa asiakkaalle sairausloman loppuviikoksi.", "vihje_de": "Eine Krankschreibung (sairausloma) für den Rest der Woche.", "kysymys_de": "Was schreibt der Arzt dem Kunden für den Rest der Woche aus?"}]}, {"otsikko": "Puhelu apteekkiin", "tyyppi": "puhelu", "litteraatti": "– Nainen: Keskustan apteekki, hyvää päivää.\n– Mies: Päivää. Soitan, koska minulla on lääkärin määräämä resepti antibiootista, mutta en pääse itse hakemaan sitä, koska olen kipeänä kotona. Voiko lääkkeen noutaa joku toinen?\n– Nainen: Kyllä voi. Lähetä mukana se henkilö, joka noutaa lääkkeen, ja anna hänelle oma Kela-korttisi tai henkilötunnuksesi. Silloin lääke saadaan luovutettua.\n– Mies: Hyvä. Onko lääke heti valmiina vai pitääkö odottaa?\n– Nainen: Reseptisi näkyy meillä jo järjestelmässä, joten lääke on valmiina noin viidessätoista minuutissa. Maksu hoidetaan kassalla noudon yhteydessä.\n– Mies: Selvä. Saako tätä antibioottia ottaa yhdessä särkylääkkeen kanssa, koska minulla on myös kuumetta?\n– Nainen: Yleensä saa, mutta varmista asia pakkauksen ohjeesta. Jos jokin asia askarruttaa, voit aina kysyä farmaseutilta noudon yhteydessä.\n– Mies: Kiitos avusta. Lähetän naapurini hakemaan lääkkeen iltapäivällä.\n– Nainen: Hyvä, otamme hänet vastaan. Pikaista paranemista!", "litteraatti_de": "– Frau: Apotheke im Zentrum, guten Tag.\n– Mann: Guten Tag. Ich rufe an, weil ich ein vom Arzt verschriebenes Rezept für ein Antibiotikum habe, aber ich kann es nicht selbst abholen, weil ich krank zu Hause bin. Kann das Medikament jemand anderes abholen?\n– Frau: Ja, das kann er. Schicken Sie die Person mit, die das Medikament abholt, und geben Sie ihr Ihre eigene Kela-Karte oder Ihre Personenkennzahl mit. Dann kann das Medikament ausgehändigt werden.\n– Mann: Gut. Ist das Medikament sofort fertig oder muss man warten?\n– Frau: Ihr Rezept ist bei uns schon im System sichtbar, das Medikament ist also in etwa fünfzehn Minuten fertig. Die Bezahlung erfolgt an der Kasse bei der Abholung.\n– Mann: Verstehe. Darf man dieses Antibiotikum zusammen mit einem Schmerzmittel einnehmen, weil ich auch Fieber habe?\n– Frau: In der Regel schon, aber vergewissern Sie sich anhand der Anleitung auf der Packung. Wenn Sie etwas beschäftigt, können Sie bei der Abholung jederzeit den Apotheker fragen.\n– Mann: Danke für die Hilfe. Ich schicke meinen Nachbarn nachmittags, um das Medikament abzuholen.\n– Frau: Gut, wir empfangen ihn. Gute Besserung!", "hl": ["Soitan, koska minulla on lääkärin määräämä resepti antibiootista, mutta en pääse itse hakemaan sitä, koska olen kipeänä kotona.", "Lähetä mukana se henkilö, joka noutaa lääkkeen, ja anna hänelle oma Kela-korttisi tai henkilötunnuksesi.", "Reseptisi näkyy meillä jo järjestelmässä, joten lääke on valmiina noin viidessätoista minuutissa."], "audio": "Simulaatio_02_terveys/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Miksi mies soittaa apteekkiin?", "vaihtoehdot": ["Hän haluaa varata lääkäriajan.", "Hän on kipeänä eikä pääse itse hakemaan lääkettä.", "Hän haluaa perua reseptin."], "oikea": "b", "selitys_fi": "Mies kertoo olevansa kipeänä kotona eikä pääse itse hakemaan lääkettä.", "vihje_de": "Er ist krank zu Hause und kann das Medikament nicht selbst abholen.", "kysymys_de": "Warum ruft der Mann die Apotheke an?"}, {"id": "Ku6", "tyyppi": "lyhyt", "kysymys": "Mitä noutajan pitää ottaa mukaan, jotta hän saa lääkkeen?", "vaihtoehdot": [], "oikea": "Miehen Kela-kortin tai henkilötunnuksen.", "selitys_fi": "Apteekin työntekijä sanoo, että noutaja tarvitsee miehen Kela-kortin tai henkilötunnuksen.", "vihje_de": "Die Kela-Karte oder Personenkennzahl des Mannes.", "kysymys_de": "Was muss der Abholer mitnehmen, damit er das Medikament bekommt?"}, {"id": "Ku7", "tyyppi": "monivalinta", "kysymys": "Milloin lääke on valmiina noudettavaksi?", "vaihtoehdot": ["Noin viidessätoista minuutissa.", "Vasta seuraavana päivänä.", "Heti puhelun aikana."], "oikea": "a", "selitys_fi": "Apteekin työntekijä sanoo, että lääke on valmiina noin viidessätoista minuutissa.", "vihje_de": "In etwa fünfzehn Minuten fertig.", "kysymys_de": "Wann ist das Medikament zur Abholung fertig?"}, {"id": "Ku8", "tyyppi": "oikein-väärin", "kysymys": "Lääkkeen maksu hoidetaan vasta kotona verkkopankissa.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Työntekijä sanoo, että maksu hoidetaan kassalla noudon yhteydessä, ei kotona.", "vihje_de": "Bezahlt wird an der Kasse bei der Abholung, nicht zu Hause.", "kysymys_de": "Die Bezahlung des Medikaments erfolgt erst zu Hause im Online-Banking."}]}, {"otsikko": "Asiantuntijan vinkit hyvinvointiin", "tyyppi": "monologi", "litteraatti": "Hyvää huomenta kaikille. Olen ravitsemusterapeutti, ja puhun tänä aamuna siitä, miten arjen pienet valinnat vaikuttavat jaksamiseen. Moni kuvittelee, että hyvinvointi vaatii suuria muutoksia, mutta usein riittävät pienet teot. Aloitan ruokavaliosta. Suosittelen syömään säännöllisesti, noin viiden tunnin välein, jotta verensokeri pysyy tasaisena eikä iltapäivällä tule väsynyt ja ärtynyt olo. Lautasella olisi hyvä olla puolet kasviksia, neljännes täysjyväviljaa ja neljännes proteiinia, esimerkiksi kalaa, kanaa tai papuja. Toinen tärkeä asia on vesi. Moni juo liian vähän ja sekoittaa janon nälkään. Kun seuraavan kerran tekee mieli napostella, juo ensin lasi vettä ja odota hetki. Kolmas vinkkini koskee liikkumista. Sinun ei tarvitse käydä salilla joka päivä. Jo puolen tunnin reipas kävely riittää, ja sen voi jakaa vaikka kolmeen kymmenen minuutin pätkään päivän aikana. Lopuksi muistuttaisin levosta. Univelka kasaantuu helposti, joten yritä mennä nukkumaan suunnilleen samaan aikaan joka ilta. Kun nämä neljä asiaa ovat tasapainossa, keho ja mieli voivat selvästi paremmin. Kiitos, ja nyt otan mielelläni kysymyksiä.", "litteraatti_de": "Guten Morgen zusammen. Ich bin Ernährungstherapeutin und spreche heute Morgen darüber, wie die kleinen Entscheidungen des Alltags die Leistungsfähigkeit beeinflussen. Viele bilden sich ein, dass Wohlbefinden große Veränderungen erfordert, aber oft reichen kleine Schritte. Ich beginne mit der Ernährung. Ich empfehle, regelmäßig zu essen, etwa alle fünf Stunden, damit der Blutzucker gleichmäßig bleibt und man am Nachmittag nicht müde und gereizt wird. Auf dem Teller sollten gut zur Hälfte Gemüse, zu einem Viertel Vollkorngetreide und zu einem Viertel Proteine sein, zum Beispiel Fisch, Hähnchen oder Bohnen. Eine zweite wichtige Sache ist Wasser. Viele trinken zu wenig und verwechseln Durst mit Hunger. Wenn du das nächste Mal Lust hast zu naschen, trink zuerst ein Glas Wasser und warte einen Moment. Mein dritter Tipp betrifft die Bewegung. Du musst nicht jeden Tag ins Fitnessstudio gehen. Schon ein halbstündiger zügiger Spaziergang reicht, und man kann ihn ruhig in drei Abschnitte von zehn Minuten über den Tag verteilen. Zum Schluss möchte ich an die Ruhe erinnern. Ein Schlafdefizit häuft sich leicht an, versuche also, ungefähr zur gleichen Zeit jeden Abend ins Bett zu gehen. Wenn diese vier Dinge im Gleichgewicht sind, fühlen sich Körper und Geist deutlich besser. Danke, und jetzt beantworte ich gerne Fragen.", "hl": ["Suosittelen syömään säännöllisesti, noin viiden tunnin välein, jotta verensokeri pysyy tasaisena eikä iltapäivällä tule väsynyt ja ärtynyt olo.", "Kun seuraavan kerran tekee mieli napostella, juo ensin lasi vettä ja odota hetki.", "Jo puolen tunnin reipas kävely riittää, ja sen voi jakaa vaikka kolmeen kymmenen minuutin pätkään päivän aikana."], "audio": "Simulaatio_02_terveys/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Kuinka usein puhuja suosittelee syömään?", "vaihtoehdot": ["Vain kaksi kertaa päivässä.", "Noin viiden tunnin välein.", "Aina, kun tekee mieli."], "oikea": "b", "selitys_fi": "Puhuja suosittelee syömään säännöllisesti, noin viiden tunnin välein.", "vihje_de": "Regelmäßig essen, etwa alle fünf Stunden.", "kysymys_de": "Wie oft empfiehlt die Sprecherin zu essen?"}, {"id": "Ku10", "tyyppi": "monivalinta", "kysymys": "Mitä puhuja neuvoo tekemään, kun tekee mieli napostella?", "vaihtoehdot": ["Syömään heti jotain makeaa.", "Juomaan ensin lasin vettä ja odottamaan hetken.", "Menemään nukkumaan."], "oikea": "b", "selitys_fi": "Puhuja neuvoo juomaan ensin lasin vettä ja odottamaan, koska jano sekoitetaan usein nälkään.", "vihje_de": "Erst ein Glas Wasser trinken und kurz warten.", "kysymys_de": "Was rät die Sprecherin zu tun, wenn man Lust hat zu naschen?"}, {"id": "Ku11", "tyyppi": "lyhyt", "kysymys": "Kuinka pitkä reipas kävely riittää puhujan mukaan päivässä?", "vaihtoehdot": [], "oikea": "Puoli tuntia eli kolmekymmentä minuuttia.", "selitys_fi": "Puhuja sanoo, että jo puolen tunnin reipas kävely riittää, ja sen voi jakaa pienempiin osiin.", "vihje_de": "Eine halbe Stunde zügiges Gehen reicht.", "kysymys_de": "Wie lang muss laut der Sprecherin ein zügiger Spaziergang pro Tag sein, damit er reicht?"}, {"id": "Ku12", "tyyppi": "oikein-väärin", "kysymys": "Puhujan mukaan hyvinvointi vaatii aina suuria muutoksia.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Puhuja sanoo päinvastoin, että usein riittävät pienet teot eivätkä suuret muutokset.", "vihje_de": "Wohlbefinden braucht oft nur kleine Schritte, keine großen Veränderungen.", "kysymys_de": "Laut der Sprecherin erfordert Wohlbefinden immer große Veränderungen."}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Olet sopinut lähteväsi ystäväsi kanssa lenkille tänä iltana, mutta olet sairastunut. Kirjoita ystävällesi tekstiviesti. Kerro, että olet kipeä, kuvaile lyhyesti oireesi, peru tapaaminen ja ehdota uutta ajankohtaa.", "ohje_de": "Du wolltest heute Abend mit deiner Freundin joggen, bist aber krank geworden. Schreibe ihr eine SMS: Sag, dass du krank bist, beschreibe kurz deine Symptome, sage den Termin ab und schlage einen neuen Zeitpunkt vor.", "sanamaara": "80–120", "mallivastaus": "Hei Anna! Anteeksi, mutta minun täytyy perua tämän illan lenkkimme. Heräsin aamulla todella huonovointisena. Minulla on kurkku kipeä ja vähän kuumetta, ja olen koko päivän tuntenut itseni väsyneeksi. En usko, että minusta olisi nyt juoksemaan, ja en haluaisi tartuttaa sinua. Pahoittelen, että ilmoitan näin myöhään. Toivottavasti tämä on vain tavallinen flunssa ja olen pian taas kunnossa. Voisimmeko siirtää lenkin ensi viikon tiistaille? Silloin minulla ei ole töitä illalla. Kerro, sopiiko se sinulle. Lepään nyt ja juon paljon vettä. Pikaisiin näkemisiin ja mukavaa iltaa sinulle! Terveisin Theresia", "arviointi_fi": "Hyvässä vastauksessa on epämuodollinen tervehdys ja lopetus, kaikki neljä tehtävän kohtaa (sairaus, oireet, peruminen, uusi ajankohta), luonteva sinuttelu ja sopiva pituus 80–120 sanaa. Pienet virheet eivät laske tasoa, jos viesti on ymmärrettävä.", "mallivastaus_de": "Hallo Anna! Entschuldige, aber ich muss unseren Lauf heute Abend absagen. Ich bin heute Morgen wirklich unwohl aufgewacht. Ich habe Halsschmerzen und etwas Fieber, und ich habe mich den ganzen Tag müde gefühlt. Ich glaube nicht, dass ich jetzt zum Laufen taugen würde, und ich möchte dich nicht anstecken. Tut mir leid, dass ich mich so spät melde. Hoffentlich ist das nur eine gewöhnliche Erkältung und ich bin bald wieder fit. Könnten wir den Lauf auf nächste Woche Dienstag verschieben? Da habe ich abends nicht zu arbeiten. Sag mir, ob dir das passt. Ich ruhe mich jetzt aus und trinke viel Wasser. Bis bald und einen schönen Abend dir! Viele Grüße, Theresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Kirjoita keskustelupalstalle mielipidekirjoitus otsikolla „Pitäisikö työpaikoilla tukea työntekijöiden liikuntaa?“. Kerro oma mielipiteesi, perustele se vähintään kahdella syyllä ja anna yksi konkreettinen esimerkki tai ehdotus. Lopeta lyhyeen yhteenvetoon.", "ohje_de": "Schreibe einen Meinungsbeitrag in einem Forum zum Thema „Sollten Arbeitgeber den Sport der Mitarbeitenden fördern?“. Nenne deine Meinung, begründe sie mit mindestens zwei Argumenten, gib ein konkretes Beispiel oder einen Vorschlag und schließe mit einer kurzen Zusammenfassung.", "sanamaara": "150–200", "mallivastaus": "Pitäisikö työpaikoilla tukea työntekijöiden liikuntaa?\n\nMielestäni työnantajien kannattaa ehdottomasti tukea työntekijöiden liikuntaa, ja perustelen kantani kahdella tärkeällä syyllä. Ensinnäkin liikunta parantaa selvästi terveyttä. Kun ihmiset liikkuvat säännöllisesti, he sairastavat vähemmän ja jaksavat työssään paremmin. Tämä näkyy myös siinä, että sairauspoissaolot vähenevät, mikä hyödyttää sekä työntekijää itseään että koko yritystä. Terveempi henkilöstö on yritykselle suuri etu. Toiseksi liikunta vähentää stressiä, joka on nykyään yleinen ongelma monilla työpaikoilla. Istumatyö on raskasta sekä keholle että mielelle, ja jo lyhytkin liikuntatauko tekee hyvää. Virkeä ja levännyt työntekijä keskittyy paremmin ja tekee vähemmän virheitä.\n\nKonkreettisena esimerkkinä työpaikka voisi tarjota työntekijöilleen liikuntaseteleitä tai järjestää yhteisen taukojumpan keskellä työpäivää. Omalla työpaikallani moni alkoi kävellä kokouksia ulkona kävellen, ja koko työyhteisön tunnelma parani heti huomattavasti. Tällaiset pienet teot eivät maksa paljoa, mutta niiden vaikutus jaksamiseen on todella suuri.\n\nYhteenvetona sanoisin, että liikunnan tukeminen on työnantajalle viisas sijoitus. Se lisää terveyttä, vähentää stressiä ja parantaa selvästi työilmapiiriä. Siksi toivon, että yhä useampi työnantaja ottaisi asian vihdoin vakavasti.", "arviointi_fi": "Hyvässä vastauksessa on selkeä rakenne (mielipide, kaksi perustelua, esimerkki, yhteenveto), sidesanoja kuten ensinnäkin, toiseksi ja yhteenvetona, asiatyylinen mutta luonteva kieli ja pituus 150–200 sanaa. Sanaston ja rakenteiden monipuolisuus nostaa tason kohti B2:ta.", "mallivastaus_de": "Sollten Arbeitgeber den Sport der Mitarbeitenden fördern?\n\nMeiner Meinung nach sollten Arbeitgeber den Sport der Mitarbeitenden auf jeden Fall fördern, und ich begründe meinen Standpunkt mit zwei wichtigen Gründen. Erstens verbessert Sport deutlich die Gesundheit. Wenn Menschen sich regelmäßig bewegen, werden sie seltener krank und sind bei der Arbeit leistungsfähiger. Das zeigt sich auch daran, dass die Krankheitsausfälle zurückgehen, was sowohl dem Mitarbeitenden selbst als auch dem gesamten Unternehmen zugutekommt. Ein gesünderes Personal ist für das Unternehmen ein großer Vorteil. Zweitens reduziert Sport Stress, der heutzutage an vielen Arbeitsplätzen ein verbreitetes Problem ist. Sitzende Arbeit ist sowohl für den Körper als auch für den Geist belastend, und schon eine kurze Bewegungspause tut gut. Ein munterer und ausgeruhter Mitarbeiter konzentriert sich besser und macht weniger Fehler.\n\nAls konkretes Beispiel könnte der Arbeitsplatz seinen Mitarbeitenden Sportgutscheine anbieten oder eine gemeinsame Pausengymnastik mitten am Arbeitstag organisieren. An meinem eigenen Arbeitsplatz begannen viele, Besprechungen im Gehen draußen abzuhalten, und die Stimmung der ganzen Arbeitsgemeinschaft besserte sich sofort merklich. Solche kleinen Taten kosten nicht viel, aber ihre Wirkung auf die Leistungsfähigkeit ist wirklich groß.\n\nZusammenfassend würde ich sagen, dass die Förderung des Sports für den Arbeitgeber eine kluge Investition ist. Sie steigert die Gesundheit, reduziert Stress und verbessert deutlich das Arbeitsklima. Deshalb hoffe ich, dass immer mehr Arbeitgeber die Sache endlich ernst nehmen."}, {"id": "K3", "tyyppi": "puolivirallinen viesti", "ohje_fi": "Olet ollut sairaana etkä päässyt töihin kahtena päivänä. Kirjoita sähköposti esihenkilöllesi. Kerro tilanteesi kohteliaasti, mainitse sairausloman pituus, kerro lyhyesti, miten työtehtäväsi hoidetaan poissaolon aikana, ja pyydä tarvittaessa lisäohjeita.", "ohje_de": "Du warst krank und konntest zwei Tage nicht zur Arbeit kommen. Schreibe eine E-Mail an deine Vorgesetzte: Schildere höflich die Situation, nenne die Dauer der Krankschreibung, erkläre kurz, wie deine Aufgaben während der Abwesenheit erledigt werden, und bitte bei Bedarf um weitere Anweisungen.", "sanamaara": "120–160", "mallivastaus": "Aihe: Sairauspoissaolo 12.–13.6.\n\nHei Marja,\n\nilmoitan sinulle, että olen ollut sairaana enkä ole valitettavasti päässyt töihin tällä viikolla. Sairastuin äkillisesti tiistai-iltana, ja kävin lääkärin vastaanotolla heti keskiviikkona aamulla. Lääkäri kirjoitti minulle sairausloman kahdeksi päiväksi, eli torstaihin 13. kesäkuuta asti. Toimitan virallisen sairaustodistuksen henkilöstöhallintoon heti, kun pääsen takaisin töihin.\n\nOlen jo sopinut kollegani Pekan kanssa, että hän hoitaa kaikkein kiireellisimmät potilasasiat poissaoloni aikana. Olen myös laittanut sähköpostiini automaattivastauksen, jossa on Pekan yhteystiedot mahdollisia kiireellisiä asioita varten. Vähemmän kiireelliset tehtävät hoidan itse heti, kun palaan töihin perjantaina.\n\nJos toivot, että jokin asia hoidetaan poissaoloni aikana toisin, kerrothan minulle, niin järjestän sen mielelläni. Vastaan kysymyksiin tarvittaessa myös puhelimitse.\n\nKiitos ymmärryksestäsi ja oikein hyvää viikonloppua sinulle!\n\nYstävällisin terveisin\nTheresia Mertens", "arviointi_fi": "Hyvässä vastauksessa on asiallinen aihe-rivi, kohtelias mutta selkeä tyyli, kaikki pyydetyt kohdat (tilanne, sairausloman pituus, sijaisjärjestelyt, lisäohjeiden pyyntö) sekä asianmukainen tervehdys ja lopputervehdys. Pituus on 120–160 sanaa ja sävy sopii esihenkilölle.", "mallivastaus_de": "Betreff: Krankheitsbedingte Abwesenheit 12.–13.6.\n\nHallo Marja,\n\nich teile dir mit, dass ich krank gewesen bin und diese Woche leider nicht zur Arbeit kommen konnte. Ich bin am Dienstagabend plötzlich erkrankt und war gleich am Mittwochmorgen beim Arzt. Der Arzt hat mir eine Krankschreibung für zwei Tage ausgestellt, also bis Donnerstag, den 13. Juni. Ich reiche die offizielle Krankschreibung bei der Personalabteilung ein, sobald ich wieder zur Arbeit komme.\n\nIch habe bereits mit meinem Kollegen Pekka vereinbart, dass er während meiner Abwesenheit die dringendsten Patientenangelegenheiten erledigt. Ich habe außerdem in meiner E-Mail eine automatische Antwort eingerichtet, in der Pekkas Kontaktdaten für mögliche dringende Angelegenheiten stehen. Die weniger dringenden Aufgaben erledige ich selbst, sobald ich am Freitag zurückkehre.\n\nFalls du möchtest, dass etwas während meiner Abwesenheit anders erledigt wird, sag mir bitte Bescheid, dann organisiere ich das gerne. Bei Bedarf beantworte ich Fragen auch telefonisch.\n\nDanke für dein Verständnis und ein schönes Wochenende dir!\n\nMit freundlichen Grüßen\nTheresia Mertens"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Olet terveyskeskuksen vastaanotossa. Virkailija kysyy: „Mikä teidät tänään tänne tuo?“ Kerro lyhyesti, mikä sinua vaivaa, ja että haluaisit päästä lääkäriin.", "ohje_de": "Du bist an der Rezeption des Gesundheitszentrums. Die Mitarbeiterin fragt: „Was führt Sie heute her?“ Sag kurz, was dir fehlt, und dass du zum Arzt möchtest.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Päivää. Minulla on ollut kovaa päänsärkyä ja huimausta jo muutaman päivän ajan. Haluaisin varata ajan lääkärille, jos mahdollista jo tälle päivälle.", "malli_de": "Guten Tag. Ich habe schon seit ein paar Tagen starke Kopfschmerzen und Schwindel. Ich möchte gerne einen Termin beim Arzt vereinbaren, wenn möglich schon für heute."}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Olet apteekissa. Farmaseutti kysyy: „Onko teillä reseptiä?“ Sano, ettei sinulla ole reseptiä, ja kysy, mikä lääke sopisi päänsärkyyn.", "ohje_de": "Du bist in der Apotheke. Der Apotheker fragt: „Haben Sie ein Rezept?“ Sag, dass du kein Rezept hast, und frage, welches Medikament gegen Kopfschmerzen geeignet wäre.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Ei minulla ole reseptiä. Minulla on paha päänsärky. Voisitteko suositella jotain reseptivapaata särkylääkettä, joka sopii myös herkälle vatsalle?", "malli_de": "Nein, ich habe kein Rezept. Ich habe starke Kopfschmerzen. Könnten Sie mir ein rezeptfreies Schmerzmittel empfehlen, das auch für einen empfindlichen Magen geeignet ist?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Ystäväsi ehdottaa: „Lähdetäänkö huomenna uimaan?“ Suostu kutsuun ja ehdota kellonaikaa.", "ohje_de": "Dein Freund schlägt vor: „Gehen wir morgen schwimmen?“ Nimm die Einladung an und schlage eine Uhrzeit vor.", "valmistautuminen_s": 0, "puheaika_s": 20, "malli": "Hyvä idea, lähdetään! Minä pidän uimisesta. Sopisiko sinulle kello kymmenen aamulla? Silloin uimahallissa on yleensä vielä rauhallista.", "malli_de": "Gute Idee, los geht's! Ich schwimme gerne. Würde dir zehn Uhr morgens passen? Dann ist es im Schwimmbad normalerweise noch ruhig."}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Työkaverisi näyttää väsyneeltä ja sanoo nukkuvansa huonosti. Anna hänelle yksi hyvä neuvo ja toivota hänelle parempaa unta.", "ohje_de": "Deine Kollegin wirkt müde und sagt, dass sie schlecht schläft. Gib ihr einen guten Rat und wünsche ihr besseren Schlaf.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Voi harmi, että nukut huonosti. Kokeile sulkea puhelin jo tunti ennen nukkumaanmenoa, niin nukahtaminen voi helpottua. Toivottavasti nukut ensi yönä paremmin!", "malli_de": "Oh, schade, dass du schlecht schläfst. Versuch mal, das Handy schon eine Stunde vor dem Schlafengehen auszuschalten, dann kann das Einschlafen leichter werden. Hoffentlich schläfst du nächste Nacht besser!"}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Olet varannut lääkäriajan, mutta sinulle tuli este. Soita terveyskeskukseen ja peru aikasi kohteliaasti. Mainitse, milloin aikasi oli.", "ohje_de": "Du hast einen Arzttermin, aber es ist etwas dazwischengekommen. Ruf das Gesundheitszentrum an und sage den Termin höflich ab. Nenne, wann der Termin war.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, soitan, koska haluaisin perua lääkäriaikani. Minulla on aika huomenna kello yhdeksältä, mutta minulle tuli valitettavasti este enkä pääse paikalle. Voisinko saada uuden ajan ensi viikolle?", "malli_de": "Hallo, ich rufe an, weil ich gerne meinen Arzttermin absagen würde. Ich habe morgen um neun Uhr einen Termin, aber leider ist mir etwas dazwischengekommen und ich kann nicht erscheinen. Könnte ich einen neuen Termin für nächste Woche bekommen?"}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro, miten sinä pidät huolta omasta terveydestäsi ja hyvinvoinnistasi. Kerro esimerkiksi liikunnasta, ruokavaliosta, levosta ja siitä, miten rentoudut stressin keskellä. Kerro myös, onko jokin asia, jonka haluaisit tehdä paremmin.", "ohje_de": "Erzähle, wie du auf deine Gesundheit und dein Wohlbefinden achtest. Sprich zum Beispiel über Bewegung, Ernährung, Ruhe und darüber, wie du dich bei Stress entspannst. Sag auch, ob es etwas gibt, das du besser machen möchtest.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Yritän pitää huolta terveydestäni monella tavalla, vaikka se ei aina ole helppoa kiireisen työn takia. Liikun säännöllisesti noin kolme kertaa viikossa. Käyn lenkillä metsässä ja kaksi kertaa viikossa kuntosalilla. Pidän erityisesti kävelystä, koska silloin saan raitista ilmaa ja pää lepää samalla. Ruokavalioni on melko terveellinen. Syön paljon kasviksia ja kalaa ja yritän välttää liikaa sokeria, vaikka joskus tekee mieli suklaata. Juon myös paljon vettä päivän aikana. Uni on minulle tärkeää. Yritän mennä nukkumaan suunnilleen samaan aikaan joka ilta ja luen vähän ennen nukkumaanmenoa puhelimen sijaan. Stressiä tulee välillä paljon, mutta rentoudun käymällä saunassa ja tapaamalla ystäviä. Joskus kuuntelen rauhallista musiikkia tai käyn pitkällä kävelyllä. Yksi asia, jonka haluaisin tehdä paremmin, on lepääminen. Teen usein liikaa töitä enkä malta pitää taukoja. Ensi vuonna haluaisin oppia sanomaan useammin ei ja varaamaan enemmän aikaa itselleni ja perheelleni.", "malli_de": "Ich versuche, auf vielfältige Weise auf meine Gesundheit zu achten, auch wenn das wegen der vielen Arbeit nicht immer leicht ist. Ich bewege mich regelmäßig, etwa dreimal pro Woche. Ich gehe im Wald laufen und zweimal pro Woche ins Fitnessstudio. Ich mag besonders das Gehen, weil ich dabei frische Luft bekomme und der Kopf gleichzeitig zur Ruhe kommt. Meine Ernährung ist ziemlich gesund. Ich esse viel Gemüse und Fisch und versuche, zu viel Zucker zu vermeiden, auch wenn ich manchmal Lust auf Schokolade habe. Ich trinke auch viel Wasser im Laufe des Tages. Schlaf ist mir wichtig. Ich versuche, ungefähr zur gleichen Zeit jeden Abend ins Bett zu gehen und lese vor dem Schlafengehen ein wenig, statt aufs Handy zu schauen. Stress habe ich zwischendurch viel, aber ich entspanne mich, indem ich in die Sauna gehe und Freunde treffe. Manchmal höre ich ruhige Musik oder mache einen langen Spaziergang. Eine Sache, die ich besser machen möchte, ist das Ausruhen. Ich arbeite oft zu viel und kann es nicht lassen, Pausen zu machen. Nächstes Jahr würde ich gerne lernen, öfter Nein zu sagen und mir und meiner Familie mehr Zeit zu reservieren."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet lääkärin vastaanotolla. Roolisi: olet potilas, jolla on ollut viikon ajan vatsakipuja ja huono ruokahalu. Keskustele lääkärin kanssa: kuvaile oireesi, vastaa hänen kysymyksiinsä ja kysy, mitä sinun kannattaisi tehdä. Käytä vähintään 3–5 puheenvuoroa.", "ohje_de": "Situation: Du bist beim Arzt. Deine Rolle: Du bist Patient und hast seit einer Woche Bauchschmerzen und wenig Appetit. Sprich mit dem Arzt: Beschreibe deine Symptome, beantworte seine Fragen und frage, was du tun solltest. Verwende mindestens 3–5 Redebeiträge.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Potilas: Päivää. Minulla on ollut jo viikon ajan vatsakipuja, ja ruokahaluni on ollut todella huono.\n– Lääkäri: Missä kohtaa vatsaa kipu tuntuu, ja onko se jatkuvaa?\n– Potilas: Kipu tuntuu enimmäkseen ylävatsassa, ja se on pahempaa heti syömisen jälkeen. Öisin se ei juuri häiritse.\n– Lääkäri: Onko teillä ollut pahoinvointia tai kuumetta?\n– Potilas: Pahoinvointia on ollut vähän, mutta kuumetta ei. Olen myös laihtunut hieman, koska en jaksa syödä.\n– Lääkäri: Otetaan muutama koe varmuuden vuoksi.\n– Potilas: Selvä. Mitä minun kannattaisi tehdä sillä välin? Voinko syödä normaalisti vai pitäisikö välttää jotain?", "malli_de": "– Patient: Guten Tag. Ich habe schon seit einer Woche Bauchschmerzen, und mein Appetit ist wirklich schlecht gewesen.\n– Arzt: An welcher Stelle des Bauches spüren Sie den Schmerz, und ist er andauernd?\n– Patient: Der Schmerz spürt sich meist im Oberbauch, und er ist direkt nach dem Essen schlimmer. Nachts stört er kaum.\n– Arzt: Hatten Sie Übelkeit oder Fieber?\n– Patient: Übelkeit hatte ich ein wenig, aber kein Fieber. Ich habe auch etwas abgenommen, weil ich nicht imstande bin zu essen.\n– Arzt: Machen wir sicherheitshalber ein paar Untersuchungen.\n– Patient: Verstehe. Was sollte ich in der Zwischenzeit tun? Kann ich normal essen oder sollte ich etwas vermeiden?"}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Suunnittelet ystäväsi kanssa yhteistä liikuntaharrastusta. Roolisi: ehdota harrastusta, kerro, miksi se sopisi teille, ja sovi yhdessä ajasta ja paikasta. Reagoi myös ystäväsi ehdotuksiin. Käytä vähintään 3–5 puheenvuoroa.", "ohje_de": "Situation: Du planst mit deiner Freundin ein gemeinsames Sporthobby. Deine Rolle: Schlage ein Hobby vor, erkläre, warum es passen würde, und einigt euch auf Zeit und Ort. Reagiere auch auf die Vorschläge deiner Freundin. Verwende mindestens 3–5 Redebeiträge.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Sinä: Mitä jos alkaisimme käydä yhdessä uimassa? Se on hyvää liikuntaa eikä rasita niveliä.\n– Ystävä: Hyvä idea, mutta minä en oikein osaa uida hyvin. Entä jos kävisimme sen sijaan kävelylenkeillä?\n– Sinä: Sekin sopii minulle. Voisimme aloittaa kävelyllä ja kokeilla uintia myöhemmin. Sopiiko sinulle kaksi kertaa viikossa?\n– Ystävä: Sopii hyvin. Mihin aikaan haluaisit lähteä?\n– Sinä: Ehdotan tiistai- ja torstai-iltoja kello kuusi. Voisimme tavata puiston portilla. Silloin ehdimme molemmat töiden jälkeen.\n– Ystävä: Täydellistä. Otetaan vielä sadevarustus mukaan, jos sää on huono.\n– Sinä: Hyvä ajatus. Aloitetaan siis jo ensi tiistaina!", "malli_de": "– Du: Wie wäre es, wenn wir anfangen, zusammen schwimmen zu gehen? Das ist gute Bewegung und belastet die Gelenke nicht.\n– Freundin: Gute Idee, aber ich kann nicht so gut schwimmen. Wie wäre es, wenn wir stattdessen Spaziergänge machen würden?\n– Du: Das passt mir auch. Wir könnten mit dem Gehen anfangen und später das Schwimmen ausprobieren. Passt dir zweimal pro Woche?\n– Freundin: Passt gut. Um welche Zeit möchtest du losgehen?\n– Du: Ich schlage Dienstag- und Donnerstagabende um sechs Uhr vor. Wir könnten uns am Tor des Parks treffen. Dann schaffen wir es beide nach der Arbeit.\n– Freundin: Perfekt. Nehmen wir noch Regenkleidung mit, falls das Wetter schlecht ist.\n– Du: Gute Idee. Fangen wir also schon nächsten Dienstag an!"}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse toinen aiheista ja kerro mielipiteesi. Perustele kantasi ja anna esimerkkejä. Aihe 1: Pitäisikö epäterveellisille tuotteille, kuten sokerille, asettaa erityinen vero? Aihe 2: Onko etätyö hyväksi vai haitaksi ihmisen terveydelle ja hyvinvoinnille?", "ohje_de": "Wähle eines der Themen und äußere deine Meinung. Begründe deinen Standpunkt und gib Beispiele. Thema 1: Sollte auf ungesunde Produkte wie Zucker eine Sondersteuer erhoben werden? Thema 2: Ist Homeoffice gut oder schlecht für Gesundheit und Wohlbefinden?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen toisen aiheen eli etätyön vaikutuksen terveyteen. Mielestäni etätyöllä on sekä hyviä että huonoja puolia, mutta kokonaisuutena se voi olla hyväksi hyvinvoinnille, jos sitä tehdään järkevästi. Aloitan hyvistä puolista. Etätyössä säästyy aikaa, koska työmatkat jäävät pois. Tämän ajan voi käyttää lepoon, liikuntaan tai perheeseen, mikä parantaa elämänlaatua. Lisäksi monet keskittyvät paremmin kotona, kun ympärillä ei ole jatkuvaa hälinää. Toisaalta etätyössä on myös riskejä. Ihminen voi jäädä liian yksin, jolloin tulee helposti yksinäinen olo. Moni myös istuu koko päivän eikä liiku tarpeeksi, ja työ ja vapaa-aika sekoittuvat keskenään. Itse huomasin, että aluksi tein kotona liian pitkiä päiviä. Ratkaisu on mielestäni tasapaino. Olisi hyvä tehdä osa viikosta etänä ja osa toimistolla. Näin saa sekä rauhaa että työkavereiden seuraa. Tärkeää on myös pitää säännölliset tauot ja liikkua päivän aikana. Yhteenvetona sanoisin, että etätyö voi tukea hyvinvointia, kunhan ihminen huolehtii liikunnasta, sosiaalisista suhteista ja selkeästä työajasta.", "malli_de": "Ich wähle das zweite Thema, also die Wirkung von Homeoffice auf die Gesundheit. Meiner Meinung nach hat Homeoffice sowohl gute als auch schlechte Seiten, aber insgesamt kann es gut für das Wohlbefinden sein, wenn man es vernünftig macht. Ich beginne mit den guten Seiten. Im Homeoffice spart man Zeit, weil die Arbeitswege wegfallen. Diese Zeit kann man für Ruhe, Bewegung oder die Familie nutzen, was die Lebensqualität verbessert. Außerdem konzentrieren sich viele zu Hause besser, wenn es ringsum keinen ständigen Lärm gibt. Andererseits gibt es im Homeoffice auch Risiken. Ein Mensch kann zu sehr allein bleiben, sodass leicht ein Gefühl der Einsamkeit aufkommt. Viele sitzen auch den ganzen Tag und bewegen sich nicht genug, und Arbeit und Freizeit vermischen sich miteinander. Ich selbst habe gemerkt, dass ich anfangs zu Hause zu lange Tage gemacht habe. Die Lösung ist meiner Meinung nach das Gleichgewicht. Es wäre gut, einen Teil der Woche im Homeoffice und einen Teil im Büro zu arbeiten. So bekommt man sowohl Ruhe als auch die Gesellschaft der Arbeitskollegen. Wichtig ist auch, regelmäßige Pausen zu machen und sich tagsüber zu bewegen. Zusammenfassend würde ich sagen, dass Homeoffice das Wohlbefinden unterstützen kann, sofern der Mensch auf Bewegung, soziale Beziehungen und eine klare Arbeitszeit achtet."}]}, {"id": 3, "teema": "Työ ja työnhaku", "teema_de": "Arbeit und Jobsuche", "reading": [{"otsikko": "Työpaikkailmoitus: Sairaanhoitaja, Lahden terveysasema", "tyyppi": "ilmoitus", "teksti": "Lahden terveysasema hakee joukkoonsa sairaanhoitajaa vakituiseen työsuhteeseen. Etsimme rauhallista ja vastuullista työntekijää, joka pitää potilastyöstä ja haluaa kehittyä ammatissaan. Työhön kuuluu vastaanottotyötä, lääkkeiden jakamista ja yhteistyötä lääkäreiden kanssa. Työ on kolmivuorotyötä, eli teet sekä aamu-, ilta- että yövuoroja. Vuorot suunnitellaan yhdessä, ja toiveita voi esittää työvuorolistaan.\n\nToivomme hakijalta sairaanhoitajan tutkintoa ja vähintään vuoden työkokemusta. Hyvä suomen kielen taito on välttämätön, koska työssä tapaa joka päivä paljon erilaisia potilaita ja heidän omaisiaan. Arvostamme myös kykyä työskennellä kiireessä, taitoa tulla toimeen monenlaisten ihmisten kanssa sekä halua oppia uutta. Aiempi kokemus terveyskeskuksesta katsotaan eduksi, mutta perehdytämme sinut työhön huolellisesti. Tarjoamme sinulle hyvän palkan, kattavan työterveyshuollon, mukavat työkaverit ja mahdollisuuden lisäkoulutukseen.\n\nLähetä vapaamuotoinen hakemus ja ansioluettelo sähköpostitse osoitteeseen rekry@lahti.fi viimeistään 30. kesäkuuta. Haastattelut pidetään heinäkuun ensimmäisellä viikolla. Lisätietoja antaa osastonhoitaja Marja Niemi puhelimitse arkisin kello 9–15. Tervetuloa mukavaan työyhteisöön!", "teksti_de": "Die Gesundheitsstation Lahti sucht zur Verstärkung ihres Teams eine Krankenpflegerin/einen Krankenpfleger für ein unbefristetes Arbeitsverhältnis. Wir suchen eine ruhige und verantwortungsbewusste Mitarbeiterin/einen Mitarbeiter, die/der die Arbeit mit Patienten mag und sich im Beruf weiterentwickeln möchte. Zur Arbeit gehören Sprechstundentätigkeit, das Verteilen von Medikamenten und die Zusammenarbeit mit den Ärztinnen und Ärzten. Die Arbeit ist Dreischichtarbeit, das heißt, Sie machen sowohl Früh-, Spät- als auch Nachtschichten. Die Schichten werden gemeinsam geplant, und man kann Wünsche zum Dienstplan äußern.\n\nWir wünschen uns von der Bewerberin/dem Bewerber einen Krankenpflegeabschluss und mindestens ein Jahr Berufserfahrung. Gute Finnischkenntnisse sind unbedingt erforderlich, weil man bei der Arbeit jeden Tag viele unterschiedliche Patienten und deren Angehörige trifft. Wir schätzen außerdem die Fähigkeit, unter Zeitdruck zu arbeiten, das Geschick, mit verschiedensten Menschen auszukommen, sowie die Bereitschaft, Neues zu lernen. Frühere Erfahrung in einer Gesundheitsstation wird als Vorteil angesehen, aber wir führen Sie sorgfältig in die Arbeit ein. Wir bieten Ihnen ein gutes Gehalt, eine umfassende betriebliche Gesundheitsfürsorge, nette Kolleginnen und Kollegen und die Möglichkeit zur Weiterbildung.\n\nSenden Sie eine formlose Bewerbung und einen Lebenslauf per E-Mail an die Adresse rekry@lahti.fi spätestens bis zum 30. Juni. Die Vorstellungsgespräche finden in der ersten Juliwoche statt. Weitere Auskünfte erteilt die Stationsleiterin Marja Niemi telefonisch werktags von 9 bis 15 Uhr. Willkommen in einer netten Arbeitsgemeinschaft!", "hl": ["Lahden terveysasema hakee joukkoonsa sairaanhoitajaa vakituiseen työsuhteeseen.", "Työ on kolmivuorotyötä, eli teet sekä aamu-, ilta- että yövuoroja.", "Hyvä suomen kielen taito on välttämätön, koska työssä tapaa joka päivä paljon erilaisia potilaita ja heidän omaisiaan.", "Lähetä vapaamuotoinen hakemus ja ansioluettelo sähköpostitse osoitteeseen rekry@lahti.fi viimeistään 30. kesäkuuta."], "image": "Simulaatio_03_tyo/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Millainen työsuhde on tarjolla?", "vaihtoehdot": ["Määräaikainen kesätyö", "Vakituinen työ", "Lyhyt sijaisuus"], "oikea": "b", "selitys_fi": "Ilmoituksessa sanotaan, että hoitajaa haetaan vakituiseen työsuhteeseen.", "vihje_de": "„Vakituinen“ = unbefristet, fest.", "kysymys_de": "Was für ein Arbeitsverhältnis wird angeboten?"}, {"id": "L2", "tyyppi": "oikein-väärin", "kysymys": "Hakijan ei tarvitse osata suomea hyvin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan hyvä suomen kielen taito on välttämätön.", "vihje_de": "„Välttämätön“ = unbedingt erforderlich.", "kysymys_de": "Die Bewerberin/der Bewerber muss kein gutes Finnisch können."}, {"id": "L3", "tyyppi": "monivalinta", "kysymys": "Millaista työaikaa työhön kuuluu?", "vaihtoehdot": ["Vain aamuvuoroja", "Kolmivuorotyötä", "Pelkkää yötyötä"], "oikea": "b", "selitys_fi": "Työ on kolmivuorotyötä, johon kuuluu aamu-, ilta- ja yövuoroja.", "vihje_de": "„Kolmivuorotyö“ = Dreischichtarbeit.", "kysymys_de": "Was für eine Arbeitszeit gehört zur Arbeit?"}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Mihin päivämäärään mennessä hakemus pitää lähettää?", "vaihtoehdot": [], "oikea": "Viimeistään 30. kesäkuuta.", "selitys_fi": "Hakemus on lähetettävä viimeistään 30. kesäkuuta.", "vihje_de": "Bewerbungsfrist: bis spätestens 30. Juni.", "kysymys_de": "Bis zu welchem Datum muss die Bewerbung abgeschickt werden?"}]}, {"otsikko": "Sähköposti: Kutsu työhaastatteluun", "tyyppi": "sähköposti", "teksti": "Hei Theresia,\n\nkiitos hakemuksestasi ja ansioluettelostasi. Luimme hakemuksesi mielenkiinnolla, ja haluaisimme tavata sinut henkilökohtaisesti. Kutsumme sinut työhaastatteluun ensi keskiviikkona 18. kesäkuuta kello 13.00. Haastattelu pidetään toimistollamme osoitteessa Kauppakatu 5, kolmas kerros. Ilmoittaudu alakerran vastaanotossa, niin tulemme hakemaan sinut.\n\nHaastattelu kestää noin tunnin. Paikalla ovat osastonhoitaja ja yksi tiimin jäsen. Keskustelemme rauhallisesti työkokemuksestasi, toiveistasi ja siitä, miksi haet juuri tätä paikkaa. Kerromme myös tarkemmin työtehtävistä ja työvuoroista. Voit aivan vapaasti itse kysyä meiltä mitä tahansa työhön liittyvää, esimerkiksi palkasta tai perehdytyksestä. Ota mukaan kopio tutkintotodistuksestasi sekä mahdolliset työtodistukset.\n\nJos kysytty aika ei sovi sinulle, ole hyvä ja ota yhteyttä mahdollisimman pian, niin etsimme yhdessä uuden ajan. Voit vastata suoraan tähän viestiin tai soittaa numeroon 040 123 4567. Toivottavasti tapaamme pian!\n\nYstävällisin terveisin,\nMarja Niemi\nOsastonhoitaja, Lahden terveysasema", "teksti_de": "Hallo Theresia,\n\nvielen Dank für deine Bewerbung und deinen Lebenslauf. Wir haben deine Bewerbung mit Interesse gelesen und würden dich gerne persönlich treffen. Wir laden dich zu einem Vorstellungsgespräch am kommenden Mittwoch, dem 18. Juni um 13.00 Uhr ein. Das Gespräch findet in unserem Büro unter der Adresse Kauppakatu 5, dritter Stock, statt. Melde dich an der Rezeption im Erdgeschoss, dann holen wir dich ab.\n\nDas Gespräch dauert etwa eine Stunde. Anwesend sind die Stationsleiterin und ein Teammitglied. Wir sprechen in Ruhe über deine Berufserfahrung, deine Wünsche und darüber, warum du dich gerade auf diese Stelle bewirbst. Wir erzählen dir auch genauer von den Arbeitsaufgaben und den Schichten. Du kannst uns ganz frei alles fragen, was mit der Arbeit zu tun hat, zum Beispiel zum Gehalt oder zur Einarbeitung. Bring eine Kopie deines Abschlusszeugnisses sowie eventuelle Arbeitszeugnisse mit.\n\nFalls der angefragte Termin dir nicht passt, melde dich bitte so bald wie möglich, dann suchen wir gemeinsam einen neuen Termin. Du kannst direkt auf diese Nachricht antworten oder die Nummer 040 123 4567 anrufen. Hoffentlich sehen wir uns bald!\n\nMit freundlichen Grüßen,\nMarja Niemi\nStationsleiterin, Gesundheitsstation Lahti", "hl": ["Kutsumme sinut työhaastatteluun ensi keskiviikkona 18. kesäkuuta kello 13.00.", "Voit aivan vapaasti itse kysyä meiltä mitä tahansa työhön liittyvää, esimerkiksi palkasta tai perehdytyksestä.", "Ota mukaan kopio tutkintotodistuksestasi sekä mahdolliset työtodistukset.", "Jos kysytty aika ei sovi sinulle, ole hyvä ja ota yhteyttä mahdollisimman pian, niin etsimme yhdessä uuden ajan."], "image": "Simulaatio_03_tyo/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Miksi tämä viesti on lähetetty?", "vaihtoehdot": ["Theresia on saanut työpaikan", "Theresia kutsutaan haastatteluun", "Theresian hakemus on hylätty"], "oikea": "b", "selitys_fi": "Viestissä Theresia kutsutaan työhaastatteluun.", "vihje_de": "Es ist eine Einladung zum Vorstellungsgespräch.", "kysymys_de": "Warum wurde diese Nachricht geschickt?"}, {"id": "L6", "tyyppi": "lyhyt", "kysymys": "Mitä Theresian pitää ottaa mukaan haastatteluun?", "vaihtoehdot": [], "oikea": "Kopion tutkintotodistuksesta.", "selitys_fi": "Viestissä pyydetään ottamaan mukaan kopio tutkintotodistuksesta.", "vihje_de": "Eine Kopie des Abschlusszeugnisses mitbringen.", "kysymys_de": "Was muss Theresia zum Gespräch mitbringen?"}, {"id": "L7", "tyyppi": "oikein-väärin", "kysymys": "Haastattelussa Theresia saa myös itse esittää kysymyksiä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Viestin mukaan Theresia voi kysyä mitä tahansa työhön liittyvää.", "vihje_de": "Sie darf selbst Fragen stellen.", "kysymys_de": "Im Gespräch darf Theresia auch selbst Fragen stellen."}, {"id": "L8", "tyyppi": "monivalinta", "kysymys": "Mitä Theresian pitää tehdä, jos haastatteluaika ei sovi?", "vaihtoehdot": ["Olla saapumatta paikalle", "Ottaa yhteyttä pian ja sopia uusi aika", "Lähettää uusi hakemus"], "oikea": "b", "selitys_fi": "Jos aika ei sovi, hänen pitää ottaa yhteyttä pian ja etsiä yhdessä uusi aika.", "vihje_de": "Bei Terminproblemen bald melden, neuen Termin vereinbaren.", "kysymys_de": "Was muss Theresia tun, wenn der Gesprächstermin nicht passt?"}]}, {"otsikko": "Uutinen: Etätyö yleistyy suomalaisilla työpaikoilla", "tyyppi": "uutinen", "teksti": "Yhä useampi suomalainen tekee nykyään osan työviikostaan kotona. Tuoreen selvityksen mukaan noin puolet toimistotyöntekijöistä työskentelee vähintään yhtenä päivänä viikossa etänä. Etätyö on yleistynyt erityisesti suurissa kaupungeissa, joissa työmatkat ovat pitkiä.\n\nMonet työntekijät pitävät etätyöstä, koska se säästää aikaa ja antaa vapautta suunnitella omaa päivää. Kotona on usein rauhallisempaa keskittyä vaativiin tehtäviin. Toisaalta kaikki eivät viihdy yksin. Osa kaipaa työkavereita ja yhteisiä taukoja, jotka kuuluvat tavalliseen työpäivään toimistolla.\n\nMyös työnantajat suhtautuvat etätyöhön aiempaa myönteisemmin. Moni yritys on huomannut, että työ sujuu hyvin, vaikka kaikki eivät ole samassa tilassa. Asiantuntijat muistuttavat kuitenkin, että hyvä yhteistyö vaatii selkeitä sääntöjä. On tärkeää sopia yhdessä, milloin ollaan tavoitettavissa ja miten työn tuloksista kerrotaan muille. Tulevaisuudessa monet uskovat, että yhdistelmä toimisto- ja etätyötä jää pysyväksi tavaksi tehdä työtä.", "teksti_de": "Immer mehr Finninnen und Finnen erledigen heutzutage einen Teil ihrer Arbeitswoche zu Hause. Laut einer aktuellen Untersuchung arbeitet etwa die Hälfte der Büroangestellten mindestens an einem Tag pro Woche im Homeoffice. Die Telearbeit hat sich besonders in großen Städten verbreitet, in denen die Arbeitswege lang sind.\n\nViele Arbeitnehmerinnen und Arbeitnehmer mögen die Telearbeit, weil sie Zeit spart und Freiheit gibt, den eigenen Tag zu planen. Zu Hause ist es oft ruhiger, sich auf anspruchsvolle Aufgaben zu konzentrieren. Andererseits fühlen sich nicht alle allein wohl. Ein Teil vermisst die Kolleginnen und Kollegen und die gemeinsamen Pausen, die zu einem gewöhnlichen Arbeitstag im Büro gehören.\n\nAuch die Arbeitgeber stehen der Telearbeit positiver gegenüber als früher. Viele Unternehmen haben festgestellt, dass die Arbeit gut läuft, auch wenn nicht alle im selben Raum sind. Fachleute erinnern jedoch daran, dass gute Zusammenarbeit klare Regeln erfordert. Es ist wichtig, gemeinsam zu vereinbaren, wann man erreichbar ist und wie man die anderen über die Arbeitsergebnisse informiert. Viele glauben, dass in Zukunft eine Kombination aus Büro- und Telearbeit eine dauerhafte Art zu arbeiten bleiben wird.", "hl": ["Tuoreen selvityksen mukaan noin puolet toimistotyöntekijöistä työskentelee vähintään yhtenä päivänä viikossa etänä.", "Osa kaipaa työkavereita ja yhteisiä taukoja, jotka kuuluvat tavalliseen työpäivään toimistolla.", "Myös työnantajat suhtautuvat etätyöhön aiempaa myönteisemmin.", "Asiantuntijat muistuttavat kuitenkin, että hyvä yhteistyö vaatii selkeitä sääntöjä."], "image": "Simulaatio_03_tyo/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Mitä uutinen kertoo etätyöstä?", "vaihtoehdot": ["Se on vähenemässä", "Se on yleistynyt", "Se on kielletty monilla työpaikoilla"], "oikea": "b", "selitys_fi": "Uutisen mukaan etätyö on yleistynyt suomalaisilla työpaikoilla.", "vihje_de": "„Yleistyä“ = sich verbreiten, häufiger werden.", "kysymys_de": "Was berichtet die Nachricht über Telearbeit?"}, {"id": "L10", "tyyppi": "monivalinta", "kysymys": "Miksi osa työntekijöistä ei viihdy etätyössä?", "vaihtoehdot": ["He kaipaavat työkavereita ja yhteisiä taukoja", "He eivät osaa käyttää tietokonetta", "Heillä ei ole kotona internetiä"], "oikea": "a", "selitys_fi": "Tekstin mukaan osa kaipaa työkavereita ja yhteisiä taukoja.", "vihje_de": "Manche vermissen Kollegen und gemeinsame Pausen.", "kysymys_de": "Warum fühlt sich ein Teil der Arbeitnehmer in der Telearbeit nicht wohl?"}, {"id": "L11", "tyyppi": "oikein-väärin", "kysymys": "Työnantajat suhtautuvat etätyöhön nykyään myönteisemmin kuin ennen.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstissä sanotaan, että työnantajat suhtautuvat etätyöhön aiempaa myönteisemmin.", "vihje_de": "Arbeitgeber stehen Homeoffice heute positiver gegenüber.", "kysymys_de": "Arbeitgeber stehen der Telearbeit heute positiver gegenüber als früher."}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Mitä asiantuntijoiden mukaan hyvä yhteistyö vaatii?", "vaihtoehdot": [], "oikea": "Selkeitä sääntöjä.", "selitys_fi": "Asiantuntijat muistuttavat, että hyvä yhteistyö vaatii selkeitä sääntöjä.", "vihje_de": "Gute Zusammenarbeit braucht klare Regeln.", "kysymys_de": "Was erfordert laut den Fachleuten eine gute Zusammenarbeit?"}]}, {"otsikko": "Tiedote: Uudet käytännöt taukojen pitämiseen", "tyyppi": "tiedote", "teksti": "Hyvät työntekijät,\n\nhaluamme muistuttaa teitä taukojen tärkeydestä ja kertoa muutamasta uudesta käytännöstä. Tauot eivät ole pelkkää joutoaikaa, vaan ne auttavat jaksamaan ja keskittymään paremmin koko työpäivän ajan. Siksi toivomme, että jokainen pitää taukonsa säännöllisesti.\n\nJatkossa kahvitauko pidetään kello 10 ja iltapäivätauko kello 14. Ruokatunti on edelleen tunnin mittainen, ja sen voi pitää kello 11 ja 13 välillä. Pyydämme, että sovitte tiimissä, kuka on tavoitettavissa ruokatunnin aikana, jotta asiakkaita palvellaan koko päivän.\n\nTaukotila on remontoitu, ja sinne on hankittu uusi kahvinkeitin sekä mukavammat tuolit. Lisäksi seinälle on tuotu ilmoitustaulu, jolta löytyvät ajantasaiset työvuorolistat ja muut tärkeät tiedotteet. Muistakaa pitää taukotila siistinä ja viedä omat astiat pois, jotta tila pysyy viihtyisänä kaikille. Jos teillä on toiveita taukotilaan tai taukoaikoihin liittyen, kertokaa niistä rohkeasti lähimmälle esihenkilölle. Otamme palautetta mielellämme vastaan. Mukavia taukohetkiä kaikille!\n\nTerveisin,\nHenkilöstöhallinto", "teksti_de": "Liebe Mitarbeiterinnen und Mitarbeiter,\n\nwir möchten Sie an die Wichtigkeit der Pausen erinnern und Ihnen von einigen neuen Regelungen berichten. Pausen sind keine reine Leerzeit, sondern sie helfen, durchzuhalten und sich den ganzen Arbeitstag über besser zu konzentrieren. Deshalb wünschen wir uns, dass jede und jeder seine Pausen regelmäßig macht.\n\nKünftig wird die Kaffeepause um 10 Uhr und die Nachmittagspause um 14 Uhr gemacht. Die Mittagspause dauert weiterhin eine Stunde und kann zwischen 11 und 13 Uhr genommen werden. Wir bitten Sie, im Team abzusprechen, wer während der Mittagspause erreichbar ist, damit die Kunden den ganzen Tag über bedient werden.\n\nDer Pausenraum wurde renoviert, und es wurden eine neue Kaffeemaschine sowie bequemere Stühle angeschafft. Außerdem wurde an der Wand eine Anschlagtafel angebracht, auf der die aktuellen Dienstpläne und andere wichtige Mitteilungen zu finden sind. Denken Sie daran, den Pausenraum sauber zu halten und Ihr eigenes Geschirr wegzuräumen, damit der Raum für alle gemütlich bleibt. Wenn Sie Wünsche zum Pausenraum oder zu den Pausenzeiten haben, teilen Sie sie ruhig der oder dem nächsten Vorgesetzten mit. Wir nehmen Rückmeldungen gerne entgegen. Angenehme Pausenmomente für alle!\n\nMit Grüßen,\nPersonalverwaltung", "hl": ["Jatkossa kahvitauko pidetään kello 10 ja iltapäivätauko kello 14.", "Taukotila on remontoitu, ja sinne on hankittu uusi kahvinkeitin sekä mukavammat tuolit.", "Jos teillä on toiveita taukotilaan tai taukoaikoihin liittyen, kertokaa niistä rohkeasti lähimmälle esihenkilölle."], "image": "Simulaatio_03_tyo/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "lyhyt", "kysymys": "Mihin aikaan kahvitauko pidetään jatkossa?", "vaihtoehdot": [], "oikea": "Kello 10.", "selitys_fi": "Tiedotteen mukaan kahvitauko pidetään jatkossa kello 10.", "vihje_de": "Kaffeepause künftig um 10 Uhr.", "kysymys_de": "Um welche Uhrzeit wird die Kaffeepause künftig gemacht?"}, {"id": "L14", "tyyppi": "monivalinta", "kysymys": "Mitä taukotilaan on hankittu?", "vaihtoehdot": ["Uusi tietokone", "Uusi kahvinkeitin ja mukavammat tuolit", "Uusi jääkaappi"], "oikea": "b", "selitys_fi": "Taukotilaan on hankittu uusi kahvinkeitin sekä mukavammat tuolit.", "vihje_de": "Neue Kaffeemaschine und bequemere Stühle.", "kysymys_de": "Was wurde für den Pausenraum angeschafft?"}, {"id": "L15", "tyyppi": "oikein-väärin", "kysymys": "Taukoja koskevista toiveista voi kertoa lähimmälle esihenkilölle.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tiedotteen mukaan toiveista voi kertoa lähimmälle esihenkilölle.", "vihje_de": "Wünsche kann man der oder dem nächsten Vorgesetzten mitteilen.", "kysymys_de": "Wünsche zu den Pausen kann man der oder dem nächsten Vorgesetzten mitteilen."}]}], "listening": [{"otsikko": "Puhelu: Tiedustelu avoimesta työpaikasta", "tyyppi": "puhelu", "litteraatti": "– Nainen: Lahden terveysasema, Marja Niemi, hyvää päivää.\n– Hakija: Päivää, nimeni on Theresia. Soitan teidän työpaikkailmoituksestanne. Näin, että haette sairaanhoitajaa, ja minua kiinnostaisi hakea paikkaa.\n– Nainen: Hienoa, mukava kuulla. Kysykää vain, jos jokin asia askarruttaa.\n– Hakija: Kiitos. Minua kiinnostaa erityisesti työaika. Ilmoituksessa luki, että työ on kolmivuorotyötä. Voiko vuorotoiveita esittää?\n– Nainen: Kyllä voi. Teemme työvuorolistan aina kolmeksi viikoksi kerrallaan, ja jokainen saa esittää toiveita. Emme tietenkään voi luvata, että kaikki toiveet toteutuvat, mutta yritämme ottaa ne huomioon.\n– Hakija: Sehän kuulostaa hyvältä. Entä millainen suomen kielen taito työssä pitää olla?\n– Nainen: Hyvä peruskielitaito riittää alkuun. Tärkeintä on, että pystytte keskustelemaan potilaiden kanssa ja ymmärrätte ohjeet. Kieli kehittyy kyllä työssä.\n– Hakija: Selvä, kiitos. Lähetän hakemukseni tämän viikon aikana.\n– Nainen: Mainiota, odotamme sitä. Mukavaa päivänjatkoa!", "litteraatti_de": "– Frau: Gesundheitsstation Lahti, Marja Niemi, guten Tag.\n– Bewerberin: Guten Tag, mein Name ist Theresia. Ich rufe wegen Ihrer Stellenanzeige an. Ich habe gesehen, dass Sie eine Krankenpflegerin/einen Krankenpfleger suchen, und ich hätte Interesse, mich auf die Stelle zu bewerben.\n– Frau: Schön, das freut mich zu hören. Fragen Sie nur, falls Sie etwas beschäftigt.\n– Bewerberin: Danke. Mich interessiert besonders die Arbeitszeit. In der Anzeige stand, dass die Arbeit Dreischichtarbeit ist. Kann man Schichtwünsche äußern?\n– Frau: Ja, das kann man. Wir erstellen den Dienstplan immer für jeweils drei Wochen, und jede und jeder darf Wünsche äußern. Wir können natürlich nicht versprechen, dass alle Wünsche erfüllt werden, aber wir versuchen, sie zu berücksichtigen.\n– Bewerberin: Das klingt ja gut. Und was für Finnischkenntnisse muss man bei der Arbeit haben?\n– Frau: Gute Grundkenntnisse reichen am Anfang. Das Wichtigste ist, dass Sie mit den Patienten sprechen können und die Anweisungen verstehen. Die Sprache entwickelt sich schon bei der Arbeit.\n– Bewerberin: Alles klar, danke. Ich schicke meine Bewerbung im Laufe dieser Woche.\n– Frau: Ausgezeichnet, wir warten darauf. Einen angenehmen weiteren Tag!", "hl": ["Soitan teidän työpaikkailmoituksestanne. Näin, että haette sairaanhoitajaa, ja minua kiinnostaisi hakea paikkaa.", "Teemme työvuorolistan aina kolmeksi viikoksi kerrallaan, ja jokainen saa esittää toiveita.", "Hyvä peruskielitaito riittää alkuun."], "audio": "Simulaatio_03_tyo/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Miksi Theresia soittaa?", "vaihtoehdot": ["Hän haluaa varata lääkäriajan", "Hän kysyy avoimesta työpaikasta", "Hän haluaa perua haastattelun"], "oikea": "b", "selitys_fi": "Theresia soittaa työpaikkailmoituksesta ja on kiinnostunut hakemaan paikkaa.", "vihje_de": "Sie erkundigt sich nach der offenen Stelle.", "kysymys_de": "Warum ruft Theresia an?"}, {"id": "Ku2", "tyyppi": "oikein-väärin", "kysymys": "Työntekijä voi esittää toiveita työvuorolistaan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Marja kertoo, että jokainen saa esittää vuorotoiveita.", "vihje_de": "Man darf Schichtwünsche äußern.", "kysymys_de": "Die Mitarbeiterin/der Mitarbeiter kann Wünsche zum Dienstplan äußern."}, {"id": "Ku3", "tyyppi": "monivalinta", "kysymys": "Kuinka pitkäksi ajaksi työvuorolista tehdään?", "vaihtoehdot": ["Yhdeksi viikoksi", "Kolmeksi viikoksi", "Kolmeksi kuukaudeksi"], "oikea": "b", "selitys_fi": "Marja sanoo, että lista tehdään aina kolmeksi viikoksi kerrallaan.", "vihje_de": "Der Dienstplan wird für drei Wochen erstellt.", "kysymys_de": "Für welchen Zeitraum wird der Dienstplan erstellt?"}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Millainen suomen kielen taito riittää työssä alkuun?", "vaihtoehdot": [], "oikea": "Hyvä peruskielitaito.", "selitys_fi": "Marjan mukaan hyvä peruskielitaito riittää alkuun.", "vihje_de": "Gute Grundkenntnisse reichen am Anfang.", "kysymys_de": "Was für Finnischkenntnisse reichen am Anfang für die Arbeit aus?"}]}, {"otsikko": "Dialogi: Palautekeskustelu työpäivän jälkeen", "tyyppi": "dialogi", "litteraatti": "– Esihenkilö: Hei Theresia, ehditkö hetken jutella? Haluaisin antaa sinulle vähän palautetta ensimmäisestä viikosta.\n– Hakija: Totta kai, istutaan vaikka tähän.\n– Esihenkilö: Ensinnäkin haluan kiittää sinua. Olet ollut rauhallinen potilaiden kanssa ja kysynyt rohkeasti, kun jokin asia on ollut epäselvä. Se on hyvä asia.\n– Hakija: Kiitos, mukava kuulla. Olen yrittänyt kysyä heti, jos en ole ollut varma.\n– Esihenkilö: Juuri niin kannattaa toimia. Yksi asia, johon voisit kiinnittää huomiota, on kirjaaminen. Muista merkitä potilastiedot heti, kun ehdit, ettei mitään unohdu.\n– Hakija: Ai niin, se on totta. Joskus jätän kirjaamisen vähän liian myöhäiseksi, kun on kiire.\n– Esihenkilö: Ymmärrän hyvin, alussa on paljon uutta. Voit pyytää apua kollegoilta milloin tahansa. Kaiken kaikkiaan olen todella tyytyväinen alkuusi.\n– Hakija: Kiitos paljon. Otan palautteen huomioon ja yritän kirjata asiat heti.", "litteraatti_de": "– Vorgesetzte: Hallo Theresia, hast du kurz Zeit zum Reden? Ich würde dir gerne etwas Feedback zur ersten Woche geben.\n– Bewerberin: Natürlich, setzen wir uns doch hierhin.\n– Vorgesetzte: Zuerst möchte ich dir danken. Du bist ruhig mit den Patienten umgegangen und hast mutig nachgefragt, wenn etwas unklar war. Das ist eine gute Sache.\n– Bewerberin: Danke, das freut mich zu hören. Ich habe versucht, sofort zu fragen, wenn ich mir nicht sicher war.\n– Vorgesetzte: Genau so sollte man es machen. Eine Sache, auf die du achten könntest, ist das Dokumentieren. Denk daran, die Patientendaten gleich einzutragen, sobald du Zeit hast, damit nichts vergessen wird.\n– Bewerberin: Ach ja, das stimmt. Manchmal verschiebe ich das Dokumentieren etwas zu spät, wenn es eilig ist.\n– Vorgesetzte: Das verstehe ich gut, am Anfang gibt es viel Neues. Du kannst jederzeit die Kolleginnen und Kollegen um Hilfe bitten. Alles in allem bin ich wirklich zufrieden mit deinem Start.\n– Bewerberin: Vielen Dank. Ich nehme das Feedback an und versuche, die Dinge sofort zu dokumentieren.", "hl": ["Yksi asia, johon voisit kiinnittää huomiota, on kirjaaminen. Muista merkitä potilastiedot heti, kun ehdit, ettei mitään unohdu.", "Kaiken kaikkiaan olen todella tyytyväinen alkuusi.", "Otan palautteen huomioon ja yritän kirjata asiat heti."], "audio": "Simulaatio_03_tyo/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Mistä esihenkilö haluaa keskustella?", "vaihtoehdot": ["Theresian palkasta", "Palautteesta ensimmäisestä työviikosta", "Uudesta työvuorolistasta"], "oikea": "b", "selitys_fi": "Esihenkilö haluaa antaa palautetta Theresian ensimmäisestä viikosta.", "vihje_de": "Es geht um Feedback zur ersten Arbeitswoche.", "kysymys_de": "Worüber möchte die/der Vorgesetzte sprechen?"}, {"id": "Ku6", "tyyppi": "oikein-väärin", "kysymys": "Esihenkilö on tyytyväinen Theresian alkuun.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Esihenkilö sanoo olevansa todella tyytyväinen Theresian alkuun.", "vihje_de": "Die oder der Vorgesetzte ist mit dem Start zufrieden.", "kysymys_de": "Die/der Vorgesetzte ist mit Theresias Start zufrieden."}, {"id": "Ku7", "tyyppi": "monivalinta", "kysymys": "Mihin asiaan Theresian kannattaa kiinnittää huomiota?", "vaihtoehdot": ["Potilastietojen kirjaamiseen", "Vuorojen vaihtamiseen", "Kahvitaukojen pituuteen"], "oikea": "a", "selitys_fi": "Esihenkilö neuvoo kiinnittämään huomiota kirjaamiseen ja merkitsemään tiedot heti.", "vihje_de": "Sie sollte auf das Dokumentieren achten.", "kysymys_de": "Worauf sollte Theresia achten?"}, {"id": "Ku8", "tyyppi": "lyhyt", "kysymys": "Mitä Theresia lupaa tehdä jatkossa?", "vaihtoehdot": [], "oikea": "Kirjata asiat heti.", "selitys_fi": "Theresia lupaa ottaa palautteen huomioon ja kirjata asiat heti.", "vihje_de": "Sie verspricht, Dinge sofort zu dokumentieren.", "kysymys_de": "Was verspricht Theresia künftig zu tun?"}]}, {"otsikko": "Kuulutus: Henkilöstön tiedote työvuoroista ja taukotilasta", "tyyppi": "kuulutus", "litteraatti": "Hyvää huomenta, hyvät työntekijät. Tässä muutama tärkeä tiedote tämän päivän osalta. Ensinnäkin muistutamme, että ensi viikon työvuorolista on nyt valmis ja löytyy taukotilan ilmoitustaululta sekä sähköisestä järjestelmästä. Tarkistakaa omat vuoronne ja ilmoittakaa esihenkilölle viimeistään huomenna, jos huomaatte virheen.\n\nToiseksi taukotila on tänään siivouksessa kello kahdentoista ja yhden välillä. Pyydämme pitämään ruokatauon tänä aikana joko omalla osastolla tai läheisessä kahvilassa. Siivouksen jälkeen tila on taas normaalisti käytössä.\n\nKolmanneksi muistutamme, että perjantaina kello kahdelta pidetään lyhyt yhteinen palaveri, jossa käydään läpi kuukauden kuulumiset ja tulevat muutokset. Osallistuminen on toivottavaa kaikille, ja palaverissa saa esittää omia kysymyksiä ja toiveita. Jos et pääse paikalle, ilmoita siitä etukäteen esihenkilölle. Muistakaa myös pitää tauot säännöllisesti, jotta jaksatte hyvin koko päivän. Kiitos, ja oikein hyvää työpäivää kaikille.", "litteraatti_de": "Guten Morgen, liebe Mitarbeiterinnen und Mitarbeiter. Hier einige wichtige Mitteilungen für den heutigen Tag. Erstens erinnern wir daran, dass der Dienstplan für die nächste Woche jetzt fertig ist und an der Anschlagtafel im Pausenraum sowie im elektronischen System zu finden ist. Überprüfen Sie Ihre eigenen Schichten und melden Sie der/dem Vorgesetzten spätestens morgen, falls Sie einen Fehler bemerken.\n\nZweitens wird der Pausenraum heute zwischen zwölf und ein Uhr gereinigt. Wir bitten Sie, die Mittagspause während dieser Zeit entweder auf Ihrer eigenen Station oder in einem nahegelegenen Café zu machen. Nach der Reinigung ist der Raum wieder normal nutzbar.\n\nDrittens erinnern wir daran, dass am Freitag um zwei Uhr eine kurze gemeinsame Besprechung stattfindet, in der die Neuigkeiten des Monats und die kommenden Änderungen durchgegangen werden. Die Teilnahme ist für alle erwünscht, und in der Besprechung darf man eigene Fragen und Wünsche vorbringen. Falls Sie nicht teilnehmen können, melden Sie das im Voraus der/dem Vorgesetzten. Denken Sie auch daran, die Pausen regelmäßig zu machen, damit Sie den ganzen Tag gut durchhalten. Danke, und einen richtig guten Arbeitstag für alle.", "hl": ["Ensinnäkin muistutamme, että ensi viikon työvuorolista on nyt valmis ja löytyy taukotilan ilmoitustaululta sekä sähköisestä järjestelmästä.", "Toiseksi taukotila on tänään siivouksessa kello kahdentoista ja yhden välillä.", "Kolmanneksi muistutamme, että perjantaina kello kahdelta pidetään lyhyt yhteinen palaveri, jossa käydään läpi kuukauden kuulumiset ja tulevat muutokset."], "audio": "Simulaatio_03_tyo/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Mistä työvuorolistan voi tarkistaa?", "vaihtoehdot": ["Vain esihenkilön huoneesta", "Ilmoitustaululta ja sähköisestä järjestelmästä", "Pelkästään sähköpostista"], "oikea": "b", "selitys_fi": "Lista löytyy taukotilan ilmoitustaululta sekä sähköisestä järjestelmästä.", "vihje_de": "Vom Aushang und aus dem elektronischen System.", "kysymys_de": "Wo kann man den Dienstplan überprüfen?"}, {"id": "Ku10", "tyyppi": "lyhyt", "kysymys": "Mihin mennessä virheestä työvuorolistassa pitää ilmoittaa?", "vaihtoehdot": [], "oikea": "Viimeistään huomenna.", "selitys_fi": "Kuulutuksen mukaan virheestä pitää ilmoittaa esihenkilölle viimeistään huomenna.", "vihje_de": "Spätestens morgen Bescheid geben.", "kysymys_de": "Bis wann muss ein Fehler im Dienstplan gemeldet werden?"}, {"id": "Ku11", "tyyppi": "oikein-väärin", "kysymys": "Taukotila on käytössä normaalisti koko päivän.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Taukotila on siivouksessa kello kahdentoista ja yhden välillä, joten se ei ole tuolloin käytössä.", "vihje_de": "Der Pausenraum ist zur Reinigungszeit gesperrt.", "kysymys_de": "Der Pausenraum ist den ganzen Tag normal nutzbar."}, {"id": "Ku12", "tyyppi": "monivalinta", "kysymys": "Mitä perjantaina kello kahdelta tapahtuu?", "vaihtoehdot": ["Pidetään yhteinen palaveri", "Vaihdetaan kahvinkeitin", "Aloitetaan uusi koulutus"], "oikea": "a", "selitys_fi": "Perjantaina kello kahdelta pidetään lyhyt yhteinen palaveri.", "vihje_de": "Am Freitag um 14 Uhr gibt es eine Besprechung.", "kysymys_de": "Was passiert am Freitag um zwei Uhr?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Sait kutsun työhaastatteluun, mutta annettu aika ei sovi sinulle. Kirjoita lyhyt sähköpostiviesti osastonhoitaja Marjalle. Kerro, että olet iloinen kutsusta, selitä lyhyesti miksi aika ei sovi ja ehdota uutta aikaa. Kiitä lopuksi.", "ohje_de": "Sie haben eine Einladung zum Vorstellungsgespräch bekommen, aber der Termin passt nicht. Schreiben Sie eine kurze E-Mail an Marja: Freuen Sie sich über die Einladung, erklären Sie kurz, warum der Termin nicht passt, und schlagen Sie einen neuen Termin vor. Bedanken Sie sich am Ende.", "sanamaara": "80–120", "mallivastaus": "Hei Marja,\n\nkiitos paljon kutsusta työhaastatteluun. Olen todella iloinen, että pääsen mukaan ja saan kertoa lisää itsestäni ja työkokemuksestani.\n\nValitettavasti ehdotettu aika, keskiviikko 18. kesäkuuta kello 13, ei sovi minulle. Minulla on samaan aikaan tärkeä lääkärinaika, jota en voi siirtää. Pahoittelen tätä.\n\nKävisikö teille sen sijaan torstai 19. kesäkuuta tai perjantai 20. kesäkuuta? Molempina päivinä olen vapaa koko iltapäivän ja pääsen helposti toimistollenne. Voin myös tulla aikaisemmin aamulla, jos se sopii teille paremmin.\n\nKiitos vielä kutsusta ja vaivannäöstä. Odotan tapaamista innolla!\n\nYstävällisin terveisin,\nTheresia", "arviointi_fi": "Hyvässä vastauksessa on selkeä aloitus ja lopetus, sopivan epävirallinen mutta kohtelias sävy, ja se sisältää kaikki kolme kohtaa: ilon kutsusta, syyn ajan sopimattomuuteen ja ehdotuksen uudesta ajasta. Arvioidaan myös kielen sujuvuutta ja oikeinkirjoitusta.", "mallivastaus_de": "Hallo Marja,\n\nvielen Dank für die Einladung zum Vorstellungsgespräch. Ich freue mich wirklich, dass ich dabei sein darf und mehr über mich und meine Berufserfahrung erzählen kann.\n\nLeider passt mir der vorgeschlagene Termin, Mittwoch der 18. Juni um 13 Uhr, nicht. Ich habe zur selben Zeit einen wichtigen Arzttermin, den ich nicht verschieben kann. Das tut mir leid.\n\nGinge es bei Ihnen stattdessen am Donnerstag, dem 19. Juni, oder am Freitag, dem 20. Juni? An beiden Tagen bin ich den ganzen Nachmittag frei und komme leicht zu Ihrem Büro. Ich kann auch früher am Morgen kommen, falls Ihnen das besser passt.\n\nNochmals danke für die Einladung und Ihre Mühe. Ich freue mich sehr auf das Treffen!\n\nMit freundlichen Grüßen,\nTheresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Lue keskustelupalstalla väite: „Etätyö on aina parempi vaihtoehto kuin toimistolla työskentely.“ Kirjoita oma kommenttisi palstalle. Kerro mielipiteesi, perustele se vähintään kahdella syyllä ja anna esimerkki omasta elämästäsi. Voit olla väitteen kanssa samaa tai eri mieltä.", "ohje_de": "In einem Forum steht die Behauptung: „Homeoffice ist immer besser als die Arbeit im Büro.“ Schreiben Sie einen Kommentar: Nennen Sie Ihre Meinung, begründen Sie sie mit mindestens zwei Gründen und geben Sie ein Beispiel aus Ihrem Leben. Sie dürfen zustimmen oder widersprechen.", "sanamaara": "150–200", "mallivastaus": "Minun mielestäni väite on liian jyrkkä. Etätyössä on paljon hyvää, mutta se ei sovi kaikkiin tilanteisiin eikä kaikille ihmisille.\n\nEnsinnäkin etätyö säästää aikaa, koska työmatkaan ei kulu tunteja. Voin aloittaa työpäivän rauhassa kotona ja keskittyä vaativiin tehtäviin ilman jatkuvaa hälinää. Tämä on todella hyvä puoli, ja itse pidän siitä paljon.\n\nToisaalta toimistolla on myös tärkeitä etuja. Siellä tapaan työkavereita kasvotusten, ja yhteiset tauot piristävät päivää. Monet asiat selviävät nopeammin, kun voi kysyä kollegalta suoraan. Esimerkiksi terveysalalla työtä on usein vaikea tehdä kotoa käsin, koska potilaita pitää tavata henkilökohtaisesti.\n\nOn myös hyvä muistaa, että kaikilla ei ole kotona rauhallista paikkaa työskennellä. Pienessä asunnossa tai pienten lasten kanssa keskittyminen voi olla todella vaikeaa. Siksi sama ratkaisu ei sovi kaikille ihmisille samalla tavalla.\n\nOmasta mielestäni paras ratkaisu on yhdistelmä: osan viikosta tekisin etänä ja osan toimistolla. Näin saisin sekä rauhaa vaativiin tehtäviin että mukavaa seuraa työkavereilta. Siksi en usko, että etätyö on aina parempi vaihtoehto, vaan se riippuu aina työstä, tilanteesta ja ihmisestä itsestään.", "arviointi_fi": "Hyvässä vastauksessa mielipide on selkeä, sitä perustellaan vähintään kahdella syyllä ja mukana on konkreettinen esimerkki. Teksti on jäsennelty kappaleisiin, sidossanat (ensinnäkin, toisaalta, esimerkiksi) ohjaavat lukijaa, ja kielessä näkyy B1–B2-tason rakenteita. Pituuden tulee olla 150–200 sanaa.", "mallivastaus_de": "Meiner Meinung nach ist die Behauptung zu drastisch. An der Telearbeit ist vieles gut, aber sie passt nicht zu allen Situationen und nicht zu allen Menschen.\n\nErstens spart die Telearbeit Zeit, weil für den Arbeitsweg keine Stunden draufgehen. Ich kann den Arbeitstag in Ruhe zu Hause beginnen und mich auf anspruchsvolle Aufgaben konzentrieren, ohne ständigen Lärm. Das ist eine wirklich gute Seite, und ich selbst mag das sehr.\n\nAndererseits hat das Büro auch wichtige Vorteile. Dort treffe ich die Kolleginnen und Kollegen von Angesicht zu Angesicht, und die gemeinsamen Pausen lockern den Tag auf. Vieles klärt sich schneller, wenn man die Kollegin oder den Kollegen direkt fragen kann. Zum Beispiel ist es im Gesundheitsbereich oft schwierig, die Arbeit von zu Hause aus zu erledigen, weil man die Patienten persönlich treffen muss.\n\nMan sollte auch daran denken, dass nicht alle zu Hause einen ruhigen Ort zum Arbeiten haben. In einer kleinen Wohnung oder mit kleinen Kindern kann die Konzentration wirklich schwierig sein. Deshalb passt dieselbe Lösung nicht für alle Menschen auf gleiche Weise.\n\nMeiner Meinung nach ist die beste Lösung eine Kombination: einen Teil der Woche würde ich im Homeoffice und einen Teil im Büro arbeiten. So bekäme ich sowohl Ruhe für anspruchsvolle Aufgaben als auch angenehme Gesellschaft von den Kolleginnen und Kollegen. Deshalb glaube ich nicht, dass Telearbeit immer die bessere Option ist, sondern es hängt immer von der Arbeit, der Situation und dem Menschen selbst ab."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen", "ohje_fi": "Kirjoita lyhyt teksti työnantajalle, jossa kuvailet omaa työkokemustasi ja vahvuuksiasi. Kerro, missä olet ollut töissä, mitä tehtäviä sinulla on ollut ja millainen työntekijä olet. Sävyn tulee olla asiallinen ja kohtelias.", "ohje_de": "Schreiben Sie einen kurzen Text an einen Arbeitgeber, in dem Sie Ihre Berufserfahrung und Stärken beschreiben. Erzählen Sie, wo Sie gearbeitet haben, welche Aufgaben Sie hatten und was für ein Mensch/Mitarbeiter Sie sind. Der Ton soll sachlich und höflich sein.", "sanamaara": "120–160", "mallivastaus": "Olen koulutukseltani lääkäri ja minulla on usean vuoden kokemus terveydenhuollon tehtävistä. Olen työskennellyt sekä sairaalassa että terveysasemalla, missä olen hoitanut potilaita, tehnyt tutkimuksia ja tehnyt tiivistä yhteistyötä hoitajien ja muiden lääkäreiden kanssa.\n\nTyössäni olen tottunut kantamaan vastuuta ja tekemään päätöksiä myös kiireessä. Pidän tärkeänä, että potilas tulee kuulluksi ja kohdatuksi rauhallisesti. Olen huolellinen, luotettava ja oppimishaluinen, ja minulle on luontevaa työskennellä osana tiimiä.\n\nViime aikoina olen opiskellut suomen kieltä ahkerasti, koska haluan palvella potilaita heidän omalla kielellään. Käyn säännöllisesti kielikurssilla ja harjoittelen suomea myös arjessa aina, kun se on mahdollista. Kielitaitoni paranee koko ajan, ja ymmärrän jo hyvin työhön liittyvää sanastoa.\n\nUskon, että kokemukseni, hyvät yhteistyötaitoni ja myönteinen asenteeni olisivat hyödyksi teidän työyhteisössänne. Otan mielelläni vastaan uusia haasteita ja kehitän jatkuvasti omaa osaamistani. Olisin hyvin kiitollinen mahdollisuudesta tulla käymään ja kertoa itsestäni lisää.", "arviointi_fi": "Hyvässä vastauksessa kuvataan selkeästi työkokemus, tehtävät ja omat vahvuudet. Sävy on asiallinen ja kohtelias, teksti etenee loogisesti ja sanasto liittyy työelämään. Arvioidaan rakenteiden monipuolisuutta ja sitä, että pituus on 120–160 sanaa.", "mallivastaus_de": "Ich bin von der Ausbildung her Ärztin und habe mehrere Jahre Erfahrung in Aufgaben des Gesundheitswesens. Ich habe sowohl im Krankenhaus als auch in einer Gesundheitsstation gearbeitet, wo ich Patienten behandelt, Untersuchungen durchgeführt und eng mit Pflegekräften und anderen Ärztinnen und Ärzten zusammengearbeitet habe.\n\nIn meiner Arbeit bin ich es gewohnt, Verantwortung zu tragen und auch unter Zeitdruck Entscheidungen zu treffen. Mir ist wichtig, dass der Patient gehört und in Ruhe wahrgenommen wird. Ich bin sorgfältig, zuverlässig und lernbereit, und es ist für mich selbstverständlich, als Teil eines Teams zu arbeiten.\n\nIn letzter Zeit habe ich fleißig Finnisch gelernt, weil ich die Patienten in ihrer eigenen Sprache betreuen möchte. Ich besuche regelmäßig einen Sprachkurs und übe Finnisch auch im Alltag, wann immer es möglich ist. Meine Sprachkenntnisse verbessern sich ständig, und ich verstehe den arbeitsbezogenen Wortschatz schon gut.\n\nIch glaube, dass meine Erfahrung, meine guten Kooperationsfähigkeiten und meine positive Einstellung Ihrer Arbeitsgemeinschaft von Nutzen wären. Ich nehme gerne neue Herausforderungen an und entwickle mein Können ständig weiter. Ich wäre sehr dankbar für die Möglichkeit, vorbeizukommen und mehr über mich zu erzählen."}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Näet työpaikkailmoituksen, joka kiinnostaa sinua. Soitat työnantajalle. Aloita puhelu kohteliaasti ja kerro, miksi soitat.", "ohje_de": "Sie sehen eine interessante Stellenanzeige und rufen den Arbeitgeber an. Beginnen Sie das Gespräch höflich und sagen Sie, warum Sie anrufen.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hyvää päivää, nimeni on Theresia. Soitan teidän työpaikkailmoituksestanne. Näin, että haette sairaanhoitajaa, ja olisin hyvin kiinnostunut hakemaan paikkaa. Saisinko kysyä muutaman kysymyksen työstä?", "malli_de": "Guten Tag, mein Name ist Theresia. Ich rufe wegen Ihrer Stellenanzeige an. Ich habe gesehen, dass Sie eine Krankenpflegerin/einen Krankenpfleger suchen, und ich hätte großes Interesse, mich auf die Stelle zu bewerben. Dürfte ich ein paar Fragen zur Arbeit stellen?"}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Työkaverisi kysyy, voitko vaihtaa hänen kanssaan työvuoron ensi viikolla. Sinulle ei oikein sovi. Vastaa kohteliaasti ja selitä lyhyesti.", "ohje_de": "Eine Kollegin fragt, ob Sie nächste Woche mit ihr die Schicht tauschen können. Es passt Ihnen nicht gut. Antworten Sie höflich und erklären Sie kurz.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Voi harmi, valitettavasti ensi viikko ei oikein sovi minulle, koska minulla on silloin perheen menoja. En siis nyt pääse vaihtamaan vuoroa, mutta voin auttaa mielelläni jonain toisena viikkona.", "malli_de": "Oh schade, leider passt mir nächste Woche nicht so gut, weil ich dann Familientermine habe. Ich kann die Schicht also jetzt nicht tauschen, aber ich helfe gerne in einer anderen Woche aus."}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Olet uusi työntekijä. Esihenkilö toivottaa sinut tervetulleeksi. Vastaa tervehdykseen ja kerro lyhyesti, että odotat työn aloittamista.", "ohje_de": "Sie sind neu. Die oder der Vorgesetzte heißt Sie willkommen. Erwidern Sie die Begrüßung und sagen Sie kurz, dass Sie sich auf den Arbeitsbeginn freuen.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Kiitos paljon lämpimästä tervetulotoivotuksesta! On todella mukava aloittaa täällä. Odotan innolla uusia tehtäviä ja uusiin työkavereihin tutustumista. Toivottavasti opin nopeasti talon tavoille.", "malli_de": "Vielen Dank für die herzliche Willkommensbegrüßung! Es ist wirklich schön, hier anzufangen. Ich freue mich sehr auf die neuen Aufgaben und darauf, die neuen Kolleginnen und Kollegen kennenzulernen. Hoffentlich lerne ich schnell die Gepflogenheiten des Hauses."}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Saat esihenkilöltäsi kiitosta hyvin tehdystä työstä. Reagoi palautteeseen sopivalla tavalla.", "ohje_de": "Sie bekommen von Ihrer/Ihrem Vorgesetzten Lob für gute Arbeit. Reagieren Sie passend auf das Feedback.", "valmistautuminen_s": 0, "puheaika_s": 20, "malli": "Kiitos paljon, tuo on todella mukava kuulla! Olen yrittänyt tehdä parhaani. Otan palautteen ilolla vastaan ja jatkan samaan malliin.", "malli_de": "Vielen Dank, das ist wirklich schön zu hören! Ich habe versucht, mein Bestes zu geben. Ich nehme das Feedback mit Freude an und mache weiter so."}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Olet myöhässä työvuorosta ruuhkan takia. Soitat esihenkilöllesi. Pahoittele ja kerro, milloin arviolta saavut.", "ohje_de": "Sie kommen wegen Stau zu spät zur Schicht. Sie rufen die/den Vorgesetzte/n an. Entschuldigen Sie sich und sagen Sie, wann Sie ungefähr ankommen.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, täällä Theresia. Olen pahoillani, mutta olen myöhässä, koska jäin pahaan ruuhkaan matkalla töihin. Arvioni mukaan saavun noin viisitoista minuuttia myöhässä. Pahoittelen tilannetta ja tulen heti, kun pääsen perille.", "malli_de": "Hallo, hier ist Theresia. Es tut mir leid, aber ich bin zu spät, weil ich auf dem Weg zur Arbeit in einen schlimmen Stau geraten bin. Schätzungsweise komme ich etwa fünfzehn Minuten zu spät an. Ich e
