Großmutter gelernt, die sie immer zubereitete, wenn wir zu Besuch waren. Ich erinnere mich noch daran, wie es in ihrer Küche duftete. Deshalb ist Lachssuppe für mich nicht nur Essen, sondern sie ruft warme Erinnerungen an die Kindheit und die Familie wach."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet ystäväsi kanssa suunnittelemassa yhteistä illallista kotonasi. Roolisi: Ehdota, mitä ruokaa voisitte tehdä, sovi työnjaosta ja päätä, kuka käy kaupassa. Reagoi ystäväsi ehdotuksiin.", "ohje_de": "Situation: Sie planen mit Ihrer Freundin/Ihrem Freund ein gemeinsames Abendessen bei Ihnen zu Hause. Ihre Rolle: Schlagen Sie vor, welches Gericht Sie kochen könnten, einigen Sie sich über die Aufgabenverteilung und entscheiden Sie, wer einkaufen geht. Reagieren Sie auf die Vorschläge Ihrer Freundin/Ihres Freundes.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Mitä jos tekisimme yhdessä kasvislasagnea? Se on helppoa ja maistuu varmasti molemmille.\n– Hyvä idea! Mutta tarvitsemme aika monta ainesta. Kumpi meistä käy kaupassa?\n– Voin minä käydä, jos sinä alat valmistaa kastiketta sillä aikaa. Tehdäänkö myös salaatti?\n– Tehdään vain. Minä huolehdin salaatista ja jälkiruoasta. Muistatko ostaa myös juustoa?\n– Muistan kyllä. Laitan kaupan listan puhelimeen, niin mitään ei unohdu. Aloitetaanko kuudelta?", "malli_de": "– Wie wäre es, wenn wir zusammen Gemüselasagne machen würden? Das ist einfach und schmeckt bestimmt uns beiden.\n– Gute Idee! Aber wir brauchen ziemlich viele Zutaten. Wer von uns geht einkaufen?\n– Ich kann gehen, wenn du währenddessen anfängst, die Soße zuzubereiten. Machen wir auch einen Salat?\n– Machen wir nur. Ich kümmere mich um den Salat und den Nachtisch. Denkst du daran, auch Käse zu kaufen?\n– Ja, daran denke ich. Ich schreibe die Einkaufsliste ins Handy, dann wird nichts vergessen. Fangen wir um sechs an?"}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet ravintolassa tarjoilijan kanssa. Annoksessasi on ainesosa, jolle olet allerginen. Roolisi: Kerro tilanne tarjoilijalle kohteliaasti, kysy vaihtoehtoja ja sovi, miten asia ratkaistaan.", "ohje_de": "Situation: Sie sind im Restaurant mit dem Kellner. In Ihrem Gericht ist eine Zutat, gegen die Sie allergisch sind. Ihre Rolle: Schildern Sie die Situation dem Kellner höflich, fragen Sie nach Alternativen und einigen Sie sich, wie das Problem gelöst wird.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Anteeksi, mutta huomasin, että annoksessa on pähkinöitä. Minulla on valitettavasti pähkinäallergia.\n– Voi anteeksi, sitä ei mainittu listalla. Haluatteko, että vaihdamme annoksen toiseen?\n– Kyllä, kiitos. Onko teillä jokin pääruoka ilman pähkinöitä, jonka voisitte suositella?\n– Meillä on kanaa ja riisiä, joka sopii hyvin allergisille. Käykö se teille?\n– Käy oikein hyvin. Otan sen, kiitos avustanne ja nopeasta ratkaisusta.", "malli_de": "– Entschuldigung, aber mir ist aufgefallen, dass im Gericht Nüsse sind. Ich habe leider eine Nussallergie.\n– Oh, Entschuldigung, das war auf der Karte nicht angegeben. Möchten Sie, dass wir das Gericht gegen ein anderes tauschen?\n– Ja, bitte. Haben Sie ein Hauptgericht ohne Nüsse, das Sie empfehlen könnten?\n– Wir haben Hähnchen und Reis, das passt gut für Allergiker. Geht das für Sie?\n– Das geht sehr gut. Ich nehme es, danke für Ihre Hilfe und die schnelle Lösung."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse toinen aihe ja kerro mielipiteesi. Perustele näkemyksesi. Aihe 1: Onko parempi syödä ulkona ravintolassa vai laittaa ruokaa kotona? Aihe 2: Pitäisikö lasten opetella ruoanlaittoa jo koulussa?", "ohje_de": "Wählen Sie eines der beiden Themen und äußern Sie Ihre Meinung. Begründen Sie Ihre Ansicht. Thema 1: Ist es besser, im Restaurant auswärts zu essen oder zu Hause zu kochen? Thema 2: Sollten Kinder das Kochen schon in der Schule lernen?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen toisen aiheen eli sen, pitäisikö lasten opetella ruoanlaittoa jo koulussa. Minun mielestäni ehdottomasti pitäisi, ja perustelen näkemystäni muutamalla syyllä.\n\nEnsinnäkin ruoanlaitto on tärkeä taito, jota jokainen tarvitsee koko elämänsä ajan. Jos lapset oppivat valmistamaan yksinkertaisia ja terveellisiä aterioita jo nuorena, he osaavat huolehtia itsestään paremmin aikuisena. Moni nuori muuttaa omilleen osaamatta laittaa muuta kuin valmisruokaa, mikä ei ole hyväksi terveydelle.\n\nToiseksi ruoanlaitto opettaa muutakin kuin kokkaamista. Se opettaa suunnittelua, matematiikkaa ja yhteistyötä, kun ruokaa tehdään yhdessä. Lisäksi koulussa lapset oppisivat, mistä ruoka tulee ja miksi terveellinen ravinto on tärkeää.\n\nToki ymmärrän, että koulupäivät ovat jo nyt täynnä oppiaineita, eikä lisätunneille ole helposti tilaa. Tästä huolimatta uskon, että edes muutama ruoanlaittotunti lukukaudessa olisi hyödyllistä. Kaiken kaikkiaan pidän ruoanlaittotaitoa niin tärkeänä, että sen opettaminen koulussa kannattaisi varmasti.", "malli_de": "Ich wähle das zweite Thema, also die Frage, ob Kinder das Kochen schon in der Schule lernen sollten. Meiner Meinung nach sollten sie das unbedingt, und ich begründe meine Ansicht mit einigen Gründen.\n\nErstens ist Kochen eine wichtige Fähigkeit, die jeder sein ganzes Leben lang braucht. Wenn Kinder schon in jungen Jahren lernen, einfache und gesunde Mahlzeiten zuzubereiten, können sie als Erwachsene besser für sich selbst sorgen. Viele junge Menschen ziehen in die eigene Wohnung, ohne etwas anderes als Fertiggerichte zubereiten zu können, was nicht gut für die Gesundheit ist.\n\nZweitens lehrt Kochen mehr als nur das Kochen selbst. Es lehrt Planung, Mathematik und Zusammenarbeit, wenn man gemeinsam Essen zubereitet. Außerdem würden Kinder in der Schule lernen, woher das Essen kommt und warum gesunde Ernährung wichtig ist.\n\nFreilich verstehe ich, dass die Schultage schon jetzt voller Unterrichtsfächer sind und für zusätzliche Stunden nicht leicht Platz ist. Trotzdem glaube ich, dass schon ein paar Kochstunden pro Semester nützlich wären. Alles in allem halte ich die Kochfähigkeit für so wichtig, dass es sich sicherlich lohnen würde, sie in der Schule zu lehren."}]}, {"id": 7, "teema": "Vapaa-aika, kulttuuri ja harrastukset", "teema_de": "Freizeit, Kultur und Hobbys", "reading": [{"otsikko": "Kesän kulttuuritapahtuma: Joen yön festivaali", "tyyppi": "ilmoitus", "teksti": "Tervetuloa Joen yön festivaaliin lauantaina 12. heinäkuuta! Tapahtuma järjestetään tänä vuonna jo kymmenettä kertaa kaupungin rantapuistossa. Ohjelma alkaa kello 14 lasten teatteriesityksellä ja jatkuu illalla konsertteihin saakka. Pääesiintyjä nousee lavalle kello 21, ja festivaali päättyy ilotulitukseen puolenyön aikaan.\n\nFestivaalialueella on tänä vuonna kaksi lavaa. Suurella lavalla esiintyvät tunnetut bändit, ja pienemmällä lavalla kuullaan paikallisia muusikoita ja kuoroja. Alueella on myös ruokakojuja, käsityömyyjiä ja työpaja, jossa lapset voivat maalata ja askarrella ohjaajan kanssa.\n\nLiput maksavat aikuisilta 25 euroa ja alle 16-vuotiailta 10 euroa. Alle 7-vuotiaat pääsevät sisään ilmaiseksi. Liput kannattaa ostaa etukäteen verkosta, sillä portilla lippu maksaa viisi euroa enemmän. Huomaa, että alueelle ei saa tuoda omia juomia eikä lemmikkejä.\n\nFestivaalialueelle ei pääse omalla autolla, vaan suosittelemme julkista liikennettä. Keskustasta kulkee maksuton bussikuljetus puolen tunnin välein.", "teksti_de": "Willkommen zum Festival „Nacht am Fluss“ am Samstag, dem 12. Juli! Die Veranstaltung wird dieses Jahr bereits zum zehnten Mal im Uferpark der Stadt veranstaltet. Das Programm beginnt um 14 Uhr mit einer Kindertheateraufführung und geht am Abend bis hin zu Konzerten weiter. Der Hauptact betritt um 21 Uhr die Bühne, und das Festival endet um Mitternacht mit einem Feuerwerk.\n\nAuf dem Festivalgelände gibt es dieses Jahr zwei Bühnen. Auf der großen Bühne treten bekannte Bands auf, und auf der kleineren Bühne sind örtliche Musiker und Chöre zu hören. Auf dem Gelände gibt es außerdem Essensstände, Handwerksverkäufer und eine Werkstatt, in der Kinder gemeinsam mit einem Betreuer malen und basteln können.\n\nDie Tickets kosten für Erwachsene 25 Euro und für unter 16-Jährige 10 Euro. Unter 7-Jährige kommen kostenlos hinein. Die Tickets sollte man im Voraus online kaufen, denn an der Tür kostet das Ticket fünf Euro mehr. Beachten Sie, dass man weder eigene Getränke noch Haustiere auf das Gelände mitbringen darf.\n\nMit dem eigenen Auto kommt man nicht auf das Festivalgelände, sondern wir empfehlen die öffentlichen Verkehrsmittel. Aus dem Zentrum fährt alle halbe Stunde ein kostenloser Bustransfer.", "hl": ["Tapahtuma järjestetään tänä vuonna jo kymmenettä kertaa kaupungin rantapuistossa.", "Pääesiintyjä nousee lavalle kello 21, ja festivaali päättyy ilotulitukseen puolenyön aikaan.", "Liput kannattaa ostaa etukäteen verkosta, sillä portilla lippu maksaa viisi euroa enemmän.", "Festivaalialueelle ei pääse omalla autolla, vaan suosittelemme julkista liikennettä."], "image": "Simulaatio_07_vapaa_aika/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Monettako kertaa festivaali järjestetään tänä vuonna?", "vaihtoehdot": ["Ensimmäistä kertaa", "Viidettä kertaa", "Kymmenettä kertaa"], "oikea": "c", "selitys_fi": "Tekstissä sanotaan, että tapahtuma järjestetään tänä vuonna jo kymmenettä kertaa.", "vihje_de": "„kymmenettä kertaa“ = zum zehnten Mal.", "kysymys_de": "Zum wievielten Mal wird das Festival dieses Jahr veranstaltet?"}, {"id": "L2", "tyyppi": "monivalinta", "kysymys": "Mihin aikaan festivaali päättyy?", "vaihtoehdot": ["Kello 21", "Puolenyön aikaan", "Kello 14"], "oikea": "b", "selitys_fi": "Teksti kertoo, että festivaali päättyy ilotulitukseen puolenyön aikaan.", "vihje_de": "„puolenyön aikaan“ = um Mitternacht; das Fest endet mit einem Feuerwerk.", "kysymys_de": "Um welche Zeit endet das Festival?"}, {"id": "L3", "tyyppi": "oikein-väärin", "kysymys": "Lippu on halvempi, jos sen ostaa etukäteen verkosta.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Portilla lippu maksaa viisi euroa enemmän, joten verkosta ostettuna se on halvempi.", "vihje_de": "An der Tür kostet das Ticket fünf Euro mehr – online ist es günstiger.", "kysymys_de": "Das Ticket ist günstiger, wenn man es im Voraus online kauft."}, {"id": "L4", "tyyppi": "oikein-väärin", "kysymys": "Festivaalialueelle saa tulla omalla autolla.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan alueelle ei pääse omalla autolla, ja tilalle suositellaan julkista liikennettä.", "vihje_de": "Mit dem eigenen Auto kommt man nicht aufs Gelände.", "kysymys_de": "Man darf mit dem eigenen Auto auf das Festivalgelände kommen."}]}, {"otsikko": "Aikuisten harrastuskurssit syksyllä", "tyyppi": "tiedote", "teksti": "Kansalaisopiston syyslukukauden kurssit alkavat viikolla 36. Tarjolla on monenlaisia harrastuskursseja kaikenikäisille aikuisille, eikä aiempaa kokemusta tarvita. Tällä lukukaudella suosittelemme erityisesti uusia liikunta- ja kädentaitokursseja, joita on toivottu paljon.\n\nKeramiikan alkeiskurssi sopii sinulle, joka et ole koskaan tehnyt savitöitä. Kurssi kokoontuu maanantai-iltaisin kahdeksan kertaa, ja materiaalit sisältyvät hintaan. Akvarellimaalauksen kurssilla opit käyttämään vesivärejä rauhallisessa ilmapiirissä ja saat mukaasi omat työsi. Jos taas haluat liikkua, kokeile keskiviikon rauhallista joogaa tai perjantai-illan vauhdikasta kuntonyrkkeilyä.\n\nKurssit täyttyvät nopeasti, joten ilmoittaudu hyvissä ajoin opiston verkkosivuilla. Maksun voi suorittaa joko kerralla tai kahdessa erässä. Jos joudut perumaan osallistumisesi, tee se viimeistään viikkoa ennen kurssin alkua, niin saat rahasi takaisin. Myöhemmin tehdystä peruutuksesta emme valitettavasti voi palauttaa maksua.\n\nMuistathan, että osa kursseista järjestetään etänä. Etäkursseille tarvitset tietokoneen ja toimivan nettiyhteyden. Lisätietoja kursseista ja hinnoista saat opiston toimistosta tai puhelimitse arkisin kello 9–15. Tervetuloa oppimaan uutta ja viettämään mukavia hetkiä hyvässä seurassa!", "teksti_de": "Die Kurse des Herbstsemesters der Volkshochschule beginnen in der Woche 36. Angeboten werden vielerlei Freizeitkurse für Erwachsene jeden Alters, und Vorerfahrung wird nicht benötigt. In diesem Semester empfehlen wir besonders die neuen Sport- und Handarbeitskurse, die vielfach gewünscht wurden.\n\nDer Keramik-Anfängerkurs eignet sich für dich, der/die du noch nie Tonarbeiten gemacht hast. Der Kurs trifft sich montagabends acht Mal, und die Materialien sind im Preis enthalten. Im Aquarellmalerei-Kurs lernst du in ruhiger Atmosphäre, Wasserfarben zu benutzen, und du nimmst deine eigenen Werke mit nach Hause. Wenn du dich dagegen bewegen möchtest, probiere das ruhige Yoga am Mittwoch oder das schwungvolle Fitnessboxen am Freitagabend.\n\nDie Kurse füllen sich schnell, also melde dich rechtzeitig auf den Internetseiten der Volkshochschule an. Die Bezahlung kann entweder auf einmal oder in zwei Raten erfolgen. Falls du deine Teilnahme stornieren musst, tue dies spätestens eine Woche vor Kursbeginn, dann bekommst du dein Geld zurück. Bei einer später vorgenommenen Stornierung können wir den Betrag leider nicht erstatten.\n\nDenke bitte daran, dass ein Teil der Kurse online (per Fernunterricht) veranstaltet wird. Für die Fernkurse brauchst du einen Computer und eine funktionierende Internetverbindung. Weitere Informationen zu den Kursen und Preisen erhältst du im Büro der Volkshochschule oder telefonisch werktags von 9 bis 15 Uhr. Willkommen, Neues zu lernen und in guter Gesellschaft angenehme Stunden zu verbringen!", "hl": ["Tarjolla on monenlaisia harrastuskursseja kaikenikäisille aikuisille, eikä aiempaa kokemusta tarvita.", "Keramiikan alkeiskurssi sopii sinulle, joka et ole koskaan tehnyt savitöitä.", "Maksun voi suorittaa joko kerralla tai kahdessa erässä.", "Etäkursseille tarvitset tietokoneen ja toimivan nettiyhteyden."], "image": "Simulaatio_07_vapaa_aika/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Kenelle keramiikan alkeiskurssi sopii?", "vaihtoehdot": ["Vain kokeneille savitöiden tekijöille", "Sille, joka ei ole koskaan tehnyt savitöitä", "Vain lapsille ja nuorille"], "oikea": "b", "selitys_fi": "Teksti sanoo, että alkeiskurssi sopii sille, joka ei ole koskaan tehnyt savitöitä.", "vihje_de": "„alkeiskurssi“ = Anfängerkurs, für Personen ohne Vorerfahrung.", "kysymys_de": "Für wen eignet sich der Keramik-Anfängerkurs?"}, {"id": "L6", "tyyppi": "oikein-väärin", "kysymys": "Harrastuskursseille tarvitaan aiempaa kokemusta.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin alussa todetaan, että aiempaa kokemusta ei tarvita.", "vihje_de": "„eikä aiempaa kokemusta tarvita“ = keine Vorkenntnisse nötig.", "kysymys_de": "Für die Freizeitkurse wird Vorerfahrung benötigt."}, {"id": "L7", "tyyppi": "monivalinta", "kysymys": "Miten kurssimaksun voi maksaa?", "vaihtoehdot": ["Vain kerralla", "Kerralla tai kahdessa erässä", "Vasta kurssin jälkeen"], "oikea": "b", "selitys_fi": "Tekstin mukaan maksun voi suorittaa joko kerralla tai kahdessa erässä.", "vihje_de": "„kahdessa erässä“ = in zwei Raten.", "kysymys_de": "Wie kann man die Kursgebühr bezahlen?"}, {"id": "L8", "tyyppi": "lyhyt", "kysymys": "Mitä etäkursseille osallistuminen vaatii? Mainitse yksi asia.", "vaihtoehdot": [], "oikea": "Tietokoneen (ja toimivan nettiyhteyden).", "selitys_fi": "Tekstin mukaan etäkursseille tarvitaan tietokone ja toimiva nettiyhteys.", "vihje_de": "Für Fernkurse braucht man einen Computer und eine funktionierende Internetverbindung.", "kysymys_de": "Was erfordert die Teilnahme an den Fernkursen? Nennen Sie eine Sache."}]}, {"otsikko": "Blogi: Aloitin uuden harrastuksen 40-vuotiaana", "tyyppi": "blogi", "teksti": "Olin aina ajatellut, että tanssiminen ei ole minua varten. Lapsena en käynyt missään harrastuksissa, ja aikuisena tein pitkiä työpäiviä toimistossa. Viime syksynä ystäväni kuitenkin houkutteli minut mukaan paritanssikurssille, ja päätin antaa sille mahdollisuuden.\n\nEnsimmäisellä kerralla olin todella hermostunut. Pelkäsin, että kaikki muut osaisivat jo, mutta huomasin nopeasti, että suurin osa oli yhtä kokemattomia kuin minä. Opettaja oli kärsivällinen ja kannustava, eikä kukaan nauranut, vaikka astuin paria varpaille monta kertaa.\n\nNyt, puolen vuoden jälkeen, odotan jokaista tiistai-iltaa innolla. Tanssi ei ole minulle vain liikuntaa, vaan se on myös tapa rentoutua ja tavata uusia ihmisiä. Olen huomannut, että nukun paremmin ja olen töissä virkeämpi kuin ennen.\n\nNeuvoni kaikille, jotka epäröivät: kokeile rohkeasti jotain uutta, vaikka se tuntuisi aluksi pelottavalta. Ei ole koskaan liian myöhäistä aloittaa. Itse toivon, että olisin uskaltanut aloittaa jo vuosia sitten.", "teksti_de": "Ich hatte immer gedacht, dass Tanzen nichts für mich ist. Als Kind ging ich keinen Hobbys nach, und als Erwachsene/r machte ich lange Arbeitstage im Büro. Letzten Herbst hat mich aber eine Freundin zu einem Paartanzkurs mitgelockt, und ich beschloss, dem eine Chance zu geben.\n\nBeim ersten Mal war ich wirklich nervös. Ich hatte Angst, dass alle anderen es schon könnten, aber ich merkte schnell, dass die meisten genauso unerfahren waren wie ich. Die Lehrerin war geduldig und ermutigend, und niemand lachte, obwohl ich dem/der Partner/in mehrmals auf die Zehen trat.\n\nJetzt, nach einem halben Jahr, erwarte ich jeden Dienstagabend voller Vorfreude. Tanzen ist für mich nicht nur Bewegung, sondern auch eine Möglichkeit, mich zu entspannen und neue Menschen kennenzulernen. Ich habe gemerkt, dass ich besser schlafe und bei der Arbeit munterer bin als früher.\n\nMein Rat an alle, die zögern: Probiere mutig etwas Neues aus, auch wenn es anfangs beängstigend erscheint. Es ist nie zu spät anzufangen. Ich selbst wünschte, ich hätte mich schon vor Jahren getraut anzufangen.", "hl": ["Viime syksynä ystäväni kuitenkin houkutteli minut mukaan paritanssikurssille, ja päätin antaa sille mahdollisuuden.", "Ensimmäisellä kerralla olin todella hermostunut.", "Olen huomannut, että nukun paremmin ja olen töissä virkeämpi kuin ennen.", "Neuvoni kaikille, jotka epäröivät: kokeile rohkeasti jotain uutta, vaikka se tuntuisi aluksi pelottavalta. Ei ole koskaan liian myöhäistä aloittaa."], "image": "Simulaatio_07_vapaa_aika/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Miksi kirjoittaja meni tanssikurssille?", "vaihtoehdot": ["Ystävä houkutteli hänet mukaan", "Hän oli tanssinut jo lapsena", "Työnantaja vaati sitä"], "oikea": "a", "selitys_fi": "Tekstin mukaan ystävä houkutteli kirjoittajan mukaan paritanssikurssille.", "vihje_de": "„houkutteli“ = lockte/überredete; eine Freundin nahm ihn/sie mit.", "kysymys_de": "Warum ging der/die Schreiber/in zum Tanzkurs?"}, {"id": "L10", "tyyppi": "oikein-väärin", "kysymys": "Kirjoittaja oli ensimmäisellä kerralla hermostunut.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Kirjoittaja kertoo olleensa ensimmäisellä kerralla todella hermostunut.", "vihje_de": "„hermostunut“ = nervös.", "kysymys_de": "Der/die Schreiber/in war beim ersten Mal nervös."}, {"id": "L11", "tyyppi": "monivalinta", "kysymys": "Mitä hyötyä tanssista on kirjoittajan mukaan ollut?", "vaihtoehdot": ["Hän on saanut paremman palkan", "Hän nukkuu paremmin ja on töissä virkeämpi", "Hän on lopettanut työnteon kokonaan"], "oikea": "b", "selitys_fi": "Kirjoittaja kertoo nukkuvansa paremmin ja olevansa töissä virkeämpi kuin ennen.", "vihje_de": "„virkeä“ = munter, frisch; er/sie schläft besser und ist wacher bei der Arbeit.", "kysymys_de": "Welchen Nutzen hat das Tanzen laut dem/der Schreiber/in gebracht?"}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Mitä kirjoittaja neuvoo niitä, jotka epäröivät uuden harrastuksen aloittamista?", "vaihtoehdot": [], "oikea": "Kokeilemaan rohkeasti jotain uutta, koska ei ole koskaan liian myöhäistä aloittaa.", "selitys_fi": "Kirjoittaja kehottaa kokeilemaan rohkeasti uutta, sillä ei ole koskaan liian myöhäistä aloittaa.", "vihje_de": "Der Rat: mutig etwas Neues ausprobieren – es ist nie zu spät anzufangen.", "kysymys_de": "Was rät der/die Schreiber/in denjenigen, die zögern, ein neues Hobby zu beginnen?"}]}, {"otsikko": "Kaupunginkirjasto laajentaa palvelujaan", "tyyppi": "uutinen", "teksti": "Kaupunginkirjasto on uudistanut tilojaan ja palvelujaan vastatakseen asukkaiden toiveisiin. Remontin jälkeen kirjastossa on entistä enemmän tilaa työskentelyyn ja opiskeluun. Uudet ryhmätyötilat voi varata maksutta verkossa, ja niitä saavat käyttää kaikki kirjaston asiakkaat.\n\nKirjasto ei ole enää pelkkä paikka lainata kirjoja. Nyt asiakkaat voivat lainata myös soittimia, työkaluja ja jopa retkeilyvälineitä. Kirjaston johtajan mukaan tavoitteena on, että mahdollisimman moni löytäisi kirjastosta jotain itselleen sopivaa. Erityisen suosittuja ovat olleet kielikahvilat, joissa voi harjoitella suomea ja muita kieliä rennossa ilmapiirissä.\n\nLapsiperheitä varten on järjestetty viikoittaisia satutuokioita ja askartelukerhoja. Aikuisille tarjotaan ilmaisia luentoja ja kirjailijavierailuja. Useimmat tapahtumat ovat maksuttomia, mutta osaan suosituimmista tilaisuuksista täytyy ilmoittautua etukäteen, koska paikkoja on rajallisesti.\n\nKirjaston aukioloaikoja on myös pidennetty. Arkisin ovet ovat auki kello 21 saakka, ja viikonloppuisin kirjasto palvelee aamupäivästä iltaan. Johtaja toivoo, että uudet palvelut houkuttelevat kirjastoon myös niitä, jotka eivät ole aiemmin käyneet siellä usein.", "teksti_de": "Die Stadtbibliothek hat ihre Räume und Dienstleistungen erneuert, um den Wünschen der Einwohner zu entsprechen. Nach dem Umbau gibt es in der Bibliothek mehr Platz als zuvor zum Arbeiten und Lernen. Die neuen Gruppenarbeitsräume kann man kostenlos online reservieren, und alle Kunden der Bibliothek dürfen sie benutzen.\n\nDie Bibliothek ist nicht mehr nur ein Ort, um Bücher auszuleihen. Jetzt können die Kunden auch Musikinstrumente, Werkzeuge und sogar Wanderausrüstung ausleihen. Laut der Leiterin der Bibliothek ist das Ziel, dass möglichst viele in der Bibliothek etwas für sich Passendes finden. Besonders beliebt waren die Sprachcafés, in denen man in entspannter Atmosphäre Finnisch und andere Sprachen üben kann.\n\nFür Familien mit Kindern wurden wöchentliche Märchenstunden und Bastelclubs organisiert. Erwachsenen werden kostenlose Vorträge und Autorenbesuche angeboten. Die meisten Veranstaltungen sind kostenlos, aber für einen Teil der beliebtesten Veranstaltungen muss man sich im Voraus anmelden, weil die Plätze begrenzt sind.\n\nDie Öffnungszeiten der Bibliothek wurden ebenfalls verlängert. Werktags sind die Türen bis 21 Uhr geöffnet, und an den Wochenenden ist die Bibliothek vom Vormittag bis zum Abend geöffnet. Die Leiterin hofft, dass die neuen Dienstleistungen auch diejenigen in die Bibliothek locken, die früher nicht oft dort waren.", "hl": ["Nyt asiakkaat voivat lainata myös soittimia, työkaluja ja jopa retkeilyvälineitä.", "Useimmat tapahtumat ovat maksuttomia, mutta osaan suosituimmista tilaisuuksista täytyy ilmoittautua etukäteen, koska paikkoja on rajallisesti.", "Arkisin ovet ovat auki kello 21 saakka, ja viikonloppuisin kirjasto palvelee aamupäivästä iltaan."], "image": "Simulaatio_07_vapaa_aika/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Mitä uutta kirjastosta voi nyt lainata?", "vaihtoehdot": ["Vain kirjoja ja lehtiä", "Soittimia, työkaluja ja retkeilyvälineitä", "Autoja ja polkupyöriä"], "oikea": "b", "selitys_fi": "Tekstin mukaan asiakkaat voivat lainata myös soittimia, työkaluja ja retkeilyvälineitä.", "vihje_de": "Man kann jetzt auch Instrumente, Werkzeuge und Wandersachen ausleihen.", "kysymys_de": "Was kann man jetzt Neues in der Bibliothek ausleihen?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Kaikkiin kirjaston tapahtumiin täytyy ilmoittautua etukäteen.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Vain osaan suosituimmista tilaisuuksista täytyy ilmoittautua etukäteen, koska paikkoja on rajallisesti.", "vihje_de": "Nur bei einigen der beliebtesten Veranstaltungen ist eine Voranmeldung nötig.", "kysymys_de": "Für alle Veranstaltungen der Bibliothek muss man sich im Voraus anmelden."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Mihin asti kirjaston ovet ovat auki arkisin?", "vaihtoehdot": [], "oikea": "Kello 21 saakka.", "selitys_fi": "Tekstin mukaan arkisin ovet ovat auki kello 21 saakka.", "vihje_de": "Werktags hat die Bibliothek bis 21 Uhr geöffnet.", "kysymys_de": "Bis wann sind die Türen der Bibliothek werktags geöffnet?"}]}], "listening": [{"otsikko": "Kuulutus uimahallissa", "tyyppi": "kuulutus", "litteraatti": "Hyvää iltapäivää, hyvät asiakkaat. Tässä tärkeä tiedote uimahallin kävijöille. Iso allas suljetaan tänään poikkeuksellisesti jo kello 18, koska illalla järjestetään uintiseuran harjoitukset. Pieni allas ja lastenallas ovat sen sijaan normaalisti auki kello 20 saakka, joten uimaan pääsee edelleen. Pahoittelemme tästä aiheutuvaa häiriötä. Muistutamme samalla, että ensi viikolla alkaa uusi vesijumppakurssi. Kurssi kokoontuu tiistaisin ja torstaisin kello 17, ja se sopii erityisesti aloittelijoille ja senioreille. Ilmoittautuminen tapahtuu uimahallin kassalla tai verkkosivuilla, ja paikkoja on rajallisesti. Huomatkaa myös, että saunaosasto on remontin vuoksi suljettu tämän viikon loppuun asti. Naisten ja miesten pukuhuoneet sekä suihkut ovat kuitenkin täysin normaalisti käytössä. Lopuksi muistutamme, että uima-altaiden reunoilla ei saa juosta turvallisuussyistä, koska lattia on liukas. Toivotamme teille kaikille rentouttavaa ja virkistävää uintihetkeä. Kiitos.", "litteraatti_de": "Guten Nachmittag, sehr geehrte Kunden. Hier eine wichtige Mitteilung für die Besucher des Schwimmbads. Das große Becken wird heute ausnahmsweise schon um 18 Uhr geschlossen, weil am Abend das Training des Schwimmvereins stattfindet. Das kleine Becken und das Kinderbecken sind dagegen normal bis 20 Uhr geöffnet, sodass man weiterhin schwimmen kann. Wir bitten die dadurch entstehende Störung zu entschuldigen. Wir erinnern gleichzeitig daran, dass nächste Woche ein neuer Wassergymnastikkurs beginnt. Der Kurs trifft sich dienstags und donnerstags um 17 Uhr, und er eignet sich besonders für Anfänger und Senioren. Die Anmeldung erfolgt an der Kasse des Schwimmbads oder auf den Internetseiten, und die Plätze sind begrenzt. Beachten Sie auch, dass der Saunabereich wegen Renovierung bis zum Ende dieser Woche geschlossen ist. Die Umkleideräume und Duschen für Frauen und Männer sind jedoch ganz normal in Benutzung. Zum Schluss erinnern wir daran, dass man aus Sicherheitsgründen an den Rändern der Schwimmbecken nicht rennen darf, weil der Boden rutschig ist. Wir wünschen Ihnen allen eine entspannende und erfrischende Schwimmzeit. Danke.", "hl": ["Iso allas suljetaan tänään poikkeuksellisesti jo kello 18, koska illalla järjestetään uintiseuran harjoitukset.", "Kurssi kokoontuu tiistaisin ja torstaisin kello 17, ja se sopii erityisesti aloittelijoille ja senioreille.", "Ilmoittautuminen tapahtuu uimahallin kassalla tai verkkosivuilla, ja paikkoja on rajallisesti.", "Huomatkaa myös, että saunaosasto on remontin vuoksi suljettu tämän viikon loppuun asti."], "audio": "Simulaatio_07_vapaa_aika/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Miksi iso allas suljetaan tänään aikaisin?", "vaihtoehdot": ["Veden lämpötilan vuoksi", "Uintiseuran harjoitusten vuoksi", "Henkilökunnan puutteen vuoksi"], "oikea": "b", "selitys_fi": "Kuulutuksen mukaan iso allas suljetaan jo kello 18, koska illalla järjestetään uintiseuran harjoitukset.", "vihje_de": "Das große Becken schließt früher wegen des Trainings des Schwimmvereins.", "kysymys_de": "Warum wird das große Becken heute früh geschlossen?"}, {"id": "Ku2", "tyyppi": "oikein-väärin", "kysymys": "Saunaosasto on tällä viikolla suljettu.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Kuulutuksessa kerrotaan, että saunaosasto on remontin vuoksi suljettu tämän viikon loppuun asti.", "vihje_de": "Der Saunabereich ist wegen Renovierung diese Woche geschlossen.", "kysymys_de": "Der Saunabereich ist diese Woche geschlossen."}, {"id": "Ku3", "tyyppi": "monivalinta", "kysymys": "Milloin uusi vesijumppakurssi kokoontuu?", "vaihtoehdot": ["Maanantaisin ja keskiviikkoisin", "Tiistaisin ja torstaisin", "Vain viikonloppuisin"], "oikea": "b", "selitys_fi": "Kurssi kokoontuu tiistaisin ja torstaisin kello 17.", "vihje_de": "Der Wassergymnastikkurs findet dienstags und donnerstags statt.", "kysymys_de": "Wann trifft sich der neue Wassergymnastikkurs?"}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Missä vesijumppakurssille voi ilmoittautua?", "vaihtoehdot": [], "oikea": "Uimahallin kassalla tai verkkosivuilla.", "selitys_fi": "Ilmoittautuminen tapahtuu uimahallin kassalla tai verkkosivuilla.", "vihje_de": "Anmeldung an der Kasse des Schwimmbads oder auf der Webseite.", "kysymys_de": "Wo kann man sich für den Wassergymnastikkurs anmelden?"}]}, {"otsikko": "Puhelu teatterin lippukassaan", "tyyppi": "puhelu", "litteraatti": "– Mies: Hei, soitan kaupunginteatterin lippukassaan. Haluaisin varata liput ensi lauantain näytökseen. Onko vielä paikkoja vapaana?\n– Nainen: Hei, kyllä, lauantain iltanäytökseen on vielä jonkin verran paikkoja. Kuinka monta lippua tarvitsette?\n– Mies: Tarvitsisin neljä lippua. Meitä on kaksi aikuista ja kaksi lasta. Onko lapsille omaa hintaa?\n– Nainen: On, alle 12-vuotiaiden lippu maksaa puolet aikuisen hinnasta. Aikuisen lippu on 30 euroa, eli lapsen lippu on 15 euroa.\n– Mies: Selvä. Otetaan kaksi aikuisten ja kaksi lasten lippua. Pääsisimmekö istumaan lähekkäin?\n– Nainen: Totta kai, varaan teille neljä vierekkäistä paikkaa keskeltä katsomoa. Sieltä näkee hyvin lavalle. Maksatteko nyt kortilla vai noudatteko liput kassalta?\n– Mies: Maksan mieluiten nyt verkkopankilla, jos se onnistuu.\n– Nainen: Onnistuu hyvin. Lähetän teille maksulinkin tekstiviestillä. Kun olette maksaneet, liput tulevat sähköpostiinne. Muistakaa tulla paikalle noin viisitoista minuuttia ennen näytöstä.", "litteraatti_de": "– Mann: Hallo, ich rufe bei der Ticketkasse des Stadttheaters an. Ich würde gern Tickets für die Vorstellung nächsten Samstag reservieren. Sind noch Plätze frei?\n– Frau: Hallo, ja, für die Abendvorstellung am Samstag gibt es noch einige Plätze. Wie viele Tickets benötigen Sie?\n– Mann: Ich bräuchte vier Tickets. Wir sind zwei Erwachsene und zwei Kinder. Gibt es für Kinder einen eigenen Preis?\n– Frau: Ja, das Ticket für unter 12-Jährige kostet die Hälfte des Erwachsenenpreises. Das Erwachsenenticket kostet 30 Euro, also kostet das Kinderticket 15 Euro.\n– Mann: Alles klar. Wir nehmen zwei Erwachsenen- und zwei Kindertickets. Könnten wir nah beieinander sitzen?\n– Frau: Selbstverständlich, ich reserviere Ihnen vier nebeneinanderliegende Plätze in der Mitte des Zuschauerraums. Von dort sieht man gut auf die Bühne. Zahlen Sie jetzt mit Karte oder holen Sie die Tickets an der Kasse ab?\n– Mann: Ich zahle am liebsten jetzt per Online-Banking, falls das möglich ist.\n– Frau: Das geht gut. Ich schicke Ihnen einen Zahlungslink per SMS. Wenn Sie bezahlt haben, kommen die Tickets in Ihre E-Mail. Denken Sie daran, etwa fünfzehn Minuten vor der Vorstellung zu erscheinen.", "hl": ["Tarvitsisin neljä lippua. Meitä on kaksi aikuista ja kaksi lasta.", "Aikuisen lippu on 30 euroa, eli lapsen lippu on 15 euroa.", "Maksan mieluiten nyt verkkopankilla, jos se onnistuu.", "Muistakaa tulla paikalle noin viisitoista minuuttia ennen näytöstä."], "audio": "Simulaatio_07_vapaa_aika/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Kuinka monta lippua mies haluaa varata?", "vaihtoehdot": ["Kaksi lippua", "Kolme lippua", "Neljä lippua"], "oikea": "c", "selitys_fi": "Mies sanoo tarvitsevansa neljä lippua: kaksi aikuista ja kaksi lasta.", "vihje_de": "Er braucht vier Tickets: zwei Erwachsene und zwei Kinder.", "kysymys_de": "Wie viele Tickets möchte der Mann reservieren?"}, {"id": "Ku6", "tyyppi": "monivalinta", "kysymys": "Paljonko lapsen lippu maksaa?", "vaihtoehdot": ["15 euroa", "30 euroa", "Lapset pääsevät ilmaiseksi"], "oikea": "a", "selitys_fi": "Aikuisen lippu on 30 euroa ja lapsen lippu puolet siitä eli 15 euroa.", "vihje_de": "Das Kinderticket kostet die Hälfte: 15 Euro.", "kysymys_de": "Wie viel kostet das Kinderticket?"}, {"id": "Ku7", "tyyppi": "oikein-väärin", "kysymys": "Mies maksaa liput verkkopankilla.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Mies sanoo maksavansa mieluiten verkkopankilla, ja myyjä lähettää hänelle maksulinkin.", "vihje_de": "Er zahlt am liebsten per Online-Banking („verkkopankki“).", "kysymys_de": "Der Mann bezahlt die Tickets per Online-Banking."}, {"id": "Ku8", "tyyppi": "lyhyt", "kysymys": "Kuinka kauan ennen näytöstä paikalle kannattaa tulla?", "vaihtoehdot": [], "oikea": "Noin viisitoista minuuttia ennen näytöstä.", "selitys_fi": "Myyjä kehottaa tulemaan paikalle noin viisitoista minuuttia ennen näytöstä.", "vihje_de": "Etwa fünfzehn Minuten vor der Vorstellung erscheinen.", "kysymys_de": "Wie lange vor der Vorstellung sollte man erscheinen?"}]}, {"otsikko": "Kaksi ystävää suunnittelee lomaa", "tyyppi": "dialogi", "litteraatti": "– Nainen: Mietin, mitä tekisin kesälomalla. Olen ajatellut, että haluaisin tehdä jotain aivan muuta kuin viime vuonna.\n– Mies: Mitä sinä viime kesänä teit?\n– Nainen: Vietin koko loman mökillä järven rannalla. Se oli rauhallista, mutta hieman tylsää. Tänä vuonna haluaisin nähdä uusia paikkoja.\n– Mies: Kuulostaa siltä, että kaipaat seikkailua. Mitä jos lähtisit vaellusreissulle? Pohjois-Suomessa on upeita reittejä, ja luonto on aivan toista kuin etelässä.\n– Nainen: Vaeltaminen kiinnostaa kyllä, mutta en ole koskaan tehnyt sitä. Pärjäisinkö, jos en ole kovin hyvässä kunnossa?\n– Mies: Aloita helpolla reitillä, niin kaikki sujuu hyvin. Voit myös liittyä ohjattuun ryhmään. Silloin opas huolehtii reitistä, etkä eksy.\n– Nainen: Se kuulostaa hyvältä. Ryhmässä olisi varmasti turvallisempaa, ja tapaisin samalla uusia ihmisiä.\n– Mies: Juuri niin. Voin etsiä sinulle muutaman vaihtoehdon netistä, jos haluat. Monet matkanjärjestäjät tarjoavat lyhyitäkin retkiä aloittelijoille.\n– Nainen: Kiitos, se olisi ihanaa. Nyt minulla on vihdoin hyvä idea kesälomaa varten.", "litteraatti_de": "– Frau: Ich überlege, was ich in den Sommerferien machen soll. Ich habe daran gedacht, dass ich gern etwas ganz anderes machen würde als letztes Jahr.\n– Mann: Was hast du letzten Sommer gemacht?\n– Frau: Ich habe die ganzen Ferien in einer Hütte am Seeufer verbracht. Es war ruhig, aber ein bisschen langweilig. Dieses Jahr würde ich gern neue Orte sehen.\n– Mann: Es klingt so, als ob du dich nach Abenteuer sehnst. Wie wäre es, wenn du auf eine Wandertour gehst? In Nordfinnland gibt es großartige Routen, und die Natur ist ganz anders als im Süden.\n– Frau: Wandern interessiert mich schon, aber ich habe es noch nie gemacht. Würde ich zurechtkommen, wenn ich nicht in sehr guter Form bin?\n– Mann: Fang mit einer leichten Route an, dann läuft alles gut. Du kannst dich auch einer geführten Gruppe anschließen. Dann kümmert sich der Guide um die Route, und du verirrst dich nicht.\n– Frau: Das klingt gut. In der Gruppe wäre es sicher sicherer, und ich würde dabei gleich neue Menschen kennenlernen.\n– Mann: Genau so. Ich kann dir ein paar Optionen im Internet suchen, wenn du willst. Viele Reiseveranstalter bieten auch kurze Touren für Anfänger an.\n– Frau: Danke, das wäre wunderbar. Jetzt habe ich endlich eine gute Idee für die Sommerferien.", "hl": ["Vietin koko loman mökillä järven rannalla.", "Vaeltaminen kiinnostaa kyllä, mutta en ole koskaan tehnyt sitä.", "Aloita helpolla reitillä, niin kaikki sujuu hyvin. Voit myös liittyä ohjattuun ryhmään. Silloin opas huolehtii reitistä, etkä eksy.", "Voin etsiä sinulle muutaman vaihtoehdon netistä, jos haluat."], "audio": "Simulaatio_07_vapaa_aika/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Mitä nainen teki viime kesälomalla?", "vaihtoehdot": ["Matkusti ulkomaille", "Vietti koko loman mökillä järven rannalla", "Kävi vaellusreissulla"], "oikea": "b", "selitys_fi": "Nainen kertoo viettäneensä viime loman mökillä järven rannalla.", "vihje_de": "Letzten Sommer war sie die ganze Zeit in einer Hütte am See.", "kysymys_de": "Was hat die Frau in den letzten Sommerferien gemacht?"}, {"id": "Ku10", "tyyppi": "oikein-väärin", "kysymys": "Nainen on vaeltanut paljon aiemmin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Nainen sanoo, ettei ole koskaan vaeltanut, ja kysyy pärjäisikö hän.", "vihje_de": "Sie hat noch nie gewandert („en ole koskaan tehnyt sitä“).", "kysymys_de": "Die Frau ist früher viel gewandert."}, {"id": "Ku11", "tyyppi": "monivalinta", "kysymys": "Miksi mies suosittelee ohjattua ryhmää?", "vaihtoehdot": ["Koska se on halvempaa", "Koska opas huolehtii reitistä eikä nainen eksy", "Koska ryhmässä saa parempaa ruokaa"], "oikea": "b", "selitys_fi": "Mies sanoo, että ohjatussa ryhmässä opas huolehtii reitistä eikä nainen eksy.", "vihje_de": "In der geführten Gruppe kümmert sich der Guide um den Weg, sie verirrt sich nicht.", "kysymys_de": "Warum empfiehlt der Mann eine geführte Gruppe?"}, {"id": "Ku12", "tyyppi": "lyhyt", "kysymys": "Mitä mies lupaa tehdä naisen puolesta?", "vaihtoehdot": [], "oikea": "Etsiä netistä muutaman vaihtoehdon (vaellusretkistä).", "selitys_fi": "Mies lupaa etsiä naiselle muutaman vaihtoehdon netistä.", "vihje_de": "Er verspricht, ihr im Internet ein paar Optionen herauszusuchen.", "kysymys_de": "Was verspricht der Mann für die Frau zu tun?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Ystäväsi on kutsunut sinut konserttiin ensi viikonloppuna. Kirjoita hänelle vastaus viestillä. Kerro, pääsetkö mukaan, kiitä kutsusta ja kysy yksi asia konsertista (esimerkiksi aika, paikka tai liput).", "ohje_de": "Ein Freund / eine Freundin hat Sie nächstes Wochenende zu einem Konzert eingeladen. Schreiben Sie eine Antwortnachricht. Sagen Sie, ob Sie mitkommen, bedanken Sie sich für die Einladung und stellen Sie eine Frage zum Konzert (z. B. Zeit, Ort oder Tickets).", "sanamaara": "80–120", "mallivastaus": "Hei Anna!\n\nKiitos paljon kutsusta, kuinka kiva yllätys! Olen iloinen, että muistit minua. Pääsen kyllä mukaan konserttiin ensi lauantaina, sillä minulla ei ole muita menoja sinä iltana. Olen kuunnellut tätä bändiä jo pitkään, joten odotan keikkaa todella innolla.\n\nMinulla on kuitenkin pari kysymystä. Mihin aikaan konsertti alkaa ja missä se järjestetään? Pitääkö meidän ostaa liput etukäteen netistä vai voiko ne ostaa vasta ovelta? Kerro myös, tavataanko jo ennen konserttia, niin voisimme syödä yhdessä.\n\nLaita viestiä, kun tiedät tarkemmat tiedot. Minä voin hoitaa matkaliput, jos haluat.\n\nNähdään pian!\n\nTerveisin\nMaria", "arviointi_fi": "Hyvä vastaus sisältää tervehdyksen ja lopputervehdyksen, vastaa kutsuun selvästi (pääsee mukaan), kiittää kutsusta ja esittää vähintään yhden kysymyksen konsertista. Sävy on epävirallinen ja ystävällinen. Kielessä sallitaan pieniä virheitä, jos viesti on ymmärrettävä ja sanamäärä täyttyy (80–120 sanaa).", "mallivastaus_de": "Hallo Anna!\n\nVielen Dank für die Einladung, was für eine schöne Überraschung! Ich freue mich, dass du an mich gedacht hast. Ich kann nächsten Samstag tatsächlich zum Konzert mitkommen, denn ich habe an dem Abend nichts anderes vor. Ich höre diese Band schon lange, deshalb freue ich mich wirklich sehr auf das Konzert.\n\nIch habe allerdings ein paar Fragen. Um welche Zeit beginnt das Konzert und wo wird es veranstaltet? Müssen wir die Tickets im Voraus online kaufen, oder kann man sie erst an der Tür kaufen? Sag mir auch, ob wir uns schon vor dem Konzert treffen, damit wir zusammen essen könnten.\n\nSchreib mir, wenn du genauere Informationen hast. Ich kann die Fahrkarten besorgen, wenn du möchtest.\n\nWir sehen uns bald!\n\nViele Grüße\nMaria"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Kirjoita kirjoitus nettifoorumille aiheesta: \"Pitäisikö kaupungin tukea enemmän nuorten harrastuksia?\" Kerro oma mielipiteesi ja perustele se. Anna ainakin kaksi perustelua ja yksi esimerkki.", "ohje_de": "Schreiben Sie einen Beitrag für ein Internetforum zum Thema: „Sollte die Stadt die Hobbys von Jugendlichen stärker fördern?“ Geben Sie Ihre eigene Meinung an und begründen Sie sie. Nennen Sie mindestens zwei Argumente und ein Beispiel.", "sanamaara": "150–200", "mallivastaus": "Mielestäni kaupungin pitäisi ehdottomasti tukea nuorten harrastuksia nykyistä enemmän. Harrastukset ovat tärkeitä monesta syystä, ja niiden hyödyt näkyvät pian koko yhteiskunnassa. Haluan perustella mielipidettäni muutamalla tärkeällä syyllä.\n\nEnsinnäkin harrastukset pitävät nuoret kiireisinä ja poissa kadulta. Kun nuorella on mielekästä tekemistä, hänellä on vähemmän aikaa ja syytä ajautua ongelmiin. Lisäksi liikunnalliset harrastukset edistävät terveyttä ja ehkäisevät yksinäisyyttä. Toiseksi harrastuksissa opitaan tärkeitä taitoja, kuten yhteistyötä, vastuuta ja pitkäjänteisyyttä. Nämä taidot ovat hyödyllisiä myöhemmin myös opinnoissa ja työelämässä.\n\nValitettavasti monet harrastukset ovat nykyään hyvin kalliita. Esimerkiksi jääkiekko tai ratsastus maksaa niin paljon, että kaikilla perheillä ei ole siihen varaa. Tämä on mielestäni epäreilua, koska jokaisella nuorella pitäisi olla mahdollisuus harrastaa varallisuudesta riippumatta. Jos kaupunki tukisi seuroja ja tarjoaisi edullisia tai jopa maksuttomia harrastuksia, useampi nuori pääsisi mukaan toimintaan.\n\nMinun mielestäni raha kannattaa siis käyttää nuoriin, koska he ovat meidän yhteinen tulevaisuutemme. Hyvinvoivat nuoret ovat paras sijoitus, jonka kaupunki voi tehdä. Toivon vilpittömästi, että päättäjät ottaisivat tämän asian vakavasti ja toimisivat pian.", "arviointi_fi": "Hyvä vastaus ilmaisee selkeän mielipiteen ja perustelee sen vähintään kahdella argumentilla sekä yhdellä konkreettisella esimerkillä. Teksti on jäsennelty kappaleisiin, ja siinä käytetään sidoksia (ensinnäkin, toiseksi, esimerkiksi). Tyyli on asiallinen mutta voi olla melko vapaa. Sanamäärä on 150–200 sanaa, ja kielen pienet virheet sallitaan, jos viesti välittyy selvästi.", "mallivastaus_de": "Meiner Meinung nach sollte die Stadt die Hobbys von Jugendlichen unbedingt stärker fördern als bisher. Hobbys sind aus vielen Gründen wichtig, und ihre Vorteile zeigen sich bald in der ganzen Gesellschaft. Ich möchte meine Meinung mit einigen wichtigen Gründen begründen.\n\nErstens halten Hobbys die Jugendlichen beschäftigt und von der Straße fern. Wenn ein Jugendlicher eine sinnvolle Beschäftigung hat, hat er weniger Zeit und Anlass, in Probleme zu geraten. Außerdem fördern sportliche Hobbys die Gesundheit und beugen Einsamkeit vor. Zweitens lernt man bei Hobbys wichtige Fähigkeiten wie Zusammenarbeit, Verantwortung und Ausdauer. Diese Fähigkeiten sind später auch im Studium und im Arbeitsleben nützlich.\n\nLeider sind viele Hobbys heutzutage sehr teuer. Zum Beispiel kostet Eishockey oder Reiten so viel, dass nicht alle Familien es sich leisten können. Das ist meiner Meinung nach unfair, weil jeder Jugendliche unabhängig vom Vermögen die Möglichkeit haben sollte, ein Hobby auszuüben. Wenn die Stadt die Vereine unterstützen und günstige oder sogar kostenlose Hobbys anbieten würde, könnten mehr Jugendliche an den Aktivitäten teilnehmen.\n\nMeiner Meinung nach lohnt es sich also, das Geld für die Jugendlichen auszugeben, weil sie unsere gemeinsame Zukunft sind. Wohlbefindende Jugendliche sind die beste Investition, die die Stadt tätigen kann. Ich hoffe aufrichtig, dass die Entscheidungsträger diese Sache ernst nehmen und bald handeln würden."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen", "ohje_fi": "Kävit hiljattain mielenkiintoisessa tapahtumassa (esimerkiksi näyttelyssä, festivaalilla tai urheilukilpailussa). Kirjoita kuvaus tapahtumasta paikallislehden lukijapalstalle. Kerro, missä ja milloin tapahtuma oli, mitä siellä tapahtui ja mitä mieltä olit siitä.", "ohje_de": "Sie waren kürzlich bei einer interessanten Veranstaltung (z. B. einer Ausstellung, einem Festival oder einem Sportwettkampf). Schreiben Sie eine Beschreibung der Veranstaltung für die Leserspalte der Lokalzeitung. Berichten Sie, wo und wann die Veranstaltung war, was dort geschah und wie sie Ihnen gefallen hat.", "sanamaara": "120–160", "mallivastaus": "Viime sunnuntaina kävin kaupungintalon aukiolla järjestetyssä ruokafestivaalissa. Tapahtuma alkoi puolenpäivän aikaan ja jatkui iltaan asti, ja paikalle oli saapunut yllättävän paljon väkeä nauttimaan hyvästä säästä ja yhteisestä tunnelmasta.\n\nAukiolla oli kymmeniä eri kojuja, joissa myytiin ruokaa monelta eri puolelta maailmaa. Maistoin muun muassa intialaisia ja meksikolaisia herkkuja, jotka olivat todella maukkaita ja sopivan edullisia. Lavalla esiintyi paikallisia muusikoita, ja pienemmille lapsille oli järjestetty oma leikkialue ohjaajan kanssa. Erityisesti pidin siitä, että tunnelma oli koko ajan rento ja iloinen.\n\nMielestäni tällaiset tapahtumat ovat hyvin tärkeitä, koska ne tuovat ihmisiä yhteen ja esittelevät meille eri kulttuureja. Ainoa pieni harmi oli se, että kaikkein suosituimmille kojuille muodostui välillä pitkiä jonoja. Kaiken kaikkiaan vietin kuitenkin oikein mukavan ja virkistävän päivän ja suosittelen tapahtumaa lämpimästi kaikille jo ensi vuonna.", "arviointi_fi": "Hyvä vastaus kuvailee tapahtuman selkeästi ja vastaa kaikkiin kohtiin: missä ja milloin tapahtuma oli, mitä siellä tapahtui ja mitä kirjoittaja siitä ajatteli. Teksti etenee loogisesti ja sisältää konkreettisia yksityiskohtia. Tyyli on kohtelias ja melko muodollinen, kuten lukijapalstalle sopii. Sanamäärä on 120–160 sanaa, ja pienet kielivirheet sallitaan, jos teksti on selkeä ja sujuva.", "mallivastaus_de": "Letzten Sonntag war ich auf einem Food-Festival, das auf dem Platz vor dem Rathaus veranstaltet wurde. Die Veranstaltung begann um die Mittagszeit und dauerte bis zum Abend, und es waren überraschend viele Leute gekommen, um das schöne Wetter und die gemeinsame Stimmung zu genießen.\n\nAuf dem Platz gab es Dutzende verschiedener Stände, an denen Essen aus vielen verschiedenen Teilen der Welt verkauft wurde. Ich probierte unter anderem indische und mexikanische Köstlichkeiten, die wirklich lecker und angemessen günstig waren. Auf der Bühne traten örtliche Musiker auf, und für die kleineren Kinder war ein eigener Spielbereich mit einem Betreuer organisiert worden. Besonders gefallen hat mir, dass die Stimmung die ganze Zeit entspannt und fröhlich war.\n\nMeiner Meinung nach sind solche Veranstaltungen sehr wichtig, weil sie Menschen zusammenbringen und uns verschiedene Kulturen vorstellen. Der einzige kleine Wermutstropfen war, dass sich an den allerbeliebtesten Ständen zeitweise lange Schlangen bildeten. Alles in allem verbrachte ich jedoch einen sehr angenehmen und erfrischenden Tag und empfehle die Veranstaltung allen schon für nächstes Jahr wärmstens."}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Tapaat naapurisi rappukäytävässä. Hän kertoo, että aloitti juuri uuden harrastuksen, kuorolaulun. Reagoi ja sano jotain ystävällistä.", "ohje_de": "Sie treffen Ihren Nachbarn im Treppenhaus. Er erzählt, dass er gerade ein neues Hobby angefangen hat: Chorsingen. Reagieren Sie und sagen Sie etwas Freundliches.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Vau, kuinka hienoa! Kuorolaulu kuulostaa todella mukavalta harrastukselta. Onnea uuteen harrastukseen, toivottavasti viihdyt siellä!", "malli_de": "Wow, wie toll! Chorsingen klingt nach einem wirklich schönen Hobby. Viel Erfolg mit dem neuen Hobby, ich hoffe, es gefällt dir dort!"}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Haluat liittyä urheiluseuraan. Soitat seuraan ja kysyt, miten voit ilmoittautua mukaan.", "ohje_de": "Sie möchten einem Sportverein beitreten. Sie rufen den Verein an und fragen, wie Sie sich anmelden können.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, olen kiinnostunut liittymään seuraanne. Voisitteko kertoa, miten ilmoittaudun mukaan ja mitä jäsenyys maksaa? Tarvitseeko minulla olla aiempaa kokemusta?", "malli_de": "Hallo, ich bin daran interessiert, eurem Verein beizutreten. Könnten Sie mir sagen, wie ich mich anmelde und was die Mitgliedschaft kostet? Brauche ich Vorerfahrung?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Ystäväsi ehdottaa, että menisitte yhdessä elokuviin tänä iltana. Sinulla ei kuitenkaan ole aikaa. Kieltäydy kohteliaasti ja ehdota toista ajankohtaa.", "ohje_de": "Ein Freund schlägt vor, dass Sie heute Abend zusammen ins Kino gehen. Sie haben jedoch keine Zeit. Lehnen Sie höflich ab und schlagen Sie einen anderen Zeitpunkt vor.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Voi harmi, tänään en valitettavasti pääse, koska minulla on jo muuta ohjelmaa. Mitä jos menisimme elokuviin ensi viikolla vaikka perjantaina? Silloin minulla olisi varmasti aikaa.", "malli_de": "Ach, schade, heute schaffe ich es leider nicht, weil ich schon etwas anderes vorhabe. Wie wäre es, wenn wir nächste Woche, etwa am Freitag, ins Kino gingen? Dann hätte ich bestimmt Zeit."}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Olet kirjastossa ja haluat lainata kirjan, mutta sinulla ei ole vielä kirjastokorttia. Kysy kirjaston työntekijältä, miten saat kortin.", "ohje_de": "Sie sind in der Bibliothek und möchten ein Buch ausleihen, haben aber noch keinen Bibliotheksausweis. Fragen Sie die Mitarbeiterin, wie Sie einen Ausweis bekommen.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, haluaisin lainata tämän kirjan, mutta minulla ei ole vielä kirjastokorttia. Voisitteko kertoa, miten saan kortin ja tarvitsenko sitä varten henkilöllisyystodistuksen?", "malli_de": "Entschuldigung, ich würde gern dieses Buch ausleihen, aber ich habe noch keinen Bibliotheksausweis. Könnten Sie mir sagen, wie ich einen Ausweis bekomme und ob ich dafür einen Personalausweis brauche?"}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Ostit lipun konserttiin, mutta et pääsekään paikalle. Soitat lipunmyyntiin ja kysyt, voitko saada rahat takaisin tai siirtää lipun toiseen näytökseen.", "ohje_de": "Sie haben eine Konzertkarte gekauft, können aber doch nicht kommen. Sie rufen den Ticketverkauf an und fragen, ob Sie das Geld zurückbekommen oder das Ticket auf eine andere Vorstellung umbuchen können.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, ostin lipun ensi lauantain konserttiin, mutta valitettavasti en pääsekään paikalle. Olisiko mahdollista saada rahat takaisin? Jos se ei onnistu, voinko siirtää lipun johonkin toiseen näytökseen?", "malli_de": "Hallo, ich habe ein Ticket für das Konzert nächsten Samstag gekauft, aber leider kann ich doch nicht kommen. Wäre es möglich, das Geld zurückzubekommen? Wenn das nicht geht, kann ich das Ticket auf eine andere Vorstellung umbuchen?"}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro tärkeästä tai mieluisasta harrastuksesta, joka sinulla on ollut tai jonka haluaisit aloittaa. Kerro, mikä harrastus on, miksi pidät siitä, milloin ja missä sitä harrastetaan ja mitä se on antanut sinulle.", "ohje_de": "Erzählen Sie von einem wichtigen oder geliebten Hobby, das Sie hatten oder gerne anfangen würden. Sagen Sie, welches Hobby es ist, warum Sie es mögen, wann und wo man es ausübt und was es Ihnen gegeben hat.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluan kertoa harrastuksesta, joka on minulle hyvin tärkeä, eli puutarhanhoidosta. Aloitin sen muutama vuosi sitten, kun muutimme taloon, jonka pihalla oli pieni puutarha. Aluksi en tiennyt kasveista juuri mitään, mutta vähitellen opin paljon uutta. Nykyään kasvatan itse vihanneksia ja yrttejä, ja kesällä vietän pihalla useita tunteja viikossa. Pidän puutarhanhoidosta erityisesti siksi, että se rauhoittaa mieltä. Kun kaivan multaa ja hoidan kasveja, unohdan työn ja arjen kiireet. On myös ihana seurata, miten pienestä siemenestä kasvaa vähitellen iso kasvi. Parasta on tietenkin se hetki, kun pääsen syömään omia, itse kasvattamiani tomaatteja. Harrastus on opettanut minulle kärsivällisyyttä, koska kaikki ei tapahdu hetkessä. Lisäksi olen tutustunut naapureihin, jotka harrastavat samaa asiaa. Voin lämpimästi suositella puutarhanhoitoa kaikille, jotka kaipaavat rentouttavaa tekemistä ulkoilmassa.", "malli_de": "Ich möchte von einem Hobby erzählen, das mir sehr wichtig ist, nämlich der Gartenarbeit. Ich habe damit vor einigen Jahren angefangen, als wir in ein Haus zogen, in dessen Garten ein kleiner Garten war. Anfangs wusste ich über Pflanzen so gut wie nichts, aber nach und nach lernte ich viel Neues. Heutzutage ziehe ich selbst Gemüse und Kräuter, und im Sommer verbringe ich mehrere Stunden pro Woche im Garten. Ich mag die Gartenarbeit besonders deshalb, weil sie den Geist beruhigt. Wenn ich in der Erde grabe und die Pflanzen pflege, vergesse ich die Arbeit und den Trubel des Alltags. Es ist auch wunderbar zu verfolgen, wie aus einem kleinen Samen nach und nach eine große Pflanze wächst. Das Beste ist natürlich der Moment, wenn ich meine eigenen, selbst gezogenen Tomaten essen kann. Das Hobby hat mir Geduld beigebracht, weil nicht alles im Nu geschieht. Außerdem habe ich die Nachbarn kennengelernt, die dasselbe als Hobby ausüben. Ich kann die Gartenarbeit allen wärmstens empfehlen, die sich nach einer entspannenden Beschäftigung an der frischen Luft sehnen."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet kurssitoimistossa ja haluat ilmoittautua valokuvauskurssille. Roolisi: Olet asiakas. Kerro, mille kurssille haluat, kysy aikatauluista ja hinnasta sekä siitä, tarvitsetko oman kameran. Keskustele kurssineuvojan kanssa.", "ohje_de": "Situation: Sie sind im Kursbüro und möchten sich für einen Fotografiekurs anmelden. Ihre Rolle: Sie sind die Kundin / der Kunde. Sagen Sie, für welchen Kurs Sie sich interessieren, fragen Sie nach Zeitplan und Preis sowie danach, ob Sie eine eigene Kamera brauchen. Führen Sie ein Gespräch mit dem Kursberater.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Asiakas: Hei, haluaisin ilmoittautua alkeistason valokuvauskurssille. Onko sellainen vielä alkamassa?\n– Neuvoja: Hei, kyllä, uusi alkeiskurssi alkaa ensi viikolla. Se kokoontuu keskiviikkoisin kello 18.\n– Asiakas: Sopii hyvin. Paljonko kurssi maksaa ja kuinka monta kertaa se kokoontuu?\n– Neuvoja: Kurssi maksaa 90 euroa, ja se kokoontuu kahdeksan kertaa. Hintaan sisältyy myös materiaali.\n– Asiakas: Hyvä. Tarvitsenko oman kameran, vai voiko sellaisen saada lainaksi?\n– Neuvoja: Oma kamera on suositeltava, mutta meiltä saa tarvittaessa lainakameran. Laitanko sinut mukaan kurssille?\n– Asiakas: Kyllä, kiitos, ilmoittaudun mielelläni mukaan.", "malli_de": "– Kunde: Hallo, ich würde mich gern für einen Fotografiekurs auf Anfängerniveau anmelden. Beginnt so einer bald?\n– Berater: Hallo, ja, ein neuer Anfängerkurs beginnt nächste Woche. Er trifft sich mittwochs um 18 Uhr.\n– Kunde: Das passt gut. Wie viel kostet der Kurs und wie oft trifft er sich?\n– Berater: Der Kurs kostet 90 Euro, und er trifft sich acht Mal. Im Preis ist auch das Material enthalten.\n– Kunde: Gut. Brauche ich eine eigene Kamera, oder kann man eine leihen?\n– Berater: Eine eigene Kamera ist empfehlenswert, aber bei Bedarf kann man bei uns eine Leihkamera bekommen. Soll ich Sie für den Kurs eintragen?\n– Kunde: Ja, danke, ich melde mich gern an."}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Sinä ja ystäväsi suunnittelette yhteistä viikonloppua. Sinä haluaisit mennä luontoretkelle, mutta ystäväsi ehdottaa kaupunkilomaa. Roolisi: Perustele oma ehdotuksesi ja yritä päästä yhteisymmärrykseen. Keskustele ystäväsi kanssa.", "ohje_de": "Situation: Sie und Ihr Freund planen ein gemeinsames Wochenende. Sie möchten gern einen Naturausflug machen, aber Ihr Freund schlägt einen Städtetrip vor. Ihre Rolle: Begründen Sie Ihren eigenen Vorschlag und versuchen Sie, eine Einigung zu erzielen. Führen Sie ein Gespräch mit Ihrem Freund.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Sinä: Mietin, että voisimme lähteä ensi viikonloppuna luontoretkelle. Sää näyttää hyvältä, ja olisi mukava päästä metsään kävelemään.\n– Ystävä: Kuulostaa kivalta, mutta minä toivoin enemmänkin kaupunkilomaa. Voisimme käydä museoissa ja syödä hyvässä ravintolassa.\n– Sinä: Ymmärrän, mutta luonnossa saamme liikuntaa ja raitista ilmaa. Olemme molemmat olleet viime aikoina paljon sisällä.\n– Ystävä: Totta. Entä jos tekisimme molempia? Voisimme lauantaina retkeillä luonnossa ja sunnuntaina käydä kaupungissa.\n– Sinä: Se on loistava idea! Näin saamme parasta molemmista. Sovitaanko, että minä etsin hyvän retkireitin ja sinä katsot museoiden aukioloajat?\n– Ystävä: Sovitaan! Tästä tulee mukava viikonloppu.", "malli_de": "– Du: Ich habe überlegt, dass wir nächstes Wochenende einen Naturausflug machen könnten. Das Wetter sieht gut aus, und es wäre schön, in den Wald zum Spazierengehen zu kommen.\n– Freund: Klingt nett, aber ich hatte eher auf einen Städtetrip gehofft. Wir könnten Museen besuchen und in einem guten Restaurant essen.\n– Du: Ich verstehe, aber in der Natur bekommen wir Bewegung und frische Luft. Wir sind beide in letzter Zeit viel drinnen gewesen.\n– Freund: Stimmt. Und wie wäre es, wenn wir beides machen würden? Wir könnten am Samstag in der Natur wandern und am Sonntag in die Stadt gehen.\n– Du: Das ist eine großartige Idee! So bekommen wir das Beste aus beidem. Vereinbaren wir, dass ich eine gute Wanderroute suche und du die Öffnungszeiten der Museen anschaust?\n– Freund: Abgemacht! Das wird ein schönes Wochenende."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse toinen aiheista ja kerro mielipiteesi. Perustele näkemyksesi ja anna esimerkkejä.\nAihe 1: Onko parempi harrastaa yksin vai ryhmässä?\nAihe 2: Pitäisikö ihmisten viettää vapaa-aikaansa enemmän kulttuurin parissa (esimerkiksi museoissa ja teatterissa) kuin ruudun ääressä?", "ohje_de": "Wählen Sie eines der Themen und äußern Sie Ihre Meinung. Begründen Sie Ihre Ansicht und geben Sie Beispiele.\nThema 1: Ist es besser, ein Hobby allein oder in der Gruppe auszuüben?\nThema 2: Sollten Menschen ihre Freizeit mehr mit Kultur (z. B. in Museen und Theatern) verbringen als vor dem Bildschirm?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen ensimmäisen aiheen eli sen, onko parempi harrastaa yksin vai ryhmässä. Minun mielestäni molemmissa on omat hyvät puolensa, mutta itse pidän enemmän ryhmässä harrastamisesta. Kerron miksi.\n\nEnsinnäkin ryhmässä harrastaminen on sosiaalista. Kun harrastaa yhdessä muiden kanssa, tapaa uusia ihmisiä ja saa ystäviä. Esimerkiksi jalkapallojoukkueessa tai kuorossa syntyy vahva yhteishenki, ja toisten tuki auttaa jatkamaan myös silloin, kun ei aina huvittaisi. Toiseksi ryhmässä on helpompi oppia uutta, koska muilta voi kysyä neuvoa ja saa heti palautetta.\n\nToisaalta ymmärrän hyvin niitä, jotka pitävät yksin harrastamisesta. Silloin saa itse päättää ajan ja paikan, eikä tarvitse sovittaa aikatauluja muiden kanssa. Esimerkiksi lukeminen, juokseminen tai maalaaminen sopivat hyvin yksin tehtäviksi, ja niistä saa rauhaa kiireisen päivän keskelle.\n\nKaiken kaikkiaan tärkeintä on, että harrastus tuo iloa. Itse valitsen kuitenkin mieluummin ryhmän, koska nautin yhdessä tekemisestä ja uusista tuttavuuksista. Mielestäni paras vaihtoehto voisi olla se, että jokaisella olisi sekä yksi yhteinen että yksi oma harrastus.", "malli_de": "Ich wähle das erste Thema, nämlich ob es besser ist, ein Hobby allein oder in der Gruppe auszuüben. Meiner Meinung nach hat beides seine eigenen guten Seiten, aber ich selbst ziehe es vor, ein Hobby in der Gruppe auszuüben. Ich sage, warum.\n\nErstens ist es sozial, ein Hobby in der Gruppe auszuüben. Wenn man gemeinsam mit anderen ein Hobby ausübt, lernt man neue Menschen kennen und bekommt Freunde. Zum Beispiel entsteht in einer Fußballmannschaft oder einem Chor ein starker Gemeinschaftsgeist, und die Unterstützung der anderen hilft auch dann weiterzumachen, wenn man nicht immer Lust hätte. Zweitens ist es in der Gruppe leichter, Neues zu lernen, weil man andere um Rat fragen kann und sofort Rückmeldung bekommt.\n\nAndererseits verstehe ich diejenigen gut, die es vorziehen, ein Hobby allein auszuüben. Dann darf man Zeit und Ort selbst bestimmen, und man muss die Zeitpläne nicht mit anderen abstimmen. Zum Beispiel eignen sich Lesen, Laufen oder Malen gut, um sie allein zu machen, und sie geben einem Ruhe inmitten eines hektischen Tages.\n\nAlles in allem ist das Wichtigste, dass ein Hobby Freude bringt. Ich selbst wähle jedoch lieber die Gruppe, weil ich das gemeinsame Tun und neue Bekanntschaften genieße. Meiner Meinung nach könnte die beste Option sein, dass jeder sowohl ein gemeinsames als auch ein eigenes Hobby hätte."}]}, {"id": 8, "teema": "Koulutus ja opiskelu", "teema_de": "Bildung und Lernen", "reading": [{"otsikko": "Kansalaisopiston kevätkurssit – ilmoittaudu ajoissa", "tyyppi": "ilmoitus", "teksti": "Tervetuloa opiskelemaan Lahden kansalaisopistoon! Kevätlukukauden uudet kurssit alkavat tammikuun toisella viikolla, ja ilmoittautuminen aukeaa keskiviikkona 8. tammikuuta kello 9. Tarjolla on yli sata kurssia: kieliä, käden taitoja, liikuntaa ja musiikkia. Suosituimmat kurssit täyttyvät nopeasti, joten kannattaa ilmoittautua heti ensimmäisenä päivänä. Ilmoittautuminen tapahtuu helpoiten verkossa opiston sivuilla, mutta voit myös soittaa toimistoon arkisin kello 10–15. Useimmat kurssit kokoontuvat kerran viikossa illalla, ja yksi kurssi maksaa noin 60–90 euroa lukukaudessa. Jos olet työtön tai eläkeläinen, saat materiaalimaksusta alennuksen. Huomaa, että kurssipaikka varmistuu vasta, kun maksu on suoritettu. Jos joudut perumaan, ilmoita siitä viimeistään viikkoa ennen kurssin alkua, niin saat rahat takaisin. Myöhemmin tehdyistä peruutuksista emme valitettavasti palauta maksua. Uutena tänä keväänä tarjoamme suomen kielen keskustelukurssin maahanmuuttajille. Kurssilla harjoitellaan arkitilanteita rennossa ilmapiirissä, eikä aiempaa kielitaitoa tarvita paljon. Lisätietoja saat opiston neuvonnasta.", "teksti_de": "Willkommen zum Lernen an der Volkshochschule Lahti! Die neuen Kurse des Frühjahrssemesters beginnen in der zweiten Januarwoche, und die Anmeldung öffnet am Mittwoch, dem 8. Januar, um 9 Uhr. Im Angebot sind über hundert Kurse: Sprachen, Handarbeit, Sport und Musik. Die beliebtesten Kurse sind schnell ausgebucht, deshalb lohnt es sich, sich gleich am ersten Tag anzumelden. Die Anmeldung erfolgt am einfachsten online auf den Seiten der Volkshochschule, aber Sie können auch werktags von 10 bis 15 Uhr im Büro anrufen. Die meisten Kurse treffen sich einmal pro Woche am Abend, und ein Kurs kostet etwa 60–90 Euro pro Semester. Wenn Sie arbeitslos oder Rentner sind, erhalten Sie eine Ermäßigung auf die Materialgebühr. Beachten Sie, dass der Kursplatz erst bestätigt wird, wenn die Zahlung geleistet ist. Wenn Sie absagen müssen, melden Sie das spätestens eine Woche vor Kursbeginn, dann erhalten Sie Ihr Geld zurück. Bei später erfolgten Absagen erstatten wir die Gebühr leider nicht. Neu in diesem Frühjahr bieten wir einen Konversationskurs für Finnisch für Zugewanderte an. Im Kurs werden Alltagssituationen in entspannter Atmosphäre geübt, und es werden nicht viele Vorkenntnisse benötigt. Weitere Informationen erhalten Sie an der Auskunft der Volkshochschule.", "hl": ["Kevätlukukauden uudet kurssit alkavat tammikuun toisella viikolla, ja ilmoittautuminen aukeaa keskiviikkona 8. tammikuuta kello 9.", "Ilmoittautuminen tapahtuu helpoiten verkossa opiston sivuilla, mutta voit myös soittaa toimistoon arkisin kello 10–15.", "Jos olet työtön tai eläkeläinen, saat materiaalimaksusta alennuksen.", "Jos joudut perumaan, ilmoita siitä viimeistään viikkoa ennen kurssin alkua, niin saat rahat takaisin."], "image": null, "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Milloin kurssien ilmoittautuminen alkaa?", "vaihtoehdot": ["Tammikuun ensimmäisellä viikolla", "Keskiviikkona 8. tammikuuta", "Heti joulun jälkeen"], "oikea": "b", "selitys_fi": "Tekstissä sanotaan, että ilmoittautuminen aukeaa keskiviikkona 8. tammikuuta kello 9.", "vihje_de": "„aukeaa“ = öffnet; achten Sie auf das genaue Datum.", "kysymys_de": "Wann beginnt die Anmeldung für die Kurse?"}, {"id": "L2", "tyyppi": "monivalinta", "kysymys": "Miten kurssille kannattaa ilmoittautua helpoiten?", "vaihtoehdot": ["Käymällä toimistossa", "Verkossa opiston sivuilla", "Lähettämällä kirjeen"], "oikea": "b", "selitys_fi": "Tekstin mukaan ilmoittautuminen tapahtuu helpoiten verkossa opiston sivuilla.", "vihje_de": "„verkossa“ = im Internet/online.", "kysymys_de": "Wie meldet man sich am einfachsten für einen Kurs an?"}, {"id": "L3", "tyyppi": "oikein-väärin", "kysymys": "Kurssipaikka on varma heti, kun ilmoittautuu.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Kurssipaikka varmistuu vasta, kun maksu on suoritettu.", "vihje_de": "„varmistuu“ = wird bestätigt – erst nach Zahlung.", "kysymys_de": "Der Kursplatz ist sofort sicher, sobald man sich anmeldet."}, {"id": "L4", "tyyppi": "oikein-väärin", "kysymys": "Työtön opiskelija saa alennuksen materiaalimaksusta.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstissä kerrotaan, että työtön tai eläkeläinen saa materiaalimaksusta alennuksen.", "vihje_de": "„alennus“ = Ermäßigung/Rabatt.", "kysymys_de": "Ein arbeitsloser Studierender erhält eine Ermäßigung auf die Materialgebühr."}, {"id": "L5", "tyyppi": "lyhyt", "kysymys": "Mihin mennessä peruutus pitää tehdä, jotta saa rahat takaisin?", "vaihtoehdot": [], "oikea": "Viimeistään viikkoa ennen kurssin alkua.", "selitys_fi": "Maksu palautetaan vain, jos peruutus tehdään viimeistään viikkoa ennen kurssin alkua.", "vihje_de": "„viimeistään viikkoa ennen“ = spätestens eine Woche vorher.", "kysymys_de": "Bis wann muss die Absage erfolgen, damit man das Geld zurückbekommt?"}]}, {"otsikko": "Näin ilmoittaudut kielikurssille verkossa", "tyyppi": "ohje", "teksti": "Verkkoilmoittautuminen on nopeaa, kun toimit ohjeiden mukaan. Aloita kirjautumalla opiston verkkopalveluun omilla tunnuksillasi. Jos sinulla ei vielä ole tunnuksia, luo ne ensin etusivun kohdasta „Uusi käyttäjä“. Tarvitset rekisteröitymiseen sähköpostiosoitteen ja suomalaisen puhelinnumeron. Kun olet kirjautunut, etsi haluamasi kurssi hakukentästä. Voit rajata hakua aiheen, tason tai opetuspaikan mukaan. Lue kurssin kuvaus huolellisesti ja tarkista erityisesti taso, sillä liian vaikea tai liian helppo kurssi ei vie kielitaitoasi eteenpäin. Jos olet epävarma omasta tasostasi, tee sivuilla oleva lyhyt tasotesti. Kun olet löytänyt sopivan kurssin, paina painiketta „Ilmoittaudu“. Järjestelmä kysyy vielä, haluatko laskun sähköpostiisi vai paperilla. Suosittelemme sähköistä laskua, koska se on ympäristöystävällisempi ja saapuu heti. Lopuksi saat vahvistusviestin, jossa lukevat kurssin aika, paikka ja hinta. Säilytä viesti, sillä tarvitset sitä, jos haluat myöhemmin perua tai siirtää kurssin. Ongelmatilanteissa ota yhteyttä asiakaspalveluun chatissa.", "teksti_de": "Die Online-Anmeldung geht schnell, wenn Sie nach der Anleitung vorgehen. Beginnen Sie damit, sich mit Ihren eigenen Zugangsdaten beim Online-Dienst der Volkshochschule anzumelden. Wenn Sie noch keine Zugangsdaten haben, erstellen Sie diese zuerst auf der Startseite unter dem Punkt „Neuer Benutzer“. Für die Registrierung benötigen Sie eine E-Mail-Adresse und eine finnische Telefonnummer. Wenn Sie angemeldet sind, suchen Sie den gewünschten Kurs im Suchfeld. Sie können die Suche nach Thema, Niveau oder Unterrichtsort eingrenzen. Lesen Sie die Kursbeschreibung sorgfältig und überprüfen Sie besonders das Niveau, denn ein zu schwerer oder zu leichter Kurs bringt Ihre Sprachkenntnisse nicht weiter. Wenn Sie sich über Ihr eigenes Niveau unsicher sind, machen Sie den kurzen Einstufungstest auf den Seiten. Wenn Sie einen passenden Kurs gefunden haben, drücken Sie auf die Schaltfläche „Anmelden“. Das System fragt noch, ob Sie die Rechnung per E-Mail oder auf Papier möchten. Wir empfehlen die elektronische Rechnung, weil sie umweltfreundlicher ist und sofort ankommt. Zum Schluss erhalten Sie eine Bestätigungsnachricht, in der Zeit, Ort und Preis des Kurses stehen. Bewahren Sie die Nachricht auf, denn Sie brauchen sie, falls Sie den Kurs später absagen oder verschieben möchten. Bei Problemen wenden Sie sich an den Kundenservice im Chat.", "hl": ["Tarvitset rekisteröitymiseen sähköpostiosoitteen ja suomalaisen puhelinnumeron.", "Jos olet epävarma omasta tasostasi, tee sivuilla oleva lyhyt tasotesti.", "Suosittelemme sähköistä laskua, koska se on ympäristöystävällisempi ja saapuu heti.", "Säilytä viesti, sillä tarvitset sitä, jos haluat myöhemmin perua tai siirtää kurssin."], "image": "Simulaatio_08_koulutus/images/teksti2.jpg", "items": [{"id": "L6", "tyyppi": "monivalinta", "kysymys": "Mitä rekisteröityminen vaatii?", "vaihtoehdot": ["Sähköpostiosoitteen ja suomalaisen puhelinnumeron", "Vain sähköpostiosoitteen", "Pankkitunnukset"], "oikea": "a", "selitys_fi": "Tekstin mukaan rekisteröitymiseen tarvitaan sähköpostiosoite ja suomalainen puhelinnumero.", "vihje_de": "„rekisteröityminen“ = Registrierung.", "kysymys_de": "Was erfordert die Registrierung?"}, {"id": "L7", "tyyppi": "monivalinta", "kysymys": "Mitä kannattaa tehdä, jos ei tiedä omaa tasoaan?", "vaihtoehdot": ["Valita helpoin kurssi", "Tehdä sivuilla oleva tasotesti", "Soittaa opettajalle"], "oikea": "b", "selitys_fi": "Epävarmassa tilanteessa ohje neuvoo tekemään lyhyen tasotestin.", "vihje_de": "„tasotesti“ = Einstufungstest.", "kysymys_de": "Was lohnt es sich zu tun, wenn man sein eigenes Niveau nicht kennt?"}, {"id": "L8", "tyyppi": "oikein-väärin", "kysymys": "Ohje suosittelee paperilaskua.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Ohje suosittelee sähköistä laskua, koska se on ympäristöystävällisempi ja saapuu heti.", "vihje_de": "„suosittelee“ = empfiehlt; hier die elektronische Rechnung.", "kysymys_de": "Die Anleitung empfiehlt die Papierrechnung."}, {"id": "L9", "tyyppi": "lyhyt", "kysymys": "Miksi vahvistusviesti kannattaa säilyttää?", "vaihtoehdot": [], "oikea": "Sitä tarvitsee, jos haluaa perua tai siirtää kurssin.", "selitys_fi": "Tekstin mukaan viestiä tarvitaan myöhemmin kurssin peruuttamiseen tai siirtämiseen.", "vihje_de": "„säilyttää“ = aufbewahren.", "kysymys_de": "Warum sollte man die Bestätigungsnachricht aufbewahren?"}, {"id": "L10", "tyyppi": "monivalinta", "kysymys": "Mistä saa apua ongelmatilanteissa?", "vaihtoehdot": ["Asiakaspalvelun chatista", "Etusivun videolta", "Toiselta opiskelijalta"], "oikea": "a", "selitys_fi": "Ohjeen lopussa kehotetaan ottamaan yhteyttä asiakaspalveluun chatissa.", "vihje_de": "„ongelmatilanne“ = Problemfall.", "kysymys_de": "Wo bekommt man bei Problemen Hilfe?"}]}, {"otsikko": "Tiedote: lähiopetus palaa syksyllä", "tyyppi": "tiedote", "teksti": "Hyvät opiskelijat, haluamme tiedottaa tulevan syyslukukauden järjestelyistä. Viime vuosina osa opetuksesta on toteutettu etänä, mutta syksystä alkaen suurin osa kursseista palaa lähiopetukseen oppilaitoksen tiloihin. Päätös perustuu opiskelijoilta saatuun palautteeseen: moni kaipasi takaisin luokkahuoneeseen, jossa keskustelu ja yhteistyö sujuvat luontevammin. Etäopetus ei kuitenkaan poistu kokonaan. Tarjoamme jatkossakin muutamia verkkokursseja niille, jotka asuvat kaukana tai joiden työ vaatii joustavuutta. Verkkokurssit on merkitty ohjelmaan selvästi sanalla „etä“. Muistutamme, että lähiopetukseen osallistuminen edellyttää läsnäoloa vähintään 80 prosentissa tapaamisista, jos haluaa kurssitodistuksen. Poissaoloista kannattaa ilmoittaa opettajalle etukäteen. Kirjasto ja opiskelijoiden työtilat ovat avoinna arkisin kello kahdeksasta kahteenkymmeneen, ja niitä voi käyttää myös silloin, kun ei ole oppituntia. Tiloissa on rauhallista, ja siellä on helppo keskittyä omaan opiskeluun tai tehdä ryhmätöitä yhdessä muiden kanssa. Toivotamme kaikille antoisaa ja sujuvaa lukukautta. Lisätietoja tulevista kursseista ja aikatauluista löydät oppilaitoksen verkkosivuilta tai voit kysyä neuvoa opinto-ohjaajalta.", "teksti_de": "Liebe Studierende, wir möchten Sie über die Organisation des kommenden Herbstsemesters informieren. In den letzten Jahren wurde ein Teil des Unterrichts aus der Ferne durchgeführt, aber ab dem Herbst kehrt der Großteil der Kurse zum Präsenzunterricht in den Räumen der Bildungseinrichtung zurück. Die Entscheidung beruht auf dem von den Studierenden erhaltenen Feedback: Viele sehnten sich zurück ins Klassenzimmer, wo Gespräch und Zusammenarbeit natürlicher gelingen. Der Fernunterricht verschwindet jedoch nicht völlig. Wir bieten auch weiterhin einige Online-Kurse für diejenigen an, die weit weg wohnen oder deren Arbeit Flexibilität erfordert. Die Online-Kurse sind im Programm deutlich mit dem Wort „Fern“ gekennzeichnet. Wir erinnern daran, dass die Teilnahme am Präsenzunterricht Anwesenheit bei mindestens 80 Prozent der Treffen voraussetzt, wenn man eine Kursbescheinigung möchte. Abwesenheiten sollte man der Lehrkraft im Voraus melden. Die Bibliothek und die Arbeitsräume der Studierenden sind werktags von acht bis zwanzig Uhr geöffnet, und man kann sie auch dann nutzen, wenn gerade kein Unterricht ist. In den Räumen ist es ruhig, und dort kann man sich leicht auf das eigene Lernen konzentrieren oder gemeinsam mit anderen Gruppenarbeiten machen. Wir wünschen allen ein ertragreiches und reibungsloses Semester. Weitere Informationen zu den kommenden Kursen und Zeitplänen finden Sie auf der Website der Bildungseinrichtung, oder Sie können sich bei der Studienberatung Rat holen.", "hl": ["Päätös perustuu opiskelijoilta saatuun palautteeseen: moni kaipasi takaisin luokkahuoneeseen, jossa keskustelu ja yhteistyö sujuvat luontevammin.", "Etäopetus ei kuitenkaan poistu kokonaan.", "Muistutamme, että lähiopetukseen osallistuminen edellyttää läsnäoloa vähintään 80 prosentissa tapaamisista, jos haluaa kurssitodistuksen.", "Kirjasto ja opiskelijoiden työtilat ovat avoinna arkisin kello kahdeksasta kahteenkymmeneen, ja niitä voi käyttää myös silloin, kun ei ole oppituntia."], "image": "Simulaatio_08_koulutus/images/teksti3.jpg", "items": [{"id": "L11", "tyyppi": "monivalinta", "kysymys": "Mihin syksyn päätös lähiopetuksesta perustuu?", "vaihtoehdot": ["Säästöihin", "Opiskelijoilta saatuun palautteeseen", "Uuteen lakiin"], "oikea": "b", "selitys_fi": "Tekstin mukaan päätös perustuu opiskelijoilta saatuun palautteeseen.", "vihje_de": "„perustuu palautteeseen“ = beruht auf dem Feedback.", "kysymys_de": "Worauf beruht die Herbstentscheidung über den Präsenzunterricht?"}, {"id": "L12", "tyyppi": "oikein-väärin", "kysymys": "Kaikki etäopetus loppuu syksyllä kokonaan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Etäopetus ei poistu kokonaan, sillä muutamia verkkokursseja tarjotaan edelleen.", "vihje_de": "„ei poistu kokonaan“ = verschwindet nicht völlig.", "kysymys_de": "Der gesamte Fernunterricht endet im Herbst vollständig."}, {"id": "L13", "tyyppi": "lyhyt", "kysymys": "Kuinka suuri läsnäolo vaaditaan kurssitodistuksen saamiseksi?", "vaihtoehdot": [], "oikea": "Vähintään 80 prosenttia tapaamisista.", "selitys_fi": "Kurssitodistuksen saaminen edellyttää läsnäoloa vähintään 80 prosentissa tapaamisista.", "vihje_de": "„läsnäolo“ = Anwesenheit.", "kysymys_de": "Wie hoch muss die Anwesenheit sein, um die Kursbescheinigung zu erhalten?"}, {"id": "L14", "tyyppi": "monivalinta", "kysymys": "Milloin kirjasto ja työtilat ovat avoinna?", "vaihtoehdot": ["Vain oppituntien aikana", "Arkisin kello 8–20", "Joka päivä ympäri vuorokauden"], "oikea": "b", "selitys_fi": "Kirjasto ja työtilat ovat avoinna arkisin kello kahdeksasta kahteenkymmeneen.", "vihje_de": "„arkisin“ = werktags; „kahdeksasta kahteenkymmeneen“ = von 8 bis 20 Uhr.", "kysymys_de": "Wann sind die Bibliothek und die Arbeitsräume geöffnet?"}]}, {"otsikko": "Blogi: aloitin opiskelun uudelleen aikuisena", "tyyppi": "blogi", "teksti": "Olen Theresia, ja muutin Suomeen muutama vuosi sitten. Pitkän tauon jälkeen päätin viime syksynä palata koulun penkille ja parantaa suomen kieltäni. Aluksi jännitin kovasti: olisinko liian vanha oppimaan, ja muistaisiko aivoni enää mitään? Pelkoni oli turha. Huomasin pian, että aikuisena opiskelu on monella tavalla helpompaa kuin nuorena. Tiedän nyt, miksi opiskelen, ja osaan suunnitella aikani paremmin. Vaikein osa ei ollutkaan kielioppi vaan ajan löytäminen kiireisen työn ohella. Ratkaisin ongelman opiskelemalla pieninä paloina: kuuntelen suomenkielisiä podcasteja työmatkalla ja luen muutaman sivun joka ilta ennen nukkumaanmenoa. Paras vinkkini muille aikuisopiskelijoille on, ettei kannata vertailla itseään muihin. Jokainen oppii omaan tahtiinsa, ja pienikin edistys on edistystä. Olen myös huomannut, että virheet ovat osa oppimista. Ennen häpesin niitä, mutta nyt nauran niille ja yritän uudelleen. Ensi keväänä aion osallistua kielitutkintoon. En tiedä, läpäisenkö sen heti, mutta tärkeintä on, että nautin matkasta enkä pelkää enää epäonnistumista.", "teksti_de": "Ich bin Theresia und bin vor einigen Jahren nach Finnland gezogen. Nach einer langen Pause beschloss ich letzten Herbst, wieder die Schulbank zu drücken und mein Finnisch zu verbessern. Anfangs war ich sehr aufgeregt: Wäre ich zu alt zum Lernen, und würde sich mein Gehirn überhaupt noch etwas merken? Meine Angst war unbegründet. Ich merkte bald, dass das Lernen als Erwachsene in vieler Hinsicht leichter ist als in jungen Jahren. Ich weiß jetzt, warum ich lerne, und ich kann meine Zeit besser planen. Der schwierigste Teil war doch nicht die Grammatik, sondern das Finden von Zeit neben der anstrengenden Arbeit. Ich löste das Problem, indem ich in kleinen Häppchen lernte: Ich höre auf dem Arbeitsweg finnischsprachige Podcasts und lese jeden Abend vor dem Schlafengehen ein paar Seiten. Mein bester Tipp für andere erwachsene Lernende ist, dass man sich nicht mit anderen vergleichen sollte. Jeder lernt in seinem eigenen Tempo, und auch ein kleiner Fortschritt ist ein Fortschritt. Ich habe auch bemerkt, dass Fehler Teil des Lernens sind. Früher schämte ich mich dafür, aber jetzt lache ich darüber und versuche es erneut. Nächstes Frühjahr will ich an einer Sprachprüfung teilnehmen. Ich weiß nicht, ob ich sie gleich bestehe, aber das Wichtigste ist, dass ich die Reise genieße und keine Angst mehr vor dem Scheitern habe.", "hl": ["Vaikein osa ei ollutkaan kielioppi vaan ajan löytäminen kiireisen työn ohella.", "Ratkaisin ongelman opiskelemalla pieninä paloina: kuuntelen suomenkielisiä podcasteja työmatkalla ja luen muutaman sivun joka ilta ennen nukkumaanmenoa."], "image": "Simulaatio_08_koulutus/images/teksti4.jpg", "items": [{"id": "L15", "tyyppi": "monivalinta", "kysymys": "Mikä oli kirjoittajalle opiskelun vaikein osa?", "vaihtoehdot": ["Kielioppi", "Ajan löytäminen", "Muiden opiskelijoiden kanssa juttelu"], "oikea": "b", "selitys_fi": "Kirjoittaja kertoo, ettei vaikein osa ollut kielioppi vaan ajan löytäminen kiireisen työn ohella.", "vihje_de": "„ajan löytäminen“ = Zeit zu finden.", "kysymys_de": "Was war für die Verfasserin der schwierigste Teil des Lernens?"}]}], "listening": [{"otsikko": "Infotilaisuus aikuisopiskelusta", "tyyppi": "monologi", "litteraatti": "Hyvää iltaa kaikille ja tervetuloa tähän infotilaisuuteen. Olen opinto-ohjaaja ja kerron lyhyesti, miten voitte aloittaa opinnot meidän oppilaitoksessamme aikuisena. Moni teistä käy päivisin töissä, joten suurin osa kursseistamme järjestetään iltaisin tai viikonloppuisin. Ennen kurssin valintaa suosittelen, että varaatte ajan henkilökohtaiseen ohjaukseen. Yhdessä mietimme, mi
