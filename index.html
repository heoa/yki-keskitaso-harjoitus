kä kurssi sopii teidän tavoitteisiinne ja elämäntilanteeseenne. Opiskelu on meillä maksullista, mutta hinnat ovat kohtuullisia, ja monille kursseille voi hakea tukea. Jos suoritatte kurssin loppuun, saatte siitä todistuksen, josta voi olla hyötyä työnhaussa. Haluan vielä muistuttaa, että opiskelu ei lopu tähän iltaan: kannattaa jutella muiden opiskelijoiden kanssa ja perustaa vaikka oma ryhmä, jossa harjoittelette yhdessä. Kysymyksiä voitte esittää nyt tai jäädä juttelemaan tilaisuuden jälkeen. Kahvia ja pientä purtavaa on tarjolla aulassa.", "litteraatti_de": "Guten Abend allerseits und herzlich willkommen zu dieser Informationsveranstaltung. Ich bin Studienberater und erzähle Ihnen kurz, wie Sie als Erwachsene das Lernen an unserer Bildungseinrichtung beginnen können. Viele von Ihnen arbeiten tagsüber, deshalb werden die meisten unserer Kurse abends oder an Wochenenden angeboten. Vor der Kurswahl empfehle ich Ihnen, einen Termin für eine persönliche Beratung zu vereinbaren. Gemeinsam überlegen wir, welcher Kurs zu Ihren Zielen und Ihrer Lebenssituation passt. Das Lernen ist bei uns kostenpflichtig, aber die Preise sind angemessen, und für viele Kurse kann man Unterstützung beantragen. Wenn Sie einen Kurs zu Ende absolvieren, erhalten Sie dafür eine Bescheinigung, die bei der Jobsuche nützlich sein kann. Ich möchte noch daran erinnern, dass das Lernen nicht mit diesem Abend endet: Es lohnt sich, mit anderen Studierenden zu sprechen und vielleicht eine eigene Gruppe zu gründen, in der Sie zusammen üben. Fragen können Sie jetzt stellen oder nach der Veranstaltung zum Plaudern bleiben. Kaffee und ein kleiner Imbiss stehen in der Eingangshalle bereit.", "hl": ["Moni teistä käy päivisin töissä, joten suurin osa kursseistamme järjestetään iltaisin tai viikonloppuisin.", "Ennen kurssin valintaa suosittelen, että varaatte ajan henkilökohtaiseen ohjaukseen.", "Opiskelu on meillä maksullista, mutta hinnat ovat kohtuullisia, ja monille kursseille voi hakea tukea."], "audio": "Simulaatio_08_koulutus/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Milloin suurin osa kursseista järjestetään?", "vaihtoehdot": ["Aamuisin", "Iltaisin tai viikonloppuisin", "Vain kesällä"], "oikea": "b", "selitys_fi": "Puhuja kertoo, että suurin osa kursseista järjestetään iltaisin tai viikonloppuisin, koska moni käy päivisin töissä.", "vihje_de": "„iltaisin“ = abends, „viikonloppuisin“ = an Wochenenden.", "kysymys_de": "Wann werden die meisten Kurse angeboten?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Mitä opinto-ohjaaja suosittelee ennen kurssin valintaa?", "vaihtoehdot": ["Henkilökohtaisen ohjauksen varaamista", "Maksun maksamista heti", "Testin tekemistä"], "oikea": "a", "selitys_fi": "Puhuja suosittelee varaamaan ajan henkilökohtaiseen ohjaukseen ennen kurssin valintaa.", "vihje_de": "„henkilökohtainen ohjaus“ = persönliche Beratung.", "kysymys_de": "Was empfiehlt der Studienberater vor der Kurswahl?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Opiskelu oppilaitoksessa on ilmaista.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Puhuja sanoo, että opiskelu on maksullista, vaikka hinnat ovat kohtuullisia.", "vihje_de": "„maksullista“ = kostenpflichtig, das Gegenteil von gratis.", "kysymys_de": "Das Lernen an der Bildungseinrichtung ist kostenlos."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Mistä todistuksesta voi olla hyötyä?", "vaihtoehdot": [], "oikea": "Kurssin suorittamisesta saatavasta todistuksesta (työnhaussa).", "selitys_fi": "Kurssin loppuun suorittamisesta saa todistuksen, josta voi olla hyötyä työnhaussa.", "vihje_de": "„todistus“ = Zeugnis/Bescheinigung; „työnhaku“ = Jobsuche.", "kysymys_de": "Welche Bescheinigung kann nützlich sein?"}]}, {"otsikko": "Neuvontapuhelu kielikurssista", "tyyppi": "puhelu", "litteraatti": "– Nainen: Hei, soitan kansalaisopiston neuvontaan. Haluaisin ilmoittautua suomen kielen kurssille, mutta en ole varma, mikä taso sopii minulle.\n– Opinto-ohjaaja: Hei ja tervetuloa! Autan mielelläni. Kauanko olet opiskellut suomea?\n– Nainen: Noin vuoden verran. Ymmärrän puhetta jo aika hyvin, mutta puhuminen tuntuu vaikealta.\n– Opinto-ohjaaja: Kuulostaa siltä, että keskitason keskustelukurssi sopisi sinulle hyvin. Siellä harjoitellaan nimenomaan puhumista arkitilanteissa.\n– Nainen: Hienoa. Milloin kurssi alkaa ja kuinka usein se kokoontuu?\n– Opinto-ohjaaja: Kurssi alkaa helmikuun alussa ja kokoontuu kerran viikossa, tiistai-iltaisin kello kuudesta puoli kahdeksaan.\n– Nainen: Sopii minulle hyvin. Pitääkö minun ostaa kirja?\n– Opinto-ohjaaja: Ei tarvitse ostaa erikseen. Opettaja jakaa materiaalin tunnilla, ja se sisältyy kurssimaksuun.\n– Nainen: Selvä. Voinko ilmoittautua heti puhelimessa?\n– Opinto-ohjaaja: Voit. Otan tietosi ylös, niin saat vahvistuksen sähköpostiin tämän päivän aikana.\n– Nainen: Kiitos paljon avusta!", "litteraatti_de": "– Frau: Hallo, ich rufe bei der Auskunft der Volkshochschule an. Ich würde mich gern für einen Finnischkurs anmelden, bin mir aber nicht sicher, welches Niveau zu mir passt.\n– Studienberater: Hallo und willkommen! Ich helfe gerne. Wie lange haben Sie schon Finnisch gelernt?\n– Frau: Etwa ein Jahr. Ich verstehe die gesprochene Sprache schon ziemlich gut, aber das Sprechen fällt mir schwer.\n– Studienberater: Das klingt so, als würde ein Konversationskurs der Mittelstufe gut zu Ihnen passen. Dort wird gerade das Sprechen in Alltagssituationen geübt.\n– Frau: Toll. Wann beginnt der Kurs und wie oft trifft er sich?\n– Studienberater: Der Kurs beginnt Anfang Februar und trifft sich einmal pro Woche, dienstagabends von sechs bis halb acht.\n– Frau: Das passt mir gut. Muss ich ein Buch kaufen?\n– Studienberater: Sie müssen nichts gesondert kaufen. Die Lehrkraft verteilt das Material im Unterricht, und es ist in der Kursgebühr enthalten.\n– Frau: Alles klar. Kann ich mich gleich am Telefon anmelden?\n– Studienberater: Das können Sie. Ich nehme Ihre Daten auf, dann erhalten Sie noch im Laufe des heutigen Tages eine Bestätigung per E-Mail.\n– Frau: Vielen Dank für die Hilfe!", "hl": ["Ymmärrän puhetta jo aika hyvin, mutta puhuminen tuntuu vaikealta.", "Kuulostaa siltä, että keskitason keskustelukurssi sopisi sinulle hyvin.", "Kurssi alkaa helmikuun alussa ja kokoontuu kerran viikossa, tiistai-iltaisin kello kuudesta puoli kahdeksaan."], "audio": "Simulaatio_08_koulutus/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Mikä on naiselle vaikeaa suomen kielessä?", "vaihtoehdot": ["Puheen ymmärtäminen", "Puhuminen", "Lukeminen"], "oikea": "b", "selitys_fi": "Nainen kertoo ymmärtävänsä puhetta jo hyvin, mutta puhuminen tuntuu vaikealta.", "vihje_de": "„puhuminen“ = das Sprechen.", "kysymys_de": "Was fällt der Frau im Finnischen schwer?"}, {"id": "Ku6", "tyyppi": "monivalinta", "kysymys": "Minkä kurssin opinto-ohjaaja suosittelee?", "vaihtoehdot": ["Alkeiskurssin", "Keskitason keskustelukurssin", "Kirjoituskurssin"], "oikea": "b", "selitys_fi": "Ohjaaja suosittelee keskitason keskustelukurssia, jossa harjoitellaan puhumista arkitilanteissa.", "vihje_de": "„keskustelukurssi“ = Konversationskurs.", "kysymys_de": "Welchen Kurs empfiehlt der Studienberater?"}, {"id": "Ku7", "tyyppi": "lyhyt", "kysymys": "Milloin kurssi kokoontuu?", "vaihtoehdot": [], "oikea": "Kerran viikossa, tiistai-iltaisin kello 18–19.30.", "selitys_fi": "Ohjaaja kertoo, että kurssi kokoontuu kerran viikossa tiistai-iltaisin kello kuudesta puoli kahdeksaan.", "vihje_de": "„kerran viikossa“ = einmal pro Woche; „puoli kahdeksaan“ = bis halb acht (19.30).", "kysymys_de": "Wann trifft sich der Kurs?"}, {"id": "Ku8", "tyyppi": "oikein-väärin", "kysymys": "Naisen täytyy ostaa kurssikirja erikseen.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Opettaja jakaa materiaalin tunnilla, ja se sisältyy kurssimaksuun, joten kirjaa ei tarvitse ostaa erikseen.", "vihje_de": "„sisältyy kurssimaksuun“ = ist in der Kursgebühr enthalten.", "kysymys_de": "Die Frau muss das Kursbuch gesondert kaufen."}]}, {"otsikko": "Kahden opiskelijan keskustelu opiskelutavoista", "tyyppi": "dialogi", "litteraatti": "– Mies: Hei Anna, näytät väsyneeltä. Onko kaikki hyvin?\n– Nainen: Hei Jukka. Joo, olen vain valvonut myöhään, kun luin koko illan tenttiin. En vain tunnu muistavan mitään.\n– Mies: Tunnen tuon hyvin. Minulle ei toimi pitkä lukeminen kerralla. Opin parhaiten, kun pidän taukoja ja teen harjoituksia välillä.\n– Nainen: Niinkö? En ole oikein kokeillut sitä. Minä yleensä vain luen tekstin uudelleen ja uudelleen.\n– Mies: Pelkkä lukeminen ei riitä minulle. Kokeile vaikka selittää asia ääneen omin sanoin, ihan kuin opettaisit sitä jollekin toiselle. Silloin huomaat heti, mitä et vielä ymmärrä.\n– Nainen: Tuo kuulostaa järkevältä. Ehkä voisimme opiskella joskus yhdessä ja kysellä toisiltamme.\n– Mies: Hyvä idea! Yhdessä opiskelu auttaa minua pysymään hereillä ja motivoituneena. Varataanko kirjastosta ryhmätila ensi viikoksi?\n– Nainen: Varataan. Kiitos, että jaksoit kuunnella. Tunnen jo oloni vähän paremmaksi.\n– Mies: Eipä kestä. Muista myös nukkua tarpeeksi, se on yhtä tärkeää kuin itse lukeminen.", "litteraatti_de": "– Mann: Hallo Anna, du siehst müde aus. Ist alles in Ordnung?\n– Frau: Hallo Jukka. Ja, ich bin nur lange wach geblieben, weil ich den ganzen Abend für die Prüfung gelernt habe. Ich scheine mir einfach nichts merken zu können.\n– Mann: Das kenne ich gut. Bei mir funktioniert langes Lesen am Stück nicht. Ich lerne am besten, wenn ich Pausen mache und zwischendurch Übungen mache.\n– Frau: Wirklich? Das habe ich noch nicht so richtig ausprobiert. Ich lese meistens einfach den Text immer wieder.\n– Mann: Nur Lesen reicht mir nicht. Versuch doch mal, die Sache laut mit eigenen Worten zu erklären, ganz so, als würdest du sie jemand anderem beibringen. Dann merkst du sofort, was du noch nicht verstehst.\n– Frau: Das klingt sinnvoll. Vielleicht könnten wir mal zusammen lernen und uns gegenseitig abfragen.\n– Mann: Gute Idee! Gemeinsam zu lernen hilft mir, wach und motiviert zu bleiben. Sollen wir für nächste Woche einen Gruppenraum in der Bibliothek reservieren?\n– Frau: Lass uns das reservieren. Danke, dass du zugehört hast. Ich fühle mich schon ein bisschen besser.\n– Mann: Gern geschehen. Denk auch daran, genug zu schlafen, das ist genauso wichtig wie das Lernen selbst.", "hl": ["Opin parhaiten, kun pidän taukoja ja teen harjoituksia välillä.", "Kokeile vaikka selittää asia ääneen omin sanoin, ihan kuin opettaisit sitä jollekin toiselle.", "Muista myös nukkua tarpeeksi, se on yhtä tärkeää kuin itse lukeminen."], "audio": "Simulaatio_08_koulutus/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Miksi Anna on väsynyt?", "vaihtoehdot": ["Hän on ollut töissä", "Hän valvoi myöhään lukien tenttiin", "Hän on sairas"], "oikea": "b", "selitys_fi": "Anna kertoo valvoneensa myöhään, koska luki koko illan tenttiin.", "vihje_de": "„valvoa“ = wach bleiben; „tentti“ = Prüfung.", "kysymys_de": "Warum ist Anna müde?"}, {"id": "Ku10", "tyyppi": "monivalinta", "kysymys": "Miten Jukka oppii parhaiten?", "vaihtoehdot": ["Lukemalla pitkään kerralla", "Pitämällä taukoja ja tekemällä harjoituksia", "Kuuntelemalla musiikkia"], "oikea": "b", "selitys_fi": "Jukka kertoo oppivansa parhaiten, kun hän pitää taukoja ja tekee välillä harjoituksia.", "vihje_de": "„tauko“ = Pause; „harjoitus“ = Übung.", "kysymys_de": "Wie lernt Jukka am besten?"}, {"id": "Ku11", "tyyppi": "lyhyt", "kysymys": "Minkä vinkin Jukka antaa Annalle asian oppimiseen?", "vaihtoehdot": [], "oikea": "Selittää asia ääneen omin sanoin, kuin opettaisi sitä toiselle.", "selitys_fi": "Jukka neuvoo Annaa selittämään asian ääneen omin sanoin, ikään kuin opettaisi sitä jollekin toiselle.", "vihje_de": "„omin sanoin“ = mit eigenen Worten; „ääneen“ = laut.", "kysymys_de": "Welchen Tipp gibt Jukka Anna zum Lernen einer Sache?"}, {"id": "Ku12", "tyyppi": "oikein-väärin", "kysymys": "Jukan mukaan nukkuminen on yhtä tärkeää kuin lukeminen.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Lopuksi Jukka muistuttaa, että riittävä nukkuminen on yhtä tärkeää kuin itse lukeminen.", "vihje_de": "„nukkuminen“ = das Schlafen; „yhtä tärkeää kuin“ = genauso wichtig wie.", "kysymys_de": "Laut Jukka ist das Schlafen genauso wichtig wie das Lernen."}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Ystäväsi suosittelee sinulle kansalaisopiston kielikurssia. Kirjoita hänelle lyhyt viesti. Kerro, oletko kiinnostunut, kysy kurssin ajasta ja hinnasta ja ehdota, että menisitte yhdessä.", "ohje_de": "Eine Freundin/ein Freund empfiehlt Ihnen einen Sprachkurs der Volkshochschule. Schreiben Sie eine kurze Nachricht: Sagen Sie, ob Sie interessiert sind, fragen Sie nach Zeit und Preis und schlagen Sie vor, gemeinsam hinzugehen.", "sanamaara": "80–120", "mallivastaus": "Hei Liisa!\n\nKiitos vinkistä! Olen tosi kiinnostunut kielikurssista. Olen jo pitkään halunnut parantaa suomeani, joten tämä tulee juuri sopivaan aikaan. Minulla on kuitenkin pari kysymystä. Tiedätkö, milloin kurssi alkaa ja mihin aikaan illalla se kokoontuu? Minä olen töissä yleensä kello viiteen asti, joten toivottavasti tunti on vasta sen jälkeen. Paljonko kurssi muuten maksaa koko lukukaudelta?\n\nMinusta olisi mukavaa, jos menisimme kurssille yhdessä. Yhdessä on helpompi harjoitella ja pysyä motivoituneena. Ehkä voisimme ilmoittautua samalla kertaa tällä viikolla? Soita minulle illalla, niin jutellaan lisää.\n\nTerveisin\nTheresia", "arviointi_fi": "Hyvässä vastauksessa on tervehdys ja lopputervehdys, kaikki kolme asiaa (kiinnostus, kysymys ajasta ja hinnasta, ehdotus yhdessä menemisestä) on käsitelty, tyyli on epävirallinen ja sävy ystävällinen. Pituuden tulee olla 80–120 sanaa, ja perusrakenteiden (kysymyslauseet, verbien taivutus) pitää olla pääosin oikein.", "mallivastaus_de": "Hallo Liisa!\n\nDanke für den Tipp! Ich bin sehr an dem Sprachkurs interessiert. Ich wollte schon lange mein Finnisch verbessern, deshalb kommt das gerade zur richtigen Zeit. Ich habe allerdings ein paar Fragen. Weißt du, wann der Kurs beginnt und um welche Uhrzeit am Abend er sich trifft? Ich bin meistens bis fünf Uhr bei der Arbeit, deshalb hoffe ich, dass der Unterricht erst danach ist. Wie viel kostet der Kurs übrigens für das ganze Semester?\n\nIch fände es schön, wenn wir zusammen zum Kurs gingen. Zu zweit ist es leichter zu üben und motiviert zu bleiben. Vielleicht könnten wir uns diese Woche gleichzeitig anmelden? Ruf mich heute Abend an, dann reden wir mehr.\n\nViele Grüße\nTheresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Opiskelusivuston keskustelupalstalla kysytään: „Kumpi on parempi, lähiopetus vai verkko-opiskelu?“ Kirjoita oma mielipidekirjoituksesi. Perustele kantasi ja anna esimerkkejä omasta elämästäsi.", "ohje_de": "In einem Forum einer Lernwebsite wird gefragt: „Was ist besser – Präsenzunterricht oder Online-Lernen?“ Schreiben Sie einen Meinungsbeitrag. Begründen Sie Ihre Position und geben Sie Beispiele aus Ihrem eigenen Leben.", "sanamaara": "150–200", "mallivastaus": "Tämä on todella hyvä kysymys, eikä siihen ole mielestäni yhtä oikeaa vastausta. Itse olen kokeillut molempia tapoja, ja minusta kummassakin on omat hyvät ja huonot puolensa. Haluan kertoa lyhyesti omista kokemuksistani.\n\nVerkko-opiskelu on ennen kaikkea joustavaa. Voin opiskella silloin, kun minulle parhaiten sopii, enkä menetä aikaa matkoihin oppilaitokseen. Tämä on minulle hyvin tärkeää, koska teen pitkää työpäivää lääkärinä ja aikatauluni vaihtelee viikoittain. Toisaalta kotona on usein helppo häiriintyä, ja joskus tunnen itseni yksinäiseksi tietokoneen ääressä, kun kukaan ei istu vieressä.\n\nLähiopetuksessa parasta on toisten ihmisten läsnäolo. Kun istun luokassa muiden opiskelijoiden kanssa, keskustelu sujuu luontevasti ja uskallan puhua paljon enemmän kuin yksin. Opettajalta saa myös heti apua, jos jokin asia jää epäselväksi. Huono puoli on se, että tunnit ovat aina samaan aikaan, mikä ei aina sovi kiireiseen aikatauluuni.\n\nMielestäni paras ratkaisu on näiden kahden tavan yhdistelmä. Opiskelen mielelläni kielioppia verkossa omaan tahtiini, mutta puhumista haluan ehdottomasti harjoitella kasvokkain. Näin saan käyttööni molempien menetelmien parhaat puolet.", "arviointi_fi": "Hyvä vastaus esittää selkeän mielipiteen ja perustelee sen useammalla syyllä sekä konkreettisilla esimerkeillä. Tekstissä on aloitus, ydinosa ja lopetus, ja kappalejako on selkeä. Sidesanojen (toisaalta, koska, mielestäni) käytön ja monipuolisen sanaston tulee tukea sujuvuutta. Pituus 150–200 sanaa.", "mallivastaus_de": "Das ist eine wirklich gute Frage, und es gibt darauf meiner Meinung nach keine einzige richtige Antwort. Ich selbst habe beide Methoden ausprobiert, und ich finde, beide haben ihre eigenen Vor- und Nachteile. Ich möchte kurz von meinen eigenen Erfahrungen erzählen.\n\nDas Online-Lernen ist vor allem flexibel. Ich kann dann lernen, wenn es mir am besten passt, und ich verliere keine Zeit für Wege zur Bildungseinrichtung. Das ist für mich sehr wichtig, weil ich als Ärztin lange Arbeitstage habe und mein Zeitplan sich wöchentlich ändert. Andererseits lässt man sich zu Hause oft leicht ablenken, und manchmal fühle ich mich am Computer einsam, wenn niemand neben mir sitzt.\n\nBeim Präsenzunterricht ist die Anwesenheit anderer Menschen das Beste. Wenn ich mit anderen Studierenden im Klassenzimmer sitze, läuft das Gespräch natürlich, und ich traue mich, viel mehr zu sprechen als allein. Von der Lehrkraft bekommt man auch sofort Hilfe, wenn etwas unklar bleibt. Der Nachteil ist, dass der Unterricht immer zur selben Zeit ist, was nicht immer zu meinem vollen Zeitplan passt.\n\nMeiner Meinung nach ist die beste Lösung eine Kombination dieser beiden Methoden. Grammatik lerne ich gern online in meinem eigenen Tempo, aber das Sprechen möchte ich unbedingt von Angesicht zu Angesicht üben. So bekomme ich die besten Seiten beider Methoden zur Verfügung."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen", "ohje_fi": "Olet käynyt kielikurssin loppuun. Kirjoita oppilaitokselle lyhyt palauteviesti, jossa kuvailet kurssia: mikä oli hyvää, mitä voisi parantaa ja suosittelisitko kurssia muille.", "ohje_de": "Sie haben einen Sprachkurs abgeschlossen. Schreiben Sie der Bildungseinrichtung eine kurze Rückmeldung: Beschreiben Sie den Kurs – was war gut, was könnte man verbessern, und würden Sie den Kurs weiterempfehlen?", "sanamaara": "120–160", "mallivastaus": "Hyvä kansalaisopiston henkilökunta,\n\nhaluan kiittää teitä suomen kielen keskustelukurssista, jonka suoritin tänä keväänä. Kurssi oli kokonaisuudessaan erittäin antoisa, ja olen hyvin tyytyväinen valintaani. Kerron mielelläni lyhyesti, mitä mieltä kurssista olin.\n\nParasta kurssissa oli mukava ja kannustava ilmapiiri. Opettaja oli ammattitaitoinen ja kärsivällinen, ja hän rohkaisi meitä puhumaan rohkeasti, vaikka teimme välillä virheitä. Pidin erityisesti pienistä ryhmäkeskusteluista, joissa pääsin harjoittelemaan tavallisia arkitilanteita, kuten asiointia kaupassa ja lääkärin vastaanotolla.\n\nYksi asia, jota voisi mielestäni vielä parantaa, on ryhmän koko. Joskus opiskelijoita oli niin paljon, ettei kaikilla riittänyt aikaa puhua jokaisella tunnilla. Hieman pienempi ryhmä antaisi jokaiselle enemmän puheaikaa ja henkilökohtaista palautetta.\n\nKaiken kaikkiaan suosittelen kurssia lämpimästi kaikille muille aikuisopiskelijoille, jotka haluavat parantaa puhumistaan rennossa ilmapiirissä. Aion itse ilmoittautua jatkokurssille jo ensi syksynä ja odotan sitä innolla.\n\nYstävällisin terveisin\nTheresia", "arviointi_fi": "Hyvä vastaus on rakenteeltaan selkeä ja sävyltään kohtelias (puolivirallinen). Kaikki kolme osaa (hyvät puolet, parannusehdotus, suositus) tulee käsitellä. Kuvailevien adjektiivien ja kohteliaiden ilmausten käyttö nostaa tasoa. Tervehdys ja lopputervehdys ovat paikoillaan. Pituus 120–160 sanaa.", "mallivastaus_de": "Sehr geehrtes Personal der Volkshochschule,\n\nich möchte mich bei Ihnen für den Finnisch-Konversationskurs bedanken, den ich in diesem Frühjahr absolviert habe. Der Kurs war insgesamt äußerst ertragreich, und ich bin mit meiner Wahl sehr zufrieden. Ich erzähle Ihnen gern kurz, was ich von dem Kurs hielt.\n\nDas Beste am Kurs war die angenehme und ermutigende Atmosphäre. Die Lehrkraft war fachkundig und geduldig, und sie ermutigte uns, mutig zu sprechen, auch wenn wir zwischendurch Fehler machten. Besonders gut gefielen mir die kleinen Gruppengespräche, in denen ich gewöhnliche Alltagssituationen üben konnte, wie das Einkaufen im Geschäft und einen Termin beim Arzt.\n\nEine Sache, die man meiner Meinung nach noch verbessern könnte, ist die Gruppengröße. Manchmal waren so viele Studierende da, dass nicht für alle die Zeit reichte, in jeder Stunde zu sprechen. Eine etwas kleinere Gruppe würde jedem mehr Redezeit und persönliches Feedback geben.\n\nAlles in allem empfehle ich den Kurs wärmstens allen anderen erwachsenen Lernenden, die ihr Sprechen in entspannter Atmosphäre verbessern möchten. Ich selbst werde mich schon im kommenden Herbst für den Aufbaukurs anmelden und freue mich darauf.\n\nMit freundlichen Grüßen\nTheresia"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Tapaat ystäväsi, joka aloitti juuri uuden kielikurssin. Onnittele häntä ja kysy, miltä kurssi tuntuu.", "ohje_de": "Sie treffen eine Freundin/einen Freund, die/der gerade einen neuen Sprachkurs begonnen hat. Gratulieren Sie und fragen Sie, wie der Kurs ist.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Onnea uudesta kurssista! Sehän on hienoa. Miltä se on tuntunut, onko ryhmä mukava ja opettaja hyvä?", "malli_de": "Glückwunsch zum neuen Kurs! Das ist ja toll. Wie hat er sich angefühlt, ist die Gruppe nett und die Lehrkraft gut?"}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Haluat ilmoittautua kurssille, mutta et ole varma omasta tasostasi. Kerro tilanteesi toimiston työntekijälle ja pyydä neuvoa.", "ohje_de": "Sie möchten sich für einen Kurs anmelden, sind sich aber über Ihr Niveau nicht sicher. Schildern Sie der/dem Mitarbeitenden im Büro Ihre Situation und bitten Sie um Rat.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, haluaisin ilmoittautua suomen kurssille, mutta en tiedä, mikä taso sopii minulle. Olen opiskellut noin vuoden. Voisitteko auttaa minua valitsemaan oikean kurssin?", "malli_de": "Hallo, ich würde mich gern für einen Finnischkurs anmelden, aber ich weiß nicht, welches Niveau zu mir passt. Ich lerne seit etwa einem Jahr. Könnten Sie mir helfen, den richtigen Kurs auszuwählen?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Et pääse ensi viikon oppitunnille. Soita opettajalle, kerro syy ja kysy, mitä teette tunnilla.", "ohje_de": "Sie können nächste Woche nicht am Unterricht teilnehmen. Rufen Sie die Lehrkraft an, nennen Sie den Grund und fragen Sie, was im Unterricht gemacht wird.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, valitettavasti en pääse ensi viikon tunnille, koska minulla on töitä. Voitteko kertoa, mitä aiheita tunnilla käydään läpi, jotta voin opiskella ne itse kotona?", "malli_de": "Hallo, leider kann ich nächste Woche nicht zum Unterricht kommen, weil ich Arbeit habe. Können Sie mir sagen, welche Themen im Unterricht durchgenommen werden, damit ich sie selbst zu Hause lernen kann?"}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Ystäväsi miettii, kannattaako hänen aloittaa opiskelu aikuisena. Rohkaise häntä ja kerro lyhyesti yksi syy, miksi se kannattaa.", "ohje_de": "Eine Freundin/ein Freund überlegt, ob sich das Lernen im Erwachsenenalter lohnt. Ermutigen Sie sie/ihn und nennen Sie kurz einen Grund, warum es sich lohnt.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Kannattaa ehdottomasti! Aikuisena oppii usein nopeammin, koska tietää, miksi opiskelee. Älä mieti ikää liikaa, vaan kokeile rohkeasti. Sinä pärjäät varmasti hyvin.", "malli_de": "Das lohnt sich auf jeden Fall! Als Erwachsener lernt man oft schneller, weil man weiß, warum man lernt. Denk nicht zu viel über das Alter nach, sondern probier es einfach mutig aus. Du schaffst das bestimmt gut."}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Saat kurssitodistuksen, mutta nimesi on kirjoitettu väärin. Kerro asiasta toimistossa kohteliaasti ja pyydä korjausta.", "ohje_de": "Sie erhalten ein Kurszeugnis, aber Ihr Name ist falsch geschrieben. Sprechen Sie das im Büro höflich an und bitten Sie um eine Korrektur.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Anteeksi, huomasin, että nimeni on kirjoitettu todistuksessa väärin. Oikea kirjoitusasu on Theresia. Voisitteko korjata sen ja tehdä uuden todistuksen? Kiitos paljon.", "malli_de": "Entschuldigung, ich habe bemerkt, dass mein Name in der Bescheinigung falsch geschrieben ist. Die richtige Schreibweise ist Theresia. Könnten Sie das korrigieren und eine neue Bescheinigung ausstellen? Vielen Dank."}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro omasta opiskelukokemuksestasi. Mitä olet opiskellut, miten ja missä? Mikä on ollut mukavaa ja mikä vaikeaa? Mitä haluaisit vielä oppia?", "ohje_de": "Erzählen Sie von Ihrer eigenen Lernerfahrung. Was haben Sie gelernt, wie und wo? Was war angenehm und was schwierig? Was möchten Sie noch lernen?", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluan kertoa teille opiskelukokemuksestani. Muutin Suomeen muutama vuosi sitten, ja heti alussa ymmärsin, että minun on opittava suomea. Aloitin opiskelun kansalaisopiston kurssilla, jossa kävin kerran viikossa iltaisin työn jälkeen. Myöhemmin aloin opiskella myös itsenäisesti kotona. Kuuntelen suomenkielisiä podcasteja työmatkalla ja luen joka ilta vähän ennen nukkumaanmenoa. Mukavinta opiskelussa on ollut uusien ihmisten tapaaminen kurssilla ja se hetki, kun huomaan ymmärtäväni puhetta yhä paremmin. Vaikeinta minulle on ollut puhuminen, koska pelkäsin aluksi tekeväni virheitä. Nyt olen oppinut, että virheet kuuluvat oppimiseen, eikä niitä tarvitse hävetä. Ajan löytäminen kiireisen työn ohella on myös välillä hankalaa. Tulevaisuudessa haluaisin oppia puhumaan suomea entistä sujuvammin ja ymmärtää paremmin myös työni ammattisanastoa. Aion ensi keväänä osallistua kielitutkintoon. Uskon, että sinnikkyydellä ja säännöllisellä harjoittelulla pääsen tavoitteeseeni.", "valmistautuminen_de": "Vorbereitungszeit 60 Sekunden, Sprechzeit 90 Sekunden.", "malli_de": "Ich möchte Ihnen von meiner Lernerfahrung erzählen. Ich bin vor einigen Jahren nach Finnland gezogen, und gleich zu Beginn verstand ich, dass ich Finnisch lernen muss. Ich begann das Lernen mit einem Kurs an der Volkshochschule, den ich einmal pro Woche abends nach der Arbeit besuchte. Später begann ich auch, selbstständig zu Hause zu lernen. Ich höre auf dem Arbeitsweg finnischsprachige Podcasts und lese jeden Abend vor dem Schlafengehen ein wenig. Das Angenehmste am Lernen war das Treffen neuer Menschen im Kurs und der Moment, in dem ich merke, dass ich die gesprochene Sprache immer besser verstehe. Das Schwierigste war für mich das Sprechen, weil ich anfangs Angst hatte, Fehler zu machen. Jetzt habe ich gelernt, dass Fehler zum Lernen gehören und man sich nicht für sie schämen muss. Das Finden von Zeit neben der anstrengenden Arbeit ist manchmal auch schwierig. In Zukunft würde ich gern lernen, Finnisch noch fließender zu sprechen und auch die Fachsprache meiner Arbeit besser zu verstehen. Ich werde nächstes Frühjahr an einer Sprachprüfung teilnehmen. Ich glaube, dass ich mit Beharrlichkeit und regelmäßigem Üben mein Ziel erreiche."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet kurssitoverisi kanssa kahvilla. Roolisi: Ehdota, että perustaisitte yhdessä pienen opiskeluryhmän. Sovi ajasta ja paikasta sekä siitä, mitä harjoittelette.", "ohje_de": "Situation: Sie sind mit einer Kurskollegin/einem Kurskollegen beim Kaffee. Ihre Rolle: Schlagen Sie vor, gemeinsam eine kleine Lerngruppe zu gründen. Vereinbaren Sie Zeit, Ort und was Sie üben.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Sinä: Hei, mietin, että voisimme perustaa pienen opiskeluryhmän. Yhdessä on helpompi harjoitella. Mitä mieltä olet?\n– Toinen: Hyvä idea! Milloin sinulle sopisi?\n– Sinä: Ehkä torstai-iltaisin? Voisimme tavata kirjaston ryhmätilassa kuuden aikaan.\n– Toinen: Sopii hyvin. Mitä haluaisit harjoitella?\n– Sinä: Haluaisin harjoitella puhumista ja käydä läpi yhdessä viikon sanoja. Voisimme myös kysellä toisiltamme. Varaan ryhmätilan jo huomenna.", "malli_de": "– Du: Hallo, ich habe überlegt, dass wir eine kleine Lerngruppe gründen könnten. Zusammen ist es leichter zu üben. Was meinst du?\n– Andere: Gute Idee! Wann würde es dir passen?\n– Du: Vielleicht donnerstagabends? Wir könnten uns gegen sechs im Gruppenraum der Bibliothek treffen.\n– Andere: Das passt gut. Was würdest du gern üben?\n– Du: Ich würde gern das Sprechen üben und zusammen die Wörter der Woche durchgehen. Wir könnten uns auch gegenseitig abfragen. Ich reserviere den Gruppenraum schon morgen."}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet opinto-ohjaajan vastaanotolla. Roolisi: Haluat vaihtaa iltakurssin päiväkurssiin, koska aikataulusi muuttui. Selitä tilanteesi ja sovi uudesta kurssista.", "ohje_de": "Situation: Sie sind bei der Studienberatung. Ihre Rolle: Sie möchten vom Abend- in den Tageskurs wechseln, weil sich Ihr Zeitplan geändert hat. Erklären Sie Ihre Lage und vereinbaren Sie einen neuen Kurs.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Sinä: Hei, kävin tähän asti iltakurssilla, mutta aikatauluni on muuttunut, enkä enää pääse iltaisin. Olisiko mahdollista vaihtaa päiväkurssille?\n– Ohjaaja: Katsotaan yhdessä. Mihin aikaan päivällä sinulle sopisi?\n– Sinä: Aamupäivä olisi paras, esimerkiksi keskiviikkoisin.\n– Ohjaaja: Meillä alkaa keskiviikkona aamukurssi kello kymmenen. Sopiiko se?\n– Sinä: Sopii hyvin, kiitos! Pysyykö taso samana, ja siirtyykö jo maksamani kurssimaksu uudelle kurssille?", "malli_de": "– Du: Hallo, ich habe bisher den Abendkurs besucht, aber mein Zeitplan hat sich geändert, und ich kann abends nicht mehr kommen. Wäre es möglich, in den Tageskurs zu wechseln?\n– Berater: Schauen wir gemeinsam. Zu welcher Tageszeit würde es Ihnen passen?\n– Du: Der Vormittag wäre am besten, zum Beispiel mittwochs.\n– Berater: Bei uns beginnt am Mittwoch ein Vormittagskurs um zehn Uhr. Passt das?\n– Du: Das passt gut, danke! Bleibt das Niveau gleich, und wird die von mir schon bezahlte Kursgebühr auf den neuen Kurs übertragen?"}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse yksi aihe ja kerro mielipiteesi. Perustele kantasi ja anna esimerkkejä. Aihe 1: Pitäisikö aikuisten kielikurssien olla maksuttomia? Aihe 2: Onko parempi opiskella yksin vai ryhmässä?", "ohje_de": "Wählen Sie ein Thema und äußern Sie Ihre Meinung. Begründen Sie und geben Sie Beispiele. Thema 1: Sollten Sprachkurse für Erwachsene kostenlos sein? Thema 2: Lernt man besser allein oder in der Gruppe?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen aiheen kaksi: onko parempi opiskella yksin vai ryhmässä. Mielestäni paras tapa riippuu siitä, mitä haluaa oppia, mutta itse pidän selvästi enemmän ryhmässä opiskelusta. Perustelen kantani muutamalla syyllä ja annan myös esimerkkejä. Ensinnäkin ryhmässä saa harjoitella puhumista oikeiden ihmisten kanssa. Kun olen kurssilla, minun on pakko puhua ja vastata opettajan kysymyksiin, ja juuri sitä kielen oppimisessa tarvitaan eniten. Yksin kotona voin toki lukea ja kirjoittaa, mutta puhuminen jää silloin helposti liian vähälle. Toiseksi ryhmässä saa tukea ja motivaatiota muilta opiskelijoilta. Kun huomaan, että joku toinen oppii nopeasti, se kannustaa minuakin yrittämään enemmän. Olen myös huomannut, että toisten virheistä ja kysymyksistä oppii paljon. Toisaalta ymmärrän hyvin, että yksin opiskelussa on omat hyvät puolensa. Voin edetä täysin omaan tahtiini ja keskittyä juuri niihin asioihin, jotka ovat minulle vaikeita. Siksi paras ratkaisu on minusta yhdistää molemmat tavat: opiskelen kielioppia rauhassa yksin kotona ja harjoittelen puhumista yhdessä ryhmässä. Näin saan molempien tapojen parhaat puolet ja opin mielestäni kaikkein tehokkaimmin.", "malli_de": "Ich wähle Thema zwei: ob es besser ist, allein oder in der Gruppe zu lernen. Meiner Meinung nach hängt die beste Methode davon ab, was man lernen möchte, aber ich selbst bevorzuge eindeutig das Lernen in der Gruppe. Ich begründe meine Position mit ein paar Gründen und gebe auch Beispiele. Erstens kann man in der Gruppe das Sprechen mit echten Menschen üben. Wenn ich im Kurs bin, muss ich sprechen und die Fragen der Lehrkraft beantworten, und genau das braucht man beim Sprachenlernen am meisten. Allein zu Hause kann ich zwar lesen und schreiben, aber das Sprechen kommt dann leicht zu kurz. Zweitens bekommt man in der Gruppe Unterstützung und Motivation von anderen Studierenden. Wenn ich merke, dass jemand anderes schnell lernt, ermutigt mich das, mich selbst mehr anzustrengen. Ich habe auch bemerkt, dass man aus den Fehlern und Fragen anderer viel lernt. Andererseits verstehe ich gut, dass das Lernen allein seine eigenen Vorteile hat. Ich kann ganz in meinem eigenen Tempo vorankommen und mich gerade auf die Dinge konzentrieren, die für mich schwierig sind. Deshalb ist die beste Lösung meiner Meinung nach, beide Methoden zu verbinden: Grammatik lerne ich in Ruhe allein zu Hause und das Sprechen übe ich gemeinsam in der Gruppe. So bekomme ich die besten Seiten beider Methoden und lerne meiner Meinung nach am allereffektivsten."}]}, {"id": 9, "teema": "Ympäristö ja luonto", "teema_de": "Umwelt und Natur", "reading": [{"otsikko": "Taloyhtiön kierrätysohje", "tyyppi": "ohje", "teksti": "Hyvä asukas! Talomme jätekatos on uudistettu, ja nyt lajittelu on entistä helpompaa. Pihalla on omat astiat biojätteelle, kartongille, lasille, metallille ja muoville. Sekajäteastiaan saa laittaa vain sen, mitä ei voi lajitella muualle. Muista huuhtoa purkit ja pullot kevyesti ennen kuin laitat ne oikeaan astiaan. Pizzalaatikko kuuluu kartonkiin vain silloin, kun se on puhdas; rasvainen laatikko menee biojätteeseen. Pahvilaatikot tulee litistää, jotta ne vievät vähemmän tilaa. Lasipurkkien kannet ja korkit kerätään metalliin, eivät lasiin. Vaaralliset jätteet, kuten paristot, maalit ja lääkkeet, eivät kuulu pihan astioihin. Ne viedään kaupungin keräyspisteeseen tai apteekkiin. Suuret huonekalut ja sähkölaitteet kuljetetaan itse jäteasemalle, sillä ne eivät mahdu pihan astioihin. Toimivia tavaroita kannattaa myös lahjoittaa kirpputorille, jolloin ne saavat uuden elämän eivätkä päädy turhaan kaatopaikalle. Jos et ole varma, mihin jokin jäte kuuluu, kysy huoltoyhtiöltä tai katso ohjeet ilmoitustaululta. Oikealla lajittelulla säästämme sekä rahaa että luonnonvaroja. Yhdessä pidämme pihan siistinä ja säästämme luontoa tuleville sukupolville.", "teksti_de": "Liebe Bewohnerin, lieber Bewohner! Der Müllunterstand unseres Hauses wurde erneuert, und jetzt ist das Trennen einfacher als je zuvor. Im Hof gibt es eigene Behälter für Bioabfall, Karton, Glas, Metall und Kunststoff. In den Restmüllbehälter darf nur das, was sich nicht anderweitig trennen lässt. Denken Sie daran, Dosen und Flaschen leicht auszuspülen, bevor Sie sie in den richtigen Behälter geben. Eine Pizzaschachtel gehört nur dann zum Karton, wenn sie sauber ist; eine fettige Schachtel kommt in den Bioabfall. Pappkartons sind flach zu drücken, damit sie weniger Platz wegnehmen. Deckel und Korken von Glasgefäßen werden zum Metall gesammelt, nicht zum Glas. Gefährliche Abfälle wie Batterien, Farben und Medikamente gehören nicht in die Behälter im Hof. Sie werden zur Sammelstelle der Stadt oder zur Apotheke gebracht. Große Möbel und Elektrogeräte transportiert man selbst zur Mülldeponie, denn sie passen nicht in die Behälter im Hof. Funktionierende Gegenstände lohnt es sich außerdem, an den Flohmarkt zu spenden, sodass sie ein neues Leben bekommen und nicht unnötig auf der Müllkippe landen. Wenn Sie nicht sicher sind, wohin ein bestimmter Abfall gehört, fragen Sie die Hausverwaltung oder sehen Sie sich die Hinweise am Aushang an. Durch richtiges Trennen sparen wir sowohl Geld als auch natürliche Ressourcen. Gemeinsam halten wir den Hof sauber und schützen die Natur für kommende Generationen.", "hl": ["Sekajäteastiaan saa laittaa vain sen, mitä ei voi lajitella muualle.", "Pizzalaatikko kuuluu kartonkiin vain silloin, kun se on puhdas; rasvainen laatikko menee biojätteeseen.", "Lasipurkkien kannet ja korkit kerätään metalliin, eivät lasiin.", "Ne viedään kaupungin keräyspisteeseen tai apteekkiin."], "image": "Simulaatio_09_ymparisto/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Mitä sekajäteastiaan saa laittaa?", "vaihtoehdot": ["kaiken talousjätteen", "vain sen, mitä ei voi lajitella muualle", "vain vaaralliset jätteet"], "oikea": "b", "selitys_fi": "Tekstin mukaan sekajäteastiaan saa laittaa vain sen, mitä ei voi lajitella muualle.", "vihje_de": "„sekajäte“ = Restmüll: nur, was nicht anders sortiert werden kann.", "kysymys_de": "Was darf in den Restmüllbehälter gegeben werden?"}, {"id": "L2", "tyyppi": "oikein-väärin", "kysymys": "Rasvainen pizzalaatikko kuuluu kartonkiin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Rasvainen laatikko menee biojätteeseen, vain puhdas laatikko kuuluu kartonkiin.", "vihje_de": "„rasvainen“ = fettig → Biomüll, nicht Karton.", "kysymys_de": "Eine fettige Pizzaschachtel gehört zum Karton."}, {"id": "L3", "tyyppi": "monivalinta", "kysymys": "Minne lasipurkkien kannet ja korkit laitetaan?", "vaihtoehdot": ["lasiastiaan", "metalliastiaan", "sekajätteeseen"], "oikea": "b", "selitys_fi": "Tekstin mukaan kannet ja korkit kerätään metalliin, eivät lasiin.", "vihje_de": "Deckel/Korken („kannet ja korkit“) gehören zum Metall.", "kysymys_de": "Wohin werden die Deckel und Korken von Glasgefäßen gegeben?"}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Minne paristot, maalit ja lääkkeet viedään?", "vaihtoehdot": [], "oikea": "Kaupungin keräyspisteeseen tai apteekkiin.", "selitys_fi": "Vaaralliset jätteet viedään kaupungin keräyspisteeseen tai apteekkiin.", "vihje_de": "Gefährlicher Abfall („vaarallinen jäte“) → Sammelstelle oder Apotheke.", "kysymys_de": "Wohin werden Batterien, Farben und Medikamente gebracht?"}]}, {"otsikko": "Luontopolun esite: Kivijärven kierros", "tyyppi": "tiedote", "teksti": "Tervetuloa Kivijärven luontopolulle! Polku on noin neljä kilometriä pitkä, ja sen kävelee rauhallisesti reilussa tunnissa. Reitti kiertää järven ympäri ja kulkee sekä metsässä että rannan tuntumassa. Polku on merkitty puihin sinisillä maalitäplillä, joten eksyminen on epätodennäköistä. Matkan varrella on kolme levähdyspaikkaa, joissa on penkit ja roska-astiat. Puolivälissä sijaitsee laavu, jossa saa tehdä tulen merkittyyn tulipaikkaan. Muista, että metsäpalovaroituksen aikana avotulen teko on kielletty. Keväällä ja syksyllä polku voi olla liukas ja paikoin märkä, joten suosittelemme tukevia kenkiä. Koirat ovat tervetulleita, mutta ne on pidettävä kytkettyinä lintujen pesimäaikana huhtikuusta heinäkuuhun. Ota omat roskasi mukaan, jos astiat ovat täynnä. Lintutornista voi tarkkailla vesilintuja erityisesti aikaisin aamulla, jolloin järvi on tyyni ja linnut aktiivisimmillaan. Polun varrella kasvaa kesällä mustikoita ja puolukoita, joita saa jokamiehenoikeuden nojalla poimia. Marjastaessa kannattaa kuitenkin muistaa, ettei pesiviä lintuja saa häiritä. Nauti rauhasta ja kunnioita luontoa – jätä jälkeesi vain jalanjäljet.", "teksti_de": "Willkommen auf dem Naturpfad von Kivijärvi! Der Pfad ist etwa vier Kilometer lang, und man geht ihn in gemächlichem Tempo in gut einer Stunde. Die Route führt um den See herum und verläuft sowohl durch den Wald als auch in Ufernähe. Der Pfad ist an den Bäumen mit blauen Farbtupfern markiert, sodass ein Verirren unwahrscheinlich ist. Unterwegs gibt es drei Rastplätze mit Bänken und Mülleimern. Auf halbem Weg liegt eine Schutzhütte (Laavu), in der man an der markierten Feuerstelle ein Feuer machen darf. Denken Sie daran, dass während einer Waldbrandwarnung das Entzünden von offenem Feuer verboten ist. Im Frühling und Herbst kann der Pfad rutschig und stellenweise nass sein, daher empfehlen wir festes Schuhwerk. Hunde sind willkommen, müssen aber während der Brutzeit der Vögel von April bis Juli angeleint sein. Nehmen Sie Ihren Müll selbst mit, falls die Behälter voll sind. Vom Vogelturm aus kann man Wasservögel beobachten, besonders früh am Morgen, wenn der See ruhig und die Vögel am aktivsten sind. Entlang des Pfades wachsen im Sommer Blaubeeren und Preiselbeeren, die man kraft des Jedermannsrechts pflücken darf. Beim Beerensammeln sollte man jedoch daran denken, dass brütende Vögel nicht gestört werden dürfen. Genießen Sie die Ruhe und achten Sie die Natur – hinterlassen Sie nur Ihre Fußspuren.", "hl": ["Polku on noin neljä kilometriä pitkä, ja sen kävelee rauhallisesti reilussa tunnissa.", "Muista, että metsäpalovaroituksen aikana avotulen teko on kielletty.", "Keväällä ja syksyllä polku voi olla liukas ja paikoin märkä, joten suosittelemme tukevia kenkiä.", "Koirat ovat tervetulleita, mutta ne on pidettävä kytkettyinä lintujen pesimäaikana huhtikuusta heinäkuuhun."], "image": "Simulaatio_09_ymparisto/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Kuinka kauan polun kävelyyn menee rauhallisesti?", "vaihtoehdot": ["alle puoli tuntia", "reilu tunti", "noin neljä tuntia"], "oikea": "b", "selitys_fi": "Tekstin mukaan polun kävelee rauhallisesti reilussa tunnissa.", "vihje_de": "„reilu tunti“ = gut eine Stunde; vier ist die Kilometerzahl, nicht die Zeit.", "kysymys_de": "Wie lange dauert es, den Pfad in gemächlichem Tempo zu gehen?"}, {"id": "L6", "tyyppi": "oikein-väärin", "kysymys": "Avotulen saa tehdä laavulla myös metsäpalovaroituksen aikana.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Metsäpalovaroituksen aikana avotulen teko on kielletty.", "vihje_de": "Bei „metsäpalovaroitus“ (Waldbrandwarnung) ist offenes Feuer verboten.", "kysymys_de": "Offenes Feuer darf an der Schutzhütte auch während einer Waldbrandwarnung gemacht werden."}, {"id": "L7", "tyyppi": "lyhyt", "kysymys": "Milloin koirat on pidettävä kytkettyinä?", "vaihtoehdot": [], "oikea": "Lintujen pesimäaikana huhtikuusta heinäkuuhun.", "selitys_fi": "Koirat pidetään kytkettyinä lintujen pesimäaikana huhtikuusta heinäkuuhun.", "vihje_de": "Während der Brutzeit der Vögel, von April bis Juli.", "kysymys_de": "Wann müssen Hunde angeleint sein?"}, {"id": "L8", "tyyppi": "monivalinta", "kysymys": "Mitä esite suosittelee jalkineiksi keväällä ja syksyllä?", "vaihtoehdot": ["tukevia kenkiä", "sandaaleja", "kumisaappaita ei tarvita"], "oikea": "a", "selitys_fi": "Liukkaan ja märän polun takia suositellaan tukevia kenkiä.", "vihje_de": "„tukevat kengät“ = festes Schuhwerk, weil der Weg rutschig ist.", "kysymys_de": "Welches Schuhwerk empfiehlt der Prospekt für Frühling und Herbst?"}]}, {"otsikko": "Sää muuttuu loppuviikolla", "tyyppi": "uutinen", "teksti": "Alkuviikon helteet jäävät taakse, kun matalapaine saapuu lännestä torstaina. Ilmatieteen laitoksen mukaan lämpötila laskee selvästi, ja päivälämpötilat asettuvat noin viiteentoista asteeseen. Torstaina ja perjantaina sataa ajoittain vettä, ja paikoin voi esiintyä ukkosta. Tuuli voimistuu rannikolla, missä puuskat yltävät jopa viiteentoista metriin sekunnissa. Viikonloppuna sää tyyntyy ja poutaantuu, mutta yölämpötilat painuvat pohjoisessa lähelle nollaa. Asiantuntijat muistuttavat, että nopeat säänvaihtelut ovat tulleet yhä tavallisemmiksi viime vuosina. Tutkijoiden mukaan ilmaston lämpeneminen lisää sekä rankkasateita että pitkiä kuivia jaksoja. Maanviljelijöille kuiva alkukesä on ollut haastava, ja sade otetaan vastaan helpotuksena. Vesistöjen lämpötila on kuitenkin yhä korkea, joten uimaan pääsee vielä viikonloppunakin. Pelastuslaitos kuitenkin muistuttaa, että ukkosen aikana vedessä ei kannata olla. Myös mökkeilijöiden on syytä seurata varoituksia ja sammuttaa avotuli ajoissa, jos tuuli yltyy. Ensi viikolla sää näyttää lämpenevän jälleen muutamalla asteella, ja kesä jatkuu vakaampana. Tarkemmat ennusteet päivitetään säätiedotteisiin päivittäin.", "teksti_de": "Die Hitze zu Wochenbeginn liegt hinter uns, wenn am Donnerstag ein Tiefdruckgebiet aus dem Westen eintrifft. Laut dem Finnischen Meteorologischen Institut sinkt die Temperatur deutlich, und die Tagestemperaturen pendeln sich bei etwa fünfzehn Grad ein. Am Donnerstag und Freitag regnet es zeitweise, und stellenweise kann es Gewitter geben. Der Wind frischt an der Küste auf, wo die Böen bis zu fünfzehn Meter pro Sekunde erreichen. Am Wochenende beruhigt sich das Wetter und wird trocken, doch die Nachttemperaturen sinken im Norden nahe null. Fachleute weisen darauf hin, dass schnelle Wetterwechsel in den letzten Jahren immer häufiger geworden sind. Laut Forschern verstärkt die Erderwärmung sowohl Starkregen als auch lange Trockenperioden. Für die Landwirte war der trockene Frühsommer eine Herausforderung, und der Regen wird als Erleichterung aufgenommen. Die Temperatur der Gewässer ist jedoch weiterhin hoch, sodass man auch am Wochenende noch schwimmen gehen kann. Die Rettungsbehörde erinnert allerdings daran, dass man sich während eines Gewitters nicht im Wasser aufhalten sollte. Auch Ferienhausbesitzer sollten die Warnungen verfolgen und offenes Feuer rechtzeitig löschen, falls der Wind zunimmt. In der nächsten Woche scheint das Wetter wieder um einige Grad wärmer zu werden, und der Sommer geht beständiger weiter. Genauere Prognosen werden täglich in den Wetterberichten aktualisiert.", "hl": ["Alkuviikon helteet jäävät taakse, kun matalapaine saapuu lännestä torstaina.", "Viikonloppuna sää tyyntyy ja poutaantuu, mutta yölämpötilat painuvat pohjoisessa lähelle nollaa.", "Tutkijoiden mukaan ilmaston lämpeneminen lisää sekä rankkasateita että pitkiä kuivia jaksoja.", "Maanviljelijöille kuiva alkukesä on ollut haastava, ja sade otetaan vastaan helpotuksena."], "image": "Simulaatio_09_ymparisto/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Mistä suunnasta matalapaine saapuu?", "vaihtoehdot": ["idästä", "lännestä", "etelästä"], "oikea": "b", "selitys_fi": "Tekstin mukaan matalapaine saapuu lännestä torstaina.", "vihje_de": "„länsi“ = Westen; das Tiefdruckgebiet kommt aus dem Westen.", "kysymys_de": "Aus welcher Richtung trifft das Tiefdruckgebiet ein?"}, {"id": "L10", "tyyppi": "oikein-väärin", "kysymys": "Viikonloppuna sää on tyyni ja poutainen.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstin mukaan viikonloppuna sää tyyntyy ja poutaantuu.", "vihje_de": "„poutainen“ = trocken/regenfrei; „tyyni“ = windstill – am Wochenende.", "kysymys_de": "Am Wochenende ist das Wetter windstill und trocken."}, {"id": "L11", "tyyppi": "monivalinta", "kysymys": "Mitä tutkijat sanovat ilmaston lämpenemisestä?", "vaihtoehdot": ["Se vähentää sateita kokonaan.", "Se lisää sekä rankkasateita että kuivia jaksoja.", "Sillä ei ole vaikutusta säähän."], "oikea": "b", "selitys_fi": "Tutkijoiden mukaan lämpeneminen lisää sekä rankkasateita että pitkiä kuivia jaksoja.", "vihje_de": "Erwärmung bringt mehr Starkregen UND lange Trockenperioden.", "kysymys_de": "Was sagen die Forscher über die Erderwärmung?"}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Miksi sade on maanviljelijöille helpotus?", "vaihtoehdot": [], "oikea": "Koska alkukesä oli kuiva.", "selitys_fi": "Kuiva alkukesä oli haastava, joten sade otetaan vastaan helpotuksena.", "vihje_de": "Weil der Frühsommer trocken war („kuiva alkukesä“).", "kysymys_de": "Warum ist der Regen für die Landwirte eine Erleichterung?"}]}, {"otsikko": "Blogi: Ensimmäinen kesäni mökillä ilman sähköä", "tyyppi": "blogi", "teksti": "Muutimme viime keväänä vanhalle perintömökille, jossa ei ole sähköä eikä juoksevaa vettä. Aluksi jännitin kovasti, miten pärjäisin kaupunkilaisena keskellä metsää. Nyt, kolmen kuukauden jälkeen, en vaihtaisi tätä elämää mihinkään. Aamut alkavat hiljaisuudella ja linnunlaululla, ei puhelimen hälytyksellä. Vesi haetaan kaivosta, ja sitä oppii käyttämään säästeliäästi. Ruoan kypsennän puuhellalla tai nuotiolla, ja illalla luen kirjaa kynttilän valossa. Yllätyin siitä, kuinka paljon vähemmän roskaa syntyy, kun kaikkea ei ole pakattu muoviin. Kompostoin biojätteen, ja marjat sekä sienet kerään läheisestä metsästä. Tietysti haasteitakin on: sateella puut ovat märkiä, ja hyttyset ovat toisinaan riesa. Silti tunnen oloni rauhalliseksi ja levänneeksi. Olen oppinut, että onnellisuuteen ei tarvita paljon tavaraa. Myös sähkölasku on tietysti kadonnut kokonaan, mikä tuntuu hyvältä sekä kukkarossa että omallatunnolla. Iltaisin istun usein laiturilla katselemassa auringonlaskua ja kuuntelemassa veden liplatusta. Suosittelen kaikille edes yhtä viikkoa luonnon keskellä – se opettaa arvostamaan pieniä asioita ja hidastamaan tahtia.", "teksti_de": "Wir sind im vergangenen Frühling in ein altes geerbtes Ferienhaus gezogen, in dem es weder Strom noch fließendes Wasser gibt. Anfangs war ich sehr aufgeregt, wie ich als Stadtmensch mitten im Wald zurechtkommen würde. Jetzt, nach drei Monaten, würde ich dieses Leben gegen nichts eintauschen. Die Morgen beginnen mit Stille und Vogelgesang, nicht mit dem Wecker des Handys. Das Wasser wird aus dem Brunnen geholt, und man lernt, es sparsam zu verwenden. Das Essen koche ich auf dem Holzherd oder am Lagerfeuer, und abends lese ich ein Buch im Kerzenschein. Ich war überrascht, wie viel weniger Müll entsteht, wenn nicht alles in Plastik verpackt ist. Den Bioabfall kompostiere ich, und Beeren sowie Pilze sammle ich im nahe gelegenen Wald. Natürlich gibt es auch Herausforderungen: Bei Regen ist das Holz nass, und die Mücken sind zuweilen eine Plage. Trotzdem fühle ich mich ruhig und erholt. Ich habe gelernt, dass man für Glück nicht viele Dinge braucht. Auch die Stromrechnung ist natürlich völlig verschwunden, was sich sowohl im Geldbeutel als auch für das Gewissen gut anfühlt. Abends sitze ich oft auf dem Steg, schaue dem Sonnenuntergang zu und lausche dem Plätschern des Wassers. Ich empfehle allen wenigstens eine Woche mitten in der Natur – das lehrt einen, die kleinen Dinge zu schätzen und das Tempo zu verlangsamen.", "hl": ["Muutimme viime keväänä vanhalle perintömökille, jossa ei ole sähköä eikä juoksevaa vettä.", "Nyt, kolmen kuukauden jälkeen, en vaihtaisi tätä elämää mihinkään.", "Tietysti haasteitakin on: sateella puut ovat märkiä, ja hyttyset ovat toisinaan riesa."], "image": "Simulaatio_09_ymparisto/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Mitä mökiltä puuttuu?", "vaihtoehdot": ["sähkö ja juokseva vesi", "vain lämmitys", "kaivo ja puuhella"], "oikea": "a", "selitys_fi": "Mökillä ei ole sähköä eikä juoksevaa vettä.", "vihje_de": "Es fehlen Strom („sähkö“) und fließendes Wasser („juokseva vesi“).", "kysymys_de": "Was fehlt im Ferienhaus?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Kirjoittaja katuu muuttoaan mökille.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Kirjoittaja ei vaihtaisi tätä elämää mihinkään, joten hän ei kadu muuttoa.", "vihje_de": "„en vaihtaisi mihinkään“ = würde es gegen nichts tauschen → kein Bedauern.", "kysymys_de": "Die Verfasserin bereut ihren Umzug ins Ferienhaus."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Mainitse yksi haaste, jonka kirjoittaja kohtaa mökillä.", "vaihtoehdot": [], "oikea": "Märät puut sateella tai hyttyset.", "selitys_fi": "Sateella puut ovat märkiä ja hyttyset ovat toisinaan riesa.", "vihje_de": "Z. B. nasses Holz bei Regen oder Mücken („hyttyset“).", "kysymys_de": "Nennen Sie eine Herausforderung, der die Verfasserin im Ferienhaus begegnet."}]}], "listening": [{"otsikko": "Sääennuste radiossa", "tyyppi": "monologi", "litteraatti": "Hyvää huomenta, hyvät kuulijat, ja tervetuloa aamun sääkatsaukseen. Tänään koko maassa on enimmäkseen pilvistä, mutta sää pysyy poutaisena iltapäivään asti. Etelässä lämpötila nousee noin kahteenkymmeneen asteeseen, kun taas pohjoisessa jäädään lähemmäs kahtatoista astetta. Illalla lännestä saapuu sadealue, ja erityisesti rannikolla voi sataa runsaastikin. Tuuli on kohtalaista, mutta merialueilla se voimistuu illan mittaan. Huomenna sää selkenee ja aurinko pilkahtaa esiin useimmilla alueilla. Viikonlopuksi luvassa on lämpimämpää, ja lämpötila voi paikoin nousta jopa kahteenkymmeneenviiteen asteeseen. Jos olet lähdössä retkelle, ota sateenvarjo varmuuden vuoksi mukaan, sillä kuurot ovat mahdollisia myös sisämaassa. Muistakaa nauttia kesästä ja pukeutua sään mukaan. Seuraava sääkatsaus kuullaan kello kahdeltatoista.", "litteraatti_de": "Guten Morgen, liebe Hörerinnen und Hörer, und willkommen zum morgendlichen Wetterbericht. Heute ist es im ganzen Land überwiegend bewölkt, aber das Wetter bleibt bis zum Nachmittag trocken. Im Süden steigt die Temperatur auf etwa zwanzig Grad, während sie im Norden näher bei zwölf Grad bleibt. Am Abend trifft aus dem Westen ein Regengebiet ein, und besonders an der Küste kann es kräftig regnen. Der Wind ist mäßig, frischt aber im Laufe des Abends in den Seegebieten auf. Morgen klart das Wetter auf, und die Sonne kommt in den meisten Gebieten zum Vorschein. Fürs Wochenende ist wärmeres Wetter angekündigt, und die Temperatur kann stellenweise sogar auf fünfundzwanzig Grad steigen. Wenn Sie zu einem Ausflug aufbrechen, nehmen Sie sicherheitshalber einen Regenschirm mit, denn Schauer sind auch im Binnenland möglich. Vergessen Sie nicht, den Sommer zu genießen und sich dem Wetter entsprechend anzuziehen. Der nächste Wetterbericht ist um zwölf Uhr zu hören.", "hl": ["Tänään koko maassa on enimmäkseen pilvistä, mutta sää pysyy poutaisena iltapäivään asti.", "Etelässä lämpötila nousee noin kahteenkymmeneen asteeseen, kun taas pohjoisessa jäädään lähemmäs kahtatoista astetta.", "Jos olet lähdössä retkelle, ota sateenvarjo varmuuden vuoksi mukaan, sillä kuurot ovat mahdollisia myös sisämaassa."], "audio": "Simulaatio_09_ymparisto/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Millainen sää on tänään aamupäivällä?", "vaihtoehdot": ["aurinkoinen ja kuuma", "enimmäkseen pilvistä mutta poutaista", "sateista koko päivän"], "oikea": "b", "selitys_fi": "Säätiedotteen mukaan tänään on enimmäkseen pilvistä, mutta poutaista iltapäivään asti.", "vihje_de": "„pilvistä“ = bewölkt, „poutainen“ = trocken – bis zum Nachmittag.", "kysymys_de": "Wie ist das Wetter heute am Vormittag?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Mihin lämpötila nousee etelässä tänään?", "vaihtoehdot": ["noin kahteenkymmeneen asteeseen", "noin kahteentoista asteeseen", "noin kahteenkymmeneenviiteen asteeseen"], "oikea": "a", "selitys_fi": "Etelässä lämpötila nousee noin kahteenkymmeneen asteeseen.", "vihje_de": "Süden heute ca. 20 Grad; 25 Grad gilt erst fürs Wochenende.", "kysymys_de": "Auf wie viel steigt die Temperatur heute im Süden?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Sadealue saapuu illalla lännestä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tiedotteen mukaan illalla lännestä saapuu sadealue.", "vihje_de": "„sadealue“ = Regengebiet kommt abends aus dem Westen.", "kysymys_de": "Das Regengebiet trifft am Abend aus dem Westen ein."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Mitä kuulijaa kehotetaan ottamaan retkelle mukaan?", "vaihtoehdot": [], "oikea": "Sateenvarjon.", "selitys_fi": "Kuulijaa kehotetaan ottamaan sateenvarjo varmuuden vuoksi mukaan.", "vihje_de": "„sateenvarjo“ = Regenschirm, sicherheitshalber.", "kysymys_de": "Was wird den Hörern empfohlen, zum Ausflug mitzunehmen?"}]}, {"otsikko": "Opastettu retki suolla", "tyyppi": "monologi", "litteraatti": "Tervetuloa kaikki mukaan tämän päivän opastetulle retkelle. Olen oppaanne Markus, ja kuljemme tänään noin kolme kilometriä suon yli pitkin pitkospuita. Pysykää turvallisuuden vuoksi puiden päällä, sillä suo voi olla petollisen pehmeä reunoilta. Tämä suo on suojeltu, ja täällä elää monia harvinaisia lintuja ja kasveja. Keväällä täällä kukkii hilla, ja loppukesästä voimme poimia kypsiä lakkoja. Muistakaa, että suojelualueella ei saa poimia kukkia eikä häiritä lintuja. Otamme noin puolessavälissä tauon näköalatornin luona, josta avautuu upea näkymä koko suolle. Jos teillä on kiikarit, kannattaa ottaa ne esiin, sillä saatamme nähdä kurkia. Pitäkää matkapuhelimet äänettömällä, jotta emme säikäytä eläimiä. Retki kestää noin kaksi tuntia, ja palaamme samaa reittiä takaisin lähtöpaikalle. Kysykää rohkeasti, jos jokin askarruttaa. Lähdetään liikkeelle!", "litteraatti_de": "Herzlich willkommen alle zur heutigen geführten Wanderung. Ich bin Ihr Reiseleiter Markus, und wir gehen heute etwa drei Kilometer über das Moor auf dem Bohlenweg. Bleiben Sie aus Sicherheitsgründen auf den Bohlen, denn das Moor kann an den Rändern trügerisch weich sein. Dieses Moor ist geschützt, und hier leben viele seltene Vögel und Pflanzen. Im Frühling blüht hier die Moltebeere, und im Spätsommer können wir reife Moltebeeren pflücken. Denken Sie daran, dass man im Schutzgebiet keine Blumen pflücken und die Vögel nicht stören darf. Etwa auf halbem Weg machen wir eine Pause am Aussichtsturm, von dem aus sich ein herrlicher Blick über das ganze Moor öffnet. Wenn Sie ein Fernglas haben, lohnt es sich, es hervorzuholen, denn wir könnten Kraniche sehen. Stellen Sie Ihre Mobiltelefone auf lautlos, damit wir die Tiere nicht aufschrecken. Die Wanderung dauert etwa zwei Stunden, und wir kehren auf demselben Weg zum Ausgangspunkt zurück. Fragen Sie ruhig, wenn Sie etwas beschäftigt. Lasst uns aufbrechen!", "hl": ["Pysykää turvallisuuden vuoksi puiden päällä, sillä suo voi olla petollisen pehmeä reunoilta.", "Muistakaa, että suojelualueella ei saa poimia kukkia eikä häiritä lintuja.", "Jos teillä on kiikarit, kannattaa ottaa ne esiin, sillä saatamme nähdä kurkia."], "audio": "Simulaatio_09_ymparisto/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Miksi retkeläisten pitää pysyä pitkospuilla?", "vaihtoehdot": ["koska polku on lyhyempi", "koska suo voi olla pehmeä ja vaarallinen reunoilta", "koska opas käskee kävelemään nopeasti"], "oikea": "b", "selitys_fi": "Opas kehottaa pysymään puilla, koska suo voi olla petollisen pehmeä reunoilta.", "vihje_de": "„pitkospuut“ = Bohlenweg; der Rand des Moors („suo“) ist gefährlich weich.", "kysymys_de": "Warum müssen die Wanderer auf dem Bohlenweg bleiben?"}, {"id": "Ku6", "tyyppi": "oikein-väärin", "kysymys": "Suojelualueella saa poimia kukkia.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Suojelualueella ei saa poimia kukkia eikä häiritä lintuja.", "vihje_de": "Im Schutzgebiet („suojelualue“) darf man keine Blumen pflücken.", "kysymys_de": "Im Schutzgebiet darf man Blumen pflücken."}, {"id": "Ku7", "tyyppi": "lyhyt", "kysymys": "Missä retkellä pidetään tauko?", "vaihtoehdot": [], "oikea": "Näköalatornin luona.", "selitys_fi": "Tauko pidetään noin puolessavälissä näköalatornin luona.", "vihje_de": "Pause am Aussichtsturm („näköalatorni“).", "kysymys_de": "Wo wird auf der Wanderung eine Pause gemacht?"}, {"id": "Ku8", "tyyppi": "monivalinta", "kysymys": "Mitä eläimiä retkellä saatetaan nähdä kiikareilla?", "vaihtoehdot": ["karhuja", "kurkia", "kettuja"], "oikea": "b", "selitys_fi": "Opas sanoo, että kiikareilla saatetaan nähdä kurkia.", "vihje_de": "„kurki“ = Kranich; mit dem Fernglas zu sehen.", "kysymys_de": "Welche Tiere könnte man auf der Wanderung mit dem Fernglas sehen?"}]}, {"otsikko": "Keskustelu kierrättämisestä", "tyyppi": "dialogi", "litteraatti": "– Nainen: Hei Antti! Huomasin, että teidän pihalle on tullut uusi muovinkeräysastia. Onko siitä ollut hyötyä?\n– Mies: On todella! Aiemmin vein muovit autolla kauppaan, mutta nyt kaikki onnistuu kätevästi kotipihalla. Sekajätettä syntyy nyt paljon vähemmän.\n– Nainen: Hienoa. Minua kyllä mietityttää, mitkä muovit sinne saa laittaa. Voiko sinne laittaa esimerkiksi jogurttipurkkeja?\n– Mies: Kyllä voi, kunhan huuhtelet ne ensin. Likaista muovia ei oteta vastaan, koska se pilaa koko keräyserän.\n– Nainen: Selvä. Entä muovikassit ja leipäpussit?\n– Mies: Nekin käyvät, jos ne ovat puhtaita ja kuivia. Sen sijaan vaikkapa lelut tai hammasharjat eivät kuulu muovinkeräykseen, vaan sekajätteeseen.\n– Nainen: Aha, sitä en tiennyt. Pitää varmaan tarkistaa ohjeet netistä.\n– Mies: Kannattaa. Kunnan sivuilta löytyy selkeä lajitteluopas. Pienillä teoilla on iso merkitys ympäristölle.\n– Nainen: Totta. Kiitos vinkeistä, alan heti lajitella tarkemmin!", "litteraatti_de": "– Frau: Hallo Antti! Mir ist aufgefallen, dass in eurem Hof ein neuer Kunststoff-Sammelbehälter aufgestellt wurde. Hat er etwas gebracht?\n– Mann: Ja, wirklich! Früher habe ich den Kunststoff mit dem Auto zum Geschäft gebracht, aber jetzt klappt alles bequem im eigenen Hof. Es entsteht jetzt viel weniger Restmüll.\n– Frau: Toll. Mich beschäftigt allerdings, welcher Kunststoff da hinein darf. Kann man zum Beispiel Joghurtbecher hineingeben?\n– Mann: Ja, das geht, solange man sie zuerst ausspült. Schmutziger Kunststoff wird nicht angenommen, weil er die ganze Sammelcharge verdirbt.\n– Frau: Alles klar. Und Plastiktüten und Brotbeutel?\n– Mann: Die gehen auch, wenn sie sauber und trocken sind. Spielzeug oder Zahnbürsten dagegen gehören nicht in die Kunststoffsammlung, sondern in den Restmüll.\n– Frau: Aha, das wusste ich nicht. Ich sollte wohl die Anweisungen im Internet überprüfen.\n– Mann: Das lohnt sich. Auf den Seiten der Gemeinde findest du einen klaren Trennleitfaden. Kleine Taten haben eine große Bedeutung für die Umwelt.\n– Frau: Stimmt. Danke für die Tipps, ich fange gleich an, genauer zu trennen!", "hl": ["Aiemmin vein muovit autolla kauppaan, mutta nyt kaikki onnistuu kätevästi kotipihalla.", "Likaista muovia ei oteta vastaan, koska se pilaa koko keräyserän.", "Sen sijaan vaikkapa lelut tai hammasharjat eivät kuulu muovinkeräykseen, vaan sekajätteeseen."], "audio": "Simulaatio_09_ymparisto/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Miksi uusi muovinkeräysastia on miehen mielestä hyvä?", "vaihtoehdot": ["Se on ilmainen.", "Muovit voi lajitella kätevästi kotipihalla.", "Se on suurempi kuin vanha astia."], "oikea": "b", "selitys_fi": "Mies kertoo, että nyt muovien lajittelu onnistuu kätevästi kotipihalla.", "vihje_de": "Vorteil: bequemes Sortieren im eigenen Hof („kotipiha“).", "kysymys_de": "Warum ist der neue Kunststoff-Sammelbehälter aus Sicht des Mannes gut?"}, {"id": "Ku10", "tyyppi": "oikein-väärin", "kysymys": "Likaisen muovin saa laittaa keräysastiaan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Likaista muovia ei oteta vastaan, koska se pilaa koko keräyserän.", "vihje_de": "„likainen muovi“ = schmutziger Kunststoff darf nicht hinein.", "kysymys_de": "Schmutzigen Kunststoff darf man in den Sammelbehälter geben."}, {"id": "Ku11", "tyyppi": "lyhyt", "kysymys": "Mitä muoviesineitä ei saa laittaa muovinkeräykseen?", "vaihtoehdot": [], "oikea": "Leluja ja hammasharjoja.", "selitys_fi": "Lelut ja hammasharjat eivät kuulu muovinkeräykseen vaan sekajätteeseen.", "vihje_de": "Spielzeug („lelu“) und Zahnbürsten gehören nicht hinein.", "kysymys_de": "Welche Kunststoffgegenstände dürfen nicht in die Kunststoffsammlung gegeben werden?"}, {"id": "Ku12", "tyyppi": "monivalinta", "kysymys": "Mistä naista neuvotaan etsimään lisää ohjeita?", "vaihtoehdot": ["kunnan nettisivuilta", "kaupan ilmoitustaululta", "naapurilta"], "oikea": "a", "selitys_fi": "Mies kehottaa katsomaan kunnan sivuilta löytyvän selkeän lajitteluoppaan.", "vihje_de": "Anleitung auf der Webseite der Gemeinde („kunnan sivut“).", "kysymys_de": "Wo wird der Frau geraten, weitere Anweisungen zu suchen?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Olet ollut viikonlopun ystäväsi mökillä. Kirjoita ystävällesi tekstiviesti, jossa kiität viikonlopusta. Kerro, mikä mökillä oli mukavinta, mainitse jokin yhteinen hetki ja ehdota, milloin näette seuraavan kerran.", "ohje_de": "Sie waren am Wochenende im Ferienhaus Ihrer Freundin/Ihres Freundes. Schreiben Sie eine kurze Nachricht (SMS), in der Sie sich bedanken. Sagen Sie, was am schönsten war, erwähnen Sie einen gemeinsamen Moment und schlagen Sie ein nächstes Treffen vor.", "sanamaara": "80–120", "mallivastaus": "Moi Laura!\n\nKiitos vielä kerran ihanasta viikonlopusta mökilläsi! Minulla oli tosi mukavaa, ja oli kiva päästä hetkeksi pois kaupungin kiireestä. Luonto oli kaunista, ja järvi näytti illalla aivan tyyneltä.\n\nKaikkein parasta oli lauantai-illan saunominen ja uinti. Muistatko, kun hyppäsimme yhdessä kylmään veteen ja nauroimme niin, että vatsaan koski? Sitä hetkeä en unohda pitkään aikaan.\n\nOlisi kiva nähdä taas pian. Ehkä voisit tulla minulle kylään ensi viikonloppuna, vaikka jo lauantaina? Voisimme katsoa yhdessä elokuvan, syödä jotain hyvää ja muistella mökkireissua kaikessa rauhassa. Laita viestiä, miltä idea kuulostaa, niin sovitaan tarkemmin!\n\nHalauksin,\nTheresia", "arviointi_fi": "Arvioidaan viestin sopiva epävirallinen sävy, puhuttelu ja lopetus, kaikkien kolmen sisältökohdan käsittely (kiitos, yhteinen hetki, ehdotus tapaamisesta) sekä perusrakenteiden ja sanaston oikeellisuus. Tasolla 3 viesti välittää sanoman selvästi, vaikka pieniä virheitä olisi.", "mallivastaus_de": "Hallo Laura!\n\nVielen Dank noch einmal für das herrliche Wochenende in deinem Ferienhaus! Ich hatte es wirklich schön, und es war toll, für eine Weile aus der Hektik der Stadt herauszukommen. Die Natur war wunderschön, und der See sah am Abend ganz ruhig aus.\n\nAm allerschönsten war das Saunieren und Baden am Samstagabend. Erinnerst du dich, wie wir zusammen ins kalte Wasser gesprungen sind und so gelacht haben, dass uns der Bauch wehtat? Diesen Moment werde ich lange nicht vergessen.\n\nEs wäre schön, dich bald wiederzusehen. Vielleicht könntest du mich nächstes Wochenende besuchen, vielleicht schon am Samstag? Wir könnten zusammen einen Film schauen, etwas Gutes essen und in aller Ruhe von der Ferienhaus-Reise schwärmen. Schreib mir, wie dir die Idee gefällt, dann verabreden wir uns genauer!\n\nMit Umarmungen,\nTheresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Kirjoita keskustelupalstalle kirjoitus otsikolla ”Pitäisikö muovipakkauksia verottaa enemmän?”. Kerro oma mielipiteesi, perustele se ainakin kahdella syyllä ja mainitse myös yksi mahdollinen vasta-argumentti. Lopeta lyhyeen yhteenvetoon.", "ohje_de": "Schreiben Sie einen Forumsbeitrag mit dem Titel „Sollte man Plastikverpackungen stärker besteuern?“. Nennen Sie Ihre Meinung, begründen Sie sie mit mindestens zwei Argumenten und nennen Sie auch ein Gegenargument. Schließen Sie mit einer kurzen Zusammenfassung.", "sanamaara": "150–200", "mallivastaus": "Pitäisikö muovipakkauksia verottaa enemmän?\n\nMielestäni muovipakkausten verotusta pitäisi ehdottomasti lisätä. Muovi on yksi suurimmista ympäristöongelmistamme, ja meidän on tehtävä jotain sen vähentämiseksi.\n\nEnsinnäkin korkeampi vero kannustaisi yrityksiä kehittämään ympäristöystävällisempiä pakkauksia. Kun muovi maksaa enemmän, monet etsivät vaihtoehtoja, kuten kartonkia tai uusiokäytettäviä materiaaleja. Toiseksi verosta saadut rahat voitaisiin käyttää kierrätyksen parantamiseen ja luonnonsuojeluun. Esimerkiksi useammilla asuinalueilla voisi olla kattavat keräysastiat, jolloin lajittelu helpottuisi kaikille. Lisäksi vähemmän muovia tarkoittaisi puhtaampia meriä ja terveempää luontoa eläimille.\n\nToisaalta ymmärrän, että vero saattaa nostaa ruoan hintoja, mikä on ikävää erityisesti pienituloisille perheille. Tämä on otettava huomioon esimerkiksi tukemalla edullisia ja ympäristöystävällisiä vaihtoehtoja, jotta muutos olisi reilu kaikille.\n\nKaiken kaikkiaan uskon kuitenkin, että muovin verotus on tarpeellinen keino suojella ympäristöä tuleville sukupolville. Pienikin muutos kulutustottumuksissa voi ajan myötä saada aikaan suuren vaikutuksen. Siksi kannatan korkeampaa veroa, kunhan se toteutetaan oikeudenmukaisesti.", "arviointi_fi": "Arvioidaan selkeä mielipide, vähintään kaksi perustelua, vasta-argumentti ja yhteenveto, tekstin jäsentely kappaleisiin sekä sidossanojen (ensinnäkin, toisaalta, kaiken kaikkiaan) käyttö. Tasolla 3–4 kirjoittaja perustelee kantansa ymmärrettävästi ja käyttää melko monipuolista sanastoa.", "mallivastaus_de": "Sollte man Plastikverpackungen stärker besteuern?\n\nMeiner Meinung nach sollte man die Besteuerung von Plastikverpackungen unbedingt erhöhen. Plastik ist eines unserer größten Umweltprobleme, und wir müssen etwas zu seiner Verringerung tun.\n\nErstens würde eine höhere Steuer Unternehmen dazu anregen, umweltfreundlichere Verpackungen zu entwickeln. Wenn Plastik mehr kostet, suchen viele nach Alternativen wie Karton oder wiederverwendbaren Materialien. Zweitens könnten die aus der Steuer eingenommenen Gelder zur Verbesserung des Recyclings und zum Naturschutz verwendet werden. Zum Beispiel könnten mehr Wohngebiete umfassende Sammelbehälter haben, sodass das Trennen für alle leichter würde. Außerdem würde weniger Plastik sauberere Meere und eine gesündere Natur für Tiere bedeuten.\n\nAndererseits verstehe ich, dass die Steuer die Lebensmittelpreise erhöhen könnte, was besonders für einkommensschwache Familien ärgerlich ist. Das muss berücksichtigt werden, zum Beispiel indem günstige und umweltfreundliche Alternativen gefördert werden, damit die Veränderung für alle fair ist.\n\nAlles in allem glaube ich jedoch, dass die Besteuerung von Plastik ein notwendiges Mittel ist, um die Umwelt für kommende Generationen zu schützen. Schon eine kleine Veränderung der Konsumgewohnheiten kann mit der Zeit eine große Wirkung haben. Deshalb befürworte ich eine höhere Steuer, sofern sie gerecht umgesetzt wird."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen", "ohje_fi": "Asuinalueellesi suunnitellaan uutta puistoa. Kirjoita kunnan verkkosivuille palaute, jossa kuvailet, millainen puiston pitäisi mielestäsi olla. Kerro, kenelle puisto on tärkeä, ja ehdota kahta asiaa, joita puistossa voisi olla.", "ohje_de": "In Ihrem Wohngebiet ist ein neuer Park geplant. Schreiben Sie eine Rückmeldung auf der Webseite der Gemeinde, in der Sie beschreiben, wie der Park sein sollte. Sagen Sie, für wen der Park wichtig ist, und schlagen Sie zwei Dinge vor, die es im Park geben könnte.", "sanamaara": "120–160", "mallivastaus": "Palaute uudesta puistosuunnitelmasta\n\nHyvä kaupungin suunnittelutiimi,\n\nKiitos mahdollisuudesta antaa palautetta tulevasta puistosta. Mielestäni uusi puisto on alueellemme erittäin tervetullut, sillä lähistöllä on vähän vihreitä alueita.\n\nToivoisin, että puisto olisi rauhallinen ja luonnonmukainen. Olisi hienoa, jos siellä säilytettäisiin mahdollisimman paljon vanhoja puita ja istutettaisiin kukkivia pensaita, jotka houkuttelevat mehiläisiä ja perhosia. Puisto olisi tärkeä erityisesti lapsiperheille ja ikäihmisille, jotka kaipaavat turvallista paikkaa ulkoiluun.\n\nEhdottaisin puistoon kahta asiaa. Ensinnäkin sinne kannattaisi rakentaa turvallinen leikkipaikka lapsille, sillä lähistöllä sellaista ei vielä ole. Toiseksi toivoisin riittävästi penkkejä ja roska-astioita sekä selkeät kierrätyspisteet, jotta alue pysyisi siistinä ja viihtyisänä kaikkina vuodenaikoina.\n\nUskon, että hyvin suunniteltu puisto lisäisi alueen viihtyisyyttä ja toisi naapurustoa yhteen. Toivottavasti ehdotukseni otetaan huomioon. Ystävällisin terveisin, Theresia Virtanen", "arviointi_fi": "Arvioidaan puolivirallinen, kohtelias sävy, aloitus ja lopetus, kuvaileva ote, kaikkien kohtien käsittely (millainen puisto, kenelle tärkeä, kaksi ehdotusta) sekä sanaston ja rakenteiden hallinta. Tasolla 3 teksti on ymmärrettävä ja asianmukainen, vaikka yksittäisiä virheitä esiintyisi.", "mallivastaus_de": "Rückmeldung zum neuen Parkplan\n\nSehr geehrtes Planungsteam der Stadt,\n\nvielen Dank für die Möglichkeit, eine Rückmeldung zum geplanten Park zu geben. Meiner Meinung nach ist der neue Park für unser Gebiet sehr willkommen, da es in der Nähe nur wenige Grünflächen gibt.\n\nIch würde mir wünschen, dass der Park ruhig und naturnah ist. Es wäre schön, wenn dort möglichst viele alte Bäume erhalten und blühende Sträucher gepflanzt würden, die Bienen und Schmetterlinge anlocken. Der Park wäre besonders für Familien mit Kindern und für ältere Menschen wichtig, die einen sicheren Ort zum Spazierengehen vermissen.\n\nIch würde für den Park zwei Dinge vorschlagen. Erstens lohnte es sich, dort einen sicheren Spielplatz für Kinder zu bauen, denn in der Nähe gibt es noch keinen. Zweitens würde ich mir ausreichend Bänke und Mülleimer sowie klar gekennzeichnete Recyclingstellen wünschen, damit das Gebiet sauber und angenehm zu allen Jahreszeiten bleibt.\n\nIch glaube, dass ein gut geplanter Park die Behaglichkeit des Gebiets steigern und die Nachbarschaft zusammenbringen würde. Hoffentlich wird mein Vorschlag berücksichtigt. Mit freundlichen Grüßen, Theresia Virtanen"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Naapurisi laittaa lasipullot väärään jäteastiaan. Sano hänelle ystävällisesti, mihin pullot kuuluvat.", "ohje_de": "Ihr Nachbar wirft Glasflaschen in die falsche Tonne. Sagen Sie ihm freundlich, wohin die Flaschen gehören.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Hei, anteeksi että puutun! Nuo lasipullot kuuluvat itse asiassa tuohon lasinkeräysastiaan, eivät sekajätteeseen. Voin näyttää sinulle oikean astian, jos haluat.", "malli_de": "Hallo, entschuldige, dass ich mich einmische! Diese Glasflaschen gehören eigentlich in jenen Glas-Sammelbehälter, nicht in den Restmüll. Ich kann dir den richtigen Behälter zeigen, wenn du möchtest."}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Ystäväsi pyytää sinua mukaan roskien keräystalkoisiin lähimetsään. Vastaa myöntävästi ja kysy yksi käytännön asia.", "ohje_de": "Ihre Freundin lädt Sie zu einer Müllsammelaktion im Wald ein. Sagen Sie zu und stellen Sie eine praktische Frage.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Joo, tulen mielelläni mukaan! Hieno juttu, että metsää siivotaan yhdessä. Pitääkö minun ottaa omat hanskat ja roskapussit mukaan, vai saako niitä paikan päältä?", "malli_de": "Ja, ich komme gerne mit! Eine schöne Sache, dass der Wald gemeinsam aufgeräumt wird. Muss ich eigene Handschuhe und Müllsäcke mitbringen, oder bekommt man die vor Ort?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Olet kaupassa ja haluat ostaa ympäristöystävällisen pesuaineen. Pyydä myyjältä suositusta.", "ohje_de": "Sie sind im Geschäft und möchten ein umweltfreundliches Waschmittel kaufen. Bitten Sie die Verkäuferin/den Verkäufer um eine Empfehlung.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Anteeksi, voisitteko auttaa? Etsin mahdollisimman ympäristöystävällistä pesuainetta. Onko teillä jotain, jolla on ympäristömerkki, esimerkiksi Joutsenmerkki? Mitä suosittelisitte?", "malli_de": "Entschuldigung, könnten Sie mir helfen? Ich suche ein möglichst umweltfreundliches Waschmittel. Haben Sie etwas mit einem Umweltzeichen, zum Beispiel dem Nordischen Umweltzeichen (Joutsenmerkki)? Was würden Sie empfehlen?"}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Sää on muuttunut sateiseksi, ja olitte menossa retkelle. Ehdota ystävällesi, mitä voisitte tehdä sen sijaan.", "ohje_de": "Das Wetter ist regnerisch geworden, obwohl Sie eine Wanderung geplant hatten. Schlagen Sie Ihrer Freundin/Ihrem Freund eine Alternative vor.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Harmi, että alkoi sataa noin kovasti. Ehkä siirretään retki ensi viikonloppuun? Voitaisiin tänään mennä vaikka kahvilaan tai katsoa elokuva minun luonani. Mitä mieltä olet?", "malli_de": "Schade, dass es so stark zu regnen begonnen hat. Vielleicht verschieben wir die Wanderung auf nächstes Wochenende? Wir könnten heute zum Beispiel in ein Café gehen oder bei mir einen Film schauen. Was meinst du?"}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Haluat lainata naapurilta polkupyörää, jotta voit mennä töihin autoa vähemmän. Esitä pyyntö kohteliaasti.", "ohje_de": "Sie möchten sich vom Nachbarn ein Fahrrad leihen, um weniger mit dem Auto zur Arbeit zu fahren. Formulieren Sie die Bitte höflich.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei! Olisikohan mahdollista lainata sinun ylimääräistä polkupyörääsi muutamaksi päiväksi? Haluaisin kokeilla pyöräilyä töihin auton sijaan. Pitäisin pyörästä tietysti hyvää huolta.", "malli_de": "Hallo! Wäre es wohl möglich, dein zusätzliches Fahrrad für ein paar Tage zu leihen? Ich würde gerne ausprobieren, statt mit dem Auto mit dem Fahrrad zur Arbeit zu fahren. Ich würde natürlich gut auf das Fahrrad aufpassen."}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro mieleenpainuvasta hetkestä luonnossa. Missä olit, mitä teit, ja miksi se jäi mieleesi? Sinulla on aikaa valmistautua ennen kuin alat puhua.", "ohje_de": "Erzählen Sie von einem unvergesslichen Moment in der Natur. Wo waren Sie, was haben Sie gemacht, und warum ist es Ihnen in Erinnerung geblieben? Sie haben Zeit zur Vorbereitung, bevor Sie sprechen.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluan kertoa retkestä, jonka tein viime syksynä Lapissa. Olin ystäväni kanssa vaeltamassa kansallispuistossa, ja sää oli kirkas ja kylmä. Kävelimme koko päivän tunturissa, ja maisemat olivat aivan henkeäsalpaavia. Ruska oli parhaimmillaan, ja koko maa hehkui punaisena ja keltaisena. Illalla nousimme tunturin huipulle katsomaan auringonlaskua. Yhtäkkiä taivaalle ilmestyivät revontulet. En ollut koskaan ennen nähnyt niitä omin silmin, ja jäin aivan sanattomaksi. Vihreät valot liikkuivat hitaasti taivaalla, ja oli täysin hiljaista. Tunsin oloni hyvin pieneksi mutta samalla onnelliseksi. Se hetki jäi mieleeni, koska se muistutti minua siitä, kuinka kaunis ja arvokas luonto on. Sen jälkeen olen halunnut viettää enemmän aikaa luonnossa ja suojella sitä. Palaan tuohon hetkeen aina, kun tarvitsen rauhaa.", "malli_de": "Ich möchte von einer Wanderung erzählen, die ich letzten Herbst in Lappland gemacht habe. Ich war mit meiner Freundin in einem Nationalpark wandern, und das Wetter war klar und kalt. Wir gingen den ganzen Tag im Fjell, und die Landschaften waren absolut atemberaubend. Die Herbstfärbung (Ruska) war auf ihrem Höhepunkt, und das ganze Land glühte rot und gelb. Am Abend stiegen wir auf den Gipfel des Fjells, um den Sonnenuntergang zu betrachten. Plötzlich erschienen am Himmel Polarlichter. Ich hatte sie noch nie zuvor mit eigenen Augen gesehen und war völlig sprachlos. Die grünen Lichter bewegten sich langsam am Himmel, und es war völlig still. Ich fühlte mich sehr klein, aber zugleich glücklich. Dieser Moment ist mir in Erinnerung geblieben, weil er mich daran erinnerte, wie schön und wertvoll die Natur ist. Seitdem möchte ich mehr Zeit in der Natur verbringen und sie schützen. Ich kehre zu jenem Moment immer dann zurück, wenn ich Ruhe brauche."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Suunnittelet työkaverisi kanssa, miten työpaikallanne voisi vähentää jätettä. Roolisi: ehdotat konkreettisia ideoita ja perustelet ne. Keskustele haastattelijan kanssa.", "ohje_de": "Situation: Sie planen mit einer Kollegin/einem Kollegen, wie man am Arbeitsplatz Müll reduzieren kann. Ihre Rolle: Sie schlagen konkrete Ideen vor und begründen sie. Führen Sie das Gespräch mit der Prüferin/dem Prüfer.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Mielestäni voisimme aloittaa siitä, että lopettaisimme kertakäyttömukit ja ottaisimme käyttöön omat kahvikupit. Se vähentäisi roskaa heti.\n– Hyvä idea! Entä paperinkulutus?\n– Niin, voisimme tulostaa vähemmän ja siirtyä sähköisiin asiakirjoihin. Lisäksi voisimme laittaa taukotilaan selkeät lajitteluastiat
