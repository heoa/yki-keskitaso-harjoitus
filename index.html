<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1f2937;--dark:#1F3864;--mid:#2E5496;--gray:#6b7280;--ok:#0a7d33;--gold:#7A6000;--line:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--dark);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px}
header h1{margin:0;font-size:18px}header p{margin:4px 0 0;font-size:12px;opacity:.85}
.flags{display:flex;gap:8px;align-items:center;flex-shrink:0}
.flags button{padding:0;border:2px solid transparent;border-radius:4px;background:none;cursor:pointer;line-height:0;opacity:.4;transition:opacity .15s;position:relative}
.flags button:hover{opacity:.85}.flags button.on{opacity:1;border-color:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
.flags svg{width:38px;height:auto;display:block;border-radius:2px}
.wrap{max-width:860px;margin:0 auto;padding:16px}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
select,button{font:inherit}select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
.seg{display:flex;gap:4px;background:#eef1f7;border-radius:8px;padding:3px}
.seg button{border:0;background:transparent;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--mid)}
.seg button.on{background:var(--mid);color:#fff}
.meta{font-size:12px;color:var(--gray);margin-left:auto}
.toolbar{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#eaf0fb;border:1px solid #d4e0f3;border-radius:12px;padding:10px 12px;margin-bottom:12px}
.toolbar .lbl{font-size:12px;color:var(--gray);font-weight:600;margin-right:2px}
.toolbar button{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--line);background:#fff;color:var(--mid);border-radius:20px;cursor:pointer;font-size:13px;font-weight:600}
.toolbar button:hover{border-color:var(--mid)}
.toolbar button.on{background:var(--mid);color:#fff;border-color:var(--mid)}
.toolbar button.on.hl{background:#ffd633;color:#5b4a00;border-color:#e0b400}
.sliderrow{display:flex;align-items:center;gap:12px;margin:4px 2px 14px}
.sliderrow input[type=range]{flex:1}
.navbtn{padding:4px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer}
.counter{font-variant-numeric:tabular-nums;font-size:13px;color:var(--gray);min-width:96px;text-align:right}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ctx{font-size:12px;color:var(--mid);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;font-weight:600}
.passage{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-left:4px solid var(--mid);border-radius:10px;padding:13px 15px;font-size:14.5px;line-height:1.65;margin:6px 0 10px}
.trans{white-space:pre-wrap;background:#eef3fb;border:1px solid #d4e0f3;border-left:4px solid var(--mid);border-radius:10px;padding:13px 15px;font-size:14px;line-height:1.6;margin:0 0 14px;color:#21406e}
mark.hl{background:#fff3b0;border-radius:3px;padding:0 1px;box-shadow:inset 0 -2px 0 #ffd633}
.q{font-size:16px;line-height:1.45;margin:0 0 10px}
.qitem{border-top:1px dashed var(--line);padding:12px 0 6px}.qitem .q{font-size:15px;margin-bottom:8px}
.opts{list-style:none;padding:0;margin:0 0 6px}.opts li{padding:8px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px}
.opts li.correct{border-color:var(--ok);background:#eafbf0}
.answer{margin-top:6px;padding:11px 13px;border-left:4px solid var(--ok);background:#f3faf5;border-radius:8px}
.answer .a{font-weight:700;color:var(--ok)}
.de{margin-top:6px;padding:9px 12px;border-left:4px solid var(--gold);background:#fbf8ee;border-radius:8px;font-size:13.5px;color:#5b4a00}
.model{white-space:pre-wrap;font-size:14px;line-height:1.55;margin-top:6px}
.toggle,.inlinebtn{padding:8px 13px;border:1px solid var(--mid);background:#fff;color:var(--mid);border-radius:9px;cursor:pointer;font-size:13.5px}
.toggle{margin:0 0 12px}.inlinebtn{margin-top:12px}
.mini{margin-top:4px;padding:5px 10px;border:1px solid var(--line);background:#fff;color:var(--mid);border-radius:8px;cursor:pointer;font-size:12.5px}
.hint{font-size:12px;color:var(--gray);margin-top:10px}
#audiobar{display:none;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-bottom:12px}
.audiolbl{font-size:13px;color:var(--mid);font-weight:600;margin-bottom:7px}
#player{width:100%;height:34px}
#banner{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
#banner svg{display:block;width:100%;height:auto}
.photo{width:100%;max-height:230px;object-fit:cover;border-radius:12px;margin:0 0 12px;display:block;background:#eef1f7}
footer{max-width:860px;margin:0 auto;padding:10px 16px 30px;font-size:11px;color:var(--gray)}
</style></head><body>

<script>
const DATA = [{"id": 1, "teema": "Asuminen ja naapurusto", "teema_de": "Wohnen und Nachbarschaft", "reading": [{"otsikko": "Vuokrataan kaksio keskustasta", "tyyppi": "ilmoitus", "teksti": "Vuokrataan valoisa kaksio Tampereen keskustassa, osoitteessa Hämeenkatu 14. Asunnon koko on 54 neliömetriä, ja se sijaitsee kerrostalon neljännessä kerroksessa. Talossa on hissi, joten asunto sopii hyvin myös ikääntyneille tai liikuntarajoitteisille. Keittiö on remontoitu viime vuonna, ja asunnossa on astianpesukone sekä uusi jääkaappi. Parvekkeelta on näkymä rauhalliseen sisäpihaan. Vuokra on 850 euroa kuukaudessa, ja siihen sisältyvät vesi ja lämmitys. Sähkösopimus tehdään erikseen omalla nimellä. Vuokranantaja perii kahden kuukauden vakuuden, joka maksetaan ennen muuttoa. Asuntoon ei valitettavasti saa tuoda lemmikkieläimiä, koska edellisellä vuokralaisella oli koira ja naapurit valittivat melusta. Tupakointi sisätiloissa on kielletty. Asunto vapautuu ensi kuun alussa, ja se vuokrataan mieluiten pitkäaikaiseen käyttöön. Näytöt järjestetään ensi viikon lauantaina kello 10–12. Ilmoittautuminen näyttöön tapahtuu sähköpostitse. Kiinnostuneita pyydetään kertomaan viestissä lyhyesti itsestään ja työtilanteestaan. Ota rohkeasti yhteyttä, niin sovitaan tapaaminen!", "teksti_de": "Helle Zweizimmerwohnung im Stadtzentrum von Tampere zu vermieten, in der Hämeenkatu 14. Die Wohnung ist 54 Quadratmeter groß und liegt im vierten Stock eines Mehrfamilienhauses. Das Haus hat einen Aufzug, daher eignet sich die Wohnung auch gut für ältere oder gehbehinderte Menschen. Die Küche wurde im vergangenen Jahr renoviert, und in der Wohnung gibt es eine Geschirrspülmaschine sowie einen neuen Kühlschrank. Vom Balkon hat man Blick auf einen ruhigen Innenhof. Die Miete beträgt 850 Euro im Monat, und darin enthalten sind Wasser und Heizung. Der Stromvertrag wird gesondert auf eigenen Namen abgeschlossen. Der Vermieter erhebt eine Kaution von zwei Monatsmieten, die vor dem Einzug zu zahlen ist. In die Wohnung dürfen leider keine Haustiere mitgebracht werden, weil der vorige Mieter einen Hund hatte und die Nachbarn sich über den Lärm beschwerten. Rauchen in den Innenräumen ist verboten. Die Wohnung wird zu Beginn des nächsten Monats frei und wird vorzugsweise zur langfristigen Nutzung vermietet. Besichtigungen werden am Samstag der nächsten Woche von 10 bis 12 Uhr durchgeführt. Die Anmeldung zur Besichtigung erfolgt per E-Mail. Interessenten werden gebeten, in der Nachricht kurz etwas über sich und ihre berufliche Situation zu schreiben. Nehmen Sie ruhig Kontakt auf, dann vereinbaren wir einen Termin!", "hl": ["Talossa on hissi, joten asunto sopii hyvin myös ikääntyneille tai liikuntarajoitteisille.", "Vuokra on 850 euroa kuukaudessa, ja siihen sisältyvät vesi ja lämmitys.", "Asuntoon ei valitettavasti saa tuoda lemmikkieläimiä, koska edellisellä vuokralaisella oli koira ja naapurit valittivat melusta.", "Ilmoittautuminen näyttöön tapahtuu sähköpostitse."], "image": "Simulaatio_01_asuminen/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Mitä vuokraan sisältyy?", "vaihtoehdot": ["Vesi ja lämmitys", "Sähkö ja vesi", "Lämmitys ja sähkö"], "oikea": "a", "selitys_fi": "Tekstissä sanotaan, että vuokraan sisältyvät vesi ja lämmitys, mutta sähkösopimus tehdään erikseen.", "vihje_de": "Was ist in der Miete enthalten? Achten Sie auf „siihen sisältyvät“ (darin enthalten sind).", "kysymys_de": "Was ist in der Miete enthalten?"}, {"id": "L2", "tyyppi": "oikein-väärin", "kysymys": "Asuntoon saa tuoda koiran.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan asuntoon ei saa tuoda lemmikkieläimiä, koska naapurit valittivat aiemmin koiran melusta.", "vihje_de": "„lemmikkieläin“ = Haustier. Darf man ein Haustier mitbringen?", "kysymys_de": "In die Wohnung darf man einen Hund mitbringen."}, {"id": "L3", "tyyppi": "monivalinta", "kysymys": "Miksi asunto sopii myös ikääntyneille?", "vaihtoehdot": ["Koska asunto on ensimmäisessä kerroksessa", "Koska talossa on hissi", "Koska keittiö on remontoitu"], "oikea": "b", "selitys_fi": "Tekstissä kerrotaan, että talossa on hissi, joten asunto sopii hyvin myös ikääntyneille tai liikuntarajoitteisille.", "vihje_de": "„hissi“ = Aufzug. Warum eignet sich die Wohnung auch für ältere Menschen?", "kysymys_de": "Warum eignet sich die Wohnung auch für ältere Menschen?"}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Miten näyttöön pitää ilmoittautua?", "vaihtoehdot": [], "oikea": "Sähköpostitse / sähköpostilla.", "selitys_fi": "Tekstissä sanotaan, että ilmoittautuminen näyttöön tapahtuu sähköpostitse.", "vihje_de": "Wie meldet man sich zur Besichtigung an? „ilmoittautua“ = sich anmelden.", "kysymys_de": "Wie muss man sich zur Besichtigung anmelden?"}]}, {"otsikko": "Viesti uudelle naapurille", "tyyppi": "sähköposti", "teksti": "Hei ja tervetuloa taloon! Olen Marja, asun teidän alapuolellanne asunnossa B 12. Huomasin, että muutitte viime viikonloppuna, ja halusin toivottaa teidät tervetulleiksi naapurustoon. Tämä on oikein mukava ja rauhallinen talo, ja useimmat asukkaat tuntevat toisensa ainakin nimeltä. Halusin myös kertoa muutaman käytännön asian. Talon pesutupa sijaitsee kellarikerroksessa, ja vuorot varataan ilmoitustaululta löytyvästä vihkosta. Pesutupa on käytössä arkisin kello 8–21 ja viikonloppuisin kello 10–18. Roskakatos on pihan perällä, ja siellä lajitellaan biojäte, pakkaukset ja sekajäte erikseen. Pyöriä saa säilyttää kellarissa, mutta ei rappukäytävässä, koska se on paloturvallisuussyistä kielletty. Jos teillä on kysyttävää taloyhtiön asioista, isännöitsijän yhteystiedot löytyvät rappukäytävän ilmoitustaululta. Me asukkaat järjestämme joka kevät yhteisen pihatalkoopäivän, jolloin siivoamme pihaa ja juomme kahvia yhdessä. Toivottavasti näemme silloin! Jos tarvitsette apua tai haluatte lainata vaikka porakonetta, soittakaa rohkeasti ovikelloa. Mukavaa alkanutta asumista toivottaen, Marja", "teksti_de": "Hallo und willkommen im Haus! Ich bin Marja und wohne unter Ihnen in der Wohnung B 12. Ich habe bemerkt, dass Sie letztes Wochenende eingezogen sind, und wollte Sie in der Nachbarschaft willkommen heißen. Dies ist ein wirklich nettes und ruhiges Haus, und die meisten Bewohner kennen sich zumindest dem Namen nach. Ich wollte Ihnen auch ein paar praktische Dinge mitteilen. Die Waschküche des Hauses befindet sich im Kellergeschoss, und die Termine werden in einem Heft reserviert, das am schwarzen Brett zu finden ist. Die Waschküche ist werktags von 8 bis 21 Uhr und am Wochenende von 10 bis 18 Uhr in Betrieb. Der Müllplatz ist am hinteren Ende des Hofes, und dort werden Bioabfall, Verpackungen und Restmüll getrennt. Fahrräder dürfen im Keller aufbewahrt werden, aber nicht im Treppenhaus, weil das aus Brandschutzgründen verboten ist. Wenn Sie Fragen zu den Angelegenheiten der Hausgesellschaft haben, finden Sie die Kontaktdaten des Hausverwalters am schwarzen Brett im Treppenhaus. Wir Bewohner veranstalten jedes Frühjahr einen gemeinsamen Hofarbeitstag, an dem wir den Hof säubern und zusammen Kaffee trinken. Hoffentlich sehen wir uns dann! Wenn Sie Hilfe brauchen oder sich zum Beispiel eine Bohrmaschine ausleihen möchten, klingeln Sie ruhig an der Tür. Mit den besten Wünschen für einen guten Start in das Wohnen, Marja", "hl": ["Olen Marja, asun teidän alapuolellanne asunnossa B 12.", "Talon pesutupa sijaitsee kellarikerroksessa, ja vuorot varataan ilmoitustaululta löytyvästä vihkosta.", "Pyöriä saa säilyttää kellarissa, mutta ei rappukäytävässä, koska se on paloturvallisuussyistä kielletty.", "Me asukkaat järjestämme joka kevät yhteisen pihatalkoopäivän, jolloin siivoamme pihaa ja juomme kahvia yhdessä."], "image": null, "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Missä Marja asuu suhteessa uusiin naapureihin?", "vaihtoehdot": ["Heidän yläpuolellaan", "Heidän alapuolellaan", "Samassa kerroksessa"], "oikea": "b", "selitys_fi": "Marja kirjoittaa asuvansa uusien naapureiden alapuolella asunnossa B 12.", "vihje_de": "„alapuolella“ = unterhalb, „yläpuolella“ = oberhalb. Wo wohnt Marja?", "kysymys_de": "Wo wohnt Marja im Verhältnis zu den neuen Nachbarn?"}, {"id": "L6", "tyyppi": "oikein-väärin", "kysymys": "Pyöriä saa säilyttää rappukäytävässä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Viestin mukaan pyöriä saa säilyttää kellarissa, mutta ei rappukäytävässä paloturvallisuussyistä.", "vihje_de": "„rappukäytävä“ = Treppenhaus. Darf man Fahrräder dort lagern?", "kysymys_de": "Fahrräder dürfen im Treppenhaus aufbewahrt werden."}, {"id": "L7", "tyyppi": "lyhyt", "kysymys": "Mistä pesutuvan vuorot varataan?", "vaihtoehdot": [], "oikea": "Ilmoitustaululta löytyvästä vihkosta.", "selitys_fi": "Tekstissä kerrotaan, että pesutuvan vuorot varataan ilmoitustaululta löytyvästä vihkosta.", "vihje_de": "Wo bucht man die Termine für die Waschküche? „varata vuoro“ = einen Termin reservieren.", "kysymys_de": "Wo werden die Termine für die Waschküche reserviert?"}, {"id": "L8", "tyyppi": "monivalinta", "kysymys": "Mitä asukkaat tekevät joka kevät?", "vaihtoehdot": ["Järjestävät yhteisen pihatalkoopäivän", "Maalaavat rappukäytävän", "Uusivat pesutuvan koneet"], "oikea": "a", "selitys_fi": "Marja kertoo, että asukkaat järjestävät joka kevät yhteisen pihatalkoopäivän, jolloin siivotaan pihaa ja juodaan kahvia.", "vihje_de": "„talkoot“ = gemeinsame freiwillige Arbeit. Was machen die Bewohner jedes Frühjahr?", "kysymys_de": "Was machen die Bewohner jedes Frühjahr?"}]}, {"otsikko": "Taloyhtiössä alkaa putkiremontti", "tyyppi": "tiedote", "teksti": "Hyvät asukkaat, As Oy Kotikuusen hallitus tiedottaa, että talossamme alkaa putkiremontti syyskuun alussa. Remontti koskee kaikkia rappuja, ja se kestää arviolta neljä kuukautta. Remontin aikana vanhat vesiputket ja viemärit uusitaan, ja samalla parannetaan kylpyhuoneiden vedeneristystä. Työ on välttämätön, sillä talon putket ovat yli viisikymmentä vuotta vanhat ja vuotoriski kasvaa joka vuosi. Remontin ajaksi jokaiseen rappuun rakennetaan väliaikaiset wc- ja suihkutilat pihalle. Vesi katkaistaan asunnoista kokonaan vain lyhyiksi ajoiksi, ja katkoista ilmoitetaan aina etukäteen ilmoitustaululla. Pölyn ja melun vuoksi osa asukkaista saattaa haluta muuttaa väliaikaisesti muualle työn ajaksi. Tämä on jokaisen oma päätös, eikä taloyhtiö korvaa väliaikaisen asunnon kuluja. Remontin kokonaiskustannukset jaetaan asukkaiden kesken asunnon koon mukaan, ja kustannukset näkyvät vastikkeessa ensi vuoden alusta alkaen. Järjestämme asukkaille tiedotustilaisuuden elokuun 20. päivänä kello 18 talon kerhohuoneessa. Tervetuloa kuulemaan lisää ja esittämään kysymyksiä. Ystävällisin terveisin, hallitus.", "teksti_de": "Liebe Bewohnerinnen und Bewohner, der Vorstand der Wohnungsgesellschaft As Oy Kotikuusi teilt mit, dass in unserem Haus Anfang September eine Rohrsanierung beginnt. Die Renovierung betrifft alle Aufgänge und dauert schätzungsweise vier Monate. Während der Renovierung werden die alten Wasserrohre und Abwasserleitungen erneuert und gleichzeitig die Wasserabdichtung der Badezimmer verbessert. Die Arbeit ist notwendig, denn die Rohre des Hauses sind über fünfzig Jahre alt und das Risiko von Leckagen steigt jedes Jahr. Für die Dauer der Renovierung werden für jeden Aufgang vorübergehende WC- und Duschräume im Hof errichtet. Das Wasser wird in den Wohnungen nur für kurze Zeiträume vollständig abgestellt, und Unterbrechungen werden immer im Voraus am schwarzen Brett angekündigt. Wegen Staub und Lärm möchten manche Bewohner für die Dauer der Arbeiten vielleicht vorübergehend woanders wohnen. Das ist die eigene Entscheidung jedes Einzelnen, und die Hausgesellschaft erstattet die Kosten für eine vorübergehende Wohnung nicht. Die Gesamtkosten der Renovierung werden unter den Bewohnern nach Wohnungsgröße aufgeteilt, und die Kosten erscheinen ab Anfang nächsten Jahres in der Wohngeldabrechnung. Wir veranstalten für die Bewohner eine Informationsveranstaltung am 20. August um 18 Uhr im Gemeinschaftsraum des Hauses. Herzlich willkommen, um mehr zu erfahren und Fragen zu stellen. Mit freundlichen Grüßen, der Vorstand.", "hl": ["Remontti koskee kaikkia rappuja, ja se kestää arviolta neljä kuukautta.", "Työ on välttämätön, sillä talon putket ovat yli viisikymmentä vuotta vanhat ja vuotoriski kasvaa joka vuosi.", "Tämä on jokaisen oma päätös, eikä taloyhtiö korvaa väliaikaisen asunnon kuluja.", "Järjestämme asukkaille tiedotustilaisuuden elokuun 20. päivänä kello 18 talon kerhohuoneessa."], "image": "Simulaatio_01_asuminen/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Kuinka kauan remontin arvioidaan kestävän?", "vaihtoehdot": ["Noin neljä kuukautta", "Noin neljä viikkoa", "Noin neljä vuotta"], "oikea": "a", "selitys_fi": "Tiedotteessa sanotaan, että remontti kestää arviolta neljä kuukautta.", "vihje_de": "Wie lange dauert die Renovierung voraussichtlich? „kestää“ = dauern, „kuukausi“ = Monat.", "kysymys_de": "Wie lange wird die Renovierung voraussichtlich dauern?"}, {"id": "L10", "tyyppi": "oikein-väärin", "kysymys": "Taloyhtiö maksaa asukkaiden väliaikaisen asunnon kulut.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan taloyhtiö ei korvaa väliaikaisen asunnon kuluja, vaan muutto muualle on jokaisen oma päätös.", "vihje_de": "„korvata kulut“ = Kosten erstatten. Bezahlt die Hausgesellschaft die Ersatzwohnung?", "kysymys_de": "Die Hausgesellschaft bezahlt die Kosten für die vorübergehende Wohnung der Bewohner."}, {"id": "L11", "tyyppi": "monivalinta", "kysymys": "Miksi putkiremontti on välttämätön?", "vaihtoehdot": ["Koska asukkaat haluavat uuden keittiön", "Koska talon putket ovat hyvin vanhat ja vuotoriski kasvaa", "Koska kaupunki vaatii sitä laissa"], "oikea": "b", "selitys_fi": "Tiedotteessa kerrotaan, että putket ovat yli viisikymmentä vuotta vanhat ja vuotoriski kasvaa joka vuosi.", "vihje_de": "„vuotoriski“ = Risiko von Wasserschäden/Leckagen. Warum ist die Renovierung notwendig?", "kysymys_de": "Warum ist die Rohrsanierung notwendig?"}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Milloin ja missä asukkaiden tiedotustilaisuus järjestetään?", "vaihtoehdot": [], "oikea": "Elokuun 20. päivänä kello 18 talon kerhohuoneessa.", "selitys_fi": "Tekstin mukaan tiedotustilaisuus pidetään elokuun 20. päivänä kello 18 talon kerhohuoneessa.", "vihje_de": "Wann und wo findet die Infoveranstaltung statt? „kerhohuone“ = Gemeinschaftsraum.", "kysymys_de": "Wann und wo findet die Informationsveranstaltung für die Bewohner statt?"}]}, {"otsikko": "Naapurisovun salaisuus", "tyyppi": "blogi", "teksti": "Olen asunut samassa kerrostalossa jo kymmenen vuotta, ja minulta kysytään usein, miksi viihdyn naapurustossani niin hyvin. Vastaus on yksinkertainen: hyvä naapurisopu syntyy pienistä teoista. Kun muutin taloon, päätin tervehtiä kaikkia, jotka kohtasin rappukäytävässä. Aluksi se tuntui hieman oudolta, koska monet vain nyökkäsivät vaivautuneina. Vähitellen tervehtimisestä tuli kuitenkin tapa, ja nyt pysähdymme usein juttelemaan hetkeksi postilaatikoiden luona. Olen huomannut, että tärkeintä on kunnioittaa toisten rauhaa. Vältän kovaa melua ilta-aikaan, enkä laita pesukonetta päälle keskellä yötä. Jos järjestän juhlat, kerron siitä naapureille etukäteen ja jätän heille pienen lapun rappuun. Yllättävän usein he eivät valita, vaan kiittävät huomaavaisuudesta. Riitoja syntyy yleensä silloin, kun ihmiset eivät puhu toisilleen vaan kirjoittavat vihaisia viestejä ilmoitustaululle. Itse menen mieluummin koputtamaan ovelle ja juttelen kasvotusten. Naapuruus ei vaadi ystävyyttä, mutta se vaatii kohteliaisuutta ja vähän kärsivällisyyttä. Paras palkinto on tunne siitä, että voi luottaa naapuriin. Kun lähdin viime kesänä lomalle, naapurini kasteli kukkani ja haki postini. Sitä on hyvä naapurusto parhaimmillaan.", "teksti_de": "Ich wohne schon seit zehn Jahren im selben Mehrfamilienhaus, und man fragt mich oft, warum ich mich in meiner Nachbarschaft so wohlfühle. Die Antwort ist einfach: Eine gute Nachbarschaft entsteht aus kleinen Taten. Als ich in das Haus zog, beschloss ich, alle zu grüßen, denen ich im Treppenhaus begegnete. Anfangs fühlte sich das ein wenig seltsam an, weil viele nur verlegen nickten. Allmählich wurde das Grüßen jedoch zur Gewohnheit, und jetzt bleiben wir oft an den Briefkästen stehen, um kurz zu plaudern. Ich habe gemerkt, dass es am wichtigsten ist, die Ruhe der anderen zu respektieren. Ich vermeide lauten Lärm am Abend und stelle die Waschmaschine nicht mitten in der Nacht an. Wenn ich eine Feier veranstalte, sage ich es den Nachbarn im Voraus und hinterlasse ihnen einen kleinen Zettel im Treppenhaus. Erstaunlich oft beschweren sie sich nicht, sondern bedanken sich für die Rücksichtnahme. Streit entsteht meist dann, wenn die Menschen nicht miteinander reden, sondern wütende Nachrichten an das schwarze Brett schreiben. Ich selbst gehe lieber, klopfe an die Tür und rede von Angesicht zu Angesicht. Nachbarschaft verlangt keine Freundschaft, aber sie verlangt Höflichkeit und ein wenig Geduld. Die schönste Belohnung ist das Gefühl, dass man sich auf den Nachbarn verlassen kann. Als ich letzten Sommer in den Urlaub fuhr, goss mein Nachbar meine Blumen und holte meine Post. Das ist eine gute Nachbarschaft, wenn sie am besten ist.", "hl": ["Kun muutin taloon, päätin tervehtiä kaikkia, jotka kohtasin rappukäytävässä.", "Naapuruus ei vaadi ystävyyttä, mutta se vaatii kohteliaisuutta ja vähän kärsivällisyyttä.", "Kun lähdin viime kesänä lomalle, naapurini kasteli kukkani ja haki postini."], "image": null, "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Mitä kirjoittaja päätti tehdä muutettuaan taloon?", "vaihtoehdot": ["Järjestää suuret tutustumisjuhlat", "Tervehtiä kaikkia rappukäytävässä", "Olla puhumatta naapureille"], "oikea": "b", "selitys_fi": "Kirjoittaja kertoo päättäneensä tervehtiä kaikkia, jotka kohtasi rappukäytävässä.", "vihje_de": "„tervehtiä“ = grüßen. Was beschloss der Autor nach dem Einzug zu tun?", "kysymys_de": "Was beschloss der Verfasser zu tun, nachdem er in das Haus gezogen war?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Kirjoittajan mielestä naapuruus vaatii aina ystävyyttä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstissä sanotaan, että naapuruus ei vaadi ystävyyttä, mutta se vaatii kohteliaisuutta ja kärsivällisyyttä.", "vihje_de": "„ystävyys“ = Freundschaft, „kohteliaisuus“ = Höflichkeit. Verlangt Nachbarschaft immer Freundschaft?", "kysymys_de": "Nach Ansicht des Verfassers verlangt Nachbarschaft immer Freundschaft."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Miten naapuri auttoi kirjoittajaa viime kesänä loman aikana?", "vaihtoehdot": [], "oikea": "Naapuri kasteli kukat ja haki postin.", "selitys_fi": "Tekstin lopussa kerrotaan, että naapuri kasteli kirjoittajan kukat ja haki hänen postinsa loman aikana.", "vihje_de": "Wie half der Nachbar im Sommer? „kastella kukat“ = die Blumen gießen, „hakea posti“ = die Post holen.", "kysymys_de": "Wie half der Nachbar dem Verfasser letzten Sommer während des Urlaubs?"}]}], "listening": [{"otsikko": "Vuokra-asunnon näyttö", "tyyppi": "dialogi", "litteraatti": "– Vuokranantaja: Tervetuloa katsomaan asuntoa! Tämä on siis se kaksio, josta laitoin ilmoituksen. Olkaa hyvä ja tulkaa peremmälle.\n– Asiakas: Kiitos. Vau, täällähän on yllättävän valoisaa. Mihin ilmansuuntaan ikkunat ovat?\n– Vuokranantaja: Ikkunat ovat lounaaseen, joten iltapäivisin tänne paistaa aurinko. Olohuone on tässä ja makuuhuone tuolla oven takana.\n– Asiakas: Onko keittiössä astianpesukone? Se on minulle tärkeä, koska teen paljon ruokaa kotona.\n– Vuokranantaja: Kyllä on, ja se on melko uusi. Myös jääkaappi ja liesi kuuluvat asuntoon.\n– Asiakas: Hienoa. Entä paljonko vuokra on, ja sisältyykö siihen jotain?\n– Vuokranantaja: Vuokra on 780 euroa kuussa. Siihen kuuluu vesi, mutta sähkö ja internet maksetaan itse.\n– Asiakas: Selvä. Milloin asuntoon voisi muuttaa?\n– Vuokranantaja: Asunto vapautuu kuun vaihteessa. Jos teette päätöksen tällä viikolla, voitte muuttaa heti ensi kuun alussa.\n– Asiakas: Kuulostaa hyvältä. Mietin asiaa illan ja laitan teille viestiä huomenna.", "litteraatti_de": "– Vermieter: Willkommen zur Wohnungsbesichtigung! Das ist also die Zweizimmerwohnung, für die ich die Anzeige aufgegeben habe. Bitte, kommen Sie weiter herein.\n– Kunde: Danke. Wow, hier ist es ja überraschend hell. In welche Himmelsrichtung gehen die Fenster?\n– Vermieter: Die Fenster gehen nach Südwesten, daher scheint hier nachmittags die Sonne herein. Das Wohnzimmer ist hier und das Schlafzimmer dort hinter der Tür.\n– Kunde: Gibt es in der Küche eine Geschirrspülmaschine? Das ist mir wichtig, weil ich viel zu Hause koche.\n– Vermieter: Ja, gibt es, und sie ist ziemlich neu. Auch der Kühlschrank und der Herd gehören zur Wohnung.\n– Kunde: Wunderbar. Und wie hoch ist die Miete, und ist darin etwas enthalten?\n– Vermieter: Die Miete beträgt 780 Euro im Monat. Darin enthalten ist Wasser, aber Strom und Internet bezahlt man selbst.\n– Kunde: Verstehe. Wann könnte man in die Wohnung einziehen?\n– Vermieter: Die Wohnung wird zum Monatswechsel frei. Wenn Sie diese Woche eine Entscheidung treffen, können Sie gleich zu Beginn des nächsten Monats einziehen.\n– Kunde: Klingt gut. Ich überlege es mir über den Abend und schicke Ihnen morgen eine Nachricht.", "hl": ["Ikkunat ovat lounaaseen, joten iltapäivisin tänne paistaa aurinko.", "Vuokra on 780 euroa kuussa. Siihen kuuluu vesi, mutta sähkö ja internet maksetaan itse.", "Mietin asiaa illan ja laitan teille viestiä huomenna."], "audio": "Simulaatio_01_asuminen/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Mihin ilmansuuntaan asunnon ikkunat ovat?", "vaihtoehdot": ["Pohjoiseen", "Lounaaseen", "Itään"], "oikea": "b", "selitys_fi": "Vuokranantaja sanoo, että ikkunat ovat lounaaseen ja iltapäivisin paistaa aurinko.", "vihje_de": "„ilmansuunta“ = Himmelsrichtung, „lounas“ = Südwesten. In welche Richtung zeigen die Fenster?", "kysymys_de": "In welche Himmelsrichtung gehen die Fenster der Wohnung?"}, {"id": "Ku2", "tyyppi": "oikein-väärin", "kysymys": "Keittiössä on astianpesukone.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Vuokranantaja vahvistaa, että keittiössä on melko uusi astianpesukone.", "vihje_de": "„astianpesukone“ = Geschirrspüler. Gibt es einen in der Küche?", "kysymys_de": "In der Küche gibt es eine Geschirrspülmaschine."}, {"id": "Ku3", "tyyppi": "monivalinta", "kysymys": "Mitä vuokraan kuuluu?", "vaihtoehdot": ["Vesi", "Sähkö", "Internet"], "oikea": "a", "selitys_fi": "Vuokranantajan mukaan vuokraan kuuluu vesi, mutta sähkö ja internet maksetaan itse.", "vihje_de": "Was ist in der Miete enthalten? „kuuluu vuokraan“ = gehört zur Miete.", "kysymys_de": "Was ist in der Miete enthalten?"}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Milloin asiakas lupaa ottaa yhteyttä vuokranantajaan?", "vaihtoehdot": [], "oikea": "Huomenna.", "selitys_fi": "Asiakas sanoo miettivänsä asiaa illan ja laittavansa viestiä huomenna.", "vihje_de": "Wann meldet sich der Kunde? „huomenna“ = morgen.", "kysymys_de": "Wann verspricht der Kunde, sich beim Vermieter zu melden?"}]}, {"otsikko": "Puhelu isännöitsijälle", "tyyppi": "puhelu", "litteraatti": "– Isännöitsijä: Kiinteistöpalvelu Koivisto, hyvää päivää.\n– Asukas: Päivää, täällä Heikkinen Mäkikadulta. Soitan, koska asunnossani on vesivahinko. Kylpyhuoneen lattialla on vettä, ja se tulee jostain seinän takaa.\n– Isännöitsijä: Sepä ikävää. Onko vettä paljon, vai vain vähän kosteutta?\n– Asukas: Vettä on aika paljon, ja se valuu koko ajan lisää. Pyyhin sitä jo kahdesti pois, mutta lattia kastuu uudelleen.\n– Isännöitsijä: Selvä, tämä pitää hoitaa heti. Sulkekaa ensin pääsulkuventtiili, jos osaatte. Se on yleensä eteisen kaapissa tai kylpyhuoneen katossa.\n– Asukas: Hetki, katson… Joo, löysin sen. Käännän sen kiinni nyt.\n– Isännöitsijä: Hyvä. Lähetän putkimiehen teille tunnin sisällä. Pysykää kotona siihen asti, niin hän pääsee sisään.\n– Asukas: Kiitos, pysyn kotona. Pitääkö minun siivota vesi pois itse?\n– Isännöitsijä: Pyyhkikää pahin vesi, ettei se leviä naapuriin. Loput hoituvat, kun putkimies on käynyt. Soitan teille vielä iltapäivällä ja kysyn tilanteen.", "litteraatti_de": "– Hausverwalter: Immobilienservice Koivisto, guten Tag.\n– Bewohner: Guten Tag, hier ist Heikkinen aus der Mäkikatu. Ich rufe an, weil es in meiner Wohnung einen Wasserschaden gibt. Auf dem Badezimmerboden steht Wasser, und es kommt von irgendwoher hinter der Wand.\n– Hausverwalter: Das ist ja ärgerlich. Ist es viel Wasser, oder nur ein wenig Feuchtigkeit?\n– Bewohner: Es ist ziemlich viel Wasser, und es läuft die ganze Zeit mehr nach. Ich habe es schon zweimal weggewischt, aber der Boden wird wieder nass.\n– Hausverwalter: Verstehe, das muss sofort behoben werden. Schließen Sie zuerst das Hauptabsperrventil, falls Sie das können. Es ist normalerweise im Schrank im Flur oder an der Decke des Badezimmers.\n– Bewohner: Einen Moment, ich schaue… Ja, ich habe es gefunden. Ich drehe es jetzt zu.\n– Hausverwalter: Gut. Ich schicke Ihnen innerhalb einer Stunde einen Klempner. Bleiben Sie bis dahin zu Hause, damit er hineinkommt.\n– Bewohner: Danke, ich bleibe zu Hause. Muss ich das Wasser selbst aufwischen?\n– Hausverwalter: Wischen Sie das schlimmste Wasser auf, damit es sich nicht zum Nachbarn ausbreitet. Den Rest erledigen wir, wenn der Klempner da gewesen ist. Ich rufe Sie noch am Nachmittag an und frage nach der Lage.", "hl": ["Soitan, koska asunnossani on vesivahinko.", "Sulkekaa ensin pääsulkuventtiili, jos osaatte.", "Lähetän putkimiehen teille tunnin sisällä."], "audio": "Simulaatio_01_asuminen/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Miksi asukas soittaa isännöitsijälle?", "vaihtoehdot": ["Koska asunnossa on vesivahinko", "Koska naapuri pitää melua", "Koska lämmitys ei toimi"], "oikea": "a", "selitys_fi": "Asukas kertoo soittavansa, koska kylpyhuoneen lattialla on vettä eli kyseessä on vesivahinko.", "vihje_de": "„vesivahinko“ = Wasserschaden. Warum ruft die Bewohnerin an?", "kysymys_de": "Warum ruft die Bewohnerin den Hausverwalter an?"}, {"id": "Ku6", "tyyppi": "monivalinta", "kysymys": "Mitä isännöitsijä neuvoo asukasta tekemään ensin?", "vaihtoehdot": ["Soittamaan naapurille", "Sulkemaan pääsulkuventtiilin", "Avaamaan ikkunan"], "oikea": "b", "selitys_fi": "Isännöitsijä neuvoo sulkemaan ensin pääsulkuventtiilin, joka on eteisen kaapissa tai kylpyhuoneen katossa.", "vihje_de": "„pääsulkuventtiili“ = Hauptabsperrventil. Was soll die Bewohnerin zuerst tun?", "kysymys_de": "Was rät der Hausverwalter der Bewohnerin, zuerst zu tun?"}, {"id": "Ku7", "tyyppi": "oikein-väärin", "kysymys": "Putkimies tulee paikalle tunnin sisällä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Isännöitsijä lupaa lähettää putkimiehen tunnin sisällä.", "vihje_de": "„putkimies“ = Klempner, „tunnin sisällä“ = innerhalb einer Stunde. Stimmt das?", "kysymys_de": "Der Klempner kommt innerhalb einer Stunde vorbei."}, {"id": "Ku8", "tyyppi": "lyhyt", "kysymys": "Miksi asukkaan pitää pyyhkiä pahin vesi pois?", "vaihtoehdot": [], "oikea": "Jotta vesi ei leviä (valu) naapuriin.", "selitys_fi": "Isännöitsijä pyytää pyyhkimään pahimman veden, ettei se leviä naapurin puolelle.", "vihje_de": "Warum soll das Wasser aufgewischt werden? „levitä naapuriin“ = sich zum Nachbarn ausbreiten.", "kysymys_de": "Warum muss die Bewohnerin das schlimmste Wasser aufwischen?"}]}, {"otsikko": "Taloyhtiön kuulutus pihatalkoista", "tyyppi": "kuulutus", "litteraatti": "Hyvää huomenta, hyvät asukkaat. Tässä taloyhtiön hallituksen tiedote tulevista pihatalkoista. Järjestämme perinteiset kevättalkoot lauantaina 17. toukokuuta kello kymmenestä alkaen. Talkoiden tarkoituksena on siistiä yhteinen piha-alue talven jäljiltä. Haravoimme nurmikon, keräämme roskat ja istutamme uusia kukkia etupihan istutuksiin. Toivomme, että mahdollisimman moni asukas osallistuu, sillä monta kättä saa työn nopeasti valmiiksi. Ottakaa mukaan omat puutarhahanskat, jos teillä on. Haravoita ja muita työkaluja löytyy talon varastosta. Talkoiden lomassa tarjoamme kaikille osallistujille grillimakkaraa ja kahvia kerhohuoneen edustalla noin kello kahdeltatoista. Lapset ovat lämpimästi tervetulleita mukaan, ja heille on luvassa pientä ohjelmaa. Jos sää on huono ja sataa vettä, talkoot siirretään seuraavalle lauantaille. Mahdollisesta siirrosta ilmoitetaan rappukäytävän ilmoitustaululla perjantai-iltaan mennessä. Tervetuloa mukaan viihtyisää pihaa rakentamaan! Yhdessä tekeminen on myös mukava tapa tutustua naapureihin.", "litteraatti_de": "Guten Morgen, liebe Bewohnerinnen und Bewohner. Hier ist eine Mitteilung des Vorstands der Hausgesellschaft über die bevorstehende Hofarbeit. Wir veranstalten die traditionelle Frühjahrsarbeit am Samstag, dem 17. Mai, ab zehn Uhr. Der Zweck der gemeinsamen Arbeit ist es, den gemeinsamen Hofbereich nach dem Winter zu säubern. Wir harken den Rasen, sammeln den Müll ein und pflanzen neue Blumen in die Beete im Vorgarten. Wir hoffen, dass möglichst viele Bewohner teilnehmen, denn viele Hände werden mit der Arbeit schnell fertig. Bringen Sie Ihre eigenen Gartenhandschuhe mit, falls Sie welche haben. Harken und andere Werkzeuge sind im Lager des Hauses zu finden. Während der Arbeit bieten wir allen Teilnehmern gegen etwa zwölf Uhr Grillwurst und Kaffee vor dem Gemeinschaftsraum an. Kinder sind herzlich willkommen, und für sie ist ein kleines Programm geplant. Wenn das Wetter schlecht ist und es regnet, wird die Hofarbeit auf den folgenden Samstag verschoben. Über eine mögliche Verschiebung wird bis Freitagabend am schwarzen Brett im Treppenhaus informiert. Herzlich willkommen, um einen gemütlichen Hof zu gestalten! Gemeinsames Arbeiten ist auch eine nette Möglichkeit, die Nachbarn kennenzulernen.", "hl": ["Järjestämme perinteiset kevättalkoot lauantaina 17. toukokuuta kello kymmenestä alkaen.", "Talkoiden lomassa tarjoamme kaikille osallistujille grillimakkaraa ja kahvia kerhohuoneen edustalla noin kello kahdeltatoista.", "Jos sää on huono ja sataa vettä, talkoot siirretään seuraavalle lauantaille."], "audio": "Simulaatio_01_asuminen/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Mihin aikaan talkoot alkavat?", "vaihtoehdot": ["Kello kahdeksalta", "Kello kymmeneltä", "Kello kahdeltatoista"], "oikea": "b", "selitys_fi": "Kuulutuksessa sanotaan, että talkoot alkavat lauantaina kello kymmenestä alkaen.", "vihje_de": "Wann beginnt die Gemeinschaftsarbeit? „kello kymmenestä alkaen“ = ab zehn Uhr.", "kysymys_de": "Um welche Uhrzeit beginnt die Hofarbeit?"}, {"id": "Ku10", "tyyppi": "monivalinta", "kysymys": "Mitä osallistujille tarjotaan?", "vaihtoehdot": ["Pizzaa ja mehua", "Grillimakkaraa ja kahvia", "Kakkua ja teetä"], "oikea": "b", "selitys_fi": "Kuulutuksen mukaan osallistujille tarjotaan grillimakkaraa ja kahvia kerhohuoneen edustalla.", "vihje_de": "Was wird angeboten? „grillimakkara“ = Grillwurst, „kahvi“ = Kaffee.", "kysymys_de": "Was wird den Teilnehmern angeboten?"}, {"id": "Ku11", "tyyppi": "oikein-väärin", "kysymys": "Lapset eivät saa osallistua talkoisiin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Kuulutuksessa sanotaan, että lapset ovat lämpimästi tervetulleita ja heille on luvassa ohjelmaa.", "vihje_de": "„lapset“ = Kinder, „tervetullut“ = willkommen. Dürfen Kinder teilnehmen?", "kysymys_de": "Kinder dürfen nicht an der Hofarbeit teilnehmen."}, {"id": "Ku12", "tyyppi": "lyhyt", "kysymys": "Mitä tapahtuu, jos talkoopäivänä sataa vettä?", "vaihtoehdot": [], "oikea": "Talkoot siirretään seuraavalle lauantaille.", "selitys_fi": "Kuulutuksen mukaan huonon sään sattuessa talkoot siirretään seuraavalle lauantaille.", "vihje_de": "Was passiert bei Regen? „siirtää“ = verschieben, „seuraava lauantai“ = nächster Samstag.", "kysymys_de": "Was passiert, wenn es am Tag der Hofarbeit regnet?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Olet juuri muuttanut uuteen vuokra-asuntoon. Kirjoita lyhyt viesti ystävällesi. Kerro, millainen uusi asunto on, mistä pidät siinä ja mitä aiot vielä tehdä asunnossa. Kutsu ystäväsi kylään.", "ohje_de": "Sie sind gerade in eine neue Mietwohnung gezogen. Schreiben Sie eine kurze Nachricht an eine Freundin oder einen Freund. Erzählen Sie, wie die neue Wohnung ist, was Ihnen daran gefällt und was Sie noch vorhaben. Laden Sie die Person zu sich ein.", "sanamaara": "80–120", "mallivastaus": "Hei Anna! Onpa ihana vihdoin kertoa, että muutin viime viikonloppuna uuteen vuokra-asuntoon. Asunto on kaksio aivan keskustan lähellä, ja siinä on iso parveke, josta näkee suoraan puistoon. Pidän erityisesti valoisasta olohuoneesta, koska ikkunat ovat etelään päin ja aurinko paistaa sisään koko iltapäivän. Keittiö on pieni mutta käytännöllinen. Muutto oli melko rankka, ja laatikoita on vielä paljon avaamatta. Aion seuraavaksi maalata makuuhuoneen seinät vaaleammiksi ja ostaa uudet verhot. Haluaisin myös hankkia muutaman viherkasvin olohuoneeseen. Tule käymään ensi viikolla, niin keitän kahvit ja esittelen sinulle koko asunnon! Sopisiko sinulle vaikka lauantai-iltapäivä? Laita viestiä, milloin pääset. Halauksin, Theresia", "arviointi_fi": "Hyvä vastaus on epävirallinen ja ystävällinen, sisältää tervehdyksen ja lopputervehdyksen sekä vastaa kaikkiin ohjeen kohtiin (asunnon kuvaus, mistä pitää, tulevat suunnitelmat ja kutsu). Tasolla 3 viestin pääasiat välittyvät selvästi, vaikka kielessä olisi pieniä virheitä.", "mallivastaus_de": "Hallo Anna! Wie schön, endlich erzählen zu können, dass ich letztes Wochenende in eine neue Mietwohnung gezogen bin. Die Wohnung ist eine Zweizimmerwohnung ganz in der Nähe des Stadtzentrums, und sie hat einen großen Balkon, von dem man direkt in den Park blicken kann. Besonders gefällt mir das helle Wohnzimmer, weil die Fenster nach Süden gehen und die Sonne den ganzen Nachmittag hereinscheint. Die Küche ist klein, aber praktisch. Der Umzug war ziemlich anstrengend, und es sind noch viele Kartons ungeöffnet. Als Nächstes habe ich vor, die Wände des Schlafzimmers heller zu streichen und neue Vorhänge zu kaufen. Ich würde auch gern ein paar Grünpflanzen für das Wohnzimmer besorgen. Komm nächste Woche vorbei, dann koche ich Kaffee und zeige dir die ganze Wohnung! Würde dir vielleicht der Samstagnachmittag passen? Schreib mir, wann du kannst. Mit einer Umarmung, Theresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Asuinalueesi keskustelufoorumilla pohditaan, pitäisikö taloyhtiöiden kieltää lemmikkieläimet vuokra-asunnoissa. Kirjoita oma mielipidekirjoituksesi foorumille. Perustele kantasi selkeästi ja anna esimerkkejä.", "ohje_de": "In einem Forum Ihres Wohngebiets wird diskutiert, ob Hausgesellschaften Haustiere in Mietwohnungen verbieten sollten. Schreiben Sie Ihren eigenen Meinungsbeitrag für das Forum. Begründen Sie Ihren Standpunkt klar und geben Sie Beispiele.", "sanamaara": "150–200", "mallivastaus": "Olen lukenut foorumin keskustelua lemmikkieläimistä suurella mielenkiinnolla ja haluan nyt kertoa oman näkemykseni asiasta. Mielestäni taloyhtiöiden ei pitäisi kieltää lemmikkieläimiä kokonaan, vaan kysymystä pitäisi miettiä paljon tarkemmin ja tapauskohtaisesti. Monille ihmisille koira tai kissa on tärkeä osa perhettä ja tuo elämään iloa sekä seuraa. Erityisesti yksin asuville ja ikääntyneille ihmisille lemmikki voi olla suuri henkinen tuki ja jopa syy lähteä päivittäin ulos liikkumaan. Toki ymmärrän hyvin, että lemmikit voivat aiheuttaa myös ongelmia. Koira saattaa esimerkiksi haukkua kovaa, kun omistaja on töissä, ja se häiritsee naapureita. Joillakin asukkailla voi lisäksi olla vakava allergia, jota eläimet pahentavat. Näitä ongelmia ei kuitenkaan mielestäni ratkaista parhaiten täydellä kiellolla. Parempi ratkaisu olisivat selkeät yhteiset säännöt: omistajan on huolehdittava siitä, ettei eläin pidä jatkuvasti melua eikä likaa talon yhteisiä tiloja. Jos ongelmia jossain vaiheessa ilmenee, niistä voidaan keskustella yhdessä ja sopia kohtuullinen ratkaisu. Mielestäni hyvä naapurusto perustuu joustoon ja avoimeen keskusteluun, ei ehdottomiin kieltoihin. Siksi toivon vilpittömästi, että taloyhtiömme valitsee järkevät ja oikeudenmukaiset säännöt eikä täyttä kieltoa.", "arviointi_fi": "Hyvässä vastauksessa on selvä oma mielipide, jota perustellaan vähintään kahdella eri näkökulmalla ja konkreettisilla esimerkeillä. Teksti on jäsennelty (aloitus, perustelut, lopetus) ja siinä käytetään sidossanoja kuten mielestäni, toki, kuitenkin ja siksi. Tasolla 3–4 kirjoittaja pystyy esittämään ja perustelemaan kantansa ymmärrettävästi.", "mallivastaus_de": "Ich habe die Diskussion im Forum über Haustiere mit großem Interesse gelesen und möchte nun meine eigene Ansicht zu der Sache mitteilen. Meiner Meinung nach sollten die Hausgesellschaften Haustiere nicht vollständig verbieten, sondern die Frage sollte viel genauer und von Fall zu Fall überlegt werden. Für viele Menschen ist ein Hund oder eine Katze ein wichtiger Teil der Familie und bringt Freude sowie Gesellschaft ins Leben. Besonders für allein lebende und ältere Menschen kann ein Haustier eine große seelische Stütze und sogar ein Grund sein, täglich nach draußen zu gehen und sich zu bewegen. Natürlich verstehe ich gut, dass Haustiere auch Probleme verursachen können. Ein Hund kann zum Beispiel laut bellen, wenn der Besitzer bei der Arbeit ist, und das stört die Nachbarn. Manche Bewohner können außerdem eine ernste Allergie haben, die durch Tiere verschlimmert wird. Diese Probleme werden meiner Meinung nach jedoch nicht am besten mit einem vollständigen Verbot gelöst. Eine bessere Lösung wären klare gemeinsame Regeln: Der Besitzer muss dafür sorgen, dass das Tier nicht ständig Lärm macht und die gemeinsamen Räume des Hauses nicht verschmutzt. Wenn an irgendeinem Punkt Probleme auftreten, kann man sie gemeinsam besprechen und eine angemessene Lösung vereinbaren. Meiner Ansicht nach beruht eine gute Nachbarschaft auf Flexibilität und offenem Gespräch, nicht auf absoluten Verboten. Deshalb hoffe ich aufrichtig, dass unsere Hausgesellschaft vernünftige und gerechte Regeln wählt und kein vollständiges Verbot."}, {"id": "K3", "tyyppi": "puolivirallinen viesti", "ohje_fi": "Vuokra-asuntosi kylpyhuoneen hana vuotaa ja olohuoneen lämpöpatteri ei lämpene. Kirjoita sähköposti isännöitsijälle. Kuvaile viat selkeästi, kerro milloin olet kotona ja pyydä korjaajaa käymään pian.", "ohje_de": "In Ihrer Mietwohnung tropft der Wasserhahn im Bad und der Heizkörper im Wohnzimmer wird nicht warm. Schreiben Sie eine E-Mail an den Hausverwalter. Beschreiben Sie die Mängel klar, sagen Sie, wann Sie zu Hause sind, und bitten Sie darum, dass bald jemand vorbeikommt.", "sanamaara": "120–160", "mallivastaus": "Hyvä isännöitsijä,\n\nkirjoitan teille, koska asunnossani osoitteessa Mäkikatu 7 A 4 on kaksi vikaa, jotka kaipaavat pikaista korjausta. Ensinnäkin kylpyhuoneen hana vuotaa. Vesi tippuu siitä jatkuvasti, vaikka olen sulkenut hanan kunnolla. Olen huolissani sekä kasvavasta vesilaskusta että mahdollisesta kosteusvauriosta, joka voi pahentua nopeasti. Toiseksi olohuoneen lämpöpatteri ei lämpene lainkaan, vaikka asunnon muut patterit toimivat aivan normaalisti. Iltaisin huoneessa on selvästi liian kylmä, ja se haittaa asumista nyt, kun säät ovat viilentyneet syksyn myötä.\n\nOlisi hienoa, jos korjaaja voisi käydä katsomassa vikoja mahdollisimman pian. Olen kotona arkisin kello 16 jälkeen sekä koko lauantain. Voitte myös käyttää yleisavainta, jos sovimme ajankohdan etukäteen. Ottakaa minuun ystävällisesti yhteyttä puhelimitse tai sähköpostilla, niin sovitaan teille sopiva aika.\n\nKiitos jo etukäteen avustanne ja vaivannäöstänne.\n\nYstävällisin terveisin,\nTheresia Bauer", "arviointi_fi": "Hyvä vastaus on kohtelias ja asiallinen puolivirallinen viesti, jossa on tervehdys ja lopputervehdys. Molemmat viat kuvataan selkeästi, kerrotaan milloin kirjoittaja on kotona ja esitetään pyyntö korjauksesta. Tasolla 3 viestin sisältö ja pyyntö ymmärretään vaivatta, vaikka kielessä olisi pieniä virheitä.", "mallivastaus_de": "Sehr geehrter Hausverwalter,\n\nich schreibe Ihnen, weil es in meiner Wohnung in der Mäkikatu 7 A 4 zwei Mängel gibt, die eine rasche Reparatur erfordern. Erstens tropft der Wasserhahn im Badezimmer. Das Wasser tropft ständig heraus, obwohl ich den Hahn richtig zugedreht habe. Ich mache mir Sorgen sowohl wegen der steigenden Wasserrechnung als auch wegen eines möglichen Feuchtigkeitsschadens, der sich schnell verschlimmern kann. Zweitens wird der Heizkörper im Wohnzimmer überhaupt nicht warm, obwohl die anderen Heizkörper der Wohnung ganz normal funktionieren. Abends ist es im Zimmer deutlich zu kalt, und das beeinträchtigt das Wohnen jetzt, da das Wetter mit dem Herbst kühler geworden ist.\n\nEs wäre schön, wenn ein Handwerker die Mängel möglichst bald anschauen könnte. Ich bin werktags nach 16 Uhr sowie den ganzen Samstag zu Hause. Sie können auch den Generalschlüssel benutzen, wenn wir den Zeitpunkt im Voraus vereinbaren. Bitte nehmen Sie freundlicherweise telefonisch oder per E-Mail Kontakt mit mir auf, dann vereinbaren wir eine für Sie passende Zeit.\n\nVielen Dank schon im Voraus für Ihre Hilfe und Mühe.\n\nMit freundlichen Grüßen,\nTheresia Bauer"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Naapurisi koputtaa oveen ja sanoo: „Hei, soittaisitko musiikkia hieman hiljempaa? Yritän nukkua, koska menen aikaisin töihin.” Mitä vastaat?", "ohje_de": "Ihr Nachbar klopft an die Tür und sagt: „Hallo, könntest du die Musik etwas leiser machen? Ich versuche zu schlafen, weil ich früh zur Arbeit muss.“ Was antworten Sie?", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Voi anteeksi, en huomannut, että musiikki oli niin kovalla. Laitan sen heti hiljemmalle. Hyvää yötä ja huomenta töihin!", "malli_de": "Oh, Entschuldigung, ich habe nicht bemerkt, dass die Musik so laut war. Ich stelle sie sofort leiser. Gute Nacht und einen guten Morgen bei der Arbeit!"}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Haluat vuokrata asunnon ja soitat vuokranantajalle. Hän vastaa puhelimeen. Aloita keskustelu ja kysy, onko ilmoituksen asunto vielä vapaana.", "ohje_de": "Sie möchten eine Wohnung mieten und rufen den Vermieter an. Er geht ans Telefon. Beginnen Sie das Gespräch und fragen Sie, ob die Wohnung aus der Anzeige noch frei ist.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Hyvää päivää, nimeni on Theresia. Soitan ilmoituksenne kaksiosta. Onko asunto vielä vapaana? Olisin kovasti kiinnostunut tulemaan katsomaan sitä.", "malli_de": "Guten Tag, mein Name ist Theresia. Ich rufe wegen der Zweizimmerwohnung aus Ihrer Anzeige an. Ist die Wohnung noch frei? Ich wäre sehr daran interessiert, sie mir anzuschauen."}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Ystäväsi kysyy: „Aiotko osallistua taloyhtiön pihatalkoisiin ensi lauantaina?” Vastaa ja kerro lyhyesti, miksi.", "ohje_de": "Ihr Freund fragt: „Wirst du am nächsten Samstag an der Gemeinschaftsarbeit im Hof teilnehmen?“ Antworten Sie und sagen Sie kurz, warum.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Kyllä aion osallistua. Haluan tutustua naapureihin paremmin, ja on mukava tehdä yhdessä työtä pihan hyväksi. Toivottavasti sää on hyvä!", "malli_de": "Ja, ich habe vor teilzunehmen. Ich möchte die Nachbarn besser kennenlernen, und es ist schön, gemeinsam für den Hof zu arbeiten. Hoffentlich ist das Wetter gut!"}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Olet kaupassa ja huomaat tarvitsevasi muuttolaatikoita. Pyydä myyjältä apua ja kysy, mistä löydät ne.", "ohje_de": "Sie sind im Geschäft und merken, dass Sie Umzugskartons brauchen. Bitten Sie die Verkäuferin um Hilfe und fragen Sie, wo Sie sie finden.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, voisitteko auttaa minua? Olen muuttamassa ja tarvitsisin muuttolaatikoita. Mistä päin kauppaa ne löytyvät, ja paljonko ne maksavat?", "malli_de": "Entschuldigung, könnten Sie mir helfen? Ich ziehe gerade um und bräuchte Umzugskartons. In welchem Teil des Geschäfts sind sie zu finden, und wie viel kosten sie?"}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Naapurisi pyytää: „Voisitko kastella kukkani ja hakea postini, kun olen viikon lomalla?” Vastaa pyyntöön.", "ohje_de": "Ihr Nachbar bittet: „Könntest du meine Blumen gießen und meine Post holen, während ich eine Woche im Urlaub bin?“ Reagieren Sie auf die Bitte.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Totta kai autan mielelläni! Voit huoletta lähteä lomalle. Kastelen kukkasi ja haen postin joka päivä. Anna vain avaimet ja ohjeet, niin hoidan homman.", "malli_de": "Natürlich helfe ich gern! Du kannst ganz beruhigt in den Urlaub fahren. Ich gieße deine Blumen und hole jeden Tag die Post. Gib mir einfach die Schlüssel und die Anweisungen, dann kümmere ich mich darum."}, {"id": "P6", "tyyppi": "kerronta/kuvailu", "ohje_fi": "Kerro omasta asunnostasi tai unelma-asunnostasi. Kuvaile, millainen se on, missä se sijaitsee, mitä huoneita siinä on ja miksi viihdyt siellä tai haluaisit asua siellä. Puhu yhtenäisesti noin puolitoista minuuttia.", "ohje_de": "Erzählen Sie über Ihre Wohnung oder Ihre Traumwohnung. Beschreiben Sie, wie sie ist, wo sie liegt, welche Zimmer sie hat und warum Sie sich dort wohlfühlen oder dort wohnen möchten. Sprechen Sie zusammenhängend etwa anderthalb Minuten.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluan kertoa teille unelma-asunnostani vähän tarkemmin. Se olisi valoisa ja moderni rivitaloasunto pienen kaupungin laidalla, aivan lähellä metsää ja järveä. Pidän kovasti luonnon rauhasta, joten asunnon ei tarvitsisi olla aivan keskustassa, mutta lähikauppaan ja terveysasemalle pitäisi silti olla lyhyt ja helppo matka. Asunnossa olisi kolme huonetta: tilava ja viihtyisä olohuone, rauhallinen makuuhuone sekä oma työhuone, jossa voisin lukea ja tehdä etätöitä häiriöittä. Keittiö olisi avara ja hyvin varusteltu, koska laitan todella mielelläni ruokaa ja kutsun usein ystäviä kylään. Kaikkein tärkein asia minulle olisi iso parveke tai pieni oma piha, jossa voisin kasvattaa yrttejä ja kukkia sekä juoda rauhassa aamukahvia kauniina kesäaamuina. Haluaisin myös mukavat ja ystävälliset naapurit, joiden kanssa voisi vaihtaa kuulumisia pihalla. Uskon, että viihtyisin tällaisessa asunnossa erinomaisesti, koska siinä yhdistyisivät sekä luonnon rauha että palveluiden läheisyys. Minun mielestäni koti on ennen kaikkea paikka, jossa saa levätä ja olla oma itsensä, ja juuri sellaisen lämpimän kodin haluaisin joskus itselleni.", "malli_de": "Ich möchte Ihnen etwas genauer von meiner Traumwohnung erzählen. Es wäre eine helle und moderne Reihenhauswohnung am Rand einer kleinen Stadt, ganz in der Nähe von Wald und See. Ich mag die Ruhe der Natur sehr, daher müsste die Wohnung nicht ganz im Zentrum sein, aber zum nahegelegenen Geschäft und zur Gesundheitsstation müsste der Weg trotzdem kurz und einfach sein. Die Wohnung hätte drei Zimmer: ein geräumiges und gemütliches Wohnzimmer, ein ruhiges Schlafzimmer sowie ein eigenes Arbeitszimmer, in dem ich ungestört lesen und im Homeoffice arbeiten könnte. Die Küche wäre offen und gut ausgestattet, weil ich wirklich gern koche und oft Freunde zu Besuch einlade. Das Allerwichtigste wäre für mich ein großer Balkon oder ein kleiner eigener Hof, wo ich Kräuter und Blumen anbauen und an schönen Sommermorgen in Ruhe meinen Morgenkaffee trinken könnte. Ich hätte auch gern nette und freundliche Nachbarn, mit denen man im Hof Neuigkeiten austauschen könnte. Ich glaube, dass ich mich in einer solchen Wohnung ausgezeichnet wohlfühlen würde, weil sich darin sowohl die Ruhe der Natur als auch die Nähe der Dienstleistungen verbinden würden. Meiner Meinung nach ist ein Zuhause vor allem ein Ort, an dem man sich ausruhen und man selbst sein darf, und genau so ein warmes Zuhause hätte ich irgendwann gern für mich."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Roolipeli: Olet vuokralainen ja keskustelet vuokranantajan kanssa. Haluat, että asuntoon saa tuoda kissan, mutta vuokrasopimuksessa lukee, ettei lemmikkejä sallita. Yritä kohteliaasti neuvotella asiasta ja ehdota ratkaisua. Toinen henkilö (haastattelija) esittää vuokranantajaa.", "ohje_de": "Rollenspiel: Sie sind Mieterin und sprechen mit dem Vermieter. Sie möchten eine Katze in der Wohnung halten, aber im Mietvertrag steht, dass Haustiere nicht erlaubt sind. Verhandeln Sie höflich darüber und schlagen Sie eine Lösung vor. Die andere Person (Prüferin) spielt den Vermieter.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Vuokralainen: Hyvää päivää. Haluaisin keskustella kanssanne yhdestä asiasta, joka on minulle tärkeä.\n– Vuokranantaja: Toki, kertokaa vain.\n– Vuokralainen: Tiedän, että sopimuksessa lukee, ettei lemmikkejä sallita. Toivoisin kuitenkin, että voisin pitää yhtä rauhallista kissaa. Se on sisäkissa eikä pidä melua.\n– Vuokranantaja: Ymmärrän, mutta pelkään, että eläin sotkee asunnon.\n– Vuokralainen: Ymmärrän huolenne. Voisin maksaa hieman suuremman vakuuden, ja lupaan korvata mahdolliset vahingot. Sopisiko, että kokeillaan vuoden ajan ja katsotaan, miten se sujuu?", "malli_de": "– Mieterin: Guten Tag. Ich würde gern mit Ihnen über eine Sache sprechen, die mir wichtig ist.\n– Vermieter: Gern, sagen Sie nur.\n– Mieterin: Ich weiß, dass im Vertrag steht, dass Haustiere nicht erlaubt sind. Ich würde mir jedoch wünschen, eine ruhige Katze halten zu dürfen. Es ist eine Wohnungskatze und macht keinen Lärm.\n– Vermieter: Ich verstehe, aber ich befürchte, dass das Tier die Wohnung beschädigt.\n– Mieterin: Ich verstehe Ihre Sorge. Ich könnte eine etwas höhere Kaution zahlen, und ich verspreche, eventuelle Schäden zu ersetzen. Wäre es in Ordnung, wenn wir es ein Jahr lang ausprobieren und schauen, wie es läuft?"}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Roolipeli: Naapurisi remontoi asuntoaan myöhään iltaisin, ja melu häiritsee untaasi. Mene juttelemaan naapurille. Kerro ystävällisesti ongelmasta ja yritä yhdessä löytää ratkaisu. Toinen henkilö (haastattelija) esittää naapuria.", "ohje_de": "Rollenspiel: Ihr Nachbar renoviert seine Wohnung spät am Abend, und der Lärm stört Ihren Schlaf. Sprechen Sie mit dem Nachbarn. Schildern Sie das Problem freundlich und finden Sie gemeinsam eine Lösung. Die andere Person (Prüferin) spielt den Nachbarn.", "valmistautuminen_s": 30, "puheaika_s": 90, "malli": "– Asukas: Hei, anteeksi että häiritsen. Voisinko jutella kanssasi hetken remontista?\n– Naapuri: Tietysti, mitä asiaa?\n– Asukas: Olen iloinen, että kunnostat asuntoasi, mutta poraamisen ääni kuuluu meille iltaisin kovaa. Minulla on pieni lapsi, joka herää siihen.\n– Naapuri: Ai, en tullut ajatelleeksi. Anteeksi.\n– Asukas: Ei se mitään. Voisitko tehdä äänekkäimmät työt päivällä, vaikka ennen kello kahdeksaa illalla? Silloin se ei haittaisi niin paljon.\n– Naapuri: Joo, sehän käy hyvin. Pidän jatkossa tauon iltakahdeksalta.", "malli_de": "– Bewohner: Hallo, entschuldige die Störung. Könnte ich kurz mit dir über die Renovierung sprechen?\n– Nachbar: Natürlich, worum geht es?\n– Bewohner: Ich freue mich, dass du deine Wohnung herrichtest, aber das Geräusch des Bohrens dringt abends laut zu uns. Ich habe ein kleines Kind, das davon aufwacht.\n– Nachbar: Ach, daran habe ich nicht gedacht. Entschuldige.\n– Bewohner: Das macht nichts. Könntest du die lautesten Arbeiten tagsüber machen, etwa vor acht Uhr abends? Dann würde es nicht so sehr stören.\n– Nachbar: Ja, das geht gut. Ich mache künftig ab acht Uhr abends eine Pause."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse yksi aihe ja esitä siitä perusteltu mielipide noin kaksi minuuttia. Aihe 1: Onko parempi asua vuokralla vai omistusasunnossa? Perustele. Aihe 2: Pitäisikö kaupungeissa rakentaa enemmän pieniä asuntoja vai isoja perheasuntoja? Perustele.", "ohje_de": "Wählen Sie ein Thema und äußern Sie dazu etwa zwei Minuten lang eine begründete Meinung. Thema 1: Ist es besser, zur Miete oder im Eigentum zu wohnen? Begründen Sie. Thema 2: Sollte man in den Städten mehr kleine Wohnungen oder mehr große Familienwohnungen bauen? Begründen Sie.", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen ensimmäisen aiheen eli sen, onko parempi asua vuokralla vai omistusasunnossa. Mielestäni molemmissa vaihtoehdoissa on omat hyvät ja huonot puolensa, mutta itse pidän tällä hetkellä selvästi enemmän vuokra-asumisesta. Kerron seuraavaksi, miksi ajattelen näin. Ensinnäkin vuokra-asuminen on hyvin joustavaa. Jos saan työpaikan toisesta kaupungista tai elämäntilanteeni muuttuu yllättäen, voin muuttaa melko helposti ilman, että minun täytyy myydä asuntoa. Tämä on tärkeää erityisesti nuorille aikuisille ja niille ihmisille, jotka eivät vielä tiedä, missä he haluavat asua pysyvästi. Toiseksi vuokralla asuessa ei tarvitse huolehtia kalliista korjauksista itse, vaan taloyhtiö ja vuokranantaja vastaavat niistä. Toisaalta ymmärrän erittäin hyvin myös niitä ihmisiä, jotka haluavat oman omistusasunnon. Omistusasunto on pitkällä aikavälillä sijoitus, ja siihen maksettu raha jää lopulta omaksi varallisuudeksi. Lisäksi omassa asunnossa saa tehdä remontteja ja muutoksia täysin vapaasti oman maun mukaan. Kaiken kaikkiaan ajattelen, että nuorena ja epävarmassa elämänvaiheessa vuokra-asunto on järkevä ja turvallinen valinta, mutta kun elämä vähitellen vakiintuu, oma asunto voi olla parempi ratkaisu. Tärkeintä on lopulta valita se vaihtoehto, joka sopii parhaiten omaan elämäntilanteeseen ja talouteen.", "malli_de": "Ich wähle das erste Thema, also die Frage, ob es besser ist, zur Miete oder im Eigentum zu wohnen. Meiner Meinung nach haben beide Möglichkeiten ihre eigenen Vor- und Nachteile, aber ich selbst ziehe zurzeit das Wohnen zur Miete deutlich vor. Ich erkläre als Nächstes, warum ich so denke. Erstens ist das Wohnen zur Miete sehr flexibel. Wenn ich eine Arbeitsstelle in einer anderen Stadt bekomme oder sich meine Lebenssituation unerwartet ändert, kann ich ziemlich leicht umziehen, ohne dass ich eine Wohnung verkaufen muss. Das ist besonders für junge Erwachsene wichtig und für diejenigen Menschen, die noch nicht wissen, wo sie dauerhaft wohnen möchten. Zweitens muss man beim Wohnen zur Miete nicht selbst für teure Reparaturen sorgen, sondern die Hausgesellschaft und der Vermieter sind dafür verantwortlich. Andererseits verstehe ich auch sehr gut diejenigen Menschen, die eine eigene Eigentumswohnung haben möchten. Eine Eigentumswohnung ist auf lange Sicht eine Investition, und das dafür gezahlte Geld bleibt letztlich als eigenes Vermögen. Außerdem darf man in der eigenen Wohnung völlig frei nach eigenem Geschmack renovieren und Veränderungen vornehmen. Alles in allem denke ich, dass in jungen Jahren und in einer unsicheren Lebensphase eine Mietwohnung eine vernünftige und sichere Wahl ist, aber wenn sich das Leben allmählich festigt, kann eine eigene Wohnung die bessere Lösung sein. Am wichtigsten ist letztlich, die Möglichkeit zu wählen, die am besten zur eigenen Lebenssituation und Finanzlage passt."}]}, {"id": 2, "teema": "Terveys ja hyvinvointi", "teema_de": "Gesundheit und Wohlbefinden", "reading": [{"otsikko": "Terveyskeskuksen tiedote: ajanvaraus muuttuu", "tyyppi": "tiedote", "teksti": "Hyvä asiakas! Terveyskeskuksemme ajanvaraus muuttuu maanantaina 1. syyskuuta. Jatkossa varaat lääkäriajan ensisijaisesti sähköisesti netissä tai puhelimitse takaisinsoittopalvelun kautta. Kun soitat numeroon 09 1234 567, et enää jää jonottamaan, vaan hoitaja soittaa sinulle takaisin saman päivän aikana. Muista, että takaisinsoitto tulee tuntemattomasta numerosta, joten vastaathan puhelimeen. Sähköinen asiointi on auki vuorokauden ympäri osoitteessa oma.terveys.fi. Sinne kirjaudut pankkitunnuksilla. Palvelussa voit varata ajan, perua ajan, uusia reseptin ja katsoa omat laboratoriotuloksesi. Kiireettömissä asioissa suosittelemme sähköistä asiointia, koska silloin puhelinlinjat pysyvät vapaina kiireellisille soittajille. Jos tarvitset apua heti, esimerkiksi korkean kuumeen tai kovan kivun takia, soita aina päivystykseen numeroon 116 117. Hätätilanteessa soita tietysti yleiseen hätänumeroon 112. Ilman ajanvarausta voit edelleen tulla vain laboratorioon arkisin kello 7–10. Toivomme, että uusi järjestelmä helpottaa asiointia ja lyhentää jonotusaikoja. Vastaanotamme palautetta mielellämme netissä olevan lomakkeen kautta.", "teksti_de": "Sehr geehrte Kundin, sehr geehrter Kunde! Die Terminvergabe unseres Gesundheitszentrums ändert sich am Montag, dem 1. September. Künftig buchen Sie einen Arzttermin vorrangig elektronisch im Internet oder telefonisch über den Rückrufdienst. Wenn Sie die Nummer 09 1234 567 anrufen, müssen Sie nicht mehr in der Warteschleife warten, sondern eine Pflegekraft ruft Sie noch am selben Tag zurück. Denken Sie daran, dass der Rückruf von einer unbekannten Nummer kommt, gehen Sie also bitte ans Telefon. Der elektronische Dienst ist rund um die Uhr unter der Adresse oma.terveys.fi geöffnet. Dort melden Sie sich mit Ihren Bankkennungen an. Im Dienst können Sie einen Termin buchen, einen Termin absagen, ein Rezept erneuern und Ihre eigenen Laborergebnisse einsehen. Bei nicht dringenden Anliegen empfehlen wir den elektronischen Dienst, denn dann bleiben die Telefonleitungen für dringende Anrufer frei. Wenn Sie sofort Hilfe benötigen, zum Beispiel wegen hohem Fieber oder starken Schmerzen, rufen Sie immer die Notfallambulanz unter der Nummer 116 117 an. Im Notfall rufen Sie selbstverständlich die allgemeine Notrufnummer 112 an. Ohne Termin können Sie weiterhin nur ins Labor kommen, und zwar werktags von 7 bis 10 Uhr. Wir hoffen, dass das neue System die Inanspruchnahme erleichtert und die Wartezeiten verkürzt. Rückmeldungen nehmen wir gerne über das Formular im Internet entgegen.", "hl": ["Kun soitat numeroon 09 1234 567, et enää jää jonottamaan, vaan hoitaja soittaa sinulle takaisin saman päivän aikana.", "Sähköinen asiointi on auki vuorokauden ympäri osoitteessa oma.terveys.fi.", "Kiireettömissä asioissa suosittelemme sähköistä asiointia, koska silloin puhelinlinjat pysyvät vapaina kiireellisille soittajille.", "Ilman ajanvarausta voit edelleen tulla vain laboratorioon arkisin kello 7–10."], "image": "Simulaatio_02_terveys/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Mitä tapahtuu, kun asiakas soittaa numeroon 09 1234 567?", "vaihtoehdot": ["Asiakas jää odottamaan jonoon pitkäksi aikaa.", "Hoitaja soittaa asiakkaalle takaisin saman päivän aikana.", "Asiakas saa heti ajan päivystykseen."], "oikea": "b", "selitys_fi": "Tekstissä sanotaan, että asiakas ei jää jonottamaan vaan hoitaja soittaa takaisin saman päivän aikana.", "vihje_de": "Rückrufdienst: Die Pflegekraft ruft am selben Tag zurück.", "kysymys_de": "Was passiert, wenn ein Kunde die Nummer 09 1234 567 anruft?"}, {"id": "L2", "tyyppi": "oikein-väärin", "kysymys": "Sähköinen asiointi netissä on auki vain virka-aikana.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstin mukaan sähköinen asiointi on auki vuorokauden ympäri eli koko ajan.", "vihje_de": "„Vuorokauden ympäri“ bedeutet rund um die Uhr.", "kysymys_de": "Der elektronische Dienst im Internet ist nur während der Dienstzeiten geöffnet."}, {"id": "L3", "tyyppi": "monivalinta", "kysymys": "Mitä asiakkaan kannattaa tehdä kiireettömässä asiassa?", "vaihtoehdot": ["Soittaa hätänumeroon 112.", "Mennä suoraan päivystykseen.", "Käyttää sähköistä asiointia netissä."], "oikea": "c", "selitys_fi": "Tekstissä suositellaan kiireettömissä asioissa sähköistä asiointia, jotta puhelinlinjat pysyvät vapaina.", "vihje_de": "Bei nicht dringenden Anliegen wird der Online-Dienst empfohlen.", "kysymys_de": "Was sollte der Kunde bei einem nicht dringenden Anliegen tun?"}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Minä kellonaikoina laboratorioon voi tulla ilman ajanvarausta?", "vaihtoehdot": [], "oikea": "Arkisin kello 7–10.", "selitys_fi": "Tekstissä mainitaan, että laboratorioon voi tulla ilman ajanvarausta arkisin kello 7–10.", "vihje_de": "Labor ohne Termin: werktags 7–10 Uhr.", "kysymys_de": "Zu welchen Uhrzeiten kann man ohne Termin ins Labor kommen?"}]}, {"otsikko": "Sähköposti: liikuntakaverin kutsu", "tyyppi": "sähköposti", "teksti": "Hei Theresia! Kiva, että tapasimme suomen kurssilla. Lupasin kertoa lisää yhdistyksemme liikuntaryhmästä. Me kokoonnumme joka tiistai ja torstai kello 18 Kisapuiston liikuntahallissa. Tiistaisin pelaamme sählyä ja torstaisin teemme kevyttä kuntojumppaa, joka sopii myös aloittelijoille. Sinun ei siis tarvitse olla hyvässä kunnossa, kun aloitat – tärkeintä on, että liikut säännöllisesti ja pidät hauskaa. Moni meistä on aloittanut nollasta. Ryhmä maksaa kaksikymmentä euroa kuukaudessa, ja ensimmäinen kerta on aina ilmainen, jotta voit kokeilla rauhassa. Ota mukaan sisäpelikengät, juomapullo ja pyyhe. Suihku- ja pukutilat löytyvät hallin alakerrasta. Jos sinulla on jokin vanha vamma esimerkiksi polvessa tai selässä, kerro siitä ohjaajalle ennen tuntia, niin hän osaa neuvoa sopivat liikkeet. Älä syö raskasta ateriaa juuri ennen liikuntaa, mutta muista juoda tarpeeksi vettä. Toivottavasti pääset mukaan jo ensi viikolla! Kerro minulle etukäteen, kumpana päivänä tulet, niin tulen vastaan ovelle. Terveisin Liisa", "teksti_de": "Hallo Theresia! Schön, dass wir uns im Finnischkurs getroffen haben. Ich hatte versprochen, dir mehr über die Sportgruppe unseres Vereins zu erzählen. Wir treffen uns jeden Dienstag und Donnerstag um 18 Uhr in der Sporthalle des Kisapuisto. Dienstags spielen wir Unihockey (Sähly) und donnerstags machen wir leichte Fitnessgymnastik, die auch für Anfänger geeignet ist. Du musst also nicht in guter Form sein, wenn du anfängst – das Wichtigste ist, dass du dich regelmäßig bewegst und Spaß hast. Viele von uns haben bei null angefangen. Die Gruppe kostet zwanzig Euro im Monat, und das erste Mal ist immer kostenlos, damit du in Ruhe ausprobieren kannst. Bring Hallenschuhe, eine Trinkflasche und ein Handtuch mit. Dusch- und Umkleideräume befinden sich im Untergeschoss der Halle. Falls du eine alte Verletzung hast, zum Beispiel am Knie oder am Rücken, sag das dem Trainer vor der Stunde, damit er dir passende Übungen empfehlen kann. Iss keine schwere Mahlzeit direkt vor dem Sport, aber denk daran, genug Wasser zu trinken. Hoffentlich kannst du schon nächste Woche dabei sein! Sag mir vorher Bescheid, an welchem Tag du kommst, dann komme ich dir an der Tür entgegen. Viele Grüße, Liisa", "hl": ["Tiistaisin pelaamme sählyä ja torstaisin teemme kevyttä kuntojumppaa, joka sopii myös aloittelijoille.", "Sinun ei siis tarvitse olla hyvässä kunnossa, kun aloitat – tärkeintä on, että liikut säännöllisesti ja pidät hauskaa.", "Ryhmä maksaa kaksikymmentä euroa kuukaudessa, ja ensimmäinen kerta on aina ilmainen, jotta voit kokeilla rauhassa.", "Jos sinulla on jokin vanha vamma esimerkiksi polvessa tai selässä, kerro siitä ohjaajalle ennen tuntia, niin hän osaa neuvoa sopivat liikkeet."], "image": "Simulaatio_02_terveys/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Mitä ryhmässä tehdään torstaisin?", "vaihtoehdot": ["Pelataan sählyä.", "Tehdään kevyttä kuntojumppaa.", "Käydään uimassa."], "oikea": "b", "selitys_fi": "Tekstin mukaan torstaisin tehdään kevyttä kuntojumppaa ja tiistaisin pelataan sählyä.", "vihje_de": "Donnerstags: leichte Fitnessgymnastik (kuntojumppa).", "kysymys_de": "Was macht man in der Gruppe donnerstags?"}, {"id": "L6", "tyyppi": "oikein-väärin", "kysymys": "Osallistujan täytyy olla hyvässä kunnossa, ennen kuin hän voi aloittaa ryhmässä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Liisa kirjoittaa, ettei tarvitse olla hyvässä kunnossa ja että ryhmä sopii myös aloittelijoille.", "vihje_de": "Man muss NICHT fit sein – auch für Anfänger geeignet.", "kysymys_de": "Der Teilnehmer muss in guter Form sein, bevor er in der Gruppe anfangen kann."}, {"id": "L7", "tyyppi": "lyhyt", "kysymys": "Paljonko liikuntaryhmä maksaa kuukaudessa?", "vaihtoehdot": [], "oikea": "Kaksikymmentä euroa.", "selitys_fi": "Tekstissä sanotaan, että ryhmä maksaa kaksikymmentä euroa kuukaudessa.", "vihje_de": "Zwanzig Euro pro Monat; das erste Mal ist gratis.", "kysymys_de": "Wie viel kostet die Sportgruppe pro Monat?"}, {"id": "L8", "tyyppi": "monivalinta", "kysymys": "Mitä Theresian pitäisi tehdä, jos hänellä on vanha polvivamma?", "vaihtoehdot": ["Jättää liikunta kokonaan väliin.", "Kertoa siitä ohjaajalle ennen tuntia.", "Ottaa mukaan oma lääkäri."], "oikea": "b", "selitys_fi": "Tekstin mukaan vanhasta vammasta kannattaa kertoa ohjaajalle ennen tuntia, jotta hän neuvoo sopivat liikkeet.", "vihje_de": "Bei alter Verletzung: vorher dem Trainer Bescheid sagen.", "kysymys_de": "Was sollte Theresia tun, wenn sie eine alte Knieverletzung hat?"}]}, {"otsikko": "Uutinen: suomalaiset nukkuvat liian vähän", "tyyppi": "uutinen", "teksti": "Tuore tutkimus kertoo, että yhä useampi suomalainen nukkuu liian vähän. Tutkimukseen osallistui yli kaksituhatta aikuista eri puolilta maata. Tulosten mukaan noin kolmasosa vastaajista nukkuu arkisin alle kuusi tuntia yössä, vaikka useimmat aikuiset tarvitsisivat seitsemästä yhdeksään tuntia unta. Tutkijat ovat huolissaan, koska pitkään jatkunut univaje heikentää muistia ja keskittymistä sekä lisää riskiä sairastua moniin sairauksiin. Yleisin syy huonoon uneen oli illan runsas ruutuaika. Moni katsoo puhelinta tai tietokonetta vielä sängyssä, ja näytön sininen valo viivästyttää nukahtamista. Toiseksi yleisin syy oli stressi työstä tai opiskelusta. Tutkijat muistuttavat, että unta voi parantaa pienillä muutoksilla. He suosittelevat säännöllistä nukkumaanmenoaikaa, viileää ja pimeää makuuhuonetta sekä ruudun sulkemista vähintään tunti ennen nukkumaanmenoa. Myös liikunta päivän aikana auttaa nukahtamaan paremmin illalla, mutta rankkaa urheilua kannattaa välttää aivan illalla. Asiantuntijat toivovat, että työpaikat ja koulut ottaisivat unen tärkeyden vakavammin, sillä levännyt ihminen jaksaa paremmin ja tekee vähemmän virheitä.", "teksti_de": "Eine aktuelle Studie zeigt, dass immer mehr Finnen zu wenig schlafen. An der Studie nahmen über zweitausend Erwachsene aus verschiedenen Teilen des Landes teil. Den Ergebnissen zufolge schläft etwa ein Drittel der Befragten an Werktagen weniger als sechs Stunden pro Nacht, obwohl die meisten Erwachsenen sieben bis neun Stunden Schlaf benötigen würden. Die Forscher sind besorgt, weil ein lange anhaltendes Schlafdefizit das Gedächtnis und die Konzentration beeinträchtigt sowie das Risiko erhöht, an vielen Krankheiten zu erkranken. Die häufigste Ursache für schlechten Schlaf war die viele Bildschirmzeit am Abend. Viele schauen noch im Bett auf ihr Handy oder ihren Computer, und das blaue Licht des Bildschirms verzögert das Einschlafen. Die zweithäufigste Ursache war Stress durch Arbeit oder Studium. Die Forscher erinnern daran, dass man den Schlaf mit kleinen Veränderungen verbessern kann. Sie empfehlen eine regelmäßige Schlafenszeit, ein kühles und dunkles Schlafzimmer sowie das Ausschalten des Bildschirms mindestens eine Stunde vor dem Schlafengehen. Auch Bewegung tagsüber hilft, abends besser einzuschlafen, aber hartes Training direkt am Abend sollte man vermeiden. Die Experten hoffen, dass Arbeitsplätze und Schulen die Bedeutung des Schlafs ernster nehmen, denn ein ausgeruhter Mensch ist leistungsfähiger und macht weniger Fehler.", "hl": ["Tulosten mukaan noin kolmasosa vastaajista nukkuu arkisin alle kuusi tuntia yössä, vaikka useimmat aikuiset tarvitsisivat seitsemästä yhdeksään tuntia unta.", "Yleisin syy huonoon uneen oli illan runsas ruutuaika.", "He suosittelevat säännöllistä nukkumaanmenoaikaa, viileää ja pimeää makuuhuonetta sekä ruudun sulkemista vähintään tunti ennen nukkumaanmenoa.", "Myös liikunta päivän aikana auttaa nukahtamaan paremmin illalla, mutta rankkaa urheilua kannattaa välttää aivan illalla."], "image": "Simulaatio_02_terveys/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Kuinka moni vastaaja nukkuu arkisin alle kuusi tuntia yössä?", "vaihtoehdot": ["Noin kolmasosa vastaajista.", "Lähes kaikki vastaajat.", "Vain muutama vastaaja."], "oikea": "a", "selitys_fi": "Tekstissä sanotaan, että noin kolmasosa vastaajista nukkuu alle kuusi tuntia yössä.", "vihje_de": "Etwa ein Drittel (kolmasosa) schläft weniger als sechs Stunden.", "kysymys_de": "Wie viele Befragte schlafen an Werktagen weniger als sechs Stunden pro Nacht?"}, {"id": "L10", "tyyppi": "monivalinta", "kysymys": "Mikä oli tutkimuksen mukaan yleisin syy huonoon uneen?", "vaihtoehdot": ["Liiallinen liikunta päivällä.", "Illan runsas ruutuaika.", "Liian viileä makuuhuone."], "oikea": "b", "selitys_fi": "Tekstin mukaan yleisin syy huonoon uneen oli illan runsas ruutuaika eli puhelimen tai tietokoneen käyttö.", "vihje_de": "Häufigste Ursache: viel Bildschirmzeit am Abend.", "kysymys_de": "Was war laut der Studie die häufigste Ursache für schlechten Schlaf?"}, {"id": "L11", "tyyppi": "oikein-väärin", "kysymys": "Tutkijoiden mukaan päivän aikana tehty liikunta auttaa nukahtamaan paremmin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstissä todetaan, että liikunta päivän aikana auttaa nukahtamaan paremmin illalla.", "vihje_de": "Bewegung tagsüber hilft beim Einschlafen – aber kein hartes Training spät am Abend.", "kysymys_de": "Laut den Forschern hilft Bewegung tagsüber, besser einzuschlafen."}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Mitä tutkijat suosittelevat tehtäväksi vähintään tunti ennen nukkumaanmenoa?", "vaihtoehdot": [], "oikea": "Sulkemaan ruudun eli puhelimen tai tietokoneen.", "selitys_fi": "Tekstissä suositellaan ruudun sulkemista vähintään tunti ennen nukkumaanmenoa.", "vihje_de": "Bildschirm mindestens eine Stunde vor dem Schlafengehen ausschalten.", "kysymys_de": "Was empfehlen die Forscher, mindestens eine Stunde vor dem Schlafengehen zu tun?"}]}, {"otsikko": "Apteekin ohje: särkylääkkeen oikea käyttö", "tyyppi": "ohje", "teksti": "Ostit reseptivapaan särkylääkkeen, joka sopii päänsäryn, kuumeen ja lievän kivun hoitoon. Lue tämä ohje ennen käyttöä. Aikuisen tavallinen kerta-annos on yksi tabletti. Voit ottaa uuden tabletin aikaisintaan kuuden tunnin kuluttua, mutta enintään kolme tablettia vuorokaudessa. Älä ylitä suositeltua annosta, sillä liian suuri määrä voi vahingoittaa maksaa. Ota tabletti veden kanssa ruokailun yhteydessä tai pian sen jälkeen, jolloin vatsa ärtyy vähemmän. Jos kipu tai kuume jatkuu yli kolme vuorokautta, ota yhteyttä lääkäriin tai apteekkiin. Lääke ei sovi kaikille. Kerro apteekissa, jos käytät muita lääkkeitä tai jos sinulla on maksasairaus. Jos olet raskaana tai imetät, kysy aina ensin neuvoa lääkäriltä. Älä käytä alkoholia tämän lääkkeen kanssa. Säilytä lääke huoneenlämmössä, kuivassa paikassa ja aina lasten ulottumattomissa. Tarkista pakkauksesta viimeinen käyttöpäivä äläkä käytä vanhentunutta lääkettä. Jos epäilet, että olet ottanut liian suuren annoksen, ota heti yhteyttä Myrkytystietokeskukseen tai päivystykseen, vaikka et tuntisi mitään oireita.", "teksti_de": "Du hast ein rezeptfreies Schmerzmittel gekauft, das zur Behandlung von Kopfschmerzen, Fieber und leichten Schmerzen geeignet ist. Lies diese Anleitung vor dem Gebrauch. Die übliche Einzeldosis für einen Erwachsenen ist eine Tablette. Du kannst frühestens nach sechs Stunden eine neue Tablette einnehmen, aber höchstens drei Tabletten pro Tag. Überschreite die empfohlene Dosis nicht, denn eine zu große Menge kann die Leber schädigen. Nimm die Tablette mit Wasser zusammen mit einer Mahlzeit oder kurz danach ein, dann wird der Magen weniger gereizt. Wenn Schmerz oder Fieber länger als drei Tage anhalten, wende dich an einen Arzt oder eine Apotheke. Das Medikament ist nicht für alle geeignet. Teile in der Apotheke mit, ob du andere Medikamente einnimmst oder ob du eine Lebererkrankung hast. Wenn du schwanger bist oder stillst, frage immer zuerst einen Arzt um Rat. Konsumiere keinen Alkohol zusammen mit diesem Medikament. Bewahre das Medikament bei Raumtemperatur, an einem trockenen Ort und immer außerhalb der Reichweite von Kindern auf. Überprüfe auf der Packung das Verfallsdatum und verwende kein abgelaufenes Medikament. Wenn du vermutest, dass du eine zu große Dosis eingenommen hast, wende dich sofort an die Giftinformationszentrale oder die Notfallambulanz, auch wenn du keinerlei Symptome verspürst.", "hl": ["Voit ottaa uuden tabletin aikaisintaan kuuden tunnin kuluttua, mutta enintään kolme tablettia vuorokaudessa.", "Jos kipu tai kuume jatkuu yli kolme vuorokautta, ota yhteyttä lääkäriin tai apteekkiin.", "Älä käytä alkoholia tämän lääkkeen kanssa."], "image": "Simulaatio_02_terveys/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Kuinka monta tablettia aikuinen saa ottaa enintään vuorokaudessa?", "vaihtoehdot": ["Yhden tabletin.", "Kolme tablettia.", "Kuusi tablettia."], "oikea": "b", "selitys_fi": "Tekstissä sanotaan, että enintään kolme tablettia vuorokaudessa.", "vihje_de": "Höchstens drei Tabletten pro Tag (vuorokaudessa).", "kysymys_de": "Wie viele Tabletten darf ein Erwachsener höchstens pro Tag einnehmen?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Lääkkeen kanssa saa juoda alkoholia.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Ohjeessa kielletään selvästi: älä käytä alkoholia tämän lääkkeen kanssa.", "vihje_de": "Kein Alkohol zusammen mit dem Medikament.", "kysymys_de": "Zusammen mit dem Medikament darf man Alkohol trinken."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Milloin lääkkeen käyttäjän pitää ottaa yhteyttä lääkäriin tai apteekkiin?", "vaihtoehdot": [], "oikea": "Jos kipu tai kuume jatkuu yli kolme vuorokautta.", "selitys_fi": "Ohjeen mukaan lääkäriin tai apteekkiin pitää ottaa yhteyttä, jos kipu tai kuume jatkuu yli kol
