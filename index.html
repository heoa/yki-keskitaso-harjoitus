 katoa kokonaan ainakaan lähivuosina. ”On tärkeää, että jokainen voi maksaa haluamallaan tavalla. Palvelujen pitää toimia kaikille, myös niille, jotka eivät käytä älypuhelinta”, hän korostaa.", "teksti_de": "Immer mehr Finninnen und Finnen bezahlen ihre Einkäufe mit Karte oder Handy. Laut einer aktuellen Studie verwendet heutzutage nur noch etwa jeder zehnte Kunde Bargeld bei den täglichen Einkäufen. Besonders junge Erwachsene bevorzugen das mobile Bezahlen, weil es ihrer Meinung nach schnell und praktisch ist.\n\nDer Handelsexperte Markku Laine berichtet, dass der Wandel schnell vor sich gegangen ist. „Vor zehn Jahren wurde viel mehr Bargeld benutzt. Jetzt wünschen sich viele Geschäfte, dass die Kunden mit Karte bezahlen, weil die Kassenabwicklung dann reibungsloser ist“, sagt er.\n\nNicht alle wollen jedoch auf Bargeld verzichten. Ein Teil der älteren Kunden empfindet die Kartennutzung als umständlich, und manche möchten ihre Ausgaben ganz konkret verfolgen. Deshalb erinnern die Experten daran, dass es sich für die Geschäfte lohnt, auch künftig beide Zahlungsarten anzubieten.\n\nLaut Laine wird das Bargeld zumindest in den nächsten Jahren nicht völlig verschwinden. „Es ist wichtig, dass jeder auf die von ihm gewünschte Weise bezahlen kann. Die Dienstleistungen müssen für alle funktionieren, auch für diejenigen, die kein Smartphone benutzen“, betont er.", "hl": ["Tuoreen tutkimuksen mukaan vain noin joka kymmenes asiakas käyttää nykyään käteistä päivittäisissä ostoksissaan.", "Nyt monet kaupat toivovat asiakkaiden maksavan kortilla, koska kassojen käsittely on silloin sujuvampaa”, hän sanoo.", "Laineen mukaan käteinen ei katoa kokonaan ainakaan lähivuosina."], "image": "Simulaatio_05_asiointi/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Kuinka moni asiakas käyttää tutkimuksen mukaan käteistä päivittäisissä ostoksissa?", "vaihtoehdot": ["noin joka kymmenes", "noin puolet", "lähes kaikki"], "oikea": "a", "selitys_fi": "Tekstin mukaan vain noin joka kymmenes asiakas käyttää käteistä päivittäisissä ostoksissaan.", "vihje_de": "„joka kymmenes“ = jeder Zehnte.", "kysymys_de": "Wie viele Kunden verwenden laut der Studie Bargeld bei den täglichen Einkäufen?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Asiantuntijan mukaan käteinen katoaa kokonaan jo lähivuosina.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Laineen mukaan käteinen ei katoa kokonaan ainakaan lähivuosina.", "vihje_de": "Das Bargeld verschwindet laut Experte nicht so bald ganz.", "kysymys_de": "Laut dem Experten verschwindet das Bargeld schon in den nächsten Jahren völlig."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Miksi monet kaupat toivovat, että asiakkaat maksavat kortilla?", "vaihtoehdot": [], "oikea": "Koska kassojen käsittely on silloin sujuvampaa.", "selitys_fi": "Markku Laineen mukaan kassojen käsittely on sujuvampaa, kun asiakkaat maksavat kortilla.", "vihje_de": "Die Kassenabwicklung geht so reibungsloser.", "kysymys_de": "Warum wünschen sich viele Geschäfte, dass die Kunden mit Karte bezahlen?"}]}], "listening": [{"otsikko": "Kuulutus tavaratalossa", "tyyppi": "kuulutus", "litteraatti": "Hyvää iltapäivää, hyvät asiakkaat, ja tervetuloa tavaratalo Pohjantähteen. Haluamme muistuttaa, että tämän viikon suuri alennusmyynti jatkuu vielä lauantaihin asti. Toisessa kerroksessa kaikki talvitakit ja saappaat ovat nyt kolmekymmentä prosenttia halvempia. Kannattaa siis poiketa katsomassa, sillä koot loppuvat nopeasti.\n\nMuistutamme myös, että ensimmäisen kerroksen asiakaspalvelusta saat apua kaikissa kysymyksissä. Sieltä voit hakea lahjakortteja, tehdä palautuksia tai kysyä lisätietoja tuotteista. Jos olet hukannut tavaraa tai löytänyt jotakin, löytötavarat ovat myös asiakaspalvelussa.\n\nTavaratalomme sulkeutuu tänään kello yhdeksältä illalla. Pyydämme ystävällisesti, että viette ostoksenne kassalle viimeistään varttia vaille yhdeksän. Kahvila kolmannessa kerroksessa palvelee vielä puoli tuntia kaupan sulkemisen jälkeen. Kiitos, että asioit kanssamme, ja toivotamme sinulle mukavaa loppupäivää!", "litteraatti_de": "Guten Nachmittag, sehr geehrte Kundinnen und Kunden, und willkommen im Kaufhaus Pohjantähti. Wir möchten Sie daran erinnern, dass der große Schlussverkauf dieser Woche noch bis Samstag andauert. Im zweiten Stock sind jetzt alle Wintermäntel und Stiefel dreißig Prozent günstiger. Es lohnt sich also, vorbeizuschauen, denn die Größen sind schnell ausverkauft.\n\nWir weisen Sie auch darauf hin, dass Sie beim Kundenservice im ersten Stock Hilfe bei allen Fragen bekommen. Dort können Sie Geschenkgutscheine abholen, Rücksendungen vornehmen oder weitere Informationen zu den Produkten erfragen. Wenn Sie etwas verloren oder etwas gefunden haben: Fundsachen gibt es ebenfalls beim Kundenservice.\n\nUnser Kaufhaus schließt heute um neun Uhr abends. Wir bitten Sie freundlich, Ihre Einkäufe spätestens um Viertel vor neun zur Kasse zu bringen. Das Café im dritten Stock ist noch eine halbe Stunde nach Schließung des Geschäfts geöffnet. Danke, dass Sie bei uns einkaufen, und wir wünschen Ihnen einen schönen Rest des Tages!", "hl": ["Haluamme muistuttaa, että tämän viikon suuri alennusmyynti jatkuu vielä lauantaihin asti.", "Toisessa kerroksessa kaikki talvitakit ja saappaat ovat nyt kolmekymmentä prosenttia halvempia.", "Tavaratalomme sulkeutuu tänään kello yhdeksältä illalla."], "audio": "Simulaatio_05_asiointi/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Mihin asti alennusmyynti jatkuu?", "vaihtoehdot": ["perjantaihin", "lauantaihin", "sunnuntaihin"], "oikea": "b", "selitys_fi": "Kuulutuksessa kerrotaan, että alennusmyynti jatkuu vielä lauantaihin asti.", "vihje_de": "Der Schlussverkauf dauert bis Samstag.", "kysymys_de": "Bis wann dauert der Schlussverkauf?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Mitä tuotteita on alennuksessa toisessa kerroksessa?", "vaihtoehdot": ["talvitakit ja saappaat", "lelut ja pelit", "kahvi ja leivonnaiset"], "oikea": "a", "selitys_fi": "Toisessa kerroksessa talvitakit ja saappaat ovat kolmekymmentä prosenttia halvempia.", "vihje_de": "Wintermäntel und Stiefel sind reduziert.", "kysymys_de": "Welche Produkte sind im zweiten Stock reduziert?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Löytötavarat ovat asiakaspalvelussa.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Kuulutuksen mukaan löytötavarat ovat ensimmäisen kerroksen asiakaspalvelussa.", "vihje_de": "Fundsachen gibt es beim Kundenservice.", "kysymys_de": "Die Fundsachen sind beim Kundenservice."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Mihin aikaan tavaratalo sulkeutuu tänään?", "vaihtoehdot": [], "oikea": "Kello yhdeksältä illalla eli kello 21.", "selitys_fi": "Kuulutuksessa sanotaan, että tavaratalo sulkeutuu tänään kello yhdeksältä illalla.", "vihje_de": "Das Kaufhaus schließt um 21 Uhr.", "kysymys_de": "Um wie viel Uhr schließt das Kaufhaus heute?"}]}, {"otsikko": "Puhelu pankin asiakaspalveluun", "tyyppi": "puhelu", "litteraatti": "– Asiakas: Hei, soitan, koska kortillani ei onnistunut maksaminen tänä aamuna kaupassa. Kortti ei vain toiminut.\n– Virkailija: Hei, ikävä kuulla. Katsotaan yhdessä, mistä se voi johtua. Kertoisitko ensin nimesi ja syntymäaikasi, niin löydän tietosi?\n– Asiakas: Tietysti. Nimeni on Theresia Berg, ja olen syntynyt kahdeskymmenes maaliskuuta vuonna 1985.\n– Virkailija: Kiitos. Nyt näen tilisi. Huomaan, että korttisi on mennyt lukkoon, koska tunnusluku näppäiltiin väärin kolme kertaa. Se on aivan tavallinen turvatoimi.\n– Asiakas: Ai, sepä harmillista. Mitä minun pitää nyt tehdä?\n– Virkailija: Voin avata kortin lukituksen heti, mutta varmuuden vuoksi sinun kannattaa käydä verkkopankissa vaihtamassa tunnusluku uuteen. Muista valita numerot, jotka et helposti unohda.\n– Asiakas: Selvä, kiitos paljon. Voinko siis taas maksaa kortilla tänään?\n– Virkailija: Kyllä voit. Lukitus on nyt poistettu, ja kortti toimii noin viiden minuutin kuluttua. Mukavaa päivänjatkoa!", "litteraatti_de": "– Kunde: Hallo, ich rufe an, weil das Bezahlen mit meiner Karte heute Morgen im Geschäft nicht geklappt hat. Die Karte hat einfach nicht funktioniert.\n– Sachbearbeiter: Hallo, das tut mir leid zu hören. Schauen wir gemeinsam, woran das liegen kann. Würden Sie mir zuerst Ihren Namen und Ihr Geburtsdatum nennen, damit ich Ihre Daten finde?\n– Kunde: Natürlich. Mein Name ist Theresia Berg, und ich bin am zwanzigsten März 1985 geboren.\n– Sachbearbeiter: Danke. Jetzt sehe ich Ihr Konto. Ich stelle fest, dass Ihre Karte gesperrt wurde, weil die PIN dreimal falsch eingegeben wurde. Das ist eine ganz übliche Sicherheitsmaßnahme.\n– Kunde: Ach, das ist ärgerlich. Was muss ich jetzt tun?\n– Sachbearbeiter: Ich kann die Karte sofort entsperren, aber sicherheitshalber sollten Sie im Onlinebanking die PIN durch eine neue ersetzen. Denken Sie daran, Zahlen zu wählen, die Sie nicht leicht vergessen.\n– Kunde: Alles klar, vielen Dank. Kann ich also heute wieder mit Karte bezahlen?\n– Sachbearbeiter: Ja, das können Sie. Die Sperre ist jetzt aufgehoben, und die Karte funktioniert in etwa fünf Minuten. Einen schönen Tag noch!", "hl": ["Huomaan, että korttisi on mennyt lukkoon, koska tunnusluku näppäiltiin väärin kolme kertaa.", "Voin avata kortin lukituksen heti, mutta varmuuden vuoksi sinun kannattaa käydä verkkopankissa vaihtamassa tunnusluku uuteen.", "Lukitus on nyt poistettu, ja kortti toimii noin viiden minuutin kuluttua."], "audio": "Simulaatio_05_asiointi/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Miksi asiakas soittaa pankkiin?", "vaihtoehdot": ["Hän haluaa avata uuden tilin.", "Hänen korttinsa ei toiminut kaupassa.", "Hän haluaa tilata uuden kortin."], "oikea": "b", "selitys_fi": "Asiakas soittaa, koska kortilla maksaminen ei onnistunut kaupassa.", "vihje_de": "Die Karte funktionierte im Geschäft nicht.", "kysymys_de": "Warum ruft der Kunde bei der Bank an?"}, {"id": "Ku6", "tyyppi": "monivalinta", "kysymys": "Miksi kortti meni lukkoon?", "vaihtoehdot": ["Tunnusluku näppäiltiin väärin kolme kertaa.", "Tilillä ei ollut rahaa.", "Kortti oli vanhentunut."], "oikea": "a", "selitys_fi": "Kortti meni lukkoon, koska tunnusluku näppäiltiin väärin kolme kertaa.", "vihje_de": "Die PIN wurde dreimal falsch eingegeben.", "kysymys_de": "Warum wurde die Karte gesperrt?"}, {"id": "Ku7", "tyyppi": "lyhyt", "kysymys": "Mitä virkailija neuvoo asiakasta tekemään verkkopankissa?", "vaihtoehdot": [], "oikea": "Vaihtamaan tunnusluvun uuteen.", "selitys_fi": "Virkailija neuvoo asiakasta käymään verkkopankissa ja vaihtamaan tunnusluvun uuteen.", "vihje_de": "Im Onlinebanking die PIN ändern.", "kysymys_de": "Was rät der Sachbearbeiter dem Kunden im Onlinebanking zu tun?"}, {"id": "Ku8", "tyyppi": "oikein-väärin", "kysymys": "Asiakas voi maksaa kortilla taas saman päivän aikana.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Virkailija poistaa lukituksen, ja kortti toimii noin viiden minuutin kuluttua, joten asiakas voi maksaa jo samana päivänä.", "vihje_de": "Die Karte funktioniert nach wenigen Minuten wieder.", "kysymys_de": "Der Kunde kann noch am selben Tag wieder mit Karte bezahlen."}]}, {"otsikko": "Keskustelu postin palvelutiskillä", "tyyppi": "dialogi", "litteraatti": "– Asiakas: Hei, haluaisin lähettää tämän paketin Saksaan. Onnistuuko se täältä?\n– Myyjä: Hei, totta kai. Onko paketti hauras vai kestääkö se hyvin kuljetusta?\n– Asiakas: Sisällä on kahvikuppeja, joten se on aika hauras. Toivottavasti ne eivät hajoa matkalla.\n– Myyjä: Ymmärrän. Suosittelen, että lisäämme pakettiin ”särkyvää”-tarran. Pakkasitko kupit hyvin pehmusteisiin?\n– Asiakas: Kyllä, kiedoin jokaisen kupin erikseen sanomalehteen ja laitoin laatikkoon pehmustetta.\n– Myyjä: Hienoa, se on juuri oikein. Paketti painaa nyt kaksi kiloa. Tavallinen toimitus Saksaan maksaa kaksitoista euroa ja kestää noin viisi arkipäivää. Pikatoimitus on kalliimpi, mutta paketti on perillä jo kolmessa päivässä.\n– Asiakas: Otan tavallisen toimituksen, kiitos. Ei ole kiire.\n– Myyjä: Selvä. Haluatko myös seurantakoodin, jotta voit seurata pakettia netissä?\n– Asiakas: Kyllä kiitos, se olisi kätevää.\n– Myyjä: Hyvä. Tässä on kuitti ja seurantakoodi. Mukavaa päivänjatkoa!", "litteraatti_de": "– Kunde: Hallo, ich möchte dieses Paket nach Deutschland schicken. Geht das von hier aus?\n– Verkäufer: Hallo, selbstverständlich. Ist das Paket zerbrechlich oder hält es den Transport gut aus?\n– Kunde: Drinnen sind Kaffeetassen, also ist es ziemlich zerbrechlich. Hoffentlich gehen sie unterwegs nicht kaputt.\n– Verkäufer: Ich verstehe. Ich empfehle, dass wir dem Paket einen „Zerbrechlich“-Aufkleber hinzufügen. Haben Sie die Tassen gut in Polstermaterial verpackt?\n– Kunde: Ja, ich habe jede Tasse einzeln in Zeitungspapier gewickelt und Polstermaterial in den Karton gelegt.\n– Verkäufer: Wunderbar, das ist genau richtig. Das Paket wiegt jetzt zwei Kilo. Der normale Versand nach Deutschland kostet zwölf Euro und dauert etwa fünf Werktage. Der Expressversand ist teurer, aber das Paket ist schon in drei Tagen da.\n– Kunde: Ich nehme den normalen Versand, danke. Es eilt nicht.\n– Verkäufer: Alles klar. Möchten Sie auch einen Sendungsverfolgungscode, damit Sie das Paket im Internet verfolgen können?\n– Kunde: Ja, bitte, das wäre praktisch.\n– Verkäufer: Gut. Hier sind der Beleg und der Sendungsverfolgungscode. Einen schönen Tag noch!", "hl": ["Sisällä on kahvikuppeja, joten se on aika hauras.", "Suosittelen, että lisäämme pakettiin ”särkyvää”-tarran.", "Tavallinen toimitus Saksaan maksaa kaksitoista euroa ja kestää noin viisi arkipäivää."], "audio": "Simulaatio_05_asiointi/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Mitä paketissa on sisällä?", "vaihtoehdot": ["kirjoja", "kahvikuppeja", "vaatteita"], "oikea": "b", "selitys_fi": "Asiakas kertoo, että paketissa on kahvikuppeja ja siksi se on hauras.", "vihje_de": "Im Paket sind Kaffeetassen.", "kysymys_de": "Was ist im Paket drin?"}, {"id": "Ku10", "tyyppi": "oikein-väärin", "kysymys": "Myyjä suosittelee, että pakettiin lisätään ”särkyvää”-tarra.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Myyjä suosittelee ”särkyvää”-tarraa, koska paketti on hauras.", "vihje_de": "Der Verkäufer empfiehlt einen „Zerbrechlich“-Aufkleber.", "kysymys_de": "Der Verkäufer empfiehlt, dem Paket einen „Zerbrechlich“-Aufkleber hinzuzufügen."}, {"id": "Ku11", "tyyppi": "monivalinta", "kysymys": "Minkä toimituksen asiakas valitsee?", "vaihtoehdot": ["pikatoimituksen", "tavallisen toimituksen", "noudon postista"], "oikea": "b", "selitys_fi": "Asiakas valitsee tavallisen toimituksen, koska hänellä ei ole kiire.", "vihje_de": "Der Kunde wählt den normalen Versand.", "kysymys_de": "Welchen Versand wählt der Kunde?"}, {"id": "Ku12", "tyyppi": "lyhyt", "kysymys": "Kuinka kauan tavallinen toimitus Saksaan kestää?", "vaihtoehdot": [], "oikea": "Noin viisi arkipäivää.", "selitys_fi": "Myyjän mukaan tavallinen toimitus Saksaan kestää noin viisi arkipäivää.", "vihje_de": "Der normale Versand dauert etwa fünf Werktage.", "kysymys_de": "Wie lange dauert der normale Versand nach Deutschland?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Ystäväsi lainasi sinulta rahaa kaupassa, koska unohdit lompakkosi kotiin. Kirjoita hänelle lyhyt viesti. Kiitä avusta, kerro, milloin maksat rahat takaisin, ja ehdota, että menette yhdessä kahville.", "ohje_de": "Eine Freundin/ein Freund hat Ihnen im Geschäft Geld geliehen, weil Sie Ihr Portemonnaie zu Hause vergessen haben. Schreiben Sie eine kurze Nachricht: Bedanken Sie sich, sagen Sie, wann Sie das Geld zurückzahlen, und schlagen Sie vor, zusammen einen Kaffee trinken zu gehen.", "sanamaara": "80–120", "mallivastaus": "Hei Anna,\n\nkiitos vielä kerran, että autoit minua eilen kaupassa! Olin niin hajamielinen, että unohdin lompakkoni kokonaan kotiin. Oli tosi kiva, että maksoit ostokseni puolestani. En tiedä, mitä olisin tehnyt ilman sinua.\n\nMaksan rahat takaisin heti ensi viikolla. Voin siirtää summan tilillesi tai antaa käteisenä, kumpi sinulle parhaiten sopii. Kerro vain, kummin haluat.\n\nVoisimmeko muuten mennä yhdessä kahville lauantaina? Tarjoan minä, koska olet ansainnut sen. Lähellä toria on uusi mukava kahvila, jota haluaisin kokeilla. Sopiiko sinulle noin kello kahdelta?\n\nLaita viestiä, niin sovitaan tarkemmin. Ihanaa viikonloppua!\n\nTerveisin Theresia", "arviointi_fi": "Hyvässä vastauksessa on selkeä tervehdys ja lopputervehdys, kaikki kolme tehtävää (kiitos, takaisinmaksu, kahviehdotus) on hoidettu, ja kieli on luontevaa B1-tason puhekielistä viestiä. Pienet virheet eivät laske tasoa, jos viesti on ymmärrettävä.", "mallivastaus_de": "Hallo Anna,\n\ndanke noch einmal, dass du mir gestern im Geschäft geholfen hast! Ich war so zerstreut, dass ich mein Portemonnaie komplett zu Hause vergessen habe. Es war wirklich nett, dass du meinen Einkauf für mich bezahlt hast. Ich weiß nicht, was ich ohne dich gemacht hätte.\n\nIch zahle das Geld gleich nächste Woche zurück. Ich kann den Betrag auf dein Konto überweisen oder dir bar geben, was dir am besten passt. Sag mir einfach, wie du es lieber möchtest.\n\nKönnten wir übrigens am Samstag zusammen einen Kaffee trinken gehen? Ich lade dich ein, weil du es verdient hast. In der Nähe des Marktplatzes gibt es ein nettes neues Café, das ich gern ausprobieren würde. Passt es dir gegen zwei Uhr?\n\nSchreib mir, dann verabreden wir uns genauer. Ein wunderbares Wochenende!\n\nGruß Theresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Kirjoita keskustelupalstalle mielipidekirjoitus aiheesta ”Pitäisikö kaupoissa olla aina myös ihmiskassoja, vai riittävätkö itsepalvelukassat?”. Kerro oma mielipiteesi, perustele se ja anna ainakin kaksi esimerkkiä.", "ohje_de": "Schreiben Sie einen Forumsbeitrag zum Thema „Sollte es in Geschäften immer auch Kassen mit Personal geben, oder reichen Selbstbedienungskassen?“. Nennen Sie Ihre Meinung, begründen Sie sie und geben Sie mindestens zwei Beispiele.", "sanamaara": "150–200", "mallivastaus": "Itsepalvelukassat vai ihmiskassat?\n\nMonissa kaupoissa on nykyään yhä enemmän itsepalvelukassoja, ja perinteiset kassat vähenevät. Mielestäni tämä on osittain hyvä asia, mutta kaupoissa pitäisi silti aina olla myös kassa, jossa on oikea myyjä.\n\nItsepalvelukassat ovat usein nopeita, kun ostoksia on vähän. Esimerkiksi minä käytän niitä mielelläni, jos ostan vain leipää ja maitoa. Silloin ei tarvitse jonottaa pitkään, ja asiointi sujuu kätevästi.\n\nKaikki asiakkaat eivät kuitenkaan osaa tai halua käyttää koneita. Esimerkiksi monet iäkkäät ihmiset kokevat laitteet hankaliksi, ja he tarvitsevat apua. Lisäksi joskus tulee ongelmia, kun kone ei tunnista tuotetta. Silloin on tärkeää, että lähellä on työntekijä, joka voi auttaa nopeasti.\n\nMielestäni paras ratkaisu on, että kaupassa on molempia kassoja. Näin jokainen voi valita itselleen sopivan tavan maksaa. Hyvä palvelu kuuluu kaikille asiakkaille, eikä ketään saa jättää yksin koneen kanssa.", "arviointi_fi": "Hyvässä vastauksessa mielipide on selvä, sitä perustellaan ja annetaan vähintään kaksi konkreettista esimerkkiä. Tekstissä on selkeä rakenne (aloitus, perustelut, lopetus) ja sidesanoja, kuten ”esimerkiksi”, ”lisäksi” ja ”mielestäni”. B1–B2-tasolla odotetaan monipuolisempaa sanastoa ja muutamia sivulauseita.", "mallivastaus_de": "Selbstbedienungskassen oder Kassen mit Personal?\n\nIn vielen Geschäften gibt es heutzutage immer mehr Selbstbedienungskassen, und die herkömmlichen Kassen werden weniger. Meiner Meinung nach ist das teilweise eine gute Sache, aber in den Geschäften sollte es trotzdem immer auch eine Kasse mit einem echten Verkäufer geben.\n\nSelbstbedienungskassen sind oft schnell, wenn man wenig einkauft. Ich zum Beispiel benutze sie gerne, wenn ich nur Brot und Milch kaufe. Dann muss man nicht lange anstehen, und der Einkauf geht bequem vonstatten.\n\nNicht alle Kunden können oder wollen jedoch die Maschinen benutzen. Zum Beispiel empfinden viele ältere Menschen die Geräte als umständlich, und sie brauchen Hilfe. Außerdem gibt es manchmal Probleme, wenn die Maschine ein Produkt nicht erkennt. Dann ist es wichtig, dass in der Nähe ein Mitarbeiter ist, der schnell helfen kann.\n\nMeiner Meinung nach ist die beste Lösung, dass es im Geschäft beide Arten von Kassen gibt. So kann jeder die für sich passende Art zu bezahlen wählen. Guter Service steht allen Kunden zu, und niemand darf mit der Maschine allein gelassen werden."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen viesti (reklamaatio)", "ohje_fi": "Ostit verkkokaupasta kahvinkeittimen, mutta se ei toimi: vesi ei lämpene ollenkaan. Kirjoita reklamaatio asiakaspalveluun. Kerro, mitä ostit ja milloin, kuvaile ongelma ja kerro, mitä toivot kaupan tekevän (esimerkiksi korjaus tai rahojen palautus).", "ohje_de": "Sie haben in einem Onlineshop eine Kaffeemaschine gekauft, aber sie funktioniert nicht: Das Wasser wird nicht warm. Schreiben Sie eine Reklamation an den Kundenservice. Sagen Sie, was Sie wann gekauft haben, beschreiben Sie das Problem und sagen Sie, was das Geschäft tun soll (z. B. Reparatur oder Rückerstattung).", "sanamaara": "120–160", "mallivastaus": "Aihe: Reklamaatio – viallinen kahvinkeitin (tilaus 458921)\n\nHyvä asiakaspalvelu,\n\notin teiltä yhteyttä viallisen tuotteen takia. Tilasin verkkokaupastanne kahvinkeittimen 2. kesäkuuta, ja se saapui kotiini viikko sitten. Tilausnumeroni on 458921.\n\nValitettavasti laite ei toimi kunnolla. Kun kytken sen päälle, valo syttyy, mutta vesi ei lämpene ollenkaan. Olen kokeillut keitintä useita kertoja ja lukenut käyttöohjeen huolellisesti, mutta ongelma ei korjaannu. Vika näyttää siis olevan itse laitteessa.\n\nToivon, että saan tilalle uuden, toimivan kahvinkeittimen tai vaihtoehtoisesti rahani takaisin. Kertoisitteko myös, miten voin palauttaa viallisen laitteen ja kuka maksaa palautuskulut?\n\nVastaattehan viestiini mahdollisimman pian. Kiitos jo etukäteen avustanne.\n\nYstävällisin terveisin\nTheresia Berg", "arviointi_fi": "Hyvässä reklamaatiossa on kohtelias, puolivirallinen sävy, selkeä aihe sekä tieto siitä, mitä ja milloin on ostettu. Ongelma kuvataan ymmärrettävästi, ja lopussa esitetään selvä toive (korjaus tai rahojen palautus). Tärkeää on asiallinen rekisteri ja looginen järjestys.", "mallivastaus_de": "Betreff: Reklamation – defekte Kaffeemaschine (Bestellung 458921)\n\nSehr geehrter Kundenservice,\n\nich wende mich wegen eines defekten Produkts an Sie. Ich habe in Ihrem Onlineshop am 2. Juni eine Kaffeemaschine bestellt, und sie ist vor einer Woche bei mir zu Hause angekommen. Meine Bestellnummer ist 458921.\n\nLeider funktioniert das Gerät nicht richtig. Wenn ich es einschalte, geht das Licht an, aber das Wasser wird überhaupt nicht warm. Ich habe die Maschine mehrmals ausprobiert und die Gebrauchsanweisung sorgfältig gelesen, aber das Problem lässt sich nicht beheben. Der Fehler scheint also am Gerät selbst zu liegen.\n\nIch hoffe, dass ich als Ersatz eine neue, funktionierende Kaffeemaschine oder alternativ mein Geld zurückbekomme. Würden Sie mir auch mitteilen, wie ich das defekte Gerät zurücksenden kann und wer die Rücksendekosten trägt?\n\nBitte antworten Sie mir möglichst bald. Vielen Dank schon im Voraus für Ihre Hilfe.\n\nMit freundlichen Grüßen\nTheresia Berg"}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Olet kaupassa kassalla. Myyjä kysyy: ”Haluatteko kassakuitin?” Vastaa sopivasti.", "ohje_de": "Sie stehen an der Kasse. Der Verkäufer fragt: „Möchten Sie den Kassenbon?“ Reagieren Sie passend.", "valmistautuminen_s": 0, "puheaika_s": 20, "malli": "Kyllä kiitos, otan kuitin mukaan. Saatan tarvita sitä, jos joudun palauttamaan tuotteen myöhemmin.", "malli_de": "Ja, danke, ich nehme den Beleg mit. Ich könnte ihn brauchen, falls ich das Produkt später zurückgeben muss."}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Haluat tietää, onko kaupassa tiettyä tuotetta. Kysy myyjältä, mistä löydät gluteenittoman leivän.", "ohje_de": "Sie wollen wissen, ob es ein bestimmtes Produkt gibt. Fragen Sie den Verkäufer, wo Sie das glutenfreie Brot finden.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, voisitteko auttaa? Etsin gluteenitonta leipää. Missä hyllyssä se on, vai onko se mahdollisesti loppunut?", "malli_de": "Entschuldigung, könnten Sie mir helfen? Ich suche glutenfreies Brot. In welchem Regal ist es, oder ist es möglicherweise ausverkauft?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Olet pankissa. Virkailija kysyy: ”Millä asialla olette tänään?” Kerro, että haluat avata uuden tilin.", "ohje_de": "Sie sind in der Bank. Der/die Angestellte fragt: „Womit kann ich Ihnen heute helfen?“ Sagen Sie, dass Sie ein neues Konto eröffnen möchten.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Hei, haluaisin avata uuden pankkitilin. Mitä papereita tarvitsen sitä varten, ja kestääkö se kauan?", "malli_de": "Hallo, ich möchte ein neues Bankkonto eröffnen. Welche Papiere brauche ich dafür, und dauert das lange?"}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Ostit takin, mutta huomasit kotona, että siinä on reikä. Olet myymälässä. Sano myyjälle, mikä on ongelma ja mitä haluat.", "ohje_de": "Sie haben eine Jacke gekauft, aber zu Hause bemerkt, dass sie ein Loch hat. Sie sind im Geschäft. Sagen Sie dem Verkäufer, was das Problem ist und was Sie möchten.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, ostin tämän takin eilen, mutta kotona huomasin, että hihassa on pieni reikä. Haluaisin vaihtaa sen ehjään tai saada rahat takaisin. Tässä on kuitti.", "malli_de": "Hallo, ich habe diese Jacke gestern gekauft, aber zu Hause habe ich bemerkt, dass im Ärmel ein kleines Loch ist. Ich würde sie gern gegen eine heile umtauschen oder mein Geld zurückbekommen. Hier ist der Beleg."}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Haluat varata ajan parturiin. Soitat parturiin. Kerro, että haluat varata ajan, ja ehdota sopivaa aikaa.", "ohje_de": "Sie wollen einen Friseurtermin vereinbaren. Sie rufen den Friseur an. Sagen Sie, dass Sie einen Termin möchten, und schlagen Sie eine passende Zeit vor.", "valmistautuminen_s": 0, "puheaika_s": 30, "malli": "Hei, haluaisin varata ajan hiustenleikkuuseen. Sopisiko teille ensi torstai iltapäivällä, vaikka kello kolme? Jos ei, mikä aika teillä olisi vapaana?", "malli_de": "Hallo, ich würde gern einen Termin zum Haareschneiden vereinbaren. Würde Ihnen nächster Donnerstag am Nachmittag passen, etwa um drei Uhr? Wenn nicht, welche Zeit hätten Sie frei?"}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro asioinnista, joka jäi mieleesi (esimerkiksi kaupassa, postissa tai pankissa). Kuvaile, missä olit, mitä tapahtui ja miksi tilanne jäi mieleen. Sinulla on aikaa valmistautua.", "ohje_de": "Erzählen Sie von einem Behördengang oder Einkauf, der Ihnen in Erinnerung geblieben ist (z. B. im Geschäft, in der Post oder in der Bank). Beschreiben Sie, wo Sie waren, was passierte und warum die Situation Ihnen in Erinnerung blieb. Sie haben Zeit zur Vorbereitung.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Haluan kertoa yhdestä asioinnista, joka jäi hyvin mieleeni. Viime talvena menin postiin hakemaan pakettia, jota olin odottanut jo pitkään. Olin tilannut Saksasta lahjan äidilleni, ja se oli tärkeä, koska äitini syntymäpäivä oli jo seuraavana päivänä.\n\nKun saavuin postiin, jono oli todella pitkä. Odotin lähes puoli tuntia, ja olin hieman hermostunut, koska minulla oli kiire. Lopulta pääsin tiskille ja annoin noutokoodin sekä henkilökortin. Virkailija oli kuitenkin todella ystävällinen. Hän huomasi, että olin stressaantunut, ja auttoi minua nopeasti ja rauhallisesti.\n\nKun sain paketin käteeni, olin todella helpottunut. Tarkistin heti, että lahja oli ehjä, ja se oli. Tämä tilanne jäi mieleeni, koska huomasin, kuinka paljon hyvä asiakaspalvelu merkitsee. Vaikka jouduin odottamaan kauan, ystävällinen virkailija teki päivästäni paremman. Sen jälkeen olen aina yrittänyt itsekin olla kärsivällinen jonossa.", "malli_de": "Ich möchte von einem Behördengang erzählen, der mir gut in Erinnerung geblieben ist. Letzten Winter ging ich zur Post, um ein Paket abzuholen, auf das ich schon lange gewartet hatte. Ich hatte aus Deutschland ein Geschenk für meine Mutter bestellt, und es war wichtig, weil der Geburtstag meiner Mutter schon am nächsten Tag war.\n\nAls ich bei der Post ankam, war die Schlange wirklich lang. Ich wartete fast eine halbe Stunde und war ein bisschen nervös, weil ich es eilig hatte. Schließlich kam ich an den Schalter und gab den Abholcode sowie den Personalausweis. Der Sachbearbeiter war jedoch wirklich freundlich. Er merkte, dass ich gestresst war, und half mir schnell und ruhig.\n\nAls ich das Paket in der Hand hatte, war ich wirklich erleichtert. Ich prüfte sofort, ob das Geschenk heil war, und das war es. Diese Situation ist mir in Erinnerung geblieben, weil ich gemerkt habe, wie viel guter Kundenservice bedeutet. Obwohl ich lange warten musste, machte der freundliche Sachbearbeiter meinen Tag besser. Seitdem habe ich immer versucht, selbst auch geduldig in der Schlange zu sein."}, {"id": "P7", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Olet kaupassa ja haluat palauttaa kengät, jotka ovat liian pienet. Roolisi: asiakas. Myyjä (haastattelija) kysyy kuitista ja syystä palautukseen. Selitä tilanne ja sovi palautuksesta.", "ohje_de": "Situation: Sie sind im Geschäft und möchten Schuhe zurückgeben, die zu klein sind. Ihre Rolle: Kunde/Kundin. Der Verkäufer (Prüfer) fragt nach dem Bon und dem Grund. Erklären Sie die Situation und vereinbaren Sie die Rückgabe.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Asiakas: Hei, ostin nämä kengät viime viikolla, mutta ne ovat valitettavasti liian pienet. Haluaisin palauttaa ne.\n– Myyjä: Selvä. Onko teillä kuitti mukana?\n– Asiakas: Kyllä on, tässä se on. Ostin kengät täältä viime tiistaina.\n– Myyjä: Hyvä. Haluatteko rahat takaisin vai vaihdatteko ne isompaan kokoon?\n– Asiakas: Voisinko saada saman mallin numeroa isompana? Jos sopivaa kokoa ei ole, otan mieluummin rahat takaisin.\n– Myyjä: Katson heti varastosta. Hetkinen, niin tarkistan asian.", "malli_de": "– Kunde: Hallo, ich habe diese Schuhe letzte Woche gekauft, aber sie sind leider zu klein. Ich würde sie gern zurückgeben.\n– Verkäufer: Alles klar. Haben Sie den Beleg dabei?\n– Kunde: Ja, hier ist er. Ich habe die Schuhe letzten Dienstag hier gekauft.\n– Verkäufer: Gut. Möchten Sie das Geld zurück oder tauschen Sie sie gegen eine größere Größe um?\n– Kunde: Könnte ich dasselbe Modell eine Nummer größer bekommen? Wenn die passende Größe nicht da ist, nehme ich lieber das Geld zurück.\n– Verkäufer: Ich schaue gleich im Lager nach. Einen Moment, ich prüfe das."}, {"id": "P8", "tyyppi": "keskustelu/roolipeli", "ohje_fi": "Tilanne: Ystäväsi haluaa ostaa kalliin puhelimen heti, mutta sinä ehdotat, että hän odottaa alennusmyyntiä. Roolisi: ystävä, joka neuvoo säästämään. Keskustele ja perustele mielipiteesi.", "ohje_de": "Situation: Ihr Freund will sofort ein teures Telefon kaufen, aber Sie schlagen vor, auf den Schlussverkauf zu warten. Ihre Rolle: Freund/Freundin, der/die zum Sparen rät. Diskutieren Sie und begründen Sie Ihre Meinung.", "valmistautuminen_s": 30, "puheaika_s": 60, "malli": "– Ystävä: Aiotko todella ostaa tuon puhelimen jo tänään? Se on aika kallis.\n– Sinä: Niin on. Minusta kannattaisi vielä odottaa hetki.\n– Ystävä: Miksi? Haluan sen heti.\n– Sinä: Ymmärrän kyllä, mutta pian alkaa alennusmyynti. Silloin sama puhelin voi olla paljon halvempi, ehkä jopa sata euroa edullisempi.\n– Ystävä: Hmm, se on totta. En ehkä tarvitse sitä juuri nyt.\n– Sinä: Juuri niin. Jos odotat pari viikkoa, säästät rahaa ja voit ostaa samalla vaikka suojakuoren. Mietitään asiaa rauhassa yhdessä.", "malli_de": "– Freund: Willst du dieses Telefon wirklich schon heute kaufen? Es ist ziemlich teuer.\n– Du: Ja, das stimmt. Ich finde, es würde sich lohnen, noch einen Moment zu warten.\n– Freund: Warum? Ich will es sofort.\n– Du: Ich verstehe das schon, aber bald beginnt der Schlussverkauf. Dann kann dasselbe Telefon viel günstiger sein, vielleicht sogar hundert Euro billiger.\n– Freund: Hmm, das ist wahr. Ich brauche es vielleicht nicht gerade jetzt.\n– Du: Genau. Wenn du ein paar Wochen wartest, sparst du Geld und kannst gleich zum Beispiel auch eine Schutzhülle kaufen. Überlegen wir uns die Sache in Ruhe zusammen."}, {"id": "P9", "tyyppi": "mielipide", "ohje_fi": "Valitse toinen aihe ja kerro siitä mielipiteesi. Perustele näkemyksesi ja anna esimerkkejä. Sinulla on aikaa valmistautua.\nAihe 1: Onko verkkokaupasta ostaminen parempi vai huonompi kuin asiointi tavallisessa kaupassa?\nAihe 2: Pitäisikö kauppojen olla auki myös sunnuntaisin ja yöllä?", "ohje_de": "Wählen Sie ein Thema und äußern Sie Ihre Meinung dazu. Begründen Sie Ihre Sichtweise und geben Sie Beispiele. Sie haben Zeit zur Vorbereitung.\nThema 1: Ist Onlineshopping besser oder schlechter als der Einkauf im normalen Geschäft?\nThema 2: Sollten Geschäfte auch sonntags und nachts geöffnet sein?", "valmistautuminen_s": 120, "puheaika_s": 120, "malli": "Valitsen ensimmäisen aiheen eli verkkokaupan ja tavallisen kaupan vertailun. Minun mielestäni molemmissa on hyvät ja huonot puolensa, mutta itse pidän enemmän tavallisesta kaupasta.\n\nVerkkokauppa on tietysti hyvin kätevä. Voin tilata tuotteita kotoa mihin aikaan tahansa, eikä minun tarvitse lähteä ulos huonolla säällä. Lisäksi netissä on usein laaja valikoima ja edullisempia hintoja. Esimerkiksi kirjoja ja elektroniikkaa tilaan mielelläni verkosta, koska niitä on helppo vertailla.\n\nToisaalta verkkokaupassa on myös huonoja puolia. En voi koskea tuotteeseen enkä sovittaa vaatteita ennen ostamista. Joskus tuote näyttää kuvassa erilaiselta kuin oikeasti, ja palauttaminen vie aikaa. Siksi ostan vaatteet ja ruoan mieluummin tavallisesta kaupasta.\n\nTavallisessa kaupassa saan myös henkilökohtaista palvelua. Voin kysyä myyjältä neuvoa ja saada tuotteen heti mukaani. Minusta on myös mukavaa kävellä kaupungilla ja tavata ihmisiä.\n\nKaiken kaikkiaan käytän molempia tapoja tilanteen mukaan. Tärkeää on, että kuluttajalla on mahdollisuus valita itselleen sopivin tapa ostaa.", "malli_de": "Ich wähle das erste Thema, also den Vergleich zwischen Onlineshop und normalem Geschäft. Meiner Meinung nach haben beide ihre guten und schlechten Seiten, aber ich selbst mag das normale Geschäft mehr.\n\nDer Onlineshop ist natürlich sehr praktisch. Ich kann Produkte von zu Hause aus zu jeder Zeit bestellen, und ich muss bei schlechtem Wetter nicht nach draußen gehen. Außerdem gibt es im Internet oft eine große Auswahl und günstigere Preise. Zum Beispiel Bücher und Elektronik bestelle ich gern im Internet, weil man sie leicht vergleichen kann.\n\nAndererseits hat der Onlineshop auch schlechte Seiten. Ich kann das Produkt nicht anfassen und Kleidung vor dem Kauf nicht anprobieren. Manchmal sieht das Produkt auf dem Bild anders aus als in Wirklichkeit, und das Zurücksenden kostet Zeit. Deshalb kaufe ich Kleidung und Lebensmittel lieber im normalen Geschäft.\n\nIm normalen Geschäft bekomme ich außerdem persönlichen Service. Ich kann den Verkäufer um Rat fragen und das Produkt sofort mitnehmen. Ich finde es auch schön, durch die Stadt zu gehen und Menschen zu treffen.\n\nAlles in allem benutze ich beide Wege je nach Situation. Wichtig ist, dass der Verbraucher die Möglichkeit hat, die für sich am besten passende Art zu kaufen zu wählen."}]}, {"id": 6, "teema": "Ruoka ja ravintola", "teema_de": "Essen und Restaurant", "reading": [{"otsikko": "Ravintola Kanervan kesätiedote", "tyyppi": "ilmoitus", "teksti": "Tervetuloa ravintola Kanervaan! Kesäkaudella olemme avoinna joka päivä kello 11–22. Lounasta tarjoamme arkisin kello 11–14, ja lounaan hinta on 12,90 euroa. Lounaaseen kuuluu keitto, lämmin pääruoka, salaattipöytä, leipä sekä kahvi tai tee. Viikonloppuisin tarjoamme à la carte -annoksia koko päivän, ja silloin keittiömme valmistaa myös erikoisempia annoksia kauden raaka-aineista. Terassi on auki aurinkoisella säällä, ja siellä on tilaa noin neljällekymmenelle asiakkaalle. Otamme huomioon erilaiset ruokavaliot: meiltä saa kasvis-, gluteenittomia ja laktoosittomia vaihtoehtoja. Kerro allergioistasi tarjoilijalle, niin keittiömme valmistaa sinulle sopivan annoksen. Suuremmille seurueille suosittelemme pöytävarausta, sillä ruuhka-aikoina vapaita pöytiä on vähän. Varauksen voi tehdä puhelimitse numerosta 040 123 4567 tai verkkosivuiltamme milloin tahansa. Huomaa, että heinäkuussa ravintola on suljettu kahden viikon ajan, viikoilla 28 ja 29, kun henkilökuntamme pitää ansaittua kesälomaa. Seuraa meitä sosiaalisessa mediassa, niin saat tietoa viikon erikoisannoksista, tarjouksista ja tulevista tapahtumista. Lämpimästi tervetuloa nauttimaan hyvästä ruoasta ja rennosta tunnelmasta!", "teksti_de": "Willkommen im Restaurant Kanerva! In der Sommersaison haben wir jeden Tag von 11 bis 22 Uhr geöffnet. Mittagessen servieren wir werktags von 11 bis 14 Uhr, und der Preis für das Mittagessen beträgt 12,90 Euro. Zum Mittagessen gehören eine Suppe, ein warmes Hauptgericht, ein Salatbuffet, Brot sowie Kaffee oder Tee. An den Wochenenden bieten wir den ganzen Tag à-la-carte-Gerichte an, und dann bereitet unsere Küche auch ausgefallenere Gerichte aus den Zutaten der Saison zu. Die Terrasse ist bei sonnigem Wetter geöffnet, und dort ist Platz für etwa vierzig Gäste. Wir berücksichtigen verschiedene Ernährungsweisen: Bei uns gibt es vegetarische, glutenfreie und laktosefreie Optionen. Teilen Sie dem Kellner Ihre Allergien mit, dann bereitet unsere Küche Ihnen ein passendes Gericht zu. Größeren Gesellschaften empfehlen wir eine Tischreservierung, denn zu Stoßzeiten sind nur wenige Tische frei. Die Reservierung kann jederzeit telefonisch unter der Nummer 040 123 4567 oder über unsere Website vorgenommen werden. Beachten Sie, dass das Restaurant im Juli zwei Wochen lang geschlossen ist, in den Wochen 28 und 29, wenn unser Personal seinen wohlverdienten Sommerurlaub nimmt. Folgen Sie uns in den sozialen Medien, dann erhalten Sie Informationen über die Spezialgerichte der Woche, Angebote und kommende Veranstaltungen. Herzlich willkommen, um gutes Essen und eine entspannte Atmosphäre zu genießen!", "hl": ["Lounasta tarjoamme arkisin kello 11–14, ja lounaan hinta on 12,90 euroa.", "Lounaaseen kuuluu keitto, lämmin pääruoka, salaattipöytä, leipä sekä kahvi tai tee.", "Otamme huomioon erilaiset ruokavaliot: meiltä saa kasvis-, gluteenittomia ja laktoosittomia vaihtoehtoja.", "Suuremmille seurueille suosittelemme pöytävarausta, sillä ruuhka-aikoina vapaita pöytiä on vähän."], "image": "Simulaatio_06_ruoka/images/teksti1.jpg", "items": [{"id": "L1", "tyyppi": "monivalinta", "kysymys": "Mihin aikaan lounasta tarjoillaan arkisin?", "vaihtoehdot": ["Kello 11–14", "Kello 11–22", "Koko päivän"], "oikea": "a", "selitys_fi": "Tekstissä sanotaan, että lounasta tarjotaan arkisin kello 11–14.", "vihje_de": "„arkisin\" = werktags, der Mittagstisch ist nur an Wochentagen 11–14 Uhr.", "kysymys_de": "Um welche Uhrzeit wird werktags das Mittagessen serviert?"}, {"id": "L2", "tyyppi": "monivalinta", "kysymys": "Mitä lounaaseen ei kuulu?", "vaihtoehdot": ["Jälkiruoka", "Salaattipöytä", "Kahvi tai tee"], "oikea": "a", "selitys_fi": "Lounaaseen kuuluu keitto, pääruoka, salaattipöytä ja kahvi tai tee, mutta jälkiruokaa ei mainita.", "vihje_de": "„jälkiruoka\" = Nachtisch; das ist im Mittagsmenü nicht enthalten.", "kysymys_de": "Was gehört nicht zum Mittagessen?"}, {"id": "L3", "tyyppi": "oikein-väärin", "kysymys": "Ravintola tarjoaa myös kasvisruokaa ja gluteenittomia annoksia.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstin mukaan ravintolasta saa kasvis-, gluteenittomia ja laktoosittomia vaihtoehtoja.", "vihje_de": "„kasvisruoka\" = vegetarisches Essen, „gluteeniton\" = glutenfrei.", "kysymys_de": "Das Restaurant bietet auch vegetarisches Essen und glutenfreie Gerichte an."}, {"id": "L4", "tyyppi": "lyhyt", "kysymys": "Miten suuren seurueen kannattaa varmistaa pöytä etukäteen?", "vaihtoehdot": [], "oikea": "Tekemällä pöytävarauksen puhelimitse tai verkkosivuilla.", "selitys_fi": "Suuremmille seurueille suositellaan pöytävarausta, jonka voi tehdä puhelimitse tai verkkosivuilta.", "vihje_de": "„pöytävaraus\" = Tischreservierung; per Telefon oder Website möglich.", "kysymys_de": "Wie sollte eine große Gesellschaft sich im Voraus einen Tisch sichern?"}]}, {"otsikko": "Helppo uunilohi neljälle", "tyyppi": "ohje", "teksti": "Tämä uunilohi on helppo ja nopea arkiruoka, joka onnistuu aloittelijaltakin eikä vaadi erityisiä keittiötaitoja. Tarvitset noin 600 grammaa lohifilettä, kaksi sitruunaa, tuoretta tilliä, suolaa ja oliiviöljyä. Lisukkeeksi sopivat hyvin keitetyt perunat ja höyrytetyt kasvikset, esimerkiksi parsakaali tai porkkana. Aloita lämmittämällä uuni 200 asteeseen. Laita sillä aikaa lohifile uunivuokaan nahkapuoli alaspäin. Purista toisen sitruunan mehu kalan päälle ja ripottele pinnalle suolaa sekä hienonnettua tilliä. Valele lopuksi hieman oliiviöljyä, jotta kala pysyy mehevänä. Paista lohta uunissa noin 15–20 minuuttia, kunnes kala on kypsää mutta yhä mehevää. Älä paista liian kauan, sillä silloin lohi kuivuu helposti ja menettää makuaan. Sillä aikaa kun kala kypsyy, keitä perunat kypsiksi runsaassa suolavedessä. Tarjoile lohi lämpimänä sitruunalohkojen ja tuoreen tillin kanssa. Jos haluat juhlavamman aterian, voit lisätä kastikkeen, joka tehdään kermasta ja tuoreesta tillistä. Tämä annos maistuu sekä lapsille että aikuisille, ja se sisältää paljon terveellistä kalaa sekä hyviä rasvoja.", "teksti_de": "Dieser Ofenlachs ist ein einfaches und schnelles Alltagsgericht, das auch einem Anfänger gelingt und keine besonderen Küchenkenntnisse erfordert. Du brauchst etwa 600 Gramm Lachsfilet, zwei Zitronen, frischen Dill, Salz und Olivenöl. Als Beilage passen gut gekochte Kartoffeln und gedünstetes Gemüse, zum Beispiel Brokkoli oder Karotten. Beginne damit, den Ofen auf 200 Grad vorzuheizen. Lege währenddessen das Lachsfilet mit der Hautseite nach unten in eine Auflaufform. Presse den Saft der zweiten Zitrone über den Fisch und streue Salz sowie gehackten Dill darüber. Beträufle zum Schluss alles mit etwas Olivenöl, damit der Fisch saftig bleibt. Brate den Lachs etwa 15–20 Minuten im Ofen, bis der Fisch gar, aber noch saftig ist. Brate ihn nicht zu lange, denn dann trocknet der Lachs leicht aus und verliert an Geschmack. Während der Fisch gart, koche die Kartoffeln in reichlich Salzwasser gar. Serviere den Lachs warm mit Zitronenspalten und frischem Dill. Wenn du ein festlicheres Mahl möchtest, kannst du eine Soße hinzufügen, die aus Sahne und frischem Dill zubereitet wird. Dieses Gericht schmeckt sowohl Kindern als auch Erwachsenen, und es enthält viel gesunden Fisch sowie gute Fette.", "hl": ["Aloita lämmittämällä uuni 200 asteeseen.", "Laita sillä aikaa lohifile uunivuokaan nahkapuoli alaspäin.", "Älä paista liian kauan, sillä silloin lohi kuivuu helposti ja menettää makuaan.", "Jos haluat juhlavamman aterian, voit lisätä kastikkeen, joka tehdään kermasta ja tuoreesta tillistä."], "image": "Simulaatio_06_ruoka/images/teksti2.jpg", "items": [{"id": "L5", "tyyppi": "monivalinta", "kysymys": "Kuinka kuumaksi uuni lämmitetään?", "vaihtoehdot": ["150 asteeseen", "200 asteeseen", "250 asteeseen"], "oikea": "b", "selitys_fi": "Ohjeessa kehotetaan lämmittämään uuni 200 asteeseen.", "vihje_de": "„aste\" = Grad; der Ofen wird auf 200 Grad erhitzt.", "kysymys_de": "Wie heiß wird der Ofen erhitzt?"}, {"id": "L6", "tyyppi": "monivalinta", "kysymys": "Miksi lohta ei kannata paistaa liian kauan?", "vaihtoehdot": ["Se palaa pohjaan", "Se kuivuu helposti", "Se ei kypsy kunnolla"], "oikea": "b", "selitys_fi": "Tekstin mukaan liian pitkä paistaminen kuivattaa lohen helposti.", "vihje_de": "„kuivua\" = austrocknen; zu langes Garen macht den Lachs trocken.", "kysymys_de": "Warum sollte man den Lachs nicht zu lange braten?"}, {"id": "L7", "tyyppi": "oikein-väärin", "kysymys": "Lohi laitetaan uunivuokaan nahkapuoli ylöspäin.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Ohjeen mukaan lohi laitetaan vuokaan nahkapuoli alaspäin.", "vihje_de": "„nahkapuoli alaspäin\" = die Hautseite nach unten.", "kysymys_de": "Der Lachs wird mit der Hautseite nach oben in die Auflaufform gelegt."}, {"id": "L8", "tyyppi": "lyhyt", "kysymys": "Mistä juhlavamman aterian kastike tehdään?", "vaihtoehdot": [], "oikea": "Kermasta ja tuoreesta tillistä.", "selitys_fi": "Tekstin mukaan kastike valmistetaan kermasta ja tuoreesta tillistä.", "vihje_de": "„kerma\" = Sahne, „tilli\" = Dill.", "kysymys_de": "Woraus wird die Soße für das festlichere Mahl zubereitet?"}]}, {"otsikko": "Lähiruoka maistuu ja säästää ympäristöä", "tyyppi": "blogi", "teksti": "Olen viime vuosina alkanut kiinnittää yhä enemmän huomiota siihen, mistä ruokani tulee. Aloin käydä viikoittain torilla ja lähikaupan suomalaisten tuottajien hyllyllä. Lähiruoalla tarkoitetaan ruokaa, joka on tuotettu lähellä omaa asuinpaikkaa. Sen etuja ovat tuoreus, lyhyt kuljetusmatka ja paikallisten tuottajien tukeminen. Kun ostan kasviksia suoraan viljelijältä, tiedän, mistä ne tulevat, ja raha jää oman alueen talouteen. Moni luulee, että lähiruoka on aina kallista, mutta sesongin aikaan esimerkiksi juurekset ja marjat ovat usein edullisia. Itse suosin kesällä kotimaisia mansikoita ja syksyllä sieniä, joita poimin itse metsästä. Tietysti kaikkea ei voi saada läheltä, ja kahvini juon edelleen mielelläni. Mielestäni tärkeintä on tehdä pieniä valintoja arjessa. En usko täydellisyyteen, vaan siihen, että jokainen voi vähentää ruoan ympäristövaikutuksia omilla tavoillaan. Suosittelen kokeilemaan: maku yllättää usein positiivisesti, ja samalla oppii arvostamaan suomalaista ruokaa uudella tavalla.", "teksti_de": "Ich habe in den letzten Jahren begonnen, immer mehr darauf zu achten, woher mein Essen kommt. Ich fing an, wöchentlich auf den Markt und zum Regal der finnischen Erzeuger im nahegelegenen Geschäft zu gehen. Mit regionalen Lebensmitteln ist Essen gemeint, das in der Nähe des eigenen Wohnortes erzeugt wird. Zu seinen Vorteilen gehören Frische, kurze Transportwege und die Unterstützung lokaler Erzeuger. Wenn ich Gemüse direkt vom Landwirt kaufe, weiß ich, woher es kommt, und das Geld bleibt in der Wirtschaft der eigenen Region. Viele glauben, dass regionale Lebensmittel immer teuer sind, aber in der Saison sind zum Beispiel Wurzelgemüse und Beeren oft günstig. Ich selbst bevorzuge im Sommer einheimische Erdbeeren und im Herbst Pilze, die ich selbst im Wald sammle. Natürlich kann man nicht alles aus der Nähe bekommen, und meinen Kaffee trinke ich nach wie vor gern. Meiner Meinung nach ist das Wichtigste, im Alltag kleine Entscheidungen zu treffen. Ich glaube nicht an Perfektion, sondern daran, dass jeder die Umweltauswirkungen des Essens auf seine eigene Weise verringern kann. Ich empfehle, es auszuprobieren: Der Geschmack überrascht oft positiv, und zugleich lernt man, finnisches Essen auf eine neue Weise zu schätzen.", "hl": ["Lähiruoalla tarkoitetaan ruokaa, joka on tuotettu lähellä omaa asuinpaikkaa.", "Sen etuja ovat tuoreus, lyhyt kuljetusmatka ja paikallisten tuottajien tukeminen.", "Moni luulee, että lähiruoka on aina kallista, mutta sesongin aikaan esimerkiksi juurekset ja marjat ovat usein edullisia.", "Itse suosin kesällä kotimaisia mansikoita ja syksyllä sieniä, joita poimin itse metsästä."], "image": "Simulaatio_06_ruoka/images/teksti3.jpg", "items": [{"id": "L9", "tyyppi": "monivalinta", "kysymys": "Mitä lähiruoka tarkoittaa kirjoittajan mukaan?", "vaihtoehdot": ["Lähellä asuinpaikkaa tuotettua ruokaa", "Ulkomailta tuotua ruokaa", "Vain luomuruokaa"], "oikea": "a", "selitys_fi": "Tekstissä lähiruoka määritellään ruoaksi, joka on tuotettu lähellä omaa asuinpaikkaa.", "vihje_de": "„lähiruoka\" = regionale/lokale Lebensmittel.", "kysymys_de": "Was bedeuten regionale Lebensmittel laut dem Verfasser?"}, {"id": "L10", "tyyppi": "monivalinta", "kysymys": "Mitä mieltä kirjoittaja on lähiruoan hinnasta?", "vaihtoehdot": ["Se on aina kallista", "Se voi olla sesonkina edullista", "Se on aina ilmaista"], "oikea": "b", "selitys_fi": "Kirjoittajan mukaan sesongin aikaan esimerkiksi juurekset ja marjat ovat usein edullisia.", "vihje_de": "„sesonki\" = Saison; in der Saison ist es oft günstig.", "kysymys_de": "Welcher Meinung ist der Verfasser über den Preis regionaler Lebensmittel?"}, {"id": "L11", "tyyppi": "oikein-väärin", "kysymys": "Kirjoittaja poimii itse sieniä metsästä syksyllä.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Tekstin mukaan kirjoittaja suosii syksyllä sieniä, joita poimii itse metsästä.", "vihje_de": "„poimia sieniä\" = Pilze sammeln.", "kysymys_de": "Der Verfasser sammelt im Herbst selbst Pilze im Wald."}, {"id": "L12", "tyyppi": "lyhyt", "kysymys": "Mainitse yksi lähiruoan etu, jonka kirjoittaja kertoo.", "vaihtoehdot": [], "oikea": "Tuoreus, lyhyt kuljetusmatka tai paikallisten tuottajien tukeminen.", "selitys_fi": "Kirjoittaja mainitsee lähiruoan eduiksi tuoreuden, lyhyen kuljetusmatkan ja paikallisten tuottajien tukemisen.", "vihje_de": "Ein Vorteil reicht, z. B. „tuoreus\" = Frische.", "kysymys_de": "Nennen Sie einen Vorteil regionaler Lebensmittel, den der Verfasser erwähnt."}]}, {"otsikko": "Kasviproteiinit kasvattavat suosiotaan Suomessa", "tyyppi": "uutinen", "teksti": "Kasvipohjaisten ruokien suosio on kasvanut Suomessa nopeasti viime vuosina. Kaupoissa on nykyään tarjolla yhä enemmän tuotteita, jotka korvaavat lihaa, kuten papuja, härkäpapuvalmisteita ja erilaisia kasviproteiineja. Tuoreen selvityksen mukaan jo lähes puolet suomalaisista on vähentänyt lihan syömistä ainakin jonkin verran. Syyt vaihtelevat: osa haluaa syödä terveellisemmin, osa miettii ympäristöä ja osa kokeilee uusia makuja uteliaisuudesta. Asiantuntijat muistuttavat, että monipuolinen kasvisruokavalio voi olla hyvin ravitseva, kunhan ruoasta saa riittävästi proteiinia, rautaa ja B12-vitamiinia. Ravintolat ovat reagoineet muutokseen lisäämällä kasvisvaihtoehtoja ruokalistoilleen. Myös kouluissa ja työpaikkaruokaloissa tarjotaan aiempaa useammin kasvisruokaa. Kaikki eivät kuitenkaan halua luopua lihasta kokonaan. Monelle sopii parhaiten niin sanottu joustava ruokavalio, jossa kasvisruokaa syödään arkena ja lihaa vain silloin tällöin. Tutkijoiden mukaan ruokavalion muutos näkyy todennäköisesti myös tulevaisuuden kaupan valikoimissa, kun kysyntä kasvipohjaisille tuotteille jatkaa kasvuaan.", "teksti_de": "Die Beliebtheit pflanzlicher Lebensmittel ist in Finnland in den letzten Jahren schnell gewachsen. In den Geschäften gibt es heutzutage immer mehr Produkte, die Fleisch ersetzen, wie Bohnen, Erzeugnisse aus Ackerbohnen und verschiedene Pflanzenproteine. Laut einer aktuellen Untersuchung hat bereits fast die Hälfte der Finnen den Fleischkonsum zumindest etwas reduziert. Die Gründe sind unterschiedlich: Ein Teil möchte sich gesünder ernähren, ein Teil denkt an die Umwelt und ein Teil probiert aus Neugier neue Geschmäcker aus. Experten weisen darauf hin, dass eine abwechslungsreiche vegetarische Ernährung sehr nahrhaft sein kann, sofern man aus der Nahrung ausreichend Protein, Eisen und Vitamin B12 bekommt. Die Restaurants haben auf die Veränderung reagiert, indem sie vegetarische Optionen auf ihre Speisekarten gesetzt haben. Auch in Schulen und Betriebskantinen wird häufiger als früher vegetarisches Essen angeboten. Allerdings möchten nicht alle ganz auf Fleisch verzichten. Vielen passt am besten die sogenannte flexible Ernährung, bei der unter der Woche vegetarisch gegessen wird und Fleisch nur ab und zu. Laut den Forschern wird sich die Veränderung der Ernährung wahrscheinlich auch im künftigen Sortiment des Handels zeigen, wenn die Nachfrage nach pflanzlichen Produkten weiter wächst.", "hl": ["Tuoreen selvityksen mukaan jo lähes puolet suomalaisista on vähentänyt lihan syömistä ainakin jonkin verran.", "Kaikki eivät kuitenkaan halua luopua lihasta kokonaan.", "Monelle sopii parhaiten niin sanottu joustava ruokavalio, jossa kasvisruokaa syödään arkena ja lihaa vain silloin tällöin."], "image": "Simulaatio_06_ruoka/images/teksti4.jpg", "items": [{"id": "L13", "tyyppi": "monivalinta", "kysymys": "Kuinka moni suomalainen on selvityksen mukaan vähentänyt lihan syömistä?", "vaihtoehdot": ["Lähes puolet", "Vain harva", "Lähes kaikki"], "oikea": "a", "selitys_fi": "Selvityksen mukaan lähes puolet suomalaisista on vähentänyt lihan syömistä ainakin jonkin verran.", "vihje_de": "„lähes puolet\" = fast die Hälfte.", "kysymys_de": "Wie viele Finnen haben laut der Untersuchung den Fleischkonsum reduziert?"}, {"id": "L14", "tyyppi": "oikein-väärin", "kysymys": "Tekstin mukaan kaikki suomalaiset haluavat luopua lihasta kokonaan.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Tekstissä todetaan, että kaikki eivät halua luopua lihasta kokonaan, vaan monelle sopii joustava ruokavalio.", "vihje_de": "„luopua\" = aufgeben/verzichten; nicht alle wollen ganz verzichten.", "kysymys_de": "Laut dem Text wollen alle Finnen ganz auf Fleisch verzichten."}, {"id": "L15", "tyyppi": "lyhyt", "kysymys": "Mikä on niin sanottu joustava ruokavalio?", "vaihtoehdot": [], "oikea": "Ruokavalio, jossa syödään arkena kasvisruokaa ja lihaa vain silloin tällöin.", "selitys_fi": "Joustavassa ruokavaliossa kasvisruokaa syödään arkena ja lihaa vain silloin tällöin.", "vihje_de": "„joustava\" = flexibel; flexitarische Ernährung.", "kysymys_de": "Was ist die sogenannte flexible Ernährung?"}]}], "listening": [{"otsikko": "Pöytävaraus ravintolaan", "tyyppi": "puhelu", "litteraatti": "– Tarjoilija: Ravintola Aurora, hyvää päivää.\n– Asiakas: Päivää! Haluaisin varata pöydän ensi lauantaiksi. Onko teillä tilaa?\n– Tarjoilija: Katsotaanpa. Monelleko hengelle ja mihin aikaan?\n– Asiakas: Meitä on kuusi henkilöä, ja haluaisimme tulla noin kello seitsemältä illalla.\n– Tarjoilija: Kello seitsemän on aika suosittu aika, mutta meillä on vielä yksi pöytä vapaana. Sopiiko se?\n– Asiakas: Sopii hyvin. Yksi meistä on kasvissyöjä ja yhdellä on pähkinäallergia. Onnistuuko se?\n– Tarjoilija: Totta kai. Merkitsen tiedon varaukseen, niin keittiö osaa ottaa sen huomioon. Kerrottehan vielä tarkemmin allergiasta paikan päällä.\n– Asiakas: Selvä, kiitos. Vielä yksi asia: vietämme ystäväni syntymäpäivää, joten voisimmeko tuoda oman kakun?\n– Tarjoilija: Se sopii. Veloitamme pienen kattausmaksun, kaksi euroa hengeltä. Saanko vielä nimen ja puhelinnumeron varausta varten?\n– Asiakas: Nimi on Laine ja numero 040 765 4321.\n– Tarjoilija: Kiitos, varaus on nyt tehty. Tervetuloa lauantaina!", "litteraatti_de": "– Kellner: Restaurant Aurora, guten Tag.\n– Kunde: Guten Tag! Ich möchte für nächsten Samstag einen Tisch reservieren. Haben Sie Platz?\n– Kellner: Schauen wir mal. Für wie viele Personen und zu welcher Uhrzeit?\n– Kunde: Wir sind sechs Personen, und wir möchten gegen sieben Uhr abends kommen.\n– Kellner: Sieben Uhr ist eine recht beliebte Zeit, aber wir haben noch einen Tisch frei. Passt der?\n– Kunde: Der passt gut. Eine(r) von uns ist Vegetarier(in) und eine Person hat eine Nussallergie. Geht das?\n– Kellner: Natürlich. Ich vermerke die Information bei der Reservierung, dann kann die Küche das berücksichtigen. Erzählen Sie uns die Allergie bitte noch genauer vor Ort.\n– Kunde: Alles klar, danke. Noch eine Sache: Wir feiern den Geburtstag meiner Freundin, könnten wir also einen eigenen Kuchen mitbringen?\n– Kellner: Das geht. Wir berechnen eine kleine Gedeckgebühr, zwei Euro pro Person. Darf ich noch den Namen und die Telefonnummer für die Reservierung haben?\n– Kunde: Der Name ist Laine und die Nummer 040 765 4321.\n– Kellner: Danke, die Reservierung ist nun erfolgt. Willkommen am Samstag!", "hl": ["Meitä on kuusi henkilöä, ja haluaisimme tulla noin kello seitsemältä illalla.", "Yksi meistä on kasvissyöjä ja yhdellä on pähkinäallergia.", "Veloitamme pienen kattausmaksun, kaksi euroa hengeltä."], "audio": "Simulaatio_06_ruoka/audio/ku1.m4a", "items": [{"id": "Ku1", "tyyppi": "monivalinta", "kysymys": "Kuinka monelle hengelle pöytä varataan?", "vaihtoehdot": ["Neljälle", "Kuudelle", "Seitsemälle"], "oikea": "b", "selitys_fi": "Asiakas sanoo, että heitä on kuusi henkilöä.", "vihje_de": "„kuusi henkilöä\" = sechs Personen.", "kysymys_de": "Für wie viele Personen wird der Tisch reserviert?"}, {"id": "Ku2", "tyyppi": "monivalinta", "kysymys": "Mihin aikaan asiakkaat haluavat tulla ravintolaan?", "vaihtoehdot": ["Kello viideltä", "Kello kuudelta", "Kello seitsemältä"], "oikea": "c", "selitys_fi": "Asiakas toivoo pöytää noin kello seitsemältä illalla.", "vihje_de": "„kello seitsemältä\" = um sieben Uhr.", "kysymys_de": "Um welche Uhrzeit möchten die Kunden ins Restaurant kommen?"}, {"id": "Ku3", "tyyppi": "oikein-väärin", "kysymys": "Yhdellä asiakkaista on pähkinäallergia.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Asiakas kertoo, että yhdellä seurueesta on pähkinäallergia.", "vihje_de": "„pähkinäallergia\" = Nussallergie.", "kysymys_de": "Eine(r) der Kunden hat eine Nussallergie."}, {"id": "Ku4", "tyyppi": "lyhyt", "kysymys": "Mitä asiakkaat saavat tuoda mukanaan, ja mitä siitä veloitetaan?", "vaihtoehdot": [], "oikea": "Oman kakun, ja siitä veloitetaan kahden euron kattausmaksu hengeltä.", "selitys_fi": "Seurue saa tuoda oman kakun, ja ravintola veloittaa kahden euron kattausmaksun hengeltä.", "vihje_de": "„oma kakku\" = eigene Torte; „kattausmaksu\" = Gedeck-/Servicegebühr.", "kysymys_de": "Was dürfen die Kunden mitbringen, und was wird dafür berechnet?"}]}, {"otsikko": "Ruokakaupassa", "tyyppi": "dialogi", "litteraatti": "– Asiakas: Anteeksi, voisitteko auttaa? Etsin gluteenitonta leipää, mutta en löydä sitä mistään.\n– Myyjä: Totta kai. Gluteenittomat tuotteet ovat tuolla erikoisruokavalioiden hyllyssä, heti leipäosaston vieressä.\n– Asiakas: Kiitos. Onko teillä myös laktoositonta maitoa?\n– Myyjä: On, maitohyllyssä on oma osasto laktoosittomille tuotteille. Sininen kyltti näyttää paikan.\n– Asiakas: Hienoa. Etsin vielä tuoretta kalaa. Onko se täällä lähellä?\n– Myyjä: Kala-altaamme on kaupan perällä. Tänään meillä on tarjouksessa kotimaista kirjolohta, kymmenen euroa kilo.\n– Asiakas: Kuulostaa hyvältä. Onko kala tuoretta vai pakastettua?\n– Myyjä: Tämä on tuoretta, tänään saapunutta. Suosittelen lämpimästi.\n– Asiakas: Otan sitten noin kuusisataa grammaa. Voitteko pakata sen?\n– Myyjä: Mielelläni. Haluatteko vielä jotain muuta?\n– Asiakas: En kiitos, tämä riittää. Missä on lähin kassa?\n– Myyjä: Kassat ovat heti ulko-oven vieressä. Mukavaa päivänjatkoa!", "litteraatti_de": "– Kunde: Entschuldigung, könnten Sie mir helfen? Ich suche glutenfreies Brot, finde es aber nirgends.\n– Verkäufer: Natürlich. Die glutenfreien Produkte sind dort drüben im Regal für Spezialdiäten, gleich neben der Brotabteilung.\n– Kunde: Danke. Haben Sie auch laktosefreie Milch?\n– Verkäufer: Ja, im Milchregal gibt es eine eigene Abteilung für laktosefreie Produkte. Das blaue Schild zeigt die Stelle.\n– Kunde: Schön. Ich suche noch frischen Fisch. Ist der hier in der Nähe?\n– Verkäufer: Unsere Fischtheke ist hinten im Geschäft. Heute haben wir einheimische Regenbogenforelle im Angebot, zehn Euro das Kilo.\n– Kunde: Das klingt gut. Ist der Fisch frisch oder tiefgekühlt?\n– Verkäufer: Dieser ist frisch, heute angekommen. Ich empfehle ihn wärmstens.\n– Kunde: Dann nehme ich etwa sechshundert Gramm. Können Sie ihn einpacken?\n– Verkäufer: Gerne. Möchten Sie noch etwas anderes?\n– Kunde: Nein danke, das reicht. Wo ist die nächste Kasse?\n– Verkäufer: Die Kassen sind gleich neben der Außentür. Schönen weiteren Tag!", "hl": ["Etsin gluteenitonta leipää, mutta en löydä sitä mistään.", "Tänään meillä on tarjouksessa kotimaista kirjolohta, kymmenen euroa kilo.", "Tämä on tuoretta, tänään saapunutta."], "audio": "Simulaatio_06_ruoka/audio/ku2.m4a", "items": [{"id": "Ku5", "tyyppi": "monivalinta", "kysymys": "Mitä asiakas etsii ensimmäiseksi?", "vaihtoehdot": ["Gluteenitonta leipää", "Tuoretta kalaa", "Laktoositonta maitoa"], "oikea": "a", "selitys_fi": "Asiakas etsii ensin gluteenitonta leipää, jota ei löydä itse.", "vihje_de": "„gluteeniton leipä\" = glutenfreies Brot.", "kysymys_de": "Was sucht der Kunde zuerst?"}, {"id": "Ku6", "tyyppi": "monivalinta", "kysymys": "Mikä on tänään tarjouksessa?", "vaihtoehdot": ["Kotimainen kirjolohi", "Laktoositon maito", "Gluteeniton leipä"], "oikea": "a", "selitys_fi": "Myyjä kertoo, että tarjouksessa on kotimaista kirjolohta kymmenen euroa kilo.", "vihje_de": "„tarjous\" = Angebot; „kirjolohi\" = Regenbogenforelle.", "kysymys_de": "Was ist heute im Angebot?"}, {"id": "Ku7", "tyyppi": "oikein-väärin", "kysymys": "Tarjouksessa oleva kala on pakastettua.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "väärin", "selitys_fi": "Myyjä sanoo, että kala on tuoretta ja tänään saapunutta, ei pakastettua.", "vihje_de": "„tuore\" = frisch, „pakastettu\" = tiefgekühlt.", "kysymys_de": "Der Fisch im Angebot ist tiefgekühlt."}, {"id": "Ku8", "tyyppi": "lyhyt", "kysymys": "Kuinka paljon kalaa asiakas ostaa?", "vaihtoehdot": [], "oikea": "Noin kuusisataa grammaa.", "selitys_fi": "Asiakas pyytää noin kuusisataa grammaa kalaa.", "vihje_de": "„kuusisataa grammaa\" = sechshundert Gramm.", "kysymys_de": "Wie viel Fisch kauft der Kunde?"}]}, {"otsikko": "Kuulutus kauppakeskuksen ruokatorilla", "tyyppi": "kuulutus", "litteraatti": "Hyvät asiakkaat, tervetuloa kauppakeskus Saaren ruokatorille! Tänään vietämme suomalaisen ruoan päivää, ja tarjolla on monenlaisia makuelämyksiä eri puolilta Suomea. Ruokatori on avoinna kello kymmenestä kello kahdeksaan illalla. Pohjakerroksessa pääset maistamaan perinteisiä leivonnaisia, kuten karjalanpiirakoita ja korvapuusteja. Toisessa kerroksessa ravintolat tarjoavat lounasta erikoishintaan kello kahteentoista asti. Muistattehan, että monilla pisteillä on tarjolla myös kasvis- ja gluteenittomia vaihtoehtoja, joten kysykää rohkeasti henkilökunnalta. Kello kahdelta järjestämme lapsille leivontatyöpajan, jonne voi ilmoittautua infopisteellä. Päivän aikana paikalla on myös tunnettu kokki, joka esittelee kotimaisia raaka-aineita ja antaa vinkkejä arjen ruoanlaittoon. Kokin esitys alkaa kello kolme keskusaukiolla. Toivotamme kaikille asiakkaille oikein hyvää ja maukasta päivää. Nauttikaa suomalaisesta ruoasta ja hyvästä seurasta!", "litteraatti_de": "Sehr geehrte Kunden, willkommen auf dem Lebensmittelmarkt des Einkaufszentrums Saari! Heute feiern wir den Tag des finnischen Essens, und es gibt vielerlei Geschmackserlebnisse aus verschiedenen Teilen Finnlands. Der Lebensmittelmarkt ist von zehn Uhr bis acht Uhr abends geöffnet. Im Erdgeschoss können Sie traditionelles Gebäck probieren, wie karelische Piroggen und Zimtschnecken. In der zweiten Etage bieten die Restaurants bis zwölf Uhr Mittagessen zum Sonderpreis an. Denken Sie bitte daran, dass an vielen Ständen auch vegetarische und glutenfreie Optionen angeboten werden, fragen Sie also ruhig das Personal. Um zwei Uhr veranstalten wir für Kinder einen Backworkshop, zu dem man sich am Infopunkt anmelden kann. Im Laufe des Tages ist auch ein bekannter Koch anwesend, der einheimische Zutaten vorstellt und Tipps für das Kochen im Alltag gibt. Der Auftritt des Kochs beginnt um drei Uhr auf dem zentralen Platz. Wir wünschen allen Kunden einen recht schönen und schmackhaften Tag. Genießen Sie das finnische Essen und die gute Gesellschaft!", "hl": ["Tänään vietämme suomalaisen ruoan päivää, ja tarjolla on monenlaisia makuelämyksiä eri puolilta Suomea.", "Pohjakerroksessa pääset maistamaan perinteisiä leivonnaisia, kuten karjalanpiirakoita ja korvapuusteja.", "Kokin esitys alkaa kello kolme keskusaukiolla."], "audio": "Simulaatio_06_ruoka/audio/ku3.m4a", "items": [{"id": "Ku9", "tyyppi": "monivalinta", "kysymys": "Mitä tänään juhlitaan ruokatorilla?", "vaihtoehdot": ["Suomalaisen ruoan päivää", "Kahvin päivää", "Lasten juhlaa"], "oikea": "a", "selitys_fi": "Kuulutuksen mukaan tänään vietetään suomalaisen ruoan päivää.", "vihje_de": "„suomalaisen ruoan päivä\" = Tag des finnischen Essens.", "kysymys_de": "Was wird heute auf dem Lebensmittelmarkt gefeiert?"}, {"id": "Ku10", "tyyppi": "monivalinta", "kysymys": "Mihin aikaan kokin esitys alkaa?", "vaihtoehdot": ["Kello kaksi", "Kello kolme", "Kello kahdeksan"], "oikea": "b", "selitys_fi": "Kuulutuksessa kerrotaan, että kokin esitys alkaa kello kolme keskusaukiolla.", "vihje_de": "„kello kolme\" = um drei Uhr.", "kysymys_de": "Um welche Uhrzeit beginnt der Auftritt des Kochs?"}, {"id": "Ku11", "tyyppi": "oikein-väärin", "kysymys": "Lapsille järjestetään leivontatyöpaja.", "vaihtoehdot": ["oikein", "väärin"], "oikea": "oikein", "selitys_fi": "Kuulutuksen mukaan kello kahdelta järjestetään lapsille leivontatyöpaja.", "vihje_de": "„leivontatyöpaja\" = Backworkshop für Kinder.", "kysymys_de": "Für Kinder wird ein Backworkshop veranstaltet."}, {"id": "Ku12", "tyyppi": "lyhyt", "kysymys": "Mitä perinteisiä leivonnaisia pohjakerroksessa voi maistaa?", "vaihtoehdot": [], "oikea": "Karjalanpiirakoita ja korvapuusteja.", "selitys_fi": "Pohjakerroksessa voi maistaa perinteisiä leivonnaisia, kuten karjalanpiirakoita ja korvapuusteja.", "vihje_de": "„karjalanpiirakka\" = karelische Pirogge, „korvapuusti\" = Zimtschnecke.", "kysymys_de": "Welches traditionelle Gebäck kann man im Erdgeschoss probieren?"}]}], "writing": [{"id": "K1", "tyyppi": "epävirallinen viesti", "ohje_fi": "Ystäväsi on kutsunut sinut illalliselle ensi viikolla. Kirjoita hänelle viesti. Kiitä kutsusta, kysy mitä voit tuoda mukanasi ja kerro, että et syö lihaa. Ehdota myös sopivaa kellonaikaa.", "ohje_de": "Ihre Freundin/Ihr Freund hat Sie nächste Woche zum Abendessen eingeladen. Schreiben Sie eine Nachricht. Bedanken Sie sich für die Einladung, fragen Sie, was Sie mitbringen können, und erwähnen Sie, dass Sie kein Fleisch essen. Schlagen Sie auch eine passende Uhrzeit vor.", "sanamaara": "80–120", "mallivastaus": "Hei Maija!\n\nKiitos tosi paljon kutsusta. Oli ihana kuulla, että pääsen illalliselle ensi viikolla. Olen odottanut, että näkisin sinut taas pitkästä aikaa.\n\nVoinko tuoda jotain mukanani? Tekisin mielelläni jälkiruoan tai toisin pullon viiniä. Kerro, kumpi sopisi paremmin.\n\nHaluan myös mainita, etten syö lihaa, joten kasvisruoka käy minulle hyvin. Älä siis nää ylimääräistä vaivaa minun takiani.\n\nSopisiko meille kello kuusi illalla? Silloin ehtisin tulla suoraan töiden jälkeen. Jos jokin toinen aika sopii sinulle paremmin, kerro vain.\n\nKiitos vielä kutsusta. Nähdään ensi viikolla!\n\nTerveisin\nTheresia", "arviointi_fi": "Hyvässä vastauksessa on epävirallinen ja ystävällinen sävy, kaikki neljä tehtävänantoa (kiitos, kysymys tuomisista, tieto ruokavaliosta ja aikaehdotus) on käsitelty, ja teksti on selkeästi jäsennelty alku- ja lopputervehdyksineen.", "mallivastaus_de": "Hallo Maija!\n\nVielen Dank für die Einladung. Es war schön zu hören, dass ich nächste Woche zum Abendessen kommen kann. Ich habe darauf gewartet, dich nach langer Zeit wiederzusehen.\n\nKann ich etwas mitbringen? Ich würde gern einen Nachtisch machen oder eine Flasche Wein mitbringen. Sag mir, was besser passen würde.\n\nIch möchte auch erwähnen, dass ich kein Fleisch esse, vegetarisches Essen ist für mich also gut. Mach dir meinetwegen also keine zusätzliche Mühe.\n\nWürde uns achtzehn Uhr passen? Dann würde ich es schaffen, direkt nach der Arbeit zu kommen. Falls dir eine andere Zeit besser passt, sag einfach Bescheid.\n\nNochmals danke für die Einladung. Wir sehen uns nächste Woche!\n\nViele Grüße\nTheresia"}, {"id": "K2", "tyyppi": "mielipide-/foorumikirjoitus", "ohje_fi": "Kirjoita keskustelupalstalle mielipidekirjoitus aiheesta ”Pitäisikö kouluissa ja työpaikoilla tarjota enemmän kasvisruokaa?”. Kerro oma mielipiteesi, perustele se vähintään kahdella perustelulla ja ota huomioon myös toinen näkökulma.", "ohje_de": "Schreiben Sie einen Meinungsbeitrag für ein Diskussionsforum zum Thema „Sollte in Schulen und an Arbeitsplätzen mehr vegetarisches Essen angeboten werden?\". Nennen Sie Ihre Meinung, begründen Sie sie mit mindestens zwei Argumenten und berücksichtigen Sie auch eine andere Sichtweise.", "sanamaara": "150–200", "mallivastaus": "Pitäisikö kouluissa ja työpaikoilla tarjota enemmän kasvisruokaa? Minun mielestäni ehdottomasti pitäisi, ja kerron seuraavaksi, miksi olen tätä mieltä.\n\nEnsinnäkin kasvisruoka on yleensä hyväksi sekä terveydelle että ympäristölle. Kun syömme enemmän kasviksia, palkokasveja ja täysjyväviljaa, saamme paljon kuitua ja vitamiineja, ja samalla jaksamme paremmin pitkän päivän aikana. Lisäksi kasvisruoan tuotanto kuormittaa ympäristöä vähemmän kuin lihantuotanto, mikä on tärkeää tulevaisuuden kannalta. Toiseksi monilla ihmisillä on nykyään erilaisia ruokavalioita, ja useampi kasvisvaihtoehto helpottaisi arkea kasvissyöjille ja niille, jotka haluavat vähentää lihaa terveyssyistä.\n\nYmmärrän kuitenkin, että kaikki eivät halua luopua lihasta. Heidän mielestään ruoan pitää olla maukasta ja täyttävää, ja he pelkäävät, ettei kasvisruoasta saa tarpeeksi energiaa ja proteiinia. Tämä huoli on osittain aiheellinen, jos ateria suunnitellaan huonosti tai liian yksipuoliseksi.\n\nMielestäni paras ratkaisu olisi tarjota joka päivä sekä liha- että kasvisvaihtoehto. Näin jokainen voi valita itselleen sopivan annoksen oman makunsa ja vakaumuksensa mukaan. Hyvin valmistettu kasvisruoka voi maistua kaikille, ja monipuolinen tarjonta on mielestäni paljon tärkeämpää kuin yksi ainoa vaihtoehto.", "arviointi_fi": "Hyvä vastaus sisältää selkeän oman mielipiteen, vähintään kaksi perustelua, vastakkaisen näkökulman huomioimisen sekä jäsennellyn rakenteen, jossa on aloitus, perustelukappaleet ja päätös; kielen tulee olla sujuvaa ja sidossanoja (ensinnäkin, toiseksi, kuitenkin) käytetään luontevasti.", "mallivastaus_de": "Sollte in Schulen und an Arbeitsplätzen mehr vegetarisches Essen angeboten werden? Meiner Meinung nach sollte das unbedingt geschehen, und ich erkläre als Nächstes, warum ich dieser Meinung bin.\n\nErstens ist vegetarisches Essen im Allgemeinen sowohl für die Gesundheit als auch für die Umwelt gut. Wenn wir mehr Gemüse, Hülsenfrüchte und Vollkorngetreide essen, bekommen wir viele Ballaststoffe und Vitamine, und zugleich sind wir während eines langen Tages leistungsfähiger. Außerdem belastet die Produktion von vegetarischem Essen die Umwelt weniger als die Fleischproduktion, was im Hinblick auf die Zukunft wichtig ist. Zweitens haben viele Menschen heutzutage verschiedene Ernährungsweisen, und mehrere vegetarische Optionen würden den Alltag für Vegetarier und für diejenigen erleichtern, die aus gesundheitlichen Gründen Fleisch reduzieren wollen.\n\nIch verstehe jedoch, dass nicht alle auf Fleisch verzichten wollen. Ihrer Meinung nach muss das Essen schmackhaft und sättigend sein, und sie befürchten, dass man aus vegetarischem Essen nicht genug Energie und Protein bekommt. Diese Sorge ist teilweise berechtigt, wenn die Mahlzeit schlecht oder zu einseitig geplant wird.\n\nMeiner Meinung nach wäre die beste Lösung, jeden Tag sowohl eine Fleisch- als auch eine vegetarische Option anzubieten. So kann jeder das für sich passende Gericht nach seinem eigenen Geschmack und seiner Überzeugung wählen. Gut zubereitetes vegetarisches Essen kann allen schmecken, und ein vielfältiges Angebot ist meiner Meinung nach viel wichtiger als eine einzige Option."}, {"id": "K3", "tyyppi": "kuvaileva/puolivirallinen", "ohje_fi": "Kävit hiljattain uudessa ravintolassa kotikaupungissasi. Kirjoita lyhyt arvostelu paikallisen lehden ruokapalstalle. Kuvaile ravintolan tunnelmaa, kerro mitä söit ja millaista palvelu oli sekä suosittele paikkaa muille lukijoille.", "ohje_de": "Sie waren kürzlich in einem neuen Restaurant in Ihrer Heimatstadt. Schreiben Sie eine kurze Rezension für die Gastronomiekolumne einer Lokalzeitung. Beschreiben Sie die Atmosphäre des Restaurants, berichten Sie, was Sie gegessen haben und wie der Service war, und empfehlen Sie den Ort anderen Lesern.", "sanamaara": "120–160", "mallivastaus": "Kävin viime viikonloppuna uudessa ravintolassa nimeltä Koivu, joka avattiin kaupungin keskustaan vain kuukausi sitten. Ensivaikutelma oli jo ovella erittäin miellyttävä. Sisustus oli vaalea ja rauhallinen, ja pöydillä paloivat pienet kynttilät. Tunnelma oli lämmin mutta samalla tyylikäs, joten paikka sopii hyvin sekä rentoon arki-iltaan että juhlavamman illallisen viettoon.\n\nTilasin alkuun kauden kasviskeiton ja pääruoaksi paistettua kalaa perunamuusin kanssa. Ruoka oli tuoretta ja kauniisti aseteltua, ja annokset olivat sopivan kokoisia. Erityisesti jälkiruoka, kotitekoinen mustikkapiirakka, oli aivan unohtumaton ja sopivan makea.\n\nMyös palvelu ansaitsee kehut. Henkilökunta oli ystävällistä ja osasi suositella sopivia annoksia, kun kerroin omasta ruokavaliostani. Hinnat olivat mielestäni täysin kohtuulliset annosten laatuun ja kokoon nähden.\n\nSuosittelen ravintola Koivua lämpimästi kaikille, jotka arvostavat hyvää ruokaa ja rentoa tunnelmaa. Itse aion ehdottomasti palata sinne pian uudelleen, mieluiten ystävien seurassa.", "arviointi_fi": "Hyvässä arvostelussa kuvaillaan monipuolisesti tunnelmaa, ruokaa ja palvelua, annetaan selkeä suositus ja käytetään kuvailevia adjektiiveja; tyylin tulee olla puolivirallinen ja tekstin johdonmukaisesti etenevä.", "mallivastaus_de": "Ich war letztes Wochenende in einem neuen Restaurant namens Koivu, das erst vor einem Monat im Stadtzentrum eröffnet wurde. Der erste Eindruck war schon an der Tür äußerst angenehm. Die Einrichtung war hell und ruhig, und auf den Tischen brannten kleine Kerzen. Die Atmosphäre war warm, aber zugleich stilvoll, sodass der Ort sich sowohl für einen entspannten Abend unter der Woche als auch für ein festlicheres Abendessen gut eignet.\n\nIch bestellte zu Beginn die Gemüsesuppe der Saison und als Hauptgericht gebratenen Fisch mit Kartoffelpüree. Das Essen war frisch und schön angerichtet, und die Portionen hatten eine angemessene Größe. Besonders der Nachtisch, eine hausgemachte Blaubeertorte, war geradezu unvergesslich und passend süß.\n\nAuch der Service verdient Lob. Das Personal war freundlich und konnte passende Gerichte empfehlen, als ich von meiner eigenen Ernährungsweise erzählte. Die Preise waren meiner Meinung nach völlig angemessen im Verhältnis zur Qualität und Größe der Portionen.\n\nIch empfehle das Restaurant Koivu allen wärmstens, die gutes Essen und eine entspannte Atmosphäre schätzen. Ich selbst habe fest vor, bald wieder dorthin zurückzukehren, am liebsten in Gesellschaft von Freunden."}], "speaking": [{"id": "P1", "tyyppi": "tilannereaktio", "ohje_fi": "Olet ravintolassa. Tarjoilija tulee pöytääsi. Tilaa pääruoaksi keittoa ja kysy, onko siinä pähkinöitä, koska sinulla on allergia.", "ohje_de": "Sie sind im Restaurant. Der Kellner kommt an Ihren Tisch. Bestellen Sie als Hauptgericht eine Suppe und fragen Sie, ob Nüsse darin sind, da Sie eine Allergie haben.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Hei! Ottaisin pääruoaksi päivän keiton, kiitos. Onko keitossa pähkinöitä? Minulla on nimittäin pähkinäallergia.", "malli_de": "Hallo! Ich nehme als Hauptgericht die Tagessuppe, bitte. Sind in der Suppe Nüsse? Ich habe nämlich eine Nussallergie."}, {"id": "P2", "tyyppi": "tilannereaktio", "ohje_fi": "Soitat ravintolaan ja haluat varata pöydän. Kerro, että haluat varata pöydän neljälle hengelle perjantai-illaksi kello kahdeksaksi.", "ohje_de": "Sie rufen ein Restaurant an und möchten einen Tisch reservieren. Sagen Sie, dass Sie für Freitagabend um acht Uhr einen Tisch für vier Personen reservieren möchten.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Hyvää päivää! Haluaisin varata pöydän neljälle hengelle perjantai-illaksi kello kahdeksaksi. Onko teillä silloin tilaa?", "malli_de": "Guten Tag! Ich möchte für Freitagabend um acht Uhr einen Tisch für vier Personen reservieren. Haben Sie dann Platz?"}, {"id": "P3", "tyyppi": "tilannereaktio", "ohje_fi": "Olet kahvilassa. Haluat tilata kahvin ja jotain makeaa. Tilaa kahvi maidolla ja kysy, mitä leivonnaisia heillä on tänään.", "ohje_de": "Sie sind in einem Café. Sie möchten einen Kaffee und etwas Süßes bestellen. Bestellen Sie einen Kaffee mit Milch und fragen Sie, welche Gebäcke es heute gibt.", "valmistautuminen_s": 0, "puheaika_s": 20, "malli": "Hei! Saisinko yhden kahvin maidolla? Mitä leivonnaisia teillä on tänään tarjolla?", "malli_de": "Hallo! Könnte ich einen Kaffee mit Milch bekommen? Welches Gebäck haben Sie heute im Angebot?"}, {"id": "P4", "tyyppi": "tilannereaktio", "ohje_fi": "Tilasit ruokaa, mutta annos on kylmää. Pyydä tarjoilijaa ystävällisesti lämmittämään ruoka tai tuomaan uusi annos.", "ohje_de": "Sie haben Essen bestellt, aber die Portion ist kalt. Bitten Sie den Kellner höflich, das Essen aufzuwärmen oder eine neue Portion zu bringen.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, mutta ruokani on valitettavasti kylmää. Voisitteko lämmittää sen tai tuoda uuden annoksen? Kiitos paljon.", "malli_de": "Entschuldigung, aber mein Essen ist leider kalt. Könnten Sie es aufwärmen oder eine neue Portion bringen? Vielen Dank."}, {"id": "P5", "tyyppi": "tilannereaktio", "ohje_fi": "Olet ruokakaupassa etkä löydä gluteenittomia tuotteita. Pyydä myyjältä apua ja kysy, missä hyllyssä ne ovat.", "ohje_de": "Sie sind im Supermarkt und finden die glutenfreien Produkte nicht. Bitten Sie eine Verkäuferin/einen Verkäufer um Hilfe und fragen Sie, in welchem Regal sie sind.", "valmistautuminen_s": 0, "puheaika_s": 25, "malli": "Anteeksi, voisitteko auttaa? Etsin gluteenittomia tuotteita. Missä hyllyssä ne ovat?", "malli_de": "Entschuldigung, könnten Sie mir helfen? Ich suche glutenfreie Produkte. In welchem Regal sind sie?"}, {"id": "P6", "tyyppi": "kerronta", "ohje_fi": "Kerro suosikkiruoastasi. Mikä ruoka on ja miksi pidät siitä? Kerro myös, milloin yleensä syöt sitä ja osaatko valmistaa sen itse. Voit kertoa myös muistosta, joka liittyy tähän ruokaan.", "ohje_de": "Erzählen Sie von Ihrem Lieblingsessen. Welches Gericht ist es und warum mögen Sie es? Erzählen Sie auch, wann Sie es gewöhnlich essen und ob Sie es selbst zubereiten können. Sie können auch von einer Erinnerung erzählen, die mit diesem Essen verbunden ist.", "valmistautuminen_s": 60, "puheaika_s": 90, "malli": "Suosikkiruokani on lohikeitto. Pidän siitä, koska se on samalla lämmittävää ja terveellistä, ja se sopii erityisen hyvin kylmään talvipäivään. Keitossa on lohta, perunaa, porkkanaa ja tuoretta tilliä, ja se maistuu mielestäni kotoisalta. Syön lohikeittoa yleensä viikonloppuisin, kun minulla on enemmän aikaa keittiössä. Osaan valmistaa sen itse, ja se on itse asiassa melko helppoa. Ensin keitän kasvikset, sitten lisään lohen ja lopuksi vähän kermaa ja tilliä. Tärkeintä on, ettei kalaa keitä liian kauan. Tämä ruoka liittyy minulla mukavaan muistoon. Opin tekemään lohikeittoa isoäidiltäni, joka valmisti sitä aina, kun kävimme kylässä. Muistan vieläkin, miltä hänen keittiössään tuoksui. Siksi lohikeitto ei ole minulle vain ruokaa, vaan se tuo mieleen lämpimiä muistoja lapsuudesta ja perheestä.", "malli_de": "Mein Lieblingsessen ist Lachssuppe. Ich mag sie, weil sie zugleich wärmend und gesund ist, und sie passt besonders gut zu einem kalten Wintertag. In der Suppe sind Lachs, Kartoffeln, Karotten und frischer Dill, und sie schmeckt meiner Meinung nach heimelig. Ich esse Lachssuppe gewöhnlich an den Wochenenden, wenn ich mehr Zeit in der Küche habe. Ich kann sie selbst zubereiten, und das ist eigentlich ziemlich einfach. Zuerst koche ich das Gemüse, dann gebe ich den Lachs hinzu und zum Schluss etwas Sahne und Dill. Das Wichtigste ist, den Fisch nicht zu lange zu kochen. Dieses Gericht ist bei mir mit einer schönen Erinnerung verbunden. Ich habe das Kochen der Lachssuppe von meiner
